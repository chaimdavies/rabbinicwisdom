oly One, blessed be He. Rabbi Yonah, father of Rabbi Mana, said in the name of Rabbi Levi… The Torah did not need to be given in this world—since all are destined to learn from His mouth in the World to Come. Why was it given here? So that when He comes to teach them there, everyone will know which section He is engaged in. Therefore: If you listen in this world, you will listen in the World to Come."}, {"location": "Bamidbar Rabbah 8:2", "hebrew": "הַרְבֵּה הַקָּדוֹשׁ בָּרוּךְ הוּא אוֹהֵב אֶת הַגֵּרִים, לְמָה הַדָּבָר דּוֹמֶה לְמֶלֶךְ שֶׁהָיְתָה לוֹ צֹאן, וְהָיְתָה יוֹצֵאת בַּשָֹּׂדֶה וְנִכְנֶסֶת בָּעֶרֶב, כֵּן בְּכָל יוֹם, פַּעַם אֶחָד נִכְנַס צְבִי אֶחָד עִם הַצֹּאן הָלַךְ לוֹ אֵצֶל הָעִזִּים הָיָה רוֹעֶה עִמָּהֶם, נִכְנְסָה הַצֹּאן לַדִּיר, נִכְנַס עִמָּהֶם, יָצָאת לִרְעוֹת יָצָא עִמָּהֶם, אָמְרוּ לַמֶּלֶךְ הַצְּבִי הַזֶּה נִלְוֶה עִם הַצֹּאן, וְהוּא רוֹעֶה עִמָּהֶם, כָּל יוֹם וָיוֹם יוֹצֵא עִמָּהֶם וְנִכְנָס עִמָּהֶם, הָיָה הַמֶּלֶךְ אוֹהֲבוֹ, בִּזְּמַן שֶׁהוּא יוֹצֵא לַשָֹּׂדֶה הָיָה מְפַקֵּד מִרְעֶה יָפֶה לִרְצוֹנוֹ, לֹא יַכֶּה אָדָם אוֹתוֹ הִזָּהֲרוּ בּוֹ, וְאַף כְּשֶׁהוּא נִכְנָס עִם הַצֹּאן הָיָה אוֹמֵר לָהֶם תְּנוּ לוֹ וְיִשְׁתֶּה, וְהָיָה אוֹהֲבוֹ הַרְבֵּה, אָמְרוּ לוֹ מָרִי כַּמָּה תְּיָשִׁים יֵשׁ לָךְ כַּמָּה כְּבָשִׂים יֵשׁ לָךְ כַמָּה גְּדָיִים יֵשׁ לָךְ, וְאֵין אַתּ מַזְהִירֵנוּ, וְעַל הַצְּבִי הַזֶּה בְּכָל יוֹם וָיוֹם אַתְּ מְצַוֵּנוּ. אָמַר לָהֶם הַמֶּלֶךְ, הַצֹּאן רוֹצָה וְלֹא רוֹצָה, כָּךְ הִיא דַּרְכָּהּ לִרְעוֹת בַּשָֹּׂדֶה כָּל הַיּוֹם וְלָעֶרֶב לָבוֹא לִישֹׁן בְּתוֹךְ הַדִּיר, הַצְּבָיִים בַּמִּדְבָּר הֵם יְשֵׁנִים, אֵין דַּרְכָּם לִכָּנֵס לְיִשּׁוּב בְּנֵי אָדָם, לֹא נַחֲזִיק טוֹבָה לָזֶה שֶׁהִנִּיחַ כָּל הַמִּדְבָּר הָרָחָב הַגָּדוֹל בִּמְקוֹם כָּל הַחַיּוֹת וּבָא וְעָמַד בֶּחָצֵר. כָּךְ אֵין אָנוּ צְרִיכִין לְהַחֲזִיק טוֹבָה לַגֵּר שֶׁהִנִּיחַ מִשְׁפַּחְתּוֹ וּבֵית אָבִיו וְהִנִּיחַ אֻמָּתוֹ וְכָל אֻמּוֹת הָעוֹלָם וּבָא לוֹ אֶצְלֵנוּ. לָכֵן הִרְבָּה עָלָיו שְׁמִירָה, שֶׁהִזְהִיר אֶת יִשְׂרָאֵל שֶׁיִּשְׁמְרוּ עַצְמָם מֵהֶם שֶׁלֹא יַזִּיקוּ לָהֶם, וְכֵן הוּא אוֹמֵר (דברים י, יט): וַאֲהַבְתֶּם אֶת הַגֵּר, (שמות כב, כ): וְגֵר לֹא תוֹנֶה וגו'", "english": "The Holy One, blessed be He, greatly loves converts. To what is this comparable? To a king who had sheep… One day a deer entered with the flock… The king loved it and would appoint fine pasture for it, and warn: Do not strike it… The servants said: Master, you have so many goats and sheep, yet you constantly warn us about this deer! He said: The flock’s way is to graze and return to the pen; deer sleep in the wilderness and do not enter settled places—should we not hold this one favorably for leaving the wide wilderness and coming to the courtyard? So too the convert left family, father’s house, nation, and came to us. Therefore He increased his protection, warning Israel not to harm them, as it says: “You shall love the convert,” and “A convert you shall not oppress.”"}, {"location": "Midrash Tanchuma, Vayelech 2", "hebrew": "אָמַר אֵלִיָּהוּ זִכְרוֹנוֹ לִבְרָכָה, פַּעַם אַחַת הָיִיתִי מְהַלֵּךְ בַּדֶּרֶךְ וּמָצָאתִי אָדָם אֶחָד, וְהָיָה מַלְעִיג לִי וּמִתְלוֹצֵץ בִּי. אָמַרְתִּי לוֹ, מָה אַתָּה מֵשִׁיב לְיוֹם הַדִּין אַחַר שֶׁלֹּא לָמַדְתָּ תּוֹרָה. אָמַר, יֵשׁ לִי לְהָשִׁיב, בִּינָה וָדַעַת וָלֵב שֶׁלֹּא נִתְּנוּ לִי מִן הַשָּׁמַיִם. אָמַרְתִּי לוֹ, מַה מְּלַאכְתֶּךָ. אָמַר לִי, צַיַּד עוֹפוֹת וְדָגִים אֲנִי. אָמַרְתִּי לוֹ, מִי נָתַן לְךָ דַּעַת וָלֵב לִיקַּח פִּשְׁתָּן וְלִטְווֹתוֹ וְלֶאֶרְגוֹ וְלַעֲשׂוֹת הַמְּצוּדוֹת וְלָקַחַת בָּהֶן דָּגִים וְעוֹפוֹת וּלְמָכְרָם. אָמַר לִי, בִּינָה וָדַעַת שֶׁנִּתְּנוּ לִי מִן הַשָּׁמַיִם. אָמַרְתִּי לוֹ, לִיקַּח אֶת הַפִּשְׁתָּן לֶאֱרֹג וְלִטְווֹת וְלָקַחַת הַדָּגִים וְהָעוֹפוֹת, נָתְנוּ לְךָ בִּינָה וָדַעַת. אֲבָל לִקְנוֹת אֶת הַתּוֹרָה לֹא נָתְנוּ לְךָ בִּינָה. וּכְתִיב: כִּי קָרוֹב אֵלֶיךָ הַדָּבָר מְאֹד בְּפִיךָ וּבִלְבָבְךָ לַעֲשׂוֹתוֹ (דברים ל, יד). מִיָּד הִרְהֵר בְּלִבּוֹ וְהֵרִים קוֹלוֹ בִּבְכִי. אָמַרְתִּי לוֹ, בְּנִי, אַל יֵרַע לְךָ, שֶׁכָּל בָּאֵי הָעוֹלָם כֵּיוָן שֶׁבָּאִין וְנִמְשָׁכִין מִן הַתּוֹרָה, מוֹכִיחִין עֲלֵיהֶם, שֶׁנֶּאֱמַר: וּבֹשׁוּ עוֹבְדֵי פִשְׁתִּים שְׁרִיקוֹת וְאֹרְגִים חוֹרַי (ישעיה יט, ט), וְעָלָיו וְעַל כַּיּוֹצֵא בּוֹ וְעַל הַדּוֹמִין לוֹ וְעַל הָעוֹשִׂין כְּמַעֲשָׂיו. וְאַחֲרִית דָּבָר, יִרְאַת ה'. וְעוֹשִׂין בֶּאֱמוּנָה, בּוֹ מוֹנֶה מְלַאכְתּוֹ וְרָאוּי לְחַיֵּי הָעוֹלָם הַבָּא.", "english": "Elijah, of blessed memory, said: Once I was walking on the road and found a man who mocked and derided me. I said: What will you answer on the Day of Judgment after you did not learn Torah? He said: I have an answer—understanding, knowledge, and heart were not given to me from Heaven. I asked: What is your trade? He said: I am a hunter of birds and fish. I said: Who gave you the understanding to take flax, spin it, weave it, make nets, catch fish and birds, and sell them? He said: Understanding and knowledge given to me from Heaven. I said: For nets and hunting you were given understanding; but to acquire Torah you were not? Yet it is written: “For the matter is very near to you, in your mouth and in your heart, to do it.” Immediately he reflected and wept… In the end: Fear of the LORD—and acting faithfully; he counts his craft and is fit for life in the World to Come."}, {"location": "Shir HaShirim Rabbah 1:3", "hebrew": "רַבִּי אֱלִיעֶזֶר וְרַבִּי יְהוֹשֻׁעַ וְרַבִּי עֲקִיבָא. רַבִּי אֱלִיעֶזֶר אוֹמֵר, אִם יִהְיוּ כָּל הַיַּמִּים דְּיוֹ, וַאֲגַמִּים קוּלְמוֹסִין, וְשָׁמַיִם וְאֶרֶץ מְגִלּוֹת, וְכָל בְּנֵי הָאָדָם לַבְלָרִים, אֵין מַסְפִּיקִין לִכְתּוֹב [דברי תורה שלמדתי], וַאֲנִי לֹא חִסַּרְתִּיהָ אֶלָּא כְּאָדָם שֶׁמַּטְבִּיל זַכְרוּתוֹ כְּמִכְּחוֹל בַּיָּם. רַבִּי יְהוֹשֻׁעַ אוֹמֵר אִם יִהְיוּ כָּל הַיַּמִּים דְּיוֹ, וַאֲגַמִּים קוּלְמוֹסִין, וְשָׁמַיִם וָאָרֶץ יְרִיעוֹת, וְכָל בְּנֵי אָדָם לַבְלָרִין, אֵין מַסְפִּיקִין לִכְתּוֹב דִּבְרֵי תוֹרָה שֶׁלָּמַדְתִּי, וְלֹא חִסַּרְתִּיהָ רַק כְּאָדָם שֶׁמַּטְבִּיל זַכְרוּתוֹ כְּמִכְּחוֹל בַּיָּם. רַבִּי עֲקִיבָא אוֹמֵר אֲנִי אֵין בִּי כֹּחַ לוֹמַר כְּמוֹ שֶׁאָמְרוּ רַבּוֹתַי, אֶלָּא רַבּוֹתַי חִסְּרוּהָ, וַאֲנִי לֹא חִסַּרְתִּיהָ, אֶלָּא כְּמֵרִיחַ בְּאֶתְרוֹג, הַמֵּרִיחַ נֶהֱנָה, וְהָאֶתְרוֹג לֹא חָסֵר, וְכִמְמַלֵּא מֵאַמַּת הַמַּיִם, וּכְמַדְּלִיק מִנֵּר לְנֵר.", "english": "Rabbi Eliezer, Rabbi Yehoshua, and Rabbi Akiva… Rabbi Eliezer said: If all seas were ink, and all reeds were pens, and heaven and earth were scrolls, and all people were scribes—they would not suffice to write the words of Torah I learned; and I diminished it only like one who dips a paintbrush in the sea. Rabbi Yehoshua said similarly… Rabbi Akiva said: I cannot speak as my teachers did; rather, my teachers diminished it and I did not diminish it—only like one who smells an etrog: the one who smells benefits, and the etrog does not lack; like drawing from a channel; like lighting one lamp from another."}, {"location": "Midrash Tanchuma Buber, Shemot 10", "hebrew": "אמר ר' אלעזר בן פדת ראה מה כתיב ויבן את בית ה' אלהי ישראל הוא האלהים אשר בירושלם (עזרא א ג), אינו זז משם. אמר ר' אחא, לעולם אין השכינה זזה מכותל מערבי של בית המקדש, שנאמר הנה זה עומד אחר כתלנו (שה\"ש ב ט), הוי ה' בהיכל קדשו.", "english": "Rabbi Elazar ben Pedat said: See what is written: “He will build the house of the LORD, God of Israel—He is the God who is in Jerusalem.” He does not move from there. Rabbi Aḥa said: The Divine Presence never departs from the Western Wall of the Temple, as it says: “Behold, He stands behind our wall.” Therefore: “The LORD is in His holy Temple.”"}, {"location": "Midrash Tanchuma, Kedoshim 8", "hebrew": "כִּי תָּבֹאוּ אֶל הָאָרֶץ וּנְטַעְתֶּם. אָמַר לָהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, אַף עַל פִּי שֶׁתִּמְצְאוּ אוֹתָהּ מְלֵאָה כָּל טוּב, לֹא תֹּאמְרוּ נֵשֵׁב וְלֹא נִטַּע, אֶלָּא הֱווּ זְהִירִין בִּנְטִיעוֹת, שֶׁנֶּאֱמַר: וּנְטַעְתֶּם כָּל עֵץ מַאֲכָל. כְּשֵׁם שֶׁנִּכְנַסְתֶּם וּמְצָאתֶם נְטִיעוֹת שֶׁנָּטְעוּ אֲחֵרִים, אַף אַתֶּם הֱיוּ נוֹטְעִים לְבָנֵיכֶם. שֶׁלֹּא יֹאמַר אָדָם, אֲנִי זָקֵן, כַּמָּה שָׁנִים אֲנִי חַי, מָה אֲנִי עוֹמֵד מִתְיַגֵּעַ לַאֲחֵרִים, לְמָחָר אֲנִי מֵת. אָמַר שְׁלֹמֹה, אֶת הַכֹּל עָשָׂה יָפֶה בְּעִתּוֹ גַּם אֶת הָעוֹלָם נָתַן בְּלִבָּם (קהלת ג, יא), הָעֹלָם כְּתִיב, חָסֵר וָא״ו. מַהוּ כֵן. אִלּוּלֵי שֶׁהַקָּדוֹשׁ בָּרוּךְ הוּא הֶעֱלִים מִלִּבּוֹ שֶׁל אָדָם אֶת הַמִּיתָה, לֹא הָיָה אָדָם בּוֹנֶה וְלֹא נוֹטֵעַ, שֶׁהָיָה אוֹמֵר, לְמָחָר אֲנִי מֵת, לָמָּה אֲנִי עוֹמֵד וּמִתְיַגֵּעַ לַאֲחֵרִים. לְפִיכָךְ הֶעֱלִים הַקָּדוֹשׁ בָּרוּךְ הוּא מִלִּבּוֹת שֶׁל בְּנֵי אָדָם אֶת יוֹם הַמִּיתָה, שֶׁיְּהֵא אָדָם בּוֹנֶה. זָכָה, יִהְיֶה לוֹ. לֹא זָכָה, לַאֲחֵרִים. מַעֲשֶׂה בְּאַדְרִיָּאנוּס הַמֶּלֶךְ שֶׁהָיָה עוֹבֵר לַמִּלְחָמָה וְהוֹלֵךְ עִם הַגְּיָסוֹת שֶׁלּוֹ לְהִלָּחֵם עַל מְדִינָה אַחַת שֶׁמָּרְדָה עָלָיו. מָצָא זָקֵן אֶחָד בַּדֶּרֶךְ שֶׁהָיָה נוֹטֵעַ נְטִיעוֹת תְּאֵנִים. אָמַר לוֹ אַדְרִיָּאנוּס, אַתָּה זָקֵן וְעוֹמֵד וְטוֹרֵחַ וּמִתְיַגֵּעַ לַאֲחֵרִים. אָמַר לוֹ: אֲדוֹנִי הַמֶּלֶךְ, הֲרֵינִי נוֹטֵעַ. אִם אֶזְכֶּה, אֹכַל מִפֵּרוֹת נְטִיעוֹתַי. וְאִם לָאו, יֹאכְלוּ בָּנַי. עָשָׂה שָׁלֹש שָׁנִים בַּמִּלְחָמָה וְחָזַר. לְאַחַר שָׁלֹש שָׁנִים מָצָא לְאוֹתוֹ זָקֵן בְּאוֹתוֹ מָקוֹם. מֶה עָשָׂה אוֹתוֹ זָקֵן, נֵטֶל סַלְסִלָּה וּמִלֵּא אוֹתָהּ בִּכּוּרֵי תְּאֵנִים יָפוֹת וְקֵרֵב לִפְנֵי אַדְרִיָּאנוּס. אָמַר לְפָנָיו, אֲדֹנִי הַמֶּלֶךְ, קַבֵּל מִן עַבְדְּךָ. אֲנִי הוּא אוֹתוֹ הַזָּקֵן שֶׁמָּצָאתָ אוֹתִי בַּהֲלִיכָתְךָ, וְאָמַרְתָּ לִי, אַתָּה זָקֵן מָה אַתָּה מִצְטַעֵר עוֹמֵד וּמִתְיַגֵּעַ לַאֲחֵרִים, הֲרֵי כְּבָר זִכַּנִי הַמָּקוֹם לֶאֱכֹל מִפֵּרוֹת נְטִיעוֹתַי, וְאֵלֶּה שֶׁבְּתוֹךְ הַסַּלְסִלָּה מֵהֶן מְנָתְךָ. מִיָּד אָמַר אַדְרִיָּאנוּס לַעֲבָדָיו, טְלוּ אוֹתָהּ מִמֶּנּוּ וּמִלְּאוּ אוֹתָהּ זְהוּבִים, וְעָשׂוּ כָּךְ. נָטַל הַזָּקֵן הַסַּלְסִלָּה מְלֵאָה זְהוּבִים, וְהִתְחִיל הוֹלֵךְ וּמִשְׁתַּבֵּחַ בְּבֵיתוֹ לְאִשְׁתּוֹ וּלְבָנָיו. סָח לָהֶם אֶת הַמַּעֲשֶׂה. הָיְתָה שְׁכֶנְתּוֹ עוֹמֶדֶת שָׁם, שָׁמְעָה מָה אָמַר הַזָּקֵן. אָמְרָה לְבַעֲלָהּ, כָּל בְּנֵי אָדָם הוֹלְכִין וְהַקָּדוֹשׁ בָּרוּךְ הוּא נוֹתֵן לָהֶם וּמְזַמֵּן לָהֶם טוֹבָה, וְאַתָּה יוֹשֵׁב בְּבַיִת חָשׁוּךְ בָּאֹפֶל. הֲרֵי שָׁכֵן שֶׁלָּנוּ כִּבֵּד אֶת הַמֶּלֶךְ בַּסַּלְסִלָּה שֶׁל תְּאֵנִים וּמִלֵּא אוֹתָהּ לוֹ זְהוּבִים. וְעַתָּה עֲמֹד וְטוֹל סַל גָּדוֹל וּמַלֵּא אוֹתוֹ כָּל מִינֵי מְגָדִים מִן תַּפּוּחִים וּתְאֵנִים וּשְׁאָר פֵּרוֹת יָפוֹת שֶׁהוּא אוֹהֵב אוֹתָן הַרְבֵּה, לֵךְ וְכַבְּדוֹ בָּהֶן, שֶׁמָּא יְמַלֵּא לְךָ זְהוּבִים, כְּמוֹ שֶׁעָשָׂה לִשְׁכֵנֵנוּ הַזָּקֵן. הָלַךְ וְשָׁמַע לְאִשְׁתּוֹ, וְנָטַל סַל גָּדוֹל וּמִלֵּא אוֹתוֹ כָּל מִינֵי מְגָדִים תְּאֵנִים וְתַפּוּחִים וְטָעַן עַל כְּתֵפוֹ וְקֵרֵב לִפְנֵי הַמֶּלֶךְ קוֹפַּנְדָר. וְעָמַד וְאָמַר, אֲדוֹנִי הַמֶּלֶךְ, שָׁמַעְתִּי שֶׁאַתָּה אוֹהֵב אֶת הַפֵּרוֹת, וּבָאתִי לְכַבֶּדְךָ בִּתְאֵנִים וְתַפּוּחִים. אָמַר הַמֶּלֶךְ לַסַּרְדְּיוֹטִין שֶׁלּוֹ, טְלוּ אוֹתוֹ מִמֶּנּוּ וְטִפְחוּ אוֹתָן עַל פָּנָיו. עָמְדוּ וְהִפְשִׁיטוּהוּ עָרֹם וְהִתְחִילוּ טוֹפְחִין אוֹתוֹ עַל פָּנָיו עַד שֶׁנָּפְחוּ פָּנָיו, סִמּוּ אֶת עֵינָיו וַעֲשָׂאוּהוּ דּוּגְמָא, וְהָלַךְ לְבֵיתוֹ בְּפַחֵי נֶפֶשׁ כְּשֶׁהוּא עָשׂוּי דּוּגְמָא, בּוֹכֶה. וְהָיְתָה אִשְׁתּוֹ סְבוּרָה שֶׁהוּא בָּא בְּסַל מָלֵא זְהוּבִים. וְרָאֲתָה אוֹתוֹ עָשׂוּי דּוּגְמָא וְעֵינָיו נְפוּחוֹת וְגוּפוֹ מְשֻׁבָּר וּמֻכֶּה. אָמְרָה לוֹ: מַה לְּךָ. אָמַר לָהּ: שֶׁשָּׁמַעְתִּי לָךְ וְהָלַכְתִּי לְכַבֵּד אֶת הַמֶּלֶךְ בְּאוֹתוֹ הַסַּל, וְטָפְחוּ אוֹתוֹ עַל פָּנַי. אִלּוּלֵי שֶׁשָּׁמַעְתִּי לָךְ וְהֵטַלְתִּי אוֹתוֹ הַסַּל אֶתְרוֹגִין, כְּבָר הָיוּ מַרְגִּימִין אוֹתִי אֶת כָּל גּוּפִי בָּהֶן. כָּל כָּךְ לָמָּה. לְלַמֶּדְךָ, שֶׁהַנָּשִׁים הָרָעוֹת מַפִּילוֹת אֶת בַּעֲלֵיהֶן בָּרָעָה. לְפִיכָךְ לֹא יִבָּטֵל אָדָם מִן הַנְּטִיעוֹת. אֶלָּא כְּשֵׁם שֶׁמָּצָא, עוֹד יוֹסִיף וְיִטַּע, אֲפִלּוּ יִהְיֶה זָקֵן. אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, לִמְדוּ מִמֶּנִּי, כִּבְיָכוֹל אֲנִי צָרִיךְ, שֶׁנֶּאֱמַר: וַיִּטַּע ה' אֱלֹהִים גַּן בְּעֵדֶן מִקֶּדֶם (בראשית ב, ח).", "english": "“When you come into the land and you shall plant…” The Holy One, blessed be He, said to Israel: Even though you will find it filled with every good, do not say: We will sit and not plant; rather, be careful with plantings, as it says: “And you shall plant every food tree.” Just as you entered and found plantings planted by others, so you should plant for your children. Let no one say: I am old… tomorrow I die—why toil for others? Therefore the Holy One hid from human hearts the day of death so that a person will build and plant… A story of Hadrian: he found an old man planting fig saplings… After three years he returned and the old man brought him first figs; the king filled his basket with gold… The neighbor tried likewise and was humiliated; therefore a person should not cease from planting—rather, as one found, one should add and plant, even if old. The Holy One said: Learn from Me—for I, as it were, planted, as it says: “And the LORD God planted a garden in Eden.”"}, {"location": "Midrash Tanchuma, Bereishit 4", "hebrew": "וכן אתה מוצא, שלא נתנו המועדות לישראל אלא להנאת עצמן. אמר הקב\"ה: אתם ההניתם עצמכם תהיו שונין לשנה הבאה, שנאמר: ושמרת את החוקה הזאת למועדה מימים ימימה (שמות יג) תהיו שונין מימים ימימה.", "english": "So too you find: The festivals were not given to Israel except for their own benefit. The Holy One, blessed be He, said: Since you benefited yourselves, you shall repeat them the next year, as it says: “You shall keep this statute at its appointed time, from days to days.”"}, {"location": "Midrash Tehillim 118", "hebrew": "פתחו לי שערי צדק. לעולם הבא אמרו לו לאדם מה היה מלאכתך? והוא אומר \"מאכיל רעבים הייתי\", והם יאמרו לו \"זה השער לה' מאכיל רעבים הכנס בו\". \"משקה צמאים היית\"י,והם אומרים לו \"זה השער לה', משקה צמאים הכנס בו\". \"מלביש ערומים הייתי\", והם אומרים לו \"זה השער לה', מלביש ערומים הכנס בו\". וכן מגדל יתומים, וכן עושי צדקה, וכן גומלי חסדים, ודוד אמר \"אני עשיתי את כולם! יפתחו לי את כולם!\" לכך נאמר \"פתחו לי שערי צדק אבוא בם אודה יה\".", "english": "“Open for me the gates of righteousness”: In the World to Come they will say to a person: What was your work? And he says: I fed the hungry—and they say: This is the gate of the LORD; feeder of the hungry, enter. I gave drink to the thirsty… I clothed the naked… and so with those who raise orphans, do charity, and do kindness. And David says: I did all of them—open all of them for me! Therefore it says: “Open for me the gates of righteousness; I will enter them and thank God.”"}, {"location": "Midrash Mishlei 9", "hebrew": "כל המועדים עתידים בטלים, וימי הפורים אינם בטלים לעולם, שנאמר (אסתר ט כח): \"וימי הפורים האלה לא יעברו מתוך היהודים\". אמר רבי אלעזר: אף יום הכיפורים אינו בטל לעולם, שנאמר (ויקרא טז לד): \"והיתה זאת לכם לחוקת עולם לכפר על בני ישראל מכל חטאתם אחת בשנה\".", "english": "All the festivals are destined to be annulled, but the days of Purim will never be annulled, as it says: “These days of Purim shall not pass from among the Jews.” Rabbi Elazar said: Even Yom Kippur will never be annulled, as it says: “It shall be for you an eternal statute, to atone for the children of Israel… once a year.”"}, {"location": "Sifrei, Ekev 43", "hebrew": "אע\"פ שאני מגלה אתכם מן הארץ לחוצה לארץ היו מצויינים במצוות, שכשאתם חוזרים לא יהיו לכם חדשים. משל למלך שכעס על אשתו וחזרה בבית אביה, אמר לה הוי מקושטת בתכשיטיך כשתחזרי לא יהו עליך חדשים, כך אמר להם הקב\"ה לישראל: \"בני, היו מצויינים במצות, שכשאתם חוזרים לא יהיו עליכם חדשים, שירמיהו אמר (ירמיהו לא כ) \"הציבי לך ציונים\", אילו המצות שישראל מצויינים בהם.", "english": "Even though I exile you from the land to the diaspora, be distinguished by mitzvot—so that when you return they will not be new to you. A parable: A king was angry with his wife and she returned to her father’s house; he said: Keep yourself adorned with your jewelry—so that when you return, it will not be new to you. So the Holy One said to Israel: My children, be distinguished by mitzvot… as Jeremiah said: “Set up for yourself markers”—these are the mitzvot by which Israel is marked."}, {"location": "Pesikta Rabbati 41", "hebrew": "ד\"א \"יפה נוף משוש כל הארץ\", א\"ר יוחנן אף כיפה של חשבונות היתה חוץ לירושלים וחשבנותיהם היו יוצאים ועושים חוץ לירושלים תחת אותה הכיפה מחוץ לעיר והיו אוכלים ושותים ושמחים בתוך העיר.", "english": "Another interpretation of “Beautiful in elevation, the joy of the whole earth”: Rabbi Yoḥanan said: Even the dome of accountants was outside Jerusalem; their calculations would be done outside the city under that dome, while inside the city they would eat, drink, and rejoice."}, {"location": "Bamidbar Rabbah 20:14", "hebrew": "דָּבָר אַחֵר, הַהַסְכֵּן הִסְכַּנְתִּי לַעֲשׂוֹת לְךָ כֹּה, חָס הַקָּדוֹשׁ בָּרוּךְ הוּא עַל כְּבוֹדוֹ שֶׁל אוֹתוֹ רָשָׁע, שֶׁלֹא יֹאמְרוּ זוֹ הָיְתָה שֶׁסִּלְּקָה אֶת בִּלְעָם. וְאִם חָס הַקָּדוֹשׁ בָּרוּךְ הוּא עַל כְּבוֹד הָרָשָׁע, אֵין צָרִיךְ לוֹמַר עַל כְּבוֹד הַצַּדִּיק. וְכֵן הוּא אוֹמֵר (ויקרא כ, טז): וְאִשָּׁה אֲשֶׁר תִּקְרַב אֶל כָּל בְּהֵמָה לְרִבְעָה אֹתָהּ וְהָרַגְתָּ אֶת הָאִשָּׁה וְאֶת הַבְּהֵמָה, שֶׁלֹא יֹאמְרוּ זוֹ הַבְּהֵמָה שֶׁנֶּהֶרְגָה אִשָּׁה פְּלוֹנִית עַל יָדֶיהָ, לְהוֹדִיעֲךָ שֶׁחָס הַקָּדוֹשׁ בָּרוּךְ הוּא עַל כְּבוֹדָן שֶׁל בְּרִיּוֹת וְיוֹדֵעַ צָרְכָּן וְסָתַם פִּי הַבְּהֵמָה, שֶׁאִלּוּ הָיְתָה מְדַבֶּרֶת לֹא הָיוּ יְכוֹלִין לְשַׁעְבְּדָהּ וְלַעֲמֹד בָּהּ, שֶׁזּוֹ הַטִּפֶּשֶׁת שֶׁבַּבְּהֵמָה, וְזֶה חָכָם שֶׁבַּחֲכָמִים, כֵּיוָן שֶׁדִּבְּרָה לֹא הָיָה יָכוֹל לַעֲמֹד בָּהּ.", "english": "Another interpretation: “Indeed, I have grown old; I have done this to you…” The Holy One, blessed be He, had pity on the honor of that wicked person, so that they would not say: This one is what removed Balaam. And if the Holy One has pity on the honor of the wicked, how much more so on the honor of the righteous. Likewise it says regarding a woman and an animal in bestiality: “You shall kill the woman and the animal,” so that they will not say: This is the animal by which so‑and‑so was killed—teaching that the Holy One has pity on the honor of creatures and knows their needs…"}, {"location": "Ruth Rabbah 5:6", "hebrew": "רַבִּי בֶּרֶכְיָה בְּשֵׁם רַבִּי לֵוִי כַּגּוֹאֵל הָרִאשׁוֹן כָּךְ גּוֹאֵל הָאַחֲרוֹן, מַה גּוֹאֵל הָרִאשׁוֹן נִגְלָה וְחָזַר וְנִכְסָה מֵהֶן, וְכַמָּה נִכְסָה מֵהֶן, שְׁלשָׁה חֳדָשִׁים, שֶׁנֶּאֱמַר (שמות ה, כ): וַיִּפְגְּעוּ אֶת משֶׁה וְאֶת אַהֲרֹן, אַף גּוֹאֵל אַחֲרוֹן נִגְלֶה לָהֶם וְחוֹזֵר וְנִכְסֶה מֵהֶם, וְכַמָּה נִכְסֶה מֵהֶם, רַבִּי תַּנְחוּמָא בְּשֵׁם רַבָּנָן אַרְבָּעִין וַחֲמִשָּׁה יוֹם, הֲדָא הוּא דִכְתִיב (דניאל יב, יא): וּמֵעֵת הוּסַר הַתָּמִיד וגו', וּכְתִיב (דניאל יב, יא): אַשְׁרֵי הַמְחַכֶּה וְיַגִּיעַ וגו', אִילֵין יְתֵירַיָא מָה אִינּוּן, רַבִּי יִצְחָק בֶּן קְצַרְתָּה מִשּׁוּם רַבִּי יוֹנָה אֵלּוּ אַרְבָּעִים וַחֲמִשָּׁה יָמִים שֶׁיִּשְׂרָאֵל קוֹטְפִים מַלּוּחַ וְאוֹכְלִים, הֲדָא הוּא דִכְתִיב (איוב ל, ד): הַקֹּטְפִים מַלּוּחַ עֲלֵי שִׂיחַ. לְאֵיכָן הוּא מוֹלִיכָן מִן הָאָרֶץ לְמִדְבַּר יְהוּדָה, שֶׁנֶּאֱמַר (הושע ב, טז): הִנֵּה אָנֹכִי מְפַתֶּיהָ וְהֹלַכְתִּיהָ הַמִּדְבָּר, מַאן דְּאָמַר לְמִדְבַּר סִיחוֹן וְעוֹג, שֶׁנֶּאֱמַר (הושע יב, י): עוֹד אוֹשִׁיבְךָ בָאֳהָלִים כִּימֵי מוֹעֵד, וְכָל שֶׁהוּא מַאֲמִין לוֹ, וְחָיָה. וּמִי שֶׁאֵינוֹ מַאֲמִין לוֹ הוֹלֵךְ לְאֻמּוֹת הָעוֹלָם וְהֵן מְמִיתִין אוֹתוֹ. אָמַר רַבִּי יִצְחָק בַּר מַרְיוֹן בַּסּוֹף הַקָּדוֹשׁ בָּרוּךְ הוּא נִגְלָה עֲלֵיהֶם וּמוֹרִיד לָהֶן מָן, וְאֵין כָּל חָדָשׁ תַּחַת הַשֶּׁמֶשׁ.", "english": "Rabbi Berekhya in the name of Rabbi Levi: Like the first redeemer, so the last redeemer. Just as the first redeemer appeared to them and then returned and was hidden from them—and how long was he hidden? Three months… so too the last redeemer will appear and then return and be hidden from them—and how long? Rabbi Tanḥuma said in the name of the Rabbis: Forty‑five days… During those days Israel will pick saltwort and eat… He will lead them into the wilderness… Whoever believes will live; whoever does not believe goes to the nations and they kill him. In the end the Holy One will reveal Himself and bring down manna… and there is nothing new under the sun."}, {"location": "Tanna Devei Eliyahu Rabbah 25", "hebrew": "וידבר אלקים את כל הדברים האלה לאמר אנכי ה' אלקיך וגו' (שמות כ׳:א׳-ב׳) ברוך המקום ברוך הוא שבחר בישראל מכל מעשה ידיו וקנה אותם קנין גמור וקרא אותם בנים ועבדים לשמו לפעמים הוא מדבר עמהם כמו שהוא מדבר עם הרבים ולפעמים הוא מדבר עמהם כמו שהוא מדבר עם היחיד וכל כך למה אלא בשביל האהבה שהוא אוהב אותם ובשביל השמחה שהוא משמח בהם לכן הוא מדבר עמהם בלשון יחיד ובלשון רבים. לפיכך הייתי אומר שכל אחד ואחד מישראל חייב לומר מתי יגיעו מעשי למעשה אבותי אברהם יצחק ויעקב שלא קנו האבות העוה\"ז והעוה\"ב וימות בן דוד אלא בשביל מעשיהם הטובים ות\"ת. וכך שנו חכמים במשנה כל אחד ואחד מישראל חייב לומר בשבילי נברא העולם ולא יאמר האדם בלבו לעצמו אין העוה\"ב אלא תוהו ובוהו לכן אלך בשרירות לבי ואוכל ואשתה ואהנה בעוה\"ז ואח\"כ אלך מן העוה\"ז. ואם הוא עושה כן עליו אומר אמר נבל בלבו אין אלקים", "english": "“God spoke all these words, saying: I am the LORD your God…” Blessed is the Omnipresent, blessed be He, who chose Israel from all His works and acquired them as a complete acquisition, and called them sons and servants for His name. Sometimes He speaks with them as with the many, and sometimes as with the individual—why? Because of the love with which He loves them, and the joy with which He rejoices in them; therefore He speaks in singular and in plural. Therefore each and every Israelite must say: When will my deeds reach the deeds of my fathers—Abraham, Isaac, and Jacob… And a person should not say in his heart: The World to Come is chaos—so I will follow my heart, eat and drink and enjoy this world, and afterwards depart. About such a person it says: “The fool said in his heart: There is no God.”"}, {"location": "Tanna Devei Eliyahu Rabbah 25", "hebrew": "ומפני מה נטמן המשכן עד היום הזה מפני שעשאוהו הכשרים בנדבות לבם וקשה לפני הקב\"ה להפסיד כל מה שעשו הכשרים בנדבות לבם ולעתיד יבא הקב\"ה וישרה בתוכו כמדה הראשונה שנאמר (ש\"ה ד) עורי צפון ובואי תימן וגו'", "english": "Why was the Tabernacle hidden until today? Because the worthy made it through their freewill gifts, and it is difficult before the Holy One, blessed be He, to let perish everything the worthy made with their freewill gifts. In the future the Holy One will come and rest His Presence within it as at first, as it says: “Awake, north wind, and come, south…”"}, {"location": "Bereishit Rabbah 100:7", "hebrew": "חֲבוּרָה וּמִשְׁפָּחָה כָּךְ הֵן דּוֹמִים לְכִפַּת אֲבָנִים, אַתְּ נוֹטֵל מִמֶּנָּהּ אֶבֶן אַחַת וְכוּלָּהּ מִתְרוֹעֲעַת, אַתְּ נוֹתֵן עָלֶיהָ אֶבֶן אַחַת וְכוּלָּהּ עוֹמֶדֶת.", "english": "A fellowship and a family are like a vaulted pile of stones: remove one stone and all of it collapses; place one stone on it and all of it stands."}, {"location": "Bereishit Rabbah 60:8", "hebrew": "אָמַר רַבִּי אַחָא יָפָה רְחִיצַת רַגְלֵי עַבְדֵי בָּתֵּי אָבוֹת מִתּוֹרָתָן שֶׁל בָּנִים, שֶׁאֲפִלּוּ רְחִיצַת רַגְלַיִם צָרִיךְ לִכְתֹּב, וְהַשֶּׁרֶץ מִגּוּפֵי תּוֹרָה וְאֵין דָּמוֹ מְטַמֵּא כִּבְשָׂרוֹ אֶלָּא מֵרִבּוּי הַמִּקְרָא.", "english": "Rabbi Aḥa said: The washing of the feet of the servants of the patriarchal houses is more precious than the Torah of children—for even the washing of feet needed to be written, whereas the creeping thing is from the body of Torah, yet its blood does not defile like its flesh except by an extra verse."}, {"location": "Ruth Rabbah 5:6", "hebrew": "אָמַר רַבִּי יִצְחָק בַּר מַרְיוֹן בָּא הַכָּתוּב לְלַמֶּדְךָ שֶׁאִם אָדָם עוֹשֶׂה מִצְוָה יַעֲשֶׂנָּה בְּלֵבָב שָׁלֵם, שֶׁאִלּוּ הָיָה רְאוּבֵן יוֹדֵעַ שֶׁהַקָּדוֹשׁ בָּרוּךְ הוּא מַכְתִּיב עָלָיו (בראשית לז, כא): וַיִּשְׁמַע רְאוּבֵן וַיַּצִּילֵהוּ מִיָּדָם, בִּכְתֵפוֹ הָיָה מוֹלִיכוֹ אֵצֶל אָבִיו. וְאִלּוּ הָיָה יוֹדֵעַ אַהֲרֹן שֶׁהַקָּדוֹשׁ בָּרוּךְ הוּא מַכְתִּיב עָלָיו (שמות ד, יד): הִנֵּה הוּא יֹצֵא לִקְרָאתֶךָ בְּתֻפִּים וּבִמְחוֹלוֹת הָיָה יוֹצֵא לִקְרָאתוֹ. וְאִלּוּ הָיָה יוֹדֵעַ בֹּעַז שֶׁהַקָּדוֹשׁ בָּרוּךְ הוּא מַכְתִּיב עָלָיו: וַיִּצְבָּט לָהּ קָלִי וַתֹּאכַל וַתִּשְׂבַּע וַתֹּתַר, עֲגָלוֹת מְפֻטָּמוֹת הָיָה מַאֲכִילָהּ. רַבִּי כֹּהֵן וְרַבִּי יְהוֹשֻׁעַ דְּסִכְנִין בְּשֵׁם רַבִּי לֵוִי לְשֶׁעָבַר הָיָה אָדָם עוֹשֶׂה מִצְוָה וְהַנָּבִיא כּוֹתְבָהּ, וְעַכְשָׁיו כְּשֶׁאָדָם עוֹשֶׂה מִצְוָה מִי כּוֹתְבָהּ, אֵלִיָּהוּ כּוֹתְבָהּ וּמֶלֶךְ הַמָּשִׁיחַ וְהַקָּדוֹשׁ בָּרוּךְ הוּא חוֹתֵם עַל יְדֵיהֶם, הֲדָא הוּא דִכְתִיב (מלאכי ג, טז): אָז נִדְבְּרוּ יִרְאֵי ה' אִישׁ אֶל רֵעֵהוּ וגו'.", "english": "Rabbi Yitzḥak bar Maryon said: Scripture comes to teach you that if a person does a mitzvah, he should do it with a whole heart—for if Reuben had known that the Holy One would write about him, “Reuben heard and rescued him,” he would have carried Joseph on his shoulders to his father. If Aaron had known that the Holy One would write about him, “Behold, he comes out to meet you,” he would have come out with drums and dances. And if Boaz had known that the Holy One would write about him, “He gave her roasted grain, and she ate and was satisfied and left over,” he would have fed her fattened calves… In earlier times, when a person did a mitzvah the prophet wrote it; now, who writes it? Elijah writes it, and King Messiah, and the Holy One signs it by their hand…"}, {"location": "Shemot Rabbah 17:2", "hebrew": "דָּבָר אַחֵר, וּלְקַחְתֶּם אֲגֻדַּת אֵזוֹב, הֲדָא הוּא דִכְתִיב (שיר השירים ב, ג): כְּתַפּוּחַ בַּעֲצֵי הַיַּעַר, לָמָּה נִמְשַׁל הַקָּדוֹשׁ בָּרוּךְ הוּא לְתַפּוּחַ, לוֹמַר לָךְ מַה תַּפּוּחַ זֶה נִרְאֶה לָעַיִן בְּלֹא כְלוּם וְיֵשׁ בּוֹ טַעַם וְרֵיחַ, כָּךְ הַקָּדוֹשׁ בָּרוּךְ הוּא (שיר השירים ה, טז): חִכּוֹ מַמְתַקִּים וְכֻלּוֹ מַחֲמַדִּים, וְנִרְאָה לְעוֹבְדֵי כּוֹכָבִים וְלֹא רָצוּ לְקַבֵּל הַתּוֹרָה וְהָיְתָה הַתּוֹרָה בְּעֵינֵיהֶם כְּדָבָר שֶׁאֵין בּוֹ מַמָּשׁ. וְיֵשׁ בּוֹ טַעַם וְרֵיחַ, טַעַם מִנַּיִן, שֶׁנֶּאֱמַר (תהלים לד, ט): טַעֲמוּ וּרְאוּ כִּי טוֹב ה'. וְיֵשׁ בּוֹ מַאֲכָל, דִּכְתִיב (משלי ח, יט): טוֹב פִּרְיִי מֵחָרוּץ וּמִפָּז. וְיֵשׁ בָּהּ רֵיחַ, שֶׁנֶּאֱמַר (שיר השירים ד, יא): וְרֵיחַ שַׂלְמֹתַיִךְ כְּרֵיחַ לְבָנוֹן. אָמְרוּ יִשְׂרָאֵל אָנוּ יוֹדְעִין כֹּחָהּ שֶׁל תּוֹרָה, לְפִיכָךְ אֵין אָנוּ זָזִין מִן הַקָּדוֹשׁ בָּרוּךְ הוּא וְתוֹרָתוֹ, שֶׁנֶּאֱמַר (שיר השירים ב, ג): בְּצִלּוֹ חִמַדְתִּי וְיָשַׁבְתִּי וּפִרְיוֹ מָתוֹק לְחִכִּי. וְכֵן יֵשׁ דְּבָרִים שֶׁהֵן נִרְאִין שְׁפָלִים, וְצִוָּה הַקָּדוֹשׁ בָּרוּךְ הוּא לַעֲשׂוֹת מֵהֶן כַּמָּה מִצְווֹת, הָאֵזוֹב נִרְאֶה לָאָדָם שֶׁאֵינוֹ כְּלוּם, וְכֹחוֹ גָּדוֹל לִפְנֵי הָאֱלֹהִים שֶׁמָּשַׁל אוֹתוֹ לְאֶרֶז בְּכַמָּה מְקוֹמוֹת, בְּטַהֲרַת מְצֹרָע, בִּשְׂרֵפַת הַפָּרָה, וּבְמִצְרַיִם צִוָּה לַעֲשׂוֹת מִצְוָה בָּאֵזוֹב, שֶׁנֶּאֱמַר: וּלְקַחְתֶּם אֲגֻדַּת אֵזוֹב. וְכֵן בִּשְׁלֹמֹה אוֹמֵר (מלכים א ה, יג): וַיְדַבֵּר עַל הָעֵצִים מִן הָאֶרֶז אֲשֶׁר בַּלְּבָנוֹן וְעַד הָאֵזוֹב אֲשֶׁר יֹצֵא בַּקִּיר, לְלַמֶּדְךָ שֶׁהַקָּטָן וְגָדוֹל שָׁוִין לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא, וּבִדְבָרִים קְטַנִּים הוּא עוֹשֶׂה נִסִּים, וְעַל יְדֵי אֵזוֹב שֶׁהוּא שָׁפָל שֶׁבָּאִילָנוֹת גָּאַל אֶת יִשְׂרָאֵל, הֱוֵי: כְּתַפּוּחַ בַּעֲצֵי הַיַּעַר.", "english": "Another interpretation: “And you shall take a bundle of hyssop.” This is what is written: “Like an apple tree among the trees of the forest…” Why is the Holy One compared to an apple? Just as the apple looks like nothing to the eye yet has taste and fragrance, so the Holy One… The nations saw and did not want to accept the Torah, and the Torah seemed to them like something with no substance—yet it has taste: “Taste and see that the LORD is good,” and it has fragrance… And there are things that appear lowly, yet the Holy One commanded many mitzvot to be done through them: hyssop appears as nothing, yet its power is great… teaching that small and great are equal before the Holy One, and through small things He performs miracles; and through hyssop, the lowliest, He redeemed Israel."}, {"location": "Sifrei Devarim 75:5", "hebrew": "רבי אלעזר בן עזריה אומר לא בא הכתוב אלא ללמדך דרך ארץ שלא יאכל אדם בשר אלא לתיאבון יכול יקח מן השוק ויאכל תלמוד לומר (כא) וזבחת מבקרך ומצאנך, הא אין אדם אוכל בשר עד שיהו לו בקר וצאן יכול יזבח כל צאנו וכל בקרו תלמוד לומר מבקרך ולא כל בקרך מצאנך ולא כל צאנך.", "english": "Rabbi Elazar ben Azaria says: Scripture teaches proper conduct—that a person should not eat meat except with appetite. One might think he may buy from the market and eat; therefore it says: “And you shall slaughter from your cattle and from your flock”—a person does not eat meat unless he has cattle and sheep. One might think he should slaughter all of them; therefore it says: “from your cattle”—and not all your cattle; “from your flock”—and not all your flock."}, {"location": "Sifrei Devarim 48:2", "hebrew": "רבי ישמעאל אומר (דברים ד ט) רק השמר לך ושמור נפשך מאד משל למלך בשר ודם שצד צפור ונתנה ביד עבדו אמר לו הוי זהיר בצפור זו לבני אם אבדת אותו לא תהא סבור צפור באיסר אבדת אלא כאילו נפשך אבדת וכן הוא אומר (שם לב מז) כי לא דבר רק הוא מכם דבר שאתם אומרים ריק הוא הוא חייכם.", "english": "Rabbi Yishmael said: “Only guard yourself and guard your soul very much”—a parable: A mortal king trapped a bird and placed it in his servant’s hand and said: Be careful with this bird for my son; if you lose it, do not think you lost a bird worth a coin—rather, it is as if you lost your own life. So too it says: “For it is not an empty thing from you—for it is your life.”"}, {"location": "Midrash Tanchuma, Ki Tisa 36", "hebrew": "כָּל מִי שֶׁיֵּשׁ בּוֹ תּוֹרָה וְאֵין בּוֹ יִרְאַת שָׁמַיִם — דּוֹמֶה לְגִזְבָּר שֶׁמָּסְרוּ לוֹ מַפְתְּחוֹת הַפְּנִימִיּוֹת וְלֹא מָסְרוּ לוֹ מַפְתְּחוֹת הַחִיצוֹנוֹת", "english": "Anyone who has Torah but does not have fear of Heaven is like a treasurer to whom the inner keys were given, but the outer keys were not given."}, {"location": "Sukkah 52a", "hebrew": "אָמַר רַב אַסִּי: יֵצֶר הָרָע בַּתְּחִילָּה דּוֹמֶה לְחוּט שֶׁל בּוּכְיָא, וּלְבַסּוֹף דּוֹמֶה כַּעֲבוֹתוֹת הָעֲגָלָה, שֶׁנֶּאֱמַר: ״הוֹי מוֹשְׁכֵי הֶעָוֹן בְּחַבְלֵי הַשָּׁוְא וְכַעֲבוֹת הָעֲגָלָה חַטָּאָה״.", "english": "Rav Assi said: The evil inclination at first is like a thin thread of a spider, and in the end it is like the thick ropes of a wagon, as it is said: “Woe to those who draw iniquity with cords of vanity, and sin as with wagon ropes.”"}, {"location": "Mekhilta DeRabbi Shimon Ben Yochai 19:14", "hebrew": "אמר ר' יוסי בנו של ר' חלפתא פעם אחת הייתי מהלך בדרך מצאני אדם אחד ונתן לי שלום אמר לי מאין באתה אמרתי לו מבני עיר גדולה של חכמים ושל סופרים באתי אמר לי רצונך שתשב אצלי ואתן לך פרנסה וכסף וזהב אמרתי לו אפילו אתה נותן לי כל ממון שבעולם איני יושב: אמר לי ולא קבלת עליך אמרתי לו והלא כל הרוחות והנשמות שאתה רואה בעולם כולן חוזרין לעפר ואין עומד לאדם בשעת מיתתו אלא דברי תורה בלבד:", "english": "Rabbi Yose, son of Rabbi Ḥalafta, said: Once I was walking on the road; a man met me and greeted me. He said: From where do you come? I said: From a great city of sages and scribes. He said: Would you like to dwell with me, and I will give you livelihood, and silver and gold? I said: Even if you gave me all the wealth in the world, I would not dwell—because all spirits and souls return to dust, and nothing stands by a person at the time of death except words of Torah."}, {"location": "Sifrei Devarim 48:5", "hebrew": "(שה\"ש א ב) כי טובים דודיך מיין מה יין משמח את הלב כך דברי תורה משמחים את הלב שנאמר (תהלים יט ט) פקודי ה' ישרים משמחי לב מה יין אי אתה טועם בו טעם מתחלתו וכל זמן שמתישן בקנקן סופו להשביח כך דברי תורה כל זמן שמתישנים בגוף סופם להשביח שנאמר (איוב יב יב) בישישים חכמה וגו'", "english": "“For your love is better than wine”: Just as wine gladdens the heart, so words of Torah gladden the heart… And just as you do not taste wine’s full flavor at first, but it improves as it ages in the jar, so words of Torah—so long as they ‘age’ within the body, their end is to improve, as it says: “With the aged is wisdom.”"}, {"location": "Mekhilta DeRabbi Shimon Ben Yochai 3:1", "hebrew": "ד\"א מתוך הסנה גוי אחד שאל את רבן גמליאל א\"ל מפני מה נגלה הקב\"ה על משה מתוך הסנה. א\"ל אלו נגלה על חרוב אחד או על תאנה אחת הייתי אומר שיש מקום בארץ פנוי מן השכינה עכשיו נגלה על הסנה ללמדך שאין מקום בארץ פנוי מן השכינה:", "english": "Another interpretation: A gentile asked Rabban Gamliel: Why did the Holy One reveal Himself to Moses from within a thornbush? He said: Had He revealed Himself on a carob or a fig, I would have said there is a place on earth empty of the Divine Presence. Now that He revealed Himself in a thornbush, it teaches you: There is no place on earth empty of the Divine Presence."}, {"location": "Midrash Tannaim on Deuteronomy 15:9:5", "hebrew": "ורעה עינך באחיך האביון ולא תתן לו. שלא תאמר אם נותן אני לו שמא ארד מנכסי ואהיה מיטלטל ממקום למקום בשביל המזונות ונמצאתי גורם לעצמי מיתה ת״ל(ישע' לב יז) והיה מעשה הצדקה שלום לעולם אין אדם מעני מן הצדקה ולא דבר רע ונזק נגרם בשביל הצדקה:", "english": "“Do not harden your heart against your poor brother and do not give him”: Do not say: If I give, perhaps I will fall from my assets and wander from place to place for sustenance, and I will have caused my own death. Scripture teaches: “The work of righteousness will be peace.” A person does not become impoverished from charity, and no harm or damage is caused because of charity."}, {"location": "Sifra Kedoshim Ch. 4:12", "hebrew": "\"ואהבת לרעך כמוך\" – רבי עקיבא אומר זה כלל גדול בתורה. בן עזאי אומר \"זה ספר תולדות אדם\" – זה כלל גדול מזה.", "english": "“You shall love your fellow as yourself”—Rabbi Akiva says: This is a great principle in the Torah. Ben Azzai says: “This is the book of the generations of Adam”—this is a principle even greater than that."}, {"location": "Berakhot 6b", "hebrew": "אָמַר רָבָא: אַגְרָא דִשְׁמַעְתָּא — סְבָרָא.", "english": "Rava said: The reward of a teaching is the reasoning."}, {"location": "Mishnah Shekalim 3:2", "hebrew": "לְפִי שֶׁאָדָם צָרִיךְ לָצֵאת יְדֵי הַבְּרִיּוֹת כְּדֶרֶךְ שֶׁצָּרִיךְ לָצֵאת יְדֵי הַמָּקוֹם, שְׁנֶּאֱמַר (במדבר לב) וִהְיִיתֶם נְקִיִים מֵיְיָ וּמִיִּשְׂרָאֵל, וְאוֹמֵר (משלי ג) וּמְצָא חֵן וְשֵׂכֶל טוֹב בְּעֵינֵי אֱלֹהִים וְאָדָם", "english": "Since a person must be acceptable to other people just as one must be acceptable to the Omnipresent, as it is said: “You shall be clean before the LORD and before Israel,” and it says: “And find favor and good understanding in the eyes of God and man.”"}, {"location": "Bava Metzia 38a", "hebrew": "אָמַר רַב כָּהֲנָא: אָדָם רוֹצֶה בְּקַב שֶׁלּוֹ מִתִּשְׁעָה קַבִּים שֶׁל חֲבֵירוֹ.", "english": "Rav Kahana said: A person prefers one kav of his own to nine kav of his fellow’s."}, {"location": "Shabbat 104a", "hebrew": "שִׁי״ן — שֶׁקֶר. תָּי״ו — אֱמֶת. מַאי טַעְמָא שֶׁקֶר מְקָרְבָן מִילֵּיהּ, אֱמֶת מְרַחֲקָא מִילֵּיהּ? — שִׁיקְרָא שְׁכִיחַ, קוּשְׁטָא לָא שְׁכִיחַ. וּמַאי טַעְמָא שִׁיקְרָא אַחֲדָא כַּרְעֵיהּ קָאֵי, וֶאֱמֶת מְלַבַּן לַבּוֹנֵי — קוּשְׁטָא קָאֵי, שִׁיקְרָא לָא קָאֵי.", "english": "Shin is ‘sheker’ (falsehood); tav is ‘emet’ (truth). Why? Falsehood’s letters stand close together; truth’s letters are far apart—falsehood is common, truth is not common. And why does falsehood stand on one ‘leg’ while truth stands firm? Truth stands; falsehood does not stand."}, {"location": "Sotah 3a", "hebrew": "רֵישׁ לָקִישׁ אָמַר: אֵין אָדָם עוֹבֵר עֲבֵירָה אֶלָּא אִם כֵּן נִכְנַס בּוֹ רוּחַ שְׁטוּת, שֶׁנֶּאֱמַר: ״אִישׁ אִישׁ כִּי תִשְׂטֶה אִשְׁתּוֹ״, ״תִּשְׁטֶה״ כְּתִיב.", "english": "Reish Lakish said: A person does not commit a transgression unless a spirit of folly enters him, as it is said: “If a man’s wife goes astray”—‘goes astray’ is written."}, {"location": "Sotah 21b", "hebrew": "אָמַר רַבִּי יוֹחָנָן: אֵין דִּבְרֵי תוֹרָה מִתְקַיְּימִין אֶלָּא בְּמִי שֶׁמֵּשִׂים עַצְמוֹ כְּמִי שֶׁאֵינוֹ, שֶׁנֶּאֱמַר: ״וְהַחׇכְמָה מֵאַיִן תִּמָּצֵא״.", "english": "Rabbi Yoḥanan said: Words of Torah endure only in one who makes himself like one who is not, as it is said: “And wisdom—from where shall it be found?”"}, {"location": "Taanit 20a", "hebrew": "תָּנוּ רַבָּנַן: לְעוֹלָם יְהֵא אָדָם רַךְ כְּקָנֶה וְאַל יְהֵא קָשֶׁה כְּאֶרֶז. מַעֲשֶׂה שֶׁבָּא רַבִּי אֶלְעָזָר בְּרַבִּי שִׁמְעוֹן מִמִּגְדַּל גְּדוֹר מִבֵּית רַבּוֹ, וְהָיָה רָכוּב עַל חֲמוֹר וּמְטַיֵּיל עַל שְׂפַת נָהָר, וְשָׂמֵחַ שִׂמְחָה גְּדוֹלָה. וְהָיְתָה דַּעְתּוֹ גַּסָּה עָלָיו מִפְּנֵי שֶׁלָּמַד תּוֹרָה הַרְבֵּה. נִזְדַּמֵּן לוֹ אָדָם אֶחָד שֶׁהָיָה מְכוֹעָר בְּיוֹתֵר. אָמַר לוֹ: שָׁלוֹם עָלֶיךָ רַבִּי! וְלֹא הֶחְזִיר לוֹ. אָמַר לוֹ: רֵיקָה, כַּמָּה מְכוֹעָר אוֹתוֹ הָאִישׁ! שֶׁמָּא כׇּל בְּנֵי עִירֶךָ מְכוֹעָרִין כְּמוֹתְךָ? אָמַר לוֹ: אֵינִי יוֹדֵעַ, אֶלָּא לֵךְ וֶאֱמוֹר לָאוּמָּן שֶׁעֲשָׂאַנִי: ״כַּמָּה מְכוֹעָר כְּלִי זֶה שֶׁעָשִׂיתָ״. כֵּיוָן שֶׁיָּדַע בְּעַצְמוֹ שֶׁחָטָא, יָרַד מִן הַחֲמוֹר וְנִשְׁתַּטַּח לְפָנָיו, וְאָמַר לוֹ: נַעֲנֵיתִי לְךָ, מְחוֹל לִי! אָמַר לוֹ: אֵינִי מוֹחֵל לְךָ עַד שֶׁתֵּלֵךְ לָאוּמָּן שֶׁעֲשָׂאַנִי וֶאֱמוֹר לוֹ: כַּמָּה מְכוֹעָר כְּלִי זֶה שֶׁעָשִׂיתָ. הָיָה מְטַיֵּיל אַחֲרָיו עַד שֶׁהִגִּיעַ לְעִירוֹ. יָצְאוּ בְּנֵי עִירוֹ לִקְרָאתוֹ, וְהָיוּ אוֹמְרִים לוֹ: שָׁלוֹם עָלֶיךָ רַבִּי רַבִּי, מוֹרִי מוֹרִי! אָמַר לָהֶם: לְמִי אַתֶּם קוֹרִין רַבִּי רַבִּי? אָמְרוּ לוֹ: לְזֶה שֶׁמְּטַיֵּיל אַחֲרֶיךָ. אָמַר לָהֶם: אִם זֶה רַבִּי — אַל יִרְבּוּ כְּמוֹתוֹ בְּיִשְׂרָאֵל. אָמְרוּ לוֹ: מִפְּנֵי מָה? אָמַר לָהֶם: כָּךְ וְכָךְ עָשָׂה לִי. אָמְרוּ לוֹ: אַף עַל פִּי כֵּן, מְחוֹל לוֹ, שֶׁאָדָם גָּדוֹל בְּתוֹרָה הוּא. אָמַר לָהֶם: בִּשְׁבִילְכֶם הֲרֵינִי מוֹחֵל לוֹ, וּבִלְבַד שֶׁלֹּא יְהֵא רָגִיל לַעֲשׂוֹת כֵּן. מִיָּד נִכְנַס רַבִּי אֶלְעָזָר בְּרַבִּי שִׁמְעוֹן, וְדָרַשׁ: לְעוֹלָם יְהֵא אָדָם רַךְ כְּקָנֶה וְאַל יְהֵא קָשֶׁה כְּאֶרֶז. וּלְפִיכָךְ זָכָה קָנֶה לִיטּוֹל הֵימֶנּוּ קוּלְמוֹס לִכְתּוֹב בּוֹ סֵפֶר תּוֹרָה תְּפִילִּין וּמְזוּזוֹת.", "english": "The Sages taught: A person should always be soft like a reed and not hard like a cedar. A story: Rabbi Elazar son of Rabbi Shimon was riding a donkey… he encountered a very ugly man and insulted him… The man said: Go and tell the Craftsman who made me: How ugly is this vessel You made. He realized his sin, dismounted, and begged forgiveness… In the end he taught: Always be soft like a reed and not hard like a cedar; therefore the reed merited that from it they make a quill to write Torah, tefillin, and mezuzot."}, {"location": "Midrash Tanchuma, Nitzavim 1", "hebrew": "בְּנֹהַג שֶׁבָּעוֹלָם, אִם נוֹטֵל אָדָם אֲגֻדָּה שֶׁל קָנִים, שֶׁמָּא יָכֹל לְשָׁבְרָם בְּבַת אַחַת. וְאִלּוּ נוֹטֵל אַחַת אַחַת, אֲפִלּוּ תִּינוֹק מְשַׁבְּרָן. וְכֵן אַתְּ מוֹצֵא שֶׁאֵין יִשְׂרָאֵל נִגְאֲלִין עַד שֶׁיִּהְיוּ כֻּלָּן אֲגֻדָּה אַחַת, שֶׁנֶּאֱמַר: בַּיָּמִים הָהֵמָּה וּבָעֵת הַהִיא נְאֻם ה' יָבֹאוּ בְנֵי יִשְׂרָאֵל וּבְנֵי יְהוּדָה יַחְדָּו וְגוֹ' (ירמיה נ, ד). כְּשֶׁהֵן אֲגוּדִים, מְקַבְּלִין פְּנֵי שְׁכִינָה.", "english": "In the way of the world: If a person takes a bundle of reeds, perhaps he can break them all at once; but if he takes them one by one, even a child can break them. So too you find that Israel is not redeemed until they are all one bundle, as it says: “In those days… the children of Israel and the children of Judah shall come together…” When they are bundled together, they receive the Presence of the Shechinah."}, {"location": "Shabbat 119b", "hebrew": "אָמַר רֵישׁ לָקִישׁ מִשּׁוּם רַבִּי יְהוּדָה נְשִׂיאָה: אֵין הָעוֹלָם מִתְקַיֵּים אֶלָּא בִּשְׁבִיל הֶבֶל תִּינוֹקוֹת שֶׁל בֵּית רַבָּן.", "english": "Reish Lakish said in the name of Rabbi Yehudah the Nasi: The world endures only for the sake of the breath of schoolchildren."}, {"location": "Berakhot 7a", "hebrew": "וְאָמַר רַבִּי יוֹחָנָן מִשּׁוּם רַבִּי יוֹסֵי: מִנַּיִן שֶׁאֵין מְרַצִּין לוֹ לְאָדָם בִּשְׁעַת כַּעְסוֹ, דִּכְתִיב: ״פָּנַי יֵלֵכוּ וַהֲנִחֹתִי לָךְ״. אָמַר לוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא לְמֹשֶׁה: הַמְתֵּן לִי עַד שֶׁיַּעַבְרוּ פָּנִים שֶׁל זַעַם וְאָנִיחַ לְךָ.", "english": "Rabbi Yoḥanan said in the name of Rabbi Yosei: From where do we know that one should not try to appease a person at the moment of his anger? As it is written: “My presence will go, and I will give you rest.” The Holy One, blessed be He, said to Moses: Wait for Me until the face of wrath passes, and then I will grant you rest."}, {"location": "Berakhot 7b", "hebrew": "וְאָמַר רַבִּי יוֹחָנָן מִשּׁוּם רַבִּי שִׁמְעוֹן בֶּן יוֹחַי: קָשָׁה תַּרְבּוּת רָעָה בְּתוֹךְ בֵּיתוֹ שֶׁל אָדָם יוֹתֵר מִמִּלְחֶמֶת גּוֹג וּמָגוֹג. שֶׁנֶּאֱמַר: ״מִזְמוֹר לְדָוִד בְּבָרְחוֹ מִפְּנֵי אַבְשָׁלוֹם בְּנוֹ״, וּכְתִיב בָּתְרֵיהּ: ״ה׳ מָה רַבּוּ צָרָי רַבִּים קָמִים עָלָי״, וְאִילּוּ גַּבֵּי מִלְחֶמֶת גּוֹג וּמָגוֹג, כְּתִיב: ״לָמָּה רָגְשׁוּ גוֹיִם וּלְאֻמִּים יֶהְגּוּ רִיק״. וְאִילּוּ ״מָה רַבּוּ צָרָי״ לָא כְּתִיב.", "english": "Rabbi Yoḥanan said in the name of Rabbi Shimon ben Yoḥai: An evil culture within a person’s own household is harsher than the war of Gog and Magog. For concerning David fleeing from Absalom it is written: “LORD, how many are my foes,” whereas regarding Gog and Magog it is written: “Why do nations rage,” but it does not say “How many are my foes.”"}, {"location": "Sanhedrin 98a", "hebrew": "אֲזַל לְגַבֵּיהּ. אֲמַר לֵיהּ: שָׁלוֹם עָלֶיךָ רַבִּי וּמוֹרִי! אֲמַר לֵיהּ: שָׁלוֹם עָלֶיךָ בַּר לֵיוַאי. אֲמַר לֵיהּ: לְאֵימַת אָתֵי מָר? אֲמַר לֵיהּ: הַיּוֹם. אֲתָא לְגַבֵּי אֵלִיָּהוּ. אֲמַר לֵיהּ: מַאי אֲמַר לָךְ? אֲמַר לֵיהּ: שָׁלוֹם עָלֶיךָ בַּר לֵיוַאי. אֲמַר לֵיהּ: אַבְטְחָךְ לָךְ וְלַאֲבוּךְ לְעָלְמָא דְּאָתֵי. אֲמַר לֵיהּ: שַׁקּוֹרֵי קָא שַׁקַּר בִּי, דַּאֲמַר לִי ״הַיּוֹם אָתֵינָא״ וְלָא אֲתָא. אֲמַר לֵיהּ: הָכִי אָמַר לָךְ: ״הַיּוֹם אִם בְּקֹלוֹ תִשְׁמָעוּ״.", "english": "He went to him and said: Peace to you, my master and teacher! He replied: Peace to you, son of Levi. He asked: When will the Master come? He replied: Today. He came to Elijah and said: What did he tell you? He told him: “Peace to you, son of Levi.” Elijah said: He has assured you and your father of the World to Come. He said: But he deceived me—he told me “Today I am coming,” and he did not come! Elijah said: This is what he told you: “Today—if you will heed His voice.”"}, {"location": "Pesikta DeRav Kahana 1", "hebrew": "ר' יהושע דסכנין בשם ר' לוי למה היה אוהל מועד דומה, למערה שהיא נתונה על שפת הים ועלה הים והציף המערה נתמלאת מן הים והים לא חסר. כך אוהל מועד נתמלא מזיו השכינה.", "english": "Rabbi Yehoshua of Sikhnin said in the name of Rabbi Levi: What was the Tent of Meeting like? Like a cave set at the edge of the sea; when the sea rises and floods the cave, the cave fills from the sea, yet the sea is not diminished. So too the Tent of Meeting was filled with the radiance of the Shekhinah."}, {"location": "Jerusalem Talmud, Berakhot 1:1; Shir HaShirim Rabbah 6:10", "hebrew": "רִבִּי חִיָיא רַבָּא וְרִבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא הַוּוּ מְהַלְּכִין בַּהֲדָא בִקְעַת אַרְבֶּל בִּקְרִיצְתָּה וְרָאוּ אַיֶילֶת הַשַׁחַר שֶׁבָּקַע אוֹרָהּ. אָמַר רִבִּי חִיָיא רַבָּה לְרִבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא בִּירְבִּי כַּךְ הִיא גְאוּלָּתָן שֶׁל יִשְׂרָאֵל בִּתְּחִילָּה קִימְאָה קִימְאָה כָּל מָה שֶׁהִיא הוֹלֶכֶת הִיא רָבָה וְהוֹלֶכֶת.", "english": "Rabbi Ḥiyya the Great and Rabbi Shimon ben Ḥalafta were walking in the valley of Arbel at daybreak and saw the dawn’s first light breaking through. Rabbi Ḥiyya the Great said to Rabbi Shimon ben Ḥalafta: My master, so too is Israel’s redemption—at first it comes little by little; as it progresses it grows and grows."}, {"location": "Chullin 94a", "hebrew": "אמר שמואל אסור לגנוב דעת הבריות ואפילו דעתו של עובד כוכבים... שמואל הוה קא עבר במברא א\"ל לשמעיה פייסיה למבוריה פייסיה ואיקפד. מ\"ט איקפד אמר אביי תרנגולת טרפה הואי ויהבה ניהליה במר דשחוטה רבא אמר אנפקא אמר ליה לאשקויי ואשקייה חמרא מזיגא", "english": "Shmuel said: It is forbidden to deceive people, even the mind of a gentile. Shmuel was crossing on a ferry; he said to his attendant: Appease the ferryman. The ferryman was appeased and then became angry. Abaye explained: A treif chicken had been given to him as though it were properly slaughtered. Rava explained: He had been asked for a vessel (or service) to give drink, and was given diluted wine."}, {"location": "Taanit 6b", "hebrew": "אָמַר רַב יְהוּדָה: מִיטְרָא בַּעְלַהּ דְּאַרְעָא הוּא, שֶׁנֶּאֱמַר: ״כִּי כַּאֲשֶׁר יֵרֵד הַגֶּשֶׁם וְהַשֶּׁלֶג מִן הַשָּׁמַיִם וְשָׁמָּה לֹא יָשׁוּב כִּי אִם הִרְוָה אֶת הָאָרֶץ וְהוֹלִידָהּ וְהִצְמִיחָהּ״.", "english": "Rav Yehuda said: Rain is the husband of the earth, as it is written: “For as rain and snow descend from the heavens and do not return there unless they have watered the earth and made it give birth and sprout.”"}, {"location": "Taanit 8a", "hebrew": "רָבָא אָמַר: אִם רָאִיתָ תַּלְמִיד שֶׁתַּלְמוּדוֹ קָשֶׁה עָלָיו כַּבַּרְזֶל — בִּשְׁבִיל רַבּוֹ שֶׁאֵינוֹ מַסְבִּיר לוֹ פָּנִים, שֶׁנֶּאֱמַר: ״וְהוּא לֹא פָנִים קִלְקַל״.", "english": "Rava said: If you see a student whose learning is as hard for him as iron, it is because his teacher does not show him a pleasant face, as it is said: “And he did not mar the face.”"}, {"location": "Taanit 8a", "hebrew": "וְאָמַר רַבִּי אַמֵּי: בֹּא וּרְאֵה כַּמָּה גְּדוֹלִים בַּעֲלֵי אֲמָנָה, מִנַּיִין — מֵחוּלְדָּה וּבוֹר. וּמָה הַמַּאֲמִין בְּחוּלְדָּה וּבוֹר — כָּךְ, הַמַּאֲמִין בְּהַקָּדוֹשׁ בָּרוּךְ הוּא — עַל אַחַת כַּמָּה וְכַמָּה.", "english": "Rabbi Ammi said: Come and see how great are those who keep faith. From where? From the weasel and the pit. And if one who trusts the weasel and the pit is rewarded, how much more so one who trusts the Holy One, blessed be He."}, {"location": "Taanit 9b", "hebrew": "רַב שִׁימִי בַּר אָשֵׁי הֲוָה שְׁכִיחַ קַמֵּיהּ דְּרַב פָּפָּא, הֲוָה מַקְשֵׁי לֵיהּ טוּבָא. יוֹמָא חַד חַזְיֵיהּ דִּנְפַל עַל אַפֵּיהּ, שַׁמְעֵיהּ דְּאָמַר: רַחֲמָנָא לִיצְּלַן מִכִּיסּוּפָא דְשִׁימִי. קַבֵּיל עֲלֵיהּ שְׁתִיקוּתָא, וְתוּ לָא אַקְשִׁי לֵיהּ.", "english": "Rav Shimi bar Ashi was frequently before Rav Pappa and would challenge him greatly. One day he saw Rav Pappa fallen on his face and heard him say: May the Merciful One save us from the humiliation of Shimi. Shimi accepted silence upon himself and did not challenge him further."}, {"location": "Rosh Hashanah 17a", "hebrew": "רַב הוּנָא בְּרֵיהּ דְּרַב יְהוֹשֻׁעַ חֲלַשׁ, עָל רַב פָּפָּא לְשַׁיּוֹלֵי בֵּיהּ. חַזְיֵיהּ דַּחֲלִישׁ לֵיהּ עָלְמָא, אֲמַר לְהוּ: צְבִיתוּ לֵיהּ זְוַודְתָּא. לְסוֹף אִיתְּפַח, הֲוָה מִיכְּסִיף רַב פָּפָּא לְמִיחְזְיֵיהּ. אֲמַרוּ לֵיהּ: מַאי חֲזֵית? אֲמַר לְהוּ: אִין, הָכִי הֲוָה, וַאֲמַר לְהוּ הַקָּדוֹשׁ בָּרוּךְ הוּא: הוֹאִיל וְלָא מוֹקֵים בְּמִילֵּיהּ — לָא תְּקוּמוּ בַּהֲדֵיהּ, שֶׁנֶּאֱמַר: ״נוֹשֵׂא עָוֹן וְעוֹבֵר עַל פֶּשַׁע״, לְמִי נוֹשֵׂא עָוֹן — לְעוֹבֵר פֶּשַׁע.", "english": "Rav Huna son of Rav Yehoshua fell ill. Rav Pappa came to inquire after him and saw the world growing dim for him. He said to them: Prepare provisions for him (for death). In the end he recovered, and Rav Pappa was ashamed to face him. They asked him: What did you see? He said: Indeed, it was so—and the Holy One, blessed be He, said about him: Since he does not insist on his claims, do not insist against him, as it is written: “Who bears iniquity and passes over transgression”—for whom does He bear iniquity? For one who passes over wrongdoing done to him."}, {"location": "Rosh Hashanah 21b", "hebrew": "רַב וּשְׁמוּאֵל. חַד אָמַר: חֲמִשִּׁים שַׁעֲרֵי בִינָה נִבְרְאוּ בָּעוֹלָם, וְכוּלָּן נִיתְּנוּ לְמֹשֶׁה, חָסֵר אֶחָד, שֶׁנֶּאֱמַר: ״וַתְּחַסְּרֵהוּ מְעַט מֵאֱלֹהִים״.", "english": "Rav and Shmuel: One said, Fifty gates of understanding were created in the world, and all were given to Moses except one, as it is written: “You have made him מעט (a little) less than God.”"}, {"location": "Sifra Kedoshim 4:9", "hebrew": "אמר ר' טרפון \"העבודה! אם יש בדור הזה יכול להוכיח\". אמר ר' אלעזר בן עזריה \"העבודה! אם יש בדור הזה יכול לקבל תוכחת\". אמר ר' עקיבא \"העבודה! אם יש בדור הזה יודע האיך מוכיחים\". אמר ר' יוחנן בן נורי מעידני עלי שמים וארץ שיותר מארבעה וחמשה פעמים לקה עקיבא על ידי לפני רבן גמליאל שהייתי קובל לו עליו וכל כך הייתי יודע שהיה מוסיף לי אהבה.", "english": "Rabbi Tarfon said: I swear that there is no one in this generation who is able to correctly reprove. Rabbi Elazar b. Azaryah said: I swear that there is no one in this generation who is able to accept reproof. Rabbi Akiva said: I swear that there is no one in this generation who knows _how_ to give reproof. Rabbi Yochanan b. Nuri said: I call heaven and earth as witness for me that more than four or five times Akiva was beaten (in rebuke) because of me before R. Gamliel, to whom I would complain about him - and through it all I know he loved me all the more for it."}, {"location": "Mekhilta DeRabbi Yishmael, Tractate Vayehi Beshalach 7", "hebrew": "דָּרַשׁ רַבִּי פַּפְּיָס: (בראשית ג,כב) \"הֵן הָאָדָם הָיָה כְּאַחַד מִמֶּנּוּ\", כְּאֶחָד מִמַּלְאֲכֵי הַשָּׁרֵת. אָמַר רַבִּי עֲקִיבָה: דַּיֶּיךָ פַּפְּיָס! אָמַר לוֹ: מָה אַתָּה מְקַיֵּם \"הֵן הָאָדָם הָיָה כְּאַחַד מִמֶּנּוּ\"? אָמַר לוֹ: נָתַן הַמָּקוֹם לְפָנָיו שְׁתֵּי דְרָכִים, דֶּרֶך חַיִּים וְדֶרֶך מָוֶת, וּבָחַר לוֹ דֶּרֶךְ מָוֶת.", "english": "Rabbi Pappiyas expounded: “Behold, the human was like one of us”—like one of the ministering angels. Rabbi Akiva said: Enough for you, Pappiyas! He asked: How then do you interpret “Behold, the human was like one of us”? He replied: The Omnipresent set before him two paths—the path of life and the path of death—and he chose the path of death."}, {"location": "Mekhilta DeRabbi Shimon Ben Yochai 15:26", "hebrew": "\"וְהַיָּשָׁר בְּעֵינָיו תַּעֲשֶׂה\" זֶה מַשָּׂא וּמַתָּן, מְלַמֵּד שֶׁכָּל מִי שֶׁנּוֹשֵׂא וְנוֹתֵן בֶּאֱמוּנָה וְרוּחַ הַבְּרִיּוֹת נוֹחָה הֵימֶנּוּ מַעֲלִין עָלָיו כְּאִלּוּ קִיֵּם אֶת כָּל הַתּוֹרָה כֻּלָּהּ.", "english": "“And what is right in His eyes you shall do”—this refers to honest business dealings, teaching that whoever conducts his buying and selling faithfully and people are pleased with him is regarded as though he fulfilled the entire Torah."}, {"location": "Midrash Tanchuma, Pekudei 3", "hebrew": "אָמַר רַבִּי יוֹחָנָן, מַאי דִּכְתִיב: עֹשֶׂה גְדֹלוֹת עַד אֵין חֵקֶר וְנִפְלָאוֹת עַד אֵין מִסְפָּר (איוב ט, י). תֵּדַע לְךָ, שֶׁכָּל הַנְּשָׁמוֹת שֶׁהָיוּ מִן אָדָם הָרִאשׁוֹן וְשֶׁיִּהְיוּ עַד סוֹף כָּל הָעוֹלָם, כֻּלָּן נִבְרְאוּ בְּשֵׁשֶׁת יְמֵי בְרֵאשִׁית. וְכֻלָּן בְּגַן עֵדֶן, וְכֻלָּן הָיוּ בְּמַתַּן תּוֹרָה, שֶׁנֶּאֱמַר: כִּי אֶת אֲשֶׁר יֶשְׁנוֹ פֶּה עִמָּנוּ עֹמֶד הַיּוֹם, וְאֵת אֲשֶׁר אֵינֶנּוּ פֹּה עִמָּנוּ הַיּוֹם (דברים כט, יד).", "english": "Rabbi Yoḥanan said: What is the meaning of “He does great things beyond searching, and wonders without number”? Know that all the souls that were from Adam the first and that will be until the end of the world were created during the six days of Creation. All are in the Garden of Eden, and all were present at the giving of the Torah, as it is said: “Those who are standing here with us today—and those who are not here with us today.”"}, {"location": "Vayikra Rabbah 34:7", "hebrew": "אָמַר רַבִּי זְעֵירָא: אֲפִלּוּ שִׂיחָתָן שֶׁל בְּנֵי אֶרֶץ יִשְׂרָאֵל תּוֹרָה הִיא.", "english": "Rabbi Zeira said: Even the casual speech of the inhabitants of the Land of Israel is Torah."}, {"location": "Jerusalem Talmud, Sanhedrin 1:2", "hebrew": "אָמַר הקב\"ה: חֲבִיבָה עָלַי כַּת קְטַנָּה שֶׁבְּאֶרֶץ יִשְׂרָאֵל יוֹתֵר מִסַּנְהֶדְרִין גְּדוֹלָה שֶׁבְּחוּצָה לָאָרֶץ.", "english": "The Holy One, blessed be He, said: A small band in the Land of Israel is more precious to Me than a great Sanhedrin outside the land."}, {"location": "Jerusalem Talmud, Shabbat 8:1", "hebrew": "רִבִּי אַבָּהוּ נְחַת לְטִיבֵּרְיָּא. חְמוֹנֵיהּ תַּלְמִידוֹי דְרִבִּי יוֹחָנָן אַפּוֹי נְהִירִן. אָמְרוּן קוֹמֵי רִבִּי יוֹחָנָן. אַשְׁכַּח רִבִּי אַבָּהוּ סִימָה. אֲמַר לוֹן. לָמָּה. אָמְרוּן לֵיהּ. אַפּוֹי נְהִירִן. אֲמר לוֹן. דִּילְמָא אוֹרַיְתָא חַדְּתָא שְׁמַעְתָּהּ. סְלִיק לְגַבֵּיהּ. אֲמַר לֵיהּ. מַאי אוֹרַיְתָא חַדְּתָא שְׁמַעְתָּ. אֲמַר לֵיהּ. תוֹסֶפְתָּא עַתִּיקְתָא. וּקְרָא עֲלוֹי. חָכְמַת אָדָם תָּאִיר פָּנָיו.", "english": "Rabbi Abbahu went down to Tiberias. He saw the students of Rabbi Yoḥanan with shining faces. They reported this to Rabbi Yoḥanan, who found Rabbi Abbahu and asked: Why are your faces shining—perhaps you heard a new teaching? He said: An ancient Tosefta. Rabbi Yoḥanan applied to him the verse: “A person’s wisdom lights up his face.”"}, {"location": "Jerusalem Talmud, Shekalim 6:1", "hebrew": "חֲנַנְיָה בֶּן אֲחִי רִבִּי יְהוֹשֻׁעַ אוֹמֵר. בֵּין כָל דִּיבּוּר וְדִיבּוּר דִּיקְדּוּקֶיהָ וְאוֹתוֹתֶיהָ שֶׁלְתּוֹרָה. מְמוּלָּאִים בַּתַּרְשִׁישׁ. כְּיַמָּא רַבָּא. רִבִּי שִׁמְעוֹן בֶּן לָקִישׁ כַּד הֲוָה מַטֵּי הָדֵין קִרְיָיא הֲוָה אֲמַר. יָפֶה לִימְּדֵנִי חֲנַנְיָה בֶּן אֲחִי רִבִּי יְהוֹשֻׁעַ. מַה הַיָּם הַזֶּה בֵּין גַּל גָּדוֹל לְגַל [גָּדוֹל] גַּלִּים קְטַנִּים כָּךְ בֵּין כָּל דִּיבֵּר וְדִיבֵּר דִּיקְדּוּקֶיהָ וְאוֹתוֹתֶיהָ שֶׁלְתּוֹרָה.", "english": "Ḥananya, the nephew of Rabbi Yehoshua, said: Between every word and word of Torah are its fine points and its letters—filled like the great sea. When Rabbi Shimon ben Lakish would reach this passage he would say: Ḥananya, the nephew of Rabbi Yehoshua, taught me well: just as between a great wave and a great wave there are small waves, so too between every statement and statement of Torah are its fine points and letters."}, {"location": "Kiddushin 49b", "hebrew": "עֲשָׂרָה קַבִּים חׇכְמָה יָרְדוּ לָעוֹלָם, תִּשְׁעָה נָטְלָה אֶרֶץ יִשְׂרָאֵל וְאֶחָד כׇּל הָעוֹלָם כּוּלּוֹ. עֲשָׂרָה קַבִּים יוֹפִי יָרְדוּ לָעוֹלָם, תִּשְׁעָה נָטְלָה יְרוּשָׁלַיִם וְאֶחָד כׇּל הָעוֹלָם כּוּלּוֹ.", "english": "Ten measures of wisdom descended to the world: the Land of Israel took nine and the whole world took one. Ten measures of beauty descended to the world: Jerusalem took nine and the whole world took one."}, {"location": "Bereishit Rabbah 16:4", "hebrew": "\"אֲשֶׁר שָׁם הַזָּהָב\" (בראשית ב:יא), אֵלּוּ דִּבְרֵי תוֹרָה, שֶׁהֵן נֶחְמָדִין מִזָּהָב וּמִפָּז רָב. \"וּזֲהַב הָאָרֶץ הַהִיא טוֹב\", מְלַמֵּד שֶׁאֵין תּוֹרָה כְּתוֹרַת אֶרֶץ יִשְׂרָאֵל וְלֹא חָכְמָה כְּחָכְמַת אֶרֶץ יִשְׂרָאֵל.", "english": "“Where there is gold” — these are words of Torah, which are more desirable than gold and much fine gold. “And the gold of that land is good” teaches that there is no Torah like the Torah of the Land of Israel, and no wisdom like the wisdom of the Land of Israel."}, {"location": "Sifrei Devarim 80", "hebrew": "\"וישבת בארצם\". מעשה ברבי יהודה בן בתירה ורבי מתיא בן חרש ורבי חנינא בן אחי רבי יהושע ורבי יונתן שהיו יוצאים חוצה לארץ, והגיעו לפלטום וזכרו את ארץ ישראל, זקפו עיניהם וזלגו דמעותיהם וקרעו בגדיהם וקראו המקרא הזה, \"וירשת אותם וישבת בארצם\" (דברים יב:כט), וחזרו ובאו למקומם. אמרו: ישיבת ארץ ישראל שקולה כנגד כל המצות שבתורה.", "english": "“And you will inherit them and dwell in their land.” It happened that Rabbi Yehuda ben Beteira, Rabbi Matya ben Ḥeresh, Rabbi Ḥanina the nephew of Rabbi Yehoshua, and Rabbi Yonatan were leaving for outside the land. When they reached Paltum they remembered the Land of Israel; they lifted their eyes, tears flowed, they tore their garments, and they read: “You shall inherit them and dwell in their land,” and they turned back. They said: Dwelling in the Land of Israel is equal to all the commandments of the Torah."}, {"location": "Ketubot 110b", "hebrew": "לְעוֹלָם יָדוּר אָדָם בְּאֶרֶץ יִשְׂרָאֵל אֲפִילּוּ בְּעִיר שֶׁרוּבָּהּ גּוֹיִם, וְאַל יָדוּר בְּחוּצָה לָאָרֶץ וַאֲפִילּוּ בְּעִיר שֶׁרוּבָּהּ יִשְׂרָאֵל, שֶׁכׇּל הַדָּר בְּאֶרֶץ יִשְׂרָאֵל דּוֹמֶה כְּמִי שֶׁיֵּשׁ לוֹ אֱלוֹהַּ, וְכׇל הַדָּר בְּחוּצָה לָאָרֶץ דּוֹמֶה כְּמִי שֶׁאֵין לוֹ אֱלוֹהַּ. שֶׁנֶּאֱמַר: ״לָתֵת לָכֶם אֶת אֶרֶץ כְּנַעַן לִהְיוֹת לָכֶם לֵאלֹהִים״. וְכֹל שֶׁאֵינוֹ דָּר בָּאָרֶץ אֵין לוֹ אֱלוֹהַּ? אֶלָּא לוֹמַר לָךְ: כׇּל הַדָּר בְּחוּצָה לָאָרֶץ כְּאִילּוּ עוֹבֵד עֲבוֹדָה זָרָה.", "english": "A person should always live in the Land of Israel, even in a city whose majority are gentiles, and not live outside the land even in a city whose majority are Jews; for anyone who lives in the Land of Israel is like one who has a God, and anyone who lives outside the land is like one who has no God, as it is said: “To give you the land of Canaan, to be your God.” And does one who does not live in the land have no God? Rather, it teaches: whoever lives outside the land is as though he worships idolatry."}, {"location": "Midrash Tehillim 105", "hebrew": "אמר רבי יוסי בר חלפתא לרבי ישמעאל בריה: אתה מבקש לראות את השכינה בעולם הזה? עסוק בתורה בארץ ישראל, שנאמר (תהלים קה:ד) \"דרשו ה' ועוזו, בקשו פניו תמיד\".", "english": "Rabbi Yosei ben Ḥalafta said to his son Rabbi Yishmael: Do you wish to see the Shekhinah in this world? Engage in Torah in the Land of Israel, as it is said: “Seek the LORD and His strength; seek His face תמיד (continually).”"}, {"location": "Bereishit Rabbah 39:8", "hebrew": "\"אָלִין בַּמִּדְבָּר סֶלָה\" (תהלים נה:ח), מֻטָּב לָלוּן בַּמִּדְבָּרוֹת שֶׁל אֶרֶץ יִשְׂרָאֵל וְלֹא לָלוּן בְּפַלְטֵרִיּוֹת שֶׁל חוּצָה לָאָרֶץ.", "english": "“Let me lodge in the wilderness, selah” — better to lodge in the wildernesses of the Land of Israel than to lodge in the palaces of outside the land."}, {"location": "Jerusalem Talmud, Moed Katan 3:1", "hebrew": "שִׁמְעוֹן בַּר בָּא אֲתָא לְגַבֵּיהּ רַבִּי חֲנִינָה, אֲמַר לֵיהּ: כְּתֹב לִי חֲדָא אִגְּרָא דְּאִיקָר (המלצה), נִפּוּק לְפַרְנָסָתִי לְאַרְעָא בַּרָיְתָא. אָמַר לוֹ: לְמָחָר אֲנִי הוֹלֵךְ אֵצֶל אֲבוֹתֶיךָ, יְהוּ אוֹמְרִים לִי: נְטִיעָה אַחַת שֶׁל חֶמְדָּה שֶׁהָיְתָה לָנוּ בְאֶרֶץ יִשְׂרָאֵל, הִתַּרְתָּ לָהּ לָצֵאת לְחוּץ לָאָרֶץ?!", "english": "Shimon bar Ba came to Rabbi Ḥanina and said: Write for me a letter of recommendation so I can go out for my livelihood to the outside land. He said to him: Tomorrow I will go to your ancestors, and they will say to me: A single precious sapling that we had in the Land of Israel—you permitted it to go out of the land?!"}, {"location": "Midrash Tehillim 36", "hebrew": "א\"ר אושעיא בשם ר' פנחס: עתידה ירושלים להעשות מטרפולין לכל הגוים לעתיד לבוא, שנאמר (ישעיה ס:ג) \"והלכו גוים לאורך\".", "english": "Rabbi Hoshaiah said in the name of Rabbi Pinḥas: In the future Jerusalem will become a metropolis for all the nations, as it is said: “Nations shall walk by your light.”"}, {"location": "Midrash Tanchuma Buber, Balak 14", "hebrew": "אֵינוֹ עוֹמֵד בִּפְנֵי הַפֻּרְעָנוּת אֶלָּא תְּשׁוּבָה, שֶׁכָּל מִי שֶׁיֶּחֱטָא וְאוֹמֵר חָטָאתִי אֵין רְשׁוּת לַמַּלְאָךְ לְיַגַּע בּוֹ.", "english": "Nothing stands before calamity except repentance: anyone who sins and says “I have sinned” has no permission granted for the angel to harm him."}, {"location": "Shemot Rabbah 13:3", "hebrew": "הַקָּדוֹשׁ בָּרוּךְ הוּא מַתְרֶה בּוֹ בָּאָדָם פַּעַם רִאשׁוֹנָה שְׁנִיָּה וּשְׁלִישִׁית וְאֵינוֹ חוֹזֵר בּוֹ, וְהוּא נוֹעֵל לִבּוֹ מִן הַתְּשׁוּבָה כְּדֵי לִפְרֹעַ מִמֶּנּוּ מַה שֶּׁחָטָא.", "english": "The Holy One, blessed be He, warns a person once, twice, and three times; if he does not return, then He locks his heart against repentance in order to exact from him what he sinned."}, {"location": "Mishnat Rabbi Eliezer 6:30", "hebrew": "חֲסִידֵי אֻמּוֹת הָעוֹלָם, כֵּיוָן שֶׁהֵן עוֹשִׂין שֶׁבַע מִצְווֹת שֶׁנִּצְטַוּוּ בְּנֵי נֹחַ עֲלֵיהֶן, הֵן וְכָל דִּקְדּוּקֵיהֶן, הֵן נִקְרָאִים חֲסִידִים... וְאִם עָשׂוּ כֵּן, הֲרֵי הֵן יִירְשׁוּ הָעוֹלָם הַבָּא כְּיִשְׂרָאֵל.", "english": "The pious of the nations of the world: when they keep the seven commandments with which the children of Noah were commanded, together with all their details, they are called ‘pious’… and if they do so, they will inherit the World to Come like Israel."}, {"location": "Avot 5:22", "hebrew": "בֶּן בַּג בַּג אוֹמֵר, הֲפֹךְ בָּהּ וַהֲפֹךְ בָּהּ, דְּכֹלָּא בָהּ. וּבָהּ תֶּחֱזֵי, וְסִיב וּבְלֵה בָהּ, וּמִנַּהּ לֹא תָזוּעַ, שֶׁאֵין לְךָ מִדָּה טוֹבָה הֵימֶנָּה.", "english": "Ben Bag Bag says: Turn it and turn it again, for everything is in it. Look into it, grow old and worn in it, and do not move from it—for you have no better measure than it."}, {"location": "Bereishit Rabbah 1:5", "hebrew": "בְּנֹהַג שֶׁבָּעוֹלָם מֶלֶךְ בָּשָׂר וָדָם בּוֹנֶה פָּלָטִין בִּמְקוֹם הַבִּיבִים, וּבִמְקוֹם הָאַשְׁפָּה, וּבִמְקוֹם הַסָּרִיּוֹת, כָּל מִי שֶׁהוּא בָּא לוֹמַר פָּלָטִין זוֹ בְּנוּיָה בִּמְקוֹם הַבִּיבִים וּבִמְקוֹם הָאַשְׁפָּה וּבִמְקוֹם הַסָּרִיּוֹת, אֵינוֹ פּוֹגֵם. כָּךְ כָּל מִי שֶׁהוּא בָּא לוֹמַר הָעוֹלָם הַזֶּה נִבְרָא מִתּוֹךְ תֹּהוּ וָבֹהוּ, אֵינוֹ פּוֹגֵם, אֶתְמְהָה. רַב הוּנָא בְּשֵׁם בַּר קַפָּרָא אָמַר, אִילוּלֵי שֶׁהַדָּבָר כָּתוּב אִי אֶפְשָׁר לְאָמְרוֹ, בְּרֵאשִׁית בָּרָא אֱלֹהִים, מִנַּיִן הֵן, וְהָאָרֶץ הָיְתָה תֹהוּ וָבֹהוּ.", "english": "In the way of the world: a mortal king builds a palace atop sewers, atop a refuse heap, atop latrines; whoever says, ‘This palace is built atop sewers…’ does not blemish him. So too, whoever says, ‘This world was created out of tohu va‑vohu,’ does not blemish—astonishing! Rav Huna said in the name of bar Kappara: If the matter were not written, it would be impossible to say it: “In the beginning God created”—from where are they? “And the earth was tohu va‑vohu.”"}, {"location": "Yalkut Shimoni on Nach, Ruth 4:607", "hebrew": "מעשה בחסיד אחד שירד מנכסיו והיתה אשתו כשרה לסוף נעשה שכיר, פעם אחד היה חורש בשדה פגע בו אליהו ז\"ל בדמות ערבי אחד, א\"ל יש לך שש שנים טובות אימתי אתה מבקש אותם עכשו או בסוף ימיך, א\"ל קוסם אתה אין מה ליתן לך אלא הפטר מעלי בשלום וחזר אצלו עד שלש פעמים, בפעם שלישית א\"ל אלך ואמלך באשתי, הלך אצל אשתו וא\"ל בא אלי אתך והטריח אותו עד שלש פעמים וא\"ל יש לך שש שנים טובות אימתי אתה מבקש אותם עכשו או בסוף ימיך, א\"ל ומה את אומרת, א\"ל לך אמור לו הבא אותם עכשו, א\"ל לך הבא אותם עכשיו, א\"ל לך לביתך ואין אתה מגיע לשער חצרך עד שתראה ברכה פרוסה בבית והיו יושבים בניו לחפש בידם בעפר ומצאן ממון שיזונו בו שש שנים וקראו לאמן, ולא הגיע לשער עד שיצאת אשתו לקראתו ובשרה אותו, מיד הודה להקב\"ה ונחה דעתו עליו, מה עשתה אשתו הכשרה א\"ל מכל מקום כבר משך עלינו הקב\"ה חוט של חסד ונתן לנו ממון מזון שש שנים נעסוק בגמילות חסדים שנים הללו שמא הקב\"ה מוסיף לנו משלו, וכן עשתה, כל מה שעשתה בכל יום ויום אמרה לבנה קטן כתוב כל מה שאנו נותנין וכן עשה, לסוף שש שנים בא אליהו ז\"ל אמר לו כבר הגיע עונה ליטול מה שנתתי לך, א\"ל כשנטלתי לא נטלתי אלא מדעת אשתי אף כשאני מחזיר לא אחזיר אלא מדעת אשתי, הלך אצלה אמר לה כבר בא הזקן ליטול את שלו, א\"ל לך אמור לו אם מצאת בני אדם נאמנים ממנו תן להם פקדונך, וראה הקב\"ה דבריהם וגמילות חסדים שעשו והוסיף להם טובה על טובה, לקיים מה שנאמר והיה מעשה הצדקה שלום:", "english": "A story: A pious man lost his wealth; his wife was righteous. In the end he became a hired laborer. Once, while plowing, Elijah of blessed memory met him in the guise of an Arab and said: You have six good years—when do you want them, now or at the end of your days? He dismissed him, and Elijah returned three times. The third time he said: I will consult my wife. She said: Tell him to bring them now. Elijah said: Go home—you will not reach your courtyard gate before you see blessing spread in your house. He went, and his children were sifting in the dirt and found money to sustain them six years. His wife said: Since God has drawn upon us a thread of kindness, let us spend these years doing acts of lovingkindness—perhaps He will add more. She had their young son record every gift they gave. At the end of six years Elijah returned to reclaim what he had given. The man said: I took only with my wife’s consent; I will return only with her consent. She said: Tell him—if you have found people more faithful than us, give them your deposit. God saw their words and their charity and added goodness upon goodness, fulfilling: “And the work of righteousness shall be peace.”"}, {"location": "Berakhot 7a", "hebrew": "וְאָמַר רַבִּי יוֹחָנָן מִשּׁוּם רַבִּי יוֹסֵי: טוֹבָה מַרְדּוּת אַחַת בְּלִבּוֹ שֶׁל אָדָם יוֹתֵר מִכַּמָּה מַלְקֻיוֹת.", "english": "Rabbi Yoḥanan said in the name of Rabbi Yosei: One chastisement in a person’s heart is better than many lashes."}, {"location": "Avodah Zarah 17a", "hebrew": "אָמְרוּ עָלָיו עַל רַבִּי אֶלְעָזָר בֶּן דּוּרְדְּיָא, שֶׁלֹּא הִנִּיחַ זוֹנָה אַחַת בָּעוֹלָם שֶׁלֹּא בָּא עָלֶיהָ. פַּעַם אַחַת שָׁמַע שֶׁיֵּשׁ זוֹנָה אַחַת בִּכְרַכֵּי הַיָּם, וְהָיְתָה נוֹטֶלֶת כִּיס דִּינָרִין בִּשְׂכָרָהּ. נָטַל כִּיס דִּינָרִין וְהָלַךְ וְעָבַר עָלֶיהָ שִׁבְעָה נְהָרוֹת. בִּשְׁעַת הֶרְגֵּל דָּבָר הֵפִיחָה, אָמְרָה: כְּשֵׁם שֶׁהֲפָיחָה זוֹ אֵינָהּ חוֹזֶרֶת לִמְקוֹמָהּ, כָּךְ אֶלְעָזָר בֶּן דּוּרְדְּיָא אֵין מְקַבְּלִין אוֹתוֹ בִּתְשׁוּבָה. הָלַךְ וְיָשַׁב בֵּין שְׁנֵי הָרִים וּגְבָעוֹת, אָמַר: הָרִים וּגְבָעוֹת בַּקְּשׁוּ עָלַי רַחֲמִים! אָמְרוּ לוֹ: עַד שֶׁאָנוּ מְבַקְּשִׁים עָלֶיךָ נְבַקֵּשׁ עַל עַצְמֵנוּ, שֶׁנֶּאֱמַר: ״כִּי הֶהָרִים יָמוּשׁוּ וְהַגְּבָעוֹת תְּמוּטֶינָה״. אָמַר: שָׁמַיִם וָאָרֶץ בַּקְּשׁוּ עָלַי רַחֲמִים! אָמְרוּ: עַד שֶׁאָנוּ מְבַקְּשִׁים עָלֶיךָ נְבַקֵּשׁ עַל עַצְמֵנוּ, שֶׁנֶּאֱמַר: ״כִּי שָׁמַיִם כֶּעָשָׁן נִמְלָחוּ וְהָאָרֶץ כַּבֶּגֶד תִּבְלֶה״. אָמַר: חַמָּה וּלְבָנָה בַּקְּשׁוּ עָלַי רַחֲמִים! אָמְרוּ לוֹ: עַד שֶׁאָנוּ מְבַקְּשִׁים עָלֶיךָ, נְבַקֵּשׁ עַל עַצְמֵנוּ, שֶׁנֶּאֱמַר: ״וְחָפְרָה הַלְּבָנָה וּבוֹשָׁה הַחַמָּה״. אָמַר: כּוֹכָבִים וּמַזָּלוֹת בַּקְּשׁוּ עָלַי רַחֲמִים! אָמְרוּ לוֹ: עַד שֶׁאָנוּ מְבַקְּשִׁים עָלֶיךָ, נְבַקֵּשׁ עַל עַצְמֵנוּ, שֶׁנֶּאֱמַר: ״וְנָמַקּוּ כׇּל צְבָא הַשָּׁמַיִם״. אָמַר: אֵין הַדָּבָר תָּלוּי אֶלָּא בִּי. הִנִּיחַ רֹאשׁוֹ בֵּין בִּרְכָּיו וְגָעָה בִּבְכִיָּה עַד שֶׁיָּצְתָה נִשְׁמָתוֹ. יָצְתָה בַּת קוֹל וְאָמְרָה: רַבִּי אֶלְעָזָר בֶּן דּוּרְדְּיָא מְזֻומָּן לְחַיֵּי הָעוֹלָם הַבָּא! [וְהָא הָכָא בַּעֲבֵירָה הֲוָה וּמִית], הָתָם נָמֵי, כֵּיוָן דַּאֲבִיק בַּהּ טוּבָא, כְּמִינוּת דָּמְיָא. בָּכָה רַבִּי וְאָמַר: יֵשׁ קוֹנֶה עוֹלָמוֹ בְּכַמָּה שָׁנִים, וְיֵשׁ קוֹנֶה עוֹלָמוֹ בְּשָׁעָה אַחַת. וְאָמַר רַבִּי: לֹא דַּיָּין לְבַעֲלֵי תְשׁוּבָה שֶׁמְּקַבְּלִין אוֹתָן, אֶלָּא שֶׁקּוֹרִין אוֹתָן ״רַבִּי״.", "english": "They said about Rabbi Elazar ben Dordaya that he left no prostitute in the world with whom he had not sinned. Once he heard of a prostitute in the coastal cities who took a purse of dinars as her fee. He took a purse of dinars and crossed seven rivers to reach her. In the midst of the act she passed gas and said: Just as this wind will not return to its place, so too Elazar ben Dordaya will not be accepted in repentance. He went and sat between two mountains and hills and cried: Mountains and hills, plead for mercy for me! They said: Before we plead for you, we must plead for ourselves, as it is said: “For the mountains shall depart and the hills be removed.” He said: Heaven and earth, plead for mercy for me! They said: Before we plead for you, we must plead for ourselves, as it is said: “For the heavens shall vanish like smoke, and the earth shall wear out like a garment.” He said: Sun and moon, plead for mercy for me! They said: Before we plead for you, we must plead for ourselves, as it is said: “Then the moon shall be confounded and the sun ashamed.” He said: Stars and constellations, plead for mercy for me! They said: Before we plead for you, we must plead for ourselves, as it is said: “And all the host of heaven shall rot away.” He said: The matter depends on none but me. He placed his head between his knees and wept until his soul departed. A heavenly voice proclaimed: Rabbi Elazar ben Dordaya is destined for life in the World to Come. Rabbi wept and said: Some acquire their world over many years, and some acquire their world in a single hour. And Rabbi said: Not only are penitents accepted, they are even called ‘Rabbi.’"}, {"location": "Avot DeRabbi Natan 3:6", "hebrew": "טוב לו לאדם דבר אחד בצער ממאה בריוח", "english": "Better for a person one thing in pain than a hundred in ease."}, {"location": "Mishnah Eduyot 5:6", "hebrew": "עֲקַבְיָא בֶּן מַהֲלַלְאֵל הֵעִיד אַרְבָּעָה דְבָרִים. אָמְרוּ לוֹ, עֲקַבְיָא, חֲזֹר בְּךָ בְאַרְבָּעָה דְבָרִים שֶׁהָיִיתָ אוֹמֵר וְנַעַשְׂךָ אַב בֵּית דִּין לְיִשְׂרָאֵל. אָמַר לָהֶן, מוּטָב לִי לְהִקָּרֵא שׁוֹטֶה כָּל יָמַי, וְלֹא לֵעָשׂוֹת שָׁעָה אַחַת רָשָׁע לִפְנֵי הַמָּקוֹם, שֶׁלֹּא יִהְיוּ אוֹמְרִים, בִּשְׁבִיל שְׂרָרָה חָזַר בּוֹ.", "english": "Akavya ben Mahalalel testified about four matters. They said to him: Akavya, retract those four things you used to say and we will appoint you chief judge over Israel. He said: Better for me to be called a fool all my days than to be wicked for even one hour before the Omnipresent—so that people will not say: He retracted for the sake of authority."}, {"location": "Berakhot 5b", "hebrew": "רַבִּי אֶלְעָזָר חֲלַשׁ. עַל לְגַבֵּיהּ רַבִּי יוֹחָנָן. חֲזָא דַּהֲוָה קָא גָּנֵי בְּבֵית אָפֵל. גַּלְיֵיהּ לִדְרָעֵיהּ וּנְפַל נְהוֹרָא. חַזְיֵיהּ דַּהֲוָה קָא בָּכֵי רַבִּי אֶלְעָזָר. אֲמַר לֵיהּ: אַמַּאי קָא בָּכֵית? אִי מִשּׁוּם תּוֹרָה דְּלָא אַפֵּשְׁתְּ — שָׁנִינוּ: אֶחָד הַמַּרְבֶּה וְאֶחָד הַמַּמְעִיט, וּבִלְבַד שֶׁיְּכַוֵּין לִבּוֹ לַשָּׁמַיִם. וְאִי מִשּׁוּם מְזוֹנֵי — לֹא כׇּל אָדָם זוֹכֶה לִשְׁתֵּי שֻׁלְחָנוֹת. וְאִי מִשּׁוּם בְּנֵי — דֵּין גַּרְמָא דַּעֲשִׂירָאָה בִּיר. אֲמַר לֵיהּ: לְהַאי שׁוּפְרָא דְּבָלֵי בְּעַפְרָא קָא בָּכֵינָא. אֲמַר לֵיהּ: עַל דָּא וַדַּאי קָא בָּכֵית, וּבְכוֹ תַּרְוַיְיהוּ.", "english": "Rabbi Elazar fell ill. Rabbi Yoḥanan came to him and saw that he lay in a dark house. He bared his arm, and light fell. Rabbi Yoḥanan saw Rabbi Elazar weeping. He said: Why are you weeping? If because of Torah that you did not increase—we learned: one who does much and one who does little are the same, provided he directs his heart to Heaven. If because of livelihood—not everyone merits two tables. If because of children—this is the bone of my tenth son. Rabbi Elazar said: I weep over this beauty that will decay in the dust. He said: For that, indeed, it is fitting to weep—and they both wept."}, {"location": "Shabbat 31a", "hebrew": "תָּנוּ רַבָּנַן: מַעֲשֶׂה בְּגוֹי אֶחָד שֶׁבָּא לִפְנֵי שַׁמַּאי. אָמַר לוֹ: כַּמָּה תּוֹרוֹת יֵשׁ לָכֶם? אָמַר לוֹ: שְׁתַּיִם, תּוֹרָה שֶׁבִּכְתָב וְתוֹרָה שֶׁבְּעַל פֶּה. אָמַר לוֹ: שֶׁבִּכְתָב אֲנִי מַאֲמִינְךָ, וְשֶׁבְּעַל פֶּה — אֵינִי מַאֲמִינְךָ. גַּיְּירֵנִי עַל מְנָת שֶׁתְּלַמְּדֵנִי תּוֹרָה שֶׁבִּכְתָב. גָּעַר בּוֹ וְהוֹצִיאוֹ בִּנְזִיפָה. בָּא לִפְנֵי הִלֵּל, גַּיְירֵיהּ. יוֹמָא קַמָּא אֲמַר לֵיהּ: א״ב ג״ד. לִמְחַר אֲפֵיךְ לֵיהּ. אֲמַר לֵיהּ: וְהָא אֶתְמוֹל לָא אֲמַרְתְּ לִי הָכִי! אֲמַר לֵיהּ: לָאו עֲלַי דִּידִי קָא סָמְכַתְּ? דְּעַל פֶּה נָמֵי סְמוֹךְ עֲלַי.", "english": "The Sages taught: A gentile came before Shammai and said: How many Torahs do you have? He said: Two—the Written Torah and the Oral Torah. He said: In the Written I believe you, but in the Oral I do not. Convert me on condition that you teach me the Written. Shammai rebuked him and drove him away. He came before Hillel; Hillel converted him. On the first day Hillel taught him: Alef, bet, gimel, dalet. The next day he reversed them. The convert protested: But yesterday you did not tell me so! Hillel said: Did you not rely on me? Rely on me for the Oral Torah as well."}, {"location": "Megillah 18a", "hebrew": "דָּרֵשׁ רַבִּי יְהוּדָה אִישׁ כְּפַר גִּבּוֹרַיָּא, וְאָמְרִי לַהּ אִישׁ כְּפַר גִּבּוֹר חַיִל: מַאי דִּכְתִיב: ״לְךָ דוּמִיָּה תְהִלָּה״? סַמָּא דְּכוֹלָּה — מַשְׁתּוּקָא. כִּי אֲתָא רַב דִּימִי, אֲמַר: אָמְרִי בְּמַעְרְבָא: מִלָּה — בְּסֶלַע, מַשְׁתּוּקָא — בִּתְרֵין.", "english": "Rabbi Yehuda of Kefar Giborya (some say: Kefar Gibor Ḥayil) expounded: “To You silence is praise”—the medicine for all is silence. When Rav Dimi came he said: In the West they say: A word is worth a sela; silence is worth two."}, {"location": "Pesachim 99a", "hebrew": "מִכָּאן אָמְרוּ חֲכָמִים: יָפָה שְׁתִיקָה לַחֲכָמִים, קַל וָחוֹמֶר לַטִּפְּשִׁים.", "english": "From here the Sages said: Silence is fitting for the wise—how much more so for fools."}, {"location": "Sanhedrin 103a", "hebrew": "וְאָמַר רַב חִסְדָּא אָמַר רַבִּי יִרְמְיָה בַּר אַבָּא: אַרְבַּע כִּיתּוֹת אֵין מְקַבְּלוֹת פְּנֵי שְׁכִינָה: כַּת לֵצִים, כַּת שַׁקְרָנִים, כַּת חֲנֵיפִים, כַּת מְסַפְּרֵי לָשׁוֹן הָרָע.", "english": "Rav Ḥisda said in the name of Rabbi Yirmeya bar Abba: Four groups do not receive the Divine Presence: the scoffers, the liars, the flatterers, and the tellers of evil speech."}, {"location": "Shabbat 32a", "hebrew": "תַּנְיָא, רַבִּי יִשְׁמָעֵאל בֶּן אֶלְעָזָר אוֹמֵר: בַּעֲוֹן שְׁנֵי דְבָרִים עַמֵּי הָאֲרָצוֹת מֵתִים — עַל שֶׁקּוֹרִין לַאֲרוֹן הַקּוֹדֶשׁ ״אֲרָנָא״, וְעַל שֶׁקּוֹרִין לְבֵית הַכְּנֶסֶת ״בֵּית עָם״.", "english": "It was taught: Rabbi Yishmael ben Elazar says: Because of two things ignoramuses die—because they call the Holy Ark “arana,” and because they call the synagogue “the people’s house.”"}, {"location": "Niddah 31a", "hebrew": "דָּרֵשׁ רַב יוֹסֵף: מַאי דִכְתִיב ״אוֹדְךָ ה׳ כִּי אָנַפְתָּ בִּי יָשׁוֹב אַפְּךָ וּתְנַחֲמֵנִי״, בַּמֶּה הַכָּתוּב מְדַבֵּר? בִּשְׁנֵי בְּנֵי אָדָם שֶׁיָּצְאוּ לִסְחוֹרָה. יָשַׁב לוֹ קוֹץ לְאֶחָד מֵהֶן, הִתְחִיל מְחָרֵף וּמְגַדֵּף. לְיָמִים שָׁמַע שֶׁטָּבְעָה סְפִינָתוֹ שֶׁל חֲבֵירוֹ בַּיָּם, הִתְחִיל מוֹדֶה וּמְשַׁבֵּחַ. לְכָךְ נֶאֱמַר: ״יָשׁוֹב אַפְּךָ וּתְנַחֲמֵנִי״.", "english": "Rav Yosef expounded: What is meant by “I thank You, LORD, for You were angry with me; Your anger turned and You comforted me”? It speaks of two people who went out to trade. A thorn lodged in one of them; he began to curse and blaspheme. After some time he heard that his companion’s ship had sunk at sea; he began to give thanks and praise. Therefore it is said: “Your anger turned and You comforted me.”"}, {"location": "Berakhot 8b", "hebrew": "תַּנְיָא, אָמַר רַבִּי עֲקִיבָא: בִּשְׁלֹשָׁה דְבָרִים אוֹהֵב אֲנִי אֶת הַמָּדִיִּים, כְּשֶׁחוֹתְכִין אֶת הַבָּשָׂר — אֵין חוֹתְכִין אֶלָּא עַל גַּבֵּי הַשּׁוּלְחָן, כְּשֶׁנּוֹשְׁקִין — אֵין נוֹשְׁקִין אֶלָּא עַל גַּב הַיָּד, וּכְשֶׁיּוֹעֲצִין — אֵין יוֹעֲצִין אֶלָּא בַּשָּׂדֶה.", "english": "It was taught: Rabbi Akiva said: In three things I love the Medes: when they cut meat, they cut only upon a table; when they kiss, they kiss only upon the back of the hand; and when they counsel, they counsel only in the field."}, {"location": "Eruvin 65b", "hebrew": "אָמַר רַבִּי אִילְעַאי, בִּשְׁלֹשָׁה דְּבָרִים אָדָם נִיכָּר: בְּכוֹסוֹ, וּבְכִיסוֹ וּבְכַעְסוֹ. וְאָמְרִי לֵיהּ אַף בְּשַׂחֲקוֹ.", "english": "Rabbi Ilai said: A person is recognized in three things: by his cup, by his purse, and by his anger—and some say: also by his laughter."}, {"location": "Pesachim 113b", "hebrew": "תָּנוּ רַבָּנַן, שְׁלֹשָׁה חַיֵּיהֶן אֵינָם חַיִּים: הָרַחְמָנִין, וְהָרַתְחָנִין, וַאֲנִינֵי הַדַּעַת. וְאָמַר רַב יוֹסֵף: כּוּלְּהוּ אִיתַנְהוּ בִּי.", "english": "The Sages taught: Three whose lives are not lives: the overly compassionate, the irascible, and the delicate. Rav Yosef said: All of them are in me."}, {"location": "Gittin 70a", "hebrew": "שְׁלֹשָׁה דְּבָרִים מַכְחִישִׁים כֹּחוֹ שֶׁל אָדָם, וְאֵלּוּ הֵן: פַּחַד, דֶּרֶךְ וְעָוֹן. פַּחַד – דִּכְתִיב: ״לִבִּי סְחַרְחַר עֲזָבַנִי כֹחִי״. דֶּרֶךְ – דִּכְתִיב: ״עִנָּה בַדֶּרֶךְ כֹּחִי״. עָוֹן – דִּכְתִיב: ״כָּשַׁל בַּעֲוֹנִי כֹחִי״.", "english": "Three things weaken a person’s strength: fear, travel, and sin. Fear—as it is written: “My heart trembled; my strength left me.” Travel—as it is written: “He afflicted my strength on the way.” Sin—as it is written: “My strength failed because of my iniquity.”"}, {"location": "Pesachim 112a", "hebrew": "עֲשֵׂה שַׁבַּתְּךָ חוֹל וְאַל תִּצְטָרֵךְ לַבְּרִיּוֹת", "english": "Make your Sabbath like a weekday and do not become dependent on others."}, {"location": "Pesachim 113a", "hebrew": "אֲמַר לֵיהּ רַב לְרַב כָּהֲנָא: הֲפוֹךְ בִּנְבֵילְתָּא וְלָא תֵּיפוֹךְ בְּמִילֵּי. פְּשׁוֹט נְבֵילְתָּא בְּשׁוּקָא וּשְׁקֵיל אַגְרָא, וְלָא תֵּימָא ״כָּהֲנָא אֲנָא, וְגַבְרָא רַבָּא אֲנָא, וְסַנְיָא בִּי מִלְּתָא״.", "english": "Rav said to Rav Kahana: Better to skin carcasses in the marketplace and take wages than to overturn your words. Skin carcasses in the market and earn your pay, and do not say: 'I am a priest, and I am a great man; this thing is disgraceful for me.'"}, {"location": "Bava Metzia 42a", "hebrew": "וְאָמַר רַבִּי יִצְחָק: לְעוֹלָם יַשְׁלִישׁ אָדָם אֶת מְעוֹתָיו, שְׁלִישׁ בְּקַרְקַע, וּשְׁלִישׁ בִּפְרַקְמַטְיָא, וּשְׁלִישׁ תַּחַת יָדוֹ.", "english": "Rabbi Yitzḥak said: A person should always divide his money into three—one third in land, one third in merchandise, and one third kept in hand."}, {"location": "Sotah 47a", "hebrew": "אָמַר רַבִּי יוֹחָנָן, שְׁלֹשָׁה חִינּוֹת הֵן: חֵן מָקוֹם עַל יוֹשְׁבָיו, חֵן אִשָּׁה עַל בַּעְלָהּ, חֵן מִקָּח עַל (מִקָּחוֹ).", "english": "Rabbi Yoḥanan said: There are three kinds of charm: the charm of a place upon its inhabitants, the charm of a wife upon her husband, and the charm of a purchase upon its buyer."}, {"location": "Bereishit Rabbah 34:15", "hebrew": "וְאַתֶּם פְּרוּ וּרְבוּ, אָמַר רֵישׁ לָקִישׁ בְּרִית נֶחְלְקָה לָאֲוִירוֹת, רַבִּי שִׁמְעוֹן בֶּן לָקִישׁ הֲוָה יָתֵיב לָעֵי בְּאוֹרָיְתָא בַּחֲדָא אִילְטִיס דִּטְבֶרְיָה, נְפַקּוּן תַּרְתֵּין נָשִׁין מִן תַּמָּן אָמְרָה חָדָא לַחֲבֶרְתָּהּ בְּרִיךְ דְּאַפְקִין מִן הָדֵין אֲוִירָא בִּישָׁא, צְוַח לְהוֹן וַאֲמַר לְהוֹן מָה הָן אַתּוּן אָמְרִין מִן מְזָגָא, אָמַר אֲנָא חָכֵם מִן מְזָגָא, וְלֵית בָּהּ אֶלָּא תַּרְתֵּין עַמּוּדִין, אָמַר בָּרוּךְ שֶׁנָּתַן חֵן לַמָּקוֹם עַל יוֹשְׁבָיו. חַד תַּלְמִיד מִן דְּרַבִּי יוֹסֵי הֲוָה יָתֵיב קֳדָמוֹי, הֲוָה מַסְבַּר לֵיהּ וְלָא סְבַר לֵיהּ, אֲמַר לֵיהּ לְמָה לֵית אַתְּ סָבַר, אֲמַר לֵיהּ דַּאֲנָא גָּלֵי מֵאַתְרָאי. אֲמַר לֵיהּ מֵהֵיכָן אֲתַר אַתְּ, אֲמַר לֵיהּ מִן גּוֹבַת שַׁמַּאי. אֲמַר לֵיהּ וּמָה אִינוּן אֲוִירָא דְתַמָּן, אֲמַר לֵיהּ כַּד יָנוֹקָא מִתְיְלִיד אֲנָא גָבְלִין לֵיהּ אֲדַמְדְּמָנֵי וְטוֹשִׁין מוֹחֵיהּ דְּלָא יֵכְלוּנֵיהּ יַתּוּשַׁיָּה, אֲמַר בָּרוּךְ שֶׁנָּתַן חֵן מָקוֹם בְּעֵינֵי יוֹשְׁבָיו. אַף לֶעָתִיד לָבוֹא כֵּן, שֶׁנֶּאֱמַר (יחזקאל לו, כו): וַהֲסִרֹתִי אֶת לֵב הָאֶבֶן מִבְּשַׂרְכֶם וגו' לֵב בָּשָׂר, לֵב בּוֹסֵר שֶׁל חֲבֵרוֹ.", "english": "On the verse 'Be fruitful and multiply': Reish Lakish said, 'The covenant was divided among the airs.' Rabbi Shimon ben Lakish was once sitting and studying Torah in a certain portico of Tiberias. Two women went out from there; one said to her friend, 'Blessed is He who brought us out of this bad air.' He cried out to them and said: 'What are you saying—about the climate? I am expert in climate, and it has only two columns!' He said: 'Blessed is He who has given charm to a place in the eyes of its inhabitants.'\nA certain student of Rabbi Yose sat before him; he explained, but the student did not grasp it. He said to him: 'Why do you not understand?' He replied: 'Because I am an exile from my place.' He said: 'Where are you from?' He replied: 'From Govat Shammai.' He said: 'And what is the air there like?' He replied: 'When a baby is born there, we smear it with red clay and cover its brain so that mosquitoes will not eat it.' He said: 'Blessed is He who gives a place charm in the eyes of its inhabitants.' So too in the future, as it is said: 'I will remove the heart of stone from your flesh and give you a heart of flesh'—a heart that ripens, sensitive to another’s heart."}, {"location": "Bava Kamma 92b", "hebrew": "וְאָמְרִי אִינָשֵׁי: שִׁיתִּין רָהוֹטֵי רְהוּט, וְלָא מְטוֹ לְגַבְרָא דְּמִצַּפְרָא כְּרַךְ.", "english": "People say: Sixty runners may run, yet they will not overtake the man who rises early and wraps himself up."}, {"location": "Pesachim 54a", "hebrew": "תַּנְיָא: שִׁבְעָה דְּבָרִים נִבְרְאוּ קוֹדֶם שֶׁנִּבְרָא הָעוֹלָם, וְאֵלּוּ הֵן: תּוֹרָה, וּתְשׁוּבָה, וְגַן עֵדֶן, וְגֵיהִנָּם, וְכִסֵּא הַכָּבוֹד, וּבֵית הַמִּקְדָּשׁ, וּשְׁמוֹ שֶׁל מָשִׁיחַ.", "english": "It was taught: Seven things were created before the world was created: Torah, repentance, the Garden of Eden, Gehenna, the Throne of Glory, the Temple, and the name of the Messiah."}, {"location": "Taanit 23a", "hebrew": "מַעֲשֶׂה שֶׁשָּׁלְחוּ לְחוֹנִי הַמְעַגֵּל וְכוּ׳. תָּנוּ רַבָּנַן: פַּעַם אַחַת יָצָא רוֹב אֲדָר וְלֹא יָרְדוּ גְּשָׁמִים, שָׁלְחוּ לְחוֹנִי הַמְעַגֵּל: הִתְפַּלֵּל וְיֵרְדוּ גְּשָׁמִים! הִתְפַּלֵּל, וְלֹא יָרְדוּ גְּשָׁמִים. עָג עוּגָה וְעָמַד בְּתוֹכָהּ, כְּדֶרֶךְ שֶׁעָשָׂה חֲבַקּוּק הַנָּבִיא, שֶׁנֶּאֱמַר: ״עַל מִשְׁמַרְתִּי אֶעֱמֹדָה וְאֶתְיַצְּבָה עַל מָצוֹר וְגוֹ׳״. אָמַר לְפָנָיו: רִבּוֹנוֹ שֶׁל עוֹלָם! בָּנֶיךָ שָׂמוּ פְּנֵיהֶם עָלַי, שֶׁאֲנִי כְּבֶן בַּיִת לְפָנֶיךָ. נִשְׁבָּע אֲנִי בְּשִׁמְךָ הַגָּדוֹל שֶׁאֵינִי זָז מִכָּאן עַד שֶׁתְּרַחֵם עַל בָּנֶיךָ. הִתְחִילוּ גְּשָׁמִים מְנַטְּפִין. אָמְרוּ לוֹ תַּלְמִידָיו: רַבִּי! רְאִינוּךְ וְלֹא נָמוּת, כִּמְדוּמִּין אָנוּ שֶׁאֵין גְּשָׁמִים יוֹרְדִין אֶלָּא לְהַתִּיר שְׁבוּעָתְךָ. אָמַר: לֹא כָּךְ שָׁאַלְתִּי, אֶלָּא גִּשְׁמֵי בּוֹרוֹת שִׁיחִין וּמְעָרוֹת. יָרְדוּ בְּזַעַף, עַד שֶׁכׇּל טִפָּה וְטִפָּה כִּמְלֹא פִּי חָבִית. וְשִׁיעֲרוּ חֲכָמִים שֶׁאֵין טִפָּה פְּחוּתָה מִלּוֹג. אָמְרוּ לוֹ תַּלְמִידָיו: רַבִּי, רְאִינוּךְ וְלֹא נָמוּת, כִּמְדוּמִּין אָנוּ שֶׁאֵין גְּשָׁמִים יוֹרְדִין אֶלָּא לְאַבֵּד הָעוֹלָם. אָמַר לְפָנָיו: לֹא כָּךְ שָׁאַלְתִּי, אֶלָּא גִּשְׁמֵי רָצוֹן בְּרָכָה וּנְדָבָה. יָרְדוּ כְּתִיקְנָן, עַד שֶׁעָלוּ כׇּל הָעָם לְהַר הַבַּיִת,
