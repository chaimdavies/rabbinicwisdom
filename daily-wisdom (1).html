 Creator? For Rabbi Yishmael taught: Great is peace—for the Great Name written in holiness, the Holy One, blessed be He, said it may be erased in the water to make peace between a man and his wife.”"}, {"location": "Yevamot 62b", "hebrew": "הָאוֹהֵב אֶת אִשְׁתּוֹ כְּגוּפוֹ, וְהַמְכַבְּדָהּ יוֹתֵר מִגּוּפוֹ, וְהַמַּדְרִיךְ בָּנָיו וּבְנוֹתָיו בְּדֶרֶךְ יְשָׁרָה, וְהַמַּשִּׂיאָן סָמוּךְ לְפִירְקָן — עָלָיו הַכָּתוּב אוֹמֵר: ״וְיָדַעְתָּ כִּי שָׁלוֹם אָהֳלֶךָ״.", "english": "One who loves his wife as himself, and honors her more than himself, and guides his sons and daughters in a straight path, and marries them off near the time of their maturity—about him Scripture says: “And you shall know that your tent is in shalom.”"}, {"location": "Bereishit Rabbah 17:2", "hebrew": "לֹא טוֹב, תָּנֵי רַבִּי יַעֲקֹב כָּל שֶׁאֵין לוֹ אִשָּׁה, שָׁרוּי בְּלֹא טוֹבָה בְּלֹא עֵזֶר בְּלֹא שִׂמְחָה בְּלֹא בְּרָכָה בְּלֹא כַּפָּרָה... רַבִּי סִימוֹן בְּשֵׁם רַבִּי יְהוֹשֻׁעַ בֶּן לֵוִי אָמַר אַף בְּלֹא שָׁלוֹם... רַבִּי יְהוֹשֻׁעַ דְּסִכְנִין בְּשֵׁם רַבִּי לֵוִי אָמַר אַף בְּלֹא חַיִּים... רַבִּי חִיָּא בַּר גַּמְדָא אָמַר אַף אֵינוֹ אָדָם שָׁלֵם, שֶׁנֶּאֱמַר (בראשית ה, ב): וַיְבָרֶךְ אֹתָם וַיִּקְרָא אֶת שְׁמָם אָדָם, שְׁנֵיהֶם כְּאֶחָד קְרוּיִים אָדָם. וְיֵשׁ אוֹמְרִים אַף מְמַעֵט אֶת הַדְּמוּת, שֶׁנֶּאֱמַר (בראשית ט, ו): כִּי בְּצֶלֶם אֱלֹהִים עָשָׂה אֶת הָאָדָם, מַה כְּתִיב אַחֲרָיו (בראשית ט, ז): וְאַתֶּם פְּרוּ וּרְבוּ.", "english": "“Not good”—Rabbi Yaakov taught: Anyone who has no wife dwells without goodness, without help, without simchah, without berachah, without kapparah… Rabbi Sim’on in the name of Rabbi Yehoshua ben Levi said: even without shalom… Rabbi Yehoshua of Sikhnin in the name of Rabbi Levi said: even without life… Rabbi Ḥiyya bar Gamda said: he is not even a complete person, as it is said: “And He blessed them and called their name Adam”—the two of them together are called Adam. And some say: he even diminishes the likeness (demus), as it is said: “For in the image of Elokim He made man”—what is written after it? “And you, be fruitful and multiply.”"}, {"location": "Bava Metzia 59a", "hebrew": "וְאָמַר רַבִּי חֶלְבּוֹ: לְעוֹלָם יְהֵא אָדָם זָהִיר בִּכְבוֹד אִשְׁתּוֹ, שֶׁאֵין בְּרָכָה מְצוּיָה בְּתוֹךְ בֵּיתוֹ שֶׁל אָדָם אֶלָּא בִּשְׁבִיל אִשְׁתּוֹ, שֶׁנֶּאֱמַר: ״וּלְאַבְרָם הֵטִיב בַּעֲבוּרָהּ״. וְהַיְינוּ דַּאֲמַר לְהוּ רָבָא לִבְנֵי מָחוֹזָא: אוֹקִירוּ לִנְשַׁיְיכוּ, כִּי הֵיכִי דְּתִתְעַתְּרוּ.", "english": "Rabbi Ḥelbo said: A person should always be careful with the honor of his wife, for blessing is found in a man’s house only on account of his wife, as it is said: “And to Avram He did good on her account.” And this is what Rava said to the people of Meḥoza: Honor your wives, so that you will become wealthy."}, {"location": "Chullin 84b:4", "hebrew": "לעולם יאכל אדם וישתה פחות ממה שיש לו וילבש ויתכסה במה שיש לו ויכבד אשתו ובניו יותר ממה שיש לו שהן תלויין בו והוא תלוי במי שאמר והיה העולם", "english": "A person should always eat and drink less than what he has, and dress and cover himself according to what he has, but honor his wife and his children more than what he has—for they depend on him, and he depends on the One Who spoke and the world came into being."}, {"location": "Shir HaShirim Rabbah 1:4", "hebrew": "אָמַר רַבִּי אִידֵי מַעֲשֶׂה בְּאִשָּׁה אַחַת בְּצִידוֹן שֶׁשָּׁהֲתָה עֶשֶׂר שָׁנִים עִם בַּעֲלָהּ וְלֹא יָלְדָה, אֲתוֹן גַּבֵּי רַבִּי שִׁמְעוֹן בֶּן יוֹחָאי בָּעַיִן לְמִשְׁתַּבְקָא דֵּין מִדֵּין, אֲמַר לְהוֹן חַיֵּיכוֹן כְּשֵׁם שֶׁנִּזְדַּוַּגְתֶּם זֶה לָזֶה בְּמַאֲכָל וּבְמִשְׁתֶּה, כָּךְ אֵין אַתֶּם מִתְפָּרְשִׁים אֶלָּא מִתּוֹךְ מַאֲכָל וּמִשְׁתֶּה. הָלְכוּ בִּדְרָכָיו וְעָשׂוּ לְעַצְמָן יוֹם טוֹב וְעָשׂוּ סְעוּדָה גְדוֹלָה וְשִׁכְּרַתּוּ יוֹתֵר מִדַּאי, כֵּיוָן שֶׁנִּתְיַשְּׁבָה דַעְתּוֹ עָלָיו אָמַר לָהּ בִּתִּי רְאִי כָּל חֵפֶץ טוֹב שֶׁיֵּשׁ לִי בַּבַּיִת, וּטְלִי אוֹתוֹ וּלְכִי לְבֵית אָבִיךְ, מֶה עָשְׂתָה הִיא, לְאַחַר שֶׁיָּשַׁן רָמְזָה לַעֲבָדֶיהָ וּלְשִׁפְחוֹתֶיהָ וְאָמְרָה לָהֶם, שָׂאוּהוּ בַּמִּטָּה וּקְחוּ אוֹתוֹ וְהוֹלִיכוּהוּ לְבֵית אַבָּא. בַּחֲצִי הַלַּיְלָה נִנְעַר מִשִּׁנְתֵיהּ כֵּיוָן דְּפָג חַמְרֵיהּ, אָמַר לָהּ בִּתִּי הֵיכָן אֲנִי נָתוּן, אָמְרָה לֵיהּ בְּבֵית אַבָּא, אָמַר לָהּ מַה לִּי לְבֵית אָבִיךְ, אָמְרָה לֵיהּ וְלֹא כָךְ אָמַרְתָּ לִי בָּעֶרֶב, כָּל חֵפֶץ טוֹב שֶׁיֵּשׁ בְּבֵיתִי טְלִי אוֹתוֹ וּלְכִי לְבֵית אָבִיךְ. אֵין חֵפֶץ טוֹב לִי בָּעוֹלָם יוֹתֵר מִמָּךְ. הָלְכוּ לָהֶם אֵצֶל רַבִּי שִׁמְעוֹן בֶּן יוֹחָאי וְעָמַד וְהִתְפַּלֵּל עֲלֵיהֶם וְנִפְקָדוּ, לְלַמֶּדְךָ מָה הַקָּדוֹשׁ בָּרוּךְ הוּא פּוֹקֵד עֲקָרוֹת אַף צַדִּיקִים פּוֹקְדִים עֲקָרוֹת", "english": "Rabbi Idi said: There was an incident with a woman in Sidon who had lived with her husband for ten years and had not borne children. They came before Rabbi Shimon bar Yochai, seeking to separate from one another. He said to them: “By your lives—just as you were joined to one another through food and drink, so you should not separate except through food and drink.” They followed his counsel: they made for themselves a festival day and a great feast, and they became drunk beyond measure. When his mind settled, he said to her, “My daughter, see every good object that I have in the house—take it and go to your father’s house.” What did she do? After he fell asleep, she signaled to her servants and maidservants and said to them, “Lift him onto the bed, take him, and bring him to my father’s house.” At midnight he woke from his sleep as the wine wore off. He said to her, “My daughter, where am I?” She said, “In my father’s house.” He said, “What have I to do with your father’s house?” She said, “Did you not say to me this evening: ‘Any good object that is in my house—take it and go to your father’s house’? There is no good object in the world for me more than you.” They went to Rabbi Shimon bar Yochai; he stood and prayed for them, and they were remembered with children—teaching you that just as the Holy One, blessed be He, remembers barren women, so too the righteous remember barren women."}, {"location": "Yevamot 63a", "hebrew": "רַבִּי חִיָּיא הֲוָה קָא מְצַעֲרָא לֵיהּ דְּבֵיתְהוּ. כִּי הֲוָה מַשְׁכַּח מִידֵּי, צָיַיר לֵיהּ בְּסוּדָרֵיהּ וּמַיְיתֵי נִיהֲלַהּ. אֲמַר לֵיהּ רַב: וְהָא קָא מְצַעֲרָא לֵיהּ לְמָר? אֲמַר לֵיהּ: דַּיֵּינוּ שֶׁמְּגַדְּלוֹת בָּנֵינוּ, וּמַצִּילוֹת אוֹתָנוּ מִן הַחֵטְא.", "english": "Rabbi Ḥiyya’s wife would cause him distress. When he would find something (good), he would wrap it in his scarf and bring it to her. Rav said to him: But does she not cause the master distress? He said to him: It is enough for us that they raise our children and save us from sin."}, {"location": "Avot DeRabbi Natan 28:3", "hebrew": "רשב״ג אומר כל המשים שלום בתוך ביתו מעלה עליו הכתוב כאילו משים שלום בישראל על כל אחד ואחד. וכל המטיל קנאה ותחרות בתוך ביתו מעלה עליו הכתוב כאילו מטיל קנאה ותחרות בישראל לפי שכל אחד ואחד מלך בתוך ביתו שנא׳ (אסתר א׳:כ״ב) להיות כל איש שורר בביתו:", "english": "Rabban Shim’on ben Gamliel says: Whoever places shalom within his house—Scripture accounts it to him as though he places shalom in Yisrael upon each and every one. And whoever casts jealousy and rivalry within his house—Scripture accounts it to him as though he casts jealousy and rivalry in Yisrael, for each and every one is a king within his house, as it is said: “That every man should rule in his house.”"}, {"location": "Shabbat 113a", "hebrew": "״וְכִבַּדְתּוֹ מֵעֲשׂוֹת דְּרָכֶיךָ״. ״וְכִבַּדְתּוֹ״ — שֶׁלֹּא יְהֵא מַלְבּוּשְׁךָ שֶׁל שַׁבָּת כְּמַלְבּוּשְׁךָ שֶׁל חוֹל, וְכִי הָא דְּרַבִּי יוֹחָנָן קָרֵי לְמָאנֵיהּ ״מְכַבְּדוֹתַי״.", "english": "“And you shall honor it, from doing your ways.” “And you shall honor it”—that your Shabbos garment should not be like your weekday garment; as with Rabbi Yoḥanan, who would call his garments, “my honors.”"}, {"location": "Shabbat 114a", "hebrew": "״וּפָשַׁט אֶת בְּגָדָיו וְלָבַשׁ בְּגָדִים אֲחֵרִים״, וְתָנָא דְּבֵי רַבִּי יִשְׁמָעֵאל, לִימְּדָה תּוֹרָה דֶּרֶךְ אֶרֶץ: בְּגָדִים שֶׁבִּישֵּׁל בָּהֶן קְדֵירָה לְרַבּוֹ — אַל יִמְזוֹג בָּהֶן כּוֹס לְרַבּוֹ...\nוְאָמַר רַבִּי חִיָּיא בַּר אַבָּא אָמַר רַבִּי יוֹחָנָן: כָּל תַּלְמִיד חָכָם שֶׁנִּמְצָא רְבָב עַל בִּגְדּוֹ — חַיָּיב מִיתָה, שֶׁנֶּאֱמַר: ״כָּל מְשַׂנְאַי אָהֲבוּ מָוֶת״ — אַל תִּקְרֵי ״מְשַׂנְאַי״, אֶלָּא ״מַשְׂנִיאַי״.", "english": "“And he shall remove his garments and put on other garments.” And the school of Rabbi Yishma’el taught: Torah taught derech eretz—garments in which one cooked a pot for his master: do not pour a cup for his master while wearing them.\nRabbi Ḥiyya bar Abba said in the name of Rabbi Yoḥanan: Any talmid ḥacham upon whose garment a stain is found—deserves death, as it is said: “All who hate Me love death.” Do not read “those who hate Me (mesan’ai),” but rather “those who make Me hated (masni’ai).”"}, {"location": "Shabbat 129a", "hebrew": "אָמַר רַב יְהוּדָה אָמַר רַב: לְעוֹלָם יִמְכּוֹר אָדָם קוֹרוֹת בֵּיתוֹ וְיִקַּח מִנְעָלִים לְרַגְלָיו.", "english": "Rav Yehudah said in the name of Rav: A person should always sell the beams of his house and buy shoes for his feet."}, {"location": "Shabbat 152a", "hebrew": "חַזְיֵיהּ דְּלָא סָיֵים מְסָאנֵיהּ, אֲמַר לֵיהּ: דְּעַל סוּס — מֶלֶךְ, דְּעַל חֲמוֹר — בֶּן חוֹרִין, וּדְמַנְעָלֵי בְּרִיגְלוֹהִי — בַּר אִינִישׁ. דְּלָא הָא וְלָא הָא — דַּחֲפִיר וּקְבִיר טָב מִינֵּיהּ.", "english": "He saw that he was not wearing shoes. He said to him: One who is on a horse is a king; one who is on a donkey is a free man; and one who has shoes on his feet is a human being. But one who is neither this nor that—better for him that he should dig and be buried than (to be) ???."}, {"location": "Shabbat 156b", "hebrew": "דְּאִימֵּיהּ דְּרַב נַחְמָן בַּר יִצְחָק אָמְרִי לַהּ כַּלְדָּאֵי: בְּרִיךְ גַּנָּבָא הָוֵה. לָא שְׁבַקְתֵּיהּ גַּלּוֹיֵי רֵישֵׁיהּ. אֲמַרָה לֵיהּ: כַּסִּי רֵישָׁיךָ, כִּי הֵיכִי דְּתִיהְוֵי עֲלָךְ אֵימְתָא דִשְׁמַיָּא, וּבְעִי רַחֲמֵי. לָא הֲוָה יָדַע אַמַּאי קָאָמְרָה לֵיהּ. יוֹמָא חַד יָתֵיב קָא גָרֵיס תּוּתֵי דִיקְלָא, נְפַל גְּלִימָא מֵעִילָּוֵי רֵישֵׁיהּ, דְּלִי עֵינֵיהּ חֲזָא לְדִיקְלָא, אַלְּמֵיהּ יִצְרֵיהּ, סְלֵיק, פַּסְקֵיהּ לְקִיבּוּרָא בְּשִׁינֵּיהּ.", "english": "The astrologers told the mother of Rav Naḥman bar Yitzḥak: Your son will be a thief. She did not allow him to uncover his head. She said to him: Cover your head, so that the fear of Heaven will be upon you, and ask for mercy. He did not know why she was saying this to him. One day he was sitting and learning beneath a palm tree; his head-covering fell from upon his head. He lifted his eyes and saw the palm tree; his yetzer overcame him—he climbed up and tore off a cluster (???) with his teeth."}, {"location": "Jerusalem Talmud, Beitzah 5:2", "hebrew": "רִבִּי הֲוָה מְסַב לְרִבִּי שִׁמְעוֹן בְּרֵיהּ וַהֲווֹן מְטַפְּחִין לַאֲחוֹרֵי יְדֵיהוֹן בְּשׁוּבְתָא. עֲבָר רִבִּי מֵאִיר וּשְׁמַע קָלְהוֹן. אָמַר. רַבּוֹתֵינוּ. הוּתְּרָה הַשַּׁבָּת. שְׁמַע רִבִּי קָלֵיהּ. אָמַר. מִי הוּא זֶה שֶׁבָּא לִרְדוֹתֵינוּ בְתוֹךְ בֵּיתֵינוּ. [וְאִית דְּאָֽמְרֵי. הָכֵין אָמַר. מִי הוּא זֶה שֶׁבָּא לִצְנִעֵינוּ בְתוֹךְ בֵּיתֵינוּ.] שְׁמַע רִבִּי מֵאִיר קָלֵיהּ וַעֲרַק. נַפְקִין פְּרַיי בַתְרֵיהּ מִפְרֵי. אַפְרַח רוּחָא פִיקְיָילֵיהּ מֵעַל קָדְלֵיהּ דְּרִבִּי מֵאִיר. אוֹדִיק רִבִּי מִן כַּווְתָּא וַחֲמָא קָדְלֵיהּ דְּרִבִּי מֵאִיר מִן אֲחוֹרוֹי. אֲמַר. לָא זְכִית אֲנָא לְאוֹרַיְיתָא אֶלָּא בְגִין דַּחֲמִית קָדְלֵיהּ דְּרִבִּי מֵאִיר מִן אֲחוֹרוֹי. רִבִּי יוֹחָנָן וְרִבִּי שִׁמְעוֹן בֶּן לָקִישׁ תְּרֵיהוֹן אָֽמְרִין. אֲנָן לָא זְכִינָן לְאוֹרַיְתָא אֶלָּא בְגִין דַּחֲמִינָן אֶצְבְּעָתֵיהּ דְּרִבִּי מִן לְ[גַו לְגִי]קִין דִּידֶּיהּ.", "english": "Rabbi would recline with Rabbi Shimon his son, and they would clap the backs of their hands on Shabbat. Rabbi Meir passed by and heard their voices. He said, “Our masters have permitted the Sabbath.” Rabbi heard his voice and said, “Who is this who has come to rule over us inside our own house?” (Some say he said: “Who is this who has come to shame us inside our own house?”) When Rabbi Meir heard Rabbi’s voice, he fled. They ran after him, but he got away. A wind lifted the cloak from Rabbi Meir’s neck. Rabbi looked out from the window and saw Rabbi Meir’s neck from behind. Rabbi said, “I merited Torah only because I saw Rabbi Meir’s neck from behind.” רבי Yochanan and Rabbi Shimon ben Lakish both said: “We merited Torah only because we saw Rabbi’s fingers from within the folds of his cloak.”"}, {"location": "Eruvin 13b", "hebrew": "אָמַר רַבִּי: הַאי דִּמְחַדַּדְנָא מֵחַבְרַאי דַּחֲזִיתֵיהּ לְרַבִּי מֵאִיר מֵאֲחוֹרֵיהּ, וְאִילּוּ חֲזִיתֵיהּ מִקַּמֵּיהּ הֲוָה מְחַדַּדְנָא טְפֵי — דִּכְתִיב: ״וְהָיוּ עֵינֶיךָ רוֹאוֹת אֶת מוֹרֶיךָ״.", "english": "Rabbi said: This sharpness that I have beyond my colleagues is because I saw Rabbi Meir from behind; but had I seen him from the front, I would have been sharper still—as it is written: “And your eyes shall see your teacher.”"}, {"location": "Jerusalem Talmud, Nedarim 9:1", "hebrew": "רִבִּי יוֹחָנָן פָתַח וְתָהֵי. וְאִילוּלֵי דוּ תְהֵא הוּ אֲתֵי. וְתָהוּת לֹה כְנוֹלָד הוּא. אָמַר רִבִּי הִילָא. הַתָּהוּת מְצוּיָה. כְּהָדָא רִבִּי שִׁמְעוֹן לֹא מָצָא פֶתָח לְנִדְרוֹ עַד שֶׁבָּא אֶחָד מִזִּקְנֵי גָּלִיל. אִית דְּאָֽמְרִין. רִבִּי שִׁמְעוֹן בֶּן אֶלְעָזָר הֲוָה נְסִיב לֵיהּ מִכָּא וּמוּקִים לֵיהּ הָכָא. נְסִיב לֵיהּ מִכָּא וּמוּקִים לֵיהּ הָכָא. עַד דְּאוּקְמֵיהּ גַּו שִׁמְשָׁא מַפְלֵי מָנוֹהִי. אָֽמְרִין לֵיהּ. אִילּוּ הָיִיתָ יוֹדֵעַ דְּהָהֵן סַבָּא עֲבַד לָךְ כֵּן נוֹדֵר הָיִיתָ. אֲמַר לוֹן. לֹא. וְשָׁרָא לֵיהּ. אָֽמְרוּן. מְנָא לָךְ הָדָא. אָמַר לָהֶן. מְשָׁרֵת מֵאִיר הָיִיתִי בְּבָרְחוֹ שְׁנַיִם. וְאִית דְּאָֽמְרֵי. מַקְּלוֹ שֶׁלָּרִבִּי מֵאִיר הָֽיְתָה בְיָדִי וְהִיא מְלַמֶּדֶת לִי דַּעַת.", "english": "Rabbi Yochanan began to wonder: “If only it would be—he would come,” and his bewilderment was like that of a newborn. Rabbi Hila said: Bewilderment exists. For example: Rabbi Shimon did not find an opening to release himself from his vow until one of the elders of the Galilee came. Some say: it was Rabbi Shimon ben Elazar. He would take him from here and stand him there, from here and stand him there, until he set him beneath the blazing sun, and his cloak began to fall from him. They said to him, “If you had known that this old man would do this to you, would you have vowed?” He said to them, “No,” and he released him. They said, “From where do you know this?” He said to them: “I served Meir during his flight for two years.” And some say: “Rabbi Meir’s staff was in my hand, and it teaches me understanding.”"}, {"location": "Vayikra Rabbah 20:1", "hebrew": "(קהלת ט, ב): כַּטּוֹב כַּחֹטֶא, כַּטּוֹב זֶה דָּוִד, שֶׁנֶּאֱמַר (שמואל א טז, יב): וַיִּשְׁלַח וַיְבִיאֵהוּ וְהוּא טוֹב רֹאִי, אָמַר רַבִּי יִצְחָק טוֹב רֹאִי בַּהֲלָכָה, כָּל הָרוֹאֵהוּ נִזְכַּר לְתַלְמוּדוֹ.", "english": "“As the good, so the sinner” (Koheles 9:2). “As the good”—this is David, as it is said: “And he sent and brought him, and he was good of appearance.” Rabbi Yitzḥak said: “Good of appearance”—good of appearance in halachah; whoever saw him would be reminded of his learning."}, {"location": "Bava Batra 12b", "hebrew": "האָמַר רַבִּי יוֹחָנָן: מִיּוֹם שֶׁחָרַב בֵּית הַמִּקְדָּשׁ, נִיטְּלָה נְבוּאָה מִן הַנְּבִיאִים וְנִיתְּנָה לַשּׁוֹטִים וְלַתִּינוֹקוֹת.", "english": "Rabbi Yoḥanan said: From the day the Beis HaMikdash was destroyed, nevu’ah was taken from the prophets and given to fools and to children."}, {"location": "Bava Batra 158b", "hebrew": "אָמַר רַבִּי זֵירָא, שְׁמַע מִינַּהּ – אַוֵּירָא דְּאֶרֶץ יִשְׂרָאֵל מַחְכִּים.", "english": "Rabbi Zeira said: Learn from this—the air of Eretz Yisrael makes one wise."}, {"location": "Berakhot 58b", "hebrew": "וְהָאָמַר רַב: אֲנָחָה שׁוֹבֶרֶת חֲצִי גּוּפוֹ שֶׁל אָדָם, שֶׁנֶּאֱמַר: ״וְאַתָּה בֶן אָדָם הֵאָנַח בְּשִׁבְרוֹן מׇתְנַיִם וְגוֹ׳״. וְרַבִּי יוֹחָנָן אָמַר אַף כׇּל גּוּפוֹ שֶׁל אָדָם, שֶׁנֶּאֱמַר: ״וְהָיָה כִּי יֹאמְרוּ אֵלֶיךָ עַל מָה אַתָּה נֶאֱנָח וְאָמַרְתָּ אֶל שְׁמוּעָה כִי בָאָה וְנָמֵס כׇּל לֵב וְגוֹ׳״.", "english": "Rav said: A sigh breaks half of a person’s body, as it is said: “And you, son of man, sigh with the breaking of your loins…” Rabbi Yoḥanan said: It breaks even the whole body, as it is said: “And it shall be, when they say to you: ‘Why do you sigh?’ you shall say: ‘Because of the report that has come’—and every heart will melt…”"}, {"location": "Beitzah 16a", "hebrew": "תַּנְיָא: אָמְרוּ עָלָיו עַל שַׁמַּאי הַזָּקֵן, כׇּל יָמָיו הָיָה אוֹכֵל לִכְבוֹד שַׁבָּת. מָצָא בְּהֵמָה נָאָה, אוֹמֵר: זוֹ לַשַּׁבָּת. מָצָא אַחֶרֶת נָאָה הֵימֶנָּה — מַנִּיחַ אֶת הַשְּׁנִיָּה וְאוֹכֵל אֶת הָרִאשׁוֹנָה. אֲבָל הִלֵּל הַזָּקֵן — מִדָּה אַחֶרֶת הָיְתָה לוֹ, שֶׁכׇּל מַעֲשָׂיו לְשֵׁם שָׁמַיִם, שֶׁנֶּאֱמַר: ״בָּרוּךְ ה׳ יוֹם יוֹם״. \nתַּנְיָא נָמֵי הָכִי, בֵּית שַׁמַּאי אוֹמְרִים: מֵחַד שַׁבָּיךְ לְשַׁבְּתָיךְ, וּבֵית הִלֵּל אוֹמְרִים: ״בָּרוּךְ ה׳ יוֹם יוֹם״.", "english": "It was taught: About Shammai the Elder they said: All his days he would eat in honor of Shabbos. If he found a fine animal he would say: ‘This is for Shabbos.’ If he later found a finer one, he would set aside the second and eat the first. But Hillel the Elder had a different trait: all his deeds were for the sake of Heaven, as it is said: “Blessed is HaShem day by day.” It was also taught: Beis Shammai say: From one Shabbos for the sake of the next; Beis Hillel say: “Blessed is HaShem day by day.”"}, {"location": "Shabbat 119a", "hebrew": "יוֹסֵף מוֹקַר שַׁבֵּי, הֲוָה הָהוּא גּוֹי בְּשִׁבָבוּתֵיהּ דַּהֲוָה נְפִישִׁי נִכְסֵיהּ טוּבָא. אָמְרִי לֵיהּ כַּלְדָּאֵי: כּוּלְּהוּ נִכְסֵי — יוֹסֵף מוֹקַר שַׁבֵּי אָכֵיל לְהוּ. אֲזַל זַבְּנִינְהוּ לְכוּלְּהוּ נִיכְסֵי, זְבַן בְּהוּ מַרְגָּנִיתָא, אוֹתְבַהּ בִּסְיָינֵיהּ. בַּהֲדֵי דְּקָא עָבַר מַבָּרָא — אַפְרְחֵיהּ זִיקָא, שַׁדְיֵיהּ בְּמַיָּא, בַּלְעֵיהּ כַּוְורָא. אַסְּקוּהּ, אַיְיתוּהּ אַפַּנְיָא דְּמַעֲלֵי שַׁבְּתָא. אָמְרִי: מַאן זָבֵין כִּי הַשְׁתָּא? אָמְרִי לְהוּ: זִילוּ אַמְטְיוּהּ לְגַבֵּי יוֹסֵף מוֹקַר שַׁבֵּי דִּרְגִיל דְּזָבֵין. אַמְטְיוּהּ נִיהֲלֵיהּ, זַבְנֵיהּ, קַרְעֵיהּ אַשְׁכַּח בֵּיהּ מַרְגָּנִיתָא. זַבְּנַיהּ בִּתְלֵיסַר עִילִּיָּתָא דְּדִינָרֵי דְּדַהֲבָא. פְּגַע בֵּיהּ הָהוּא סָבָא אֲמַר: מַאן דְּיָזֵיף שַׁבְּתָא — פַּרְעֵיהּ שַׁבְּתָא.", "english": "Yosef, who honored Shabbos, had a wealthy non‑Jewish neighbor. The astrologers told the neighbor: All your property will be eaten up by Yosef who honors Shabbos. He sold all his property and bought a precious jewel, placing it in his hat. While crossing a ferry, a gust blew the hat into the water; a fish swallowed it. The fish was caught and brought on Friday afternoon. They asked: Who will buy such a fish now? They said: Bring it to Yosef who honors Shabbos—he is accustomed to buying. Yosef bought it, tore it open, and found the jewel. He sold it for thirteen attics filled with gold dinars. An old man met him and said: ‘Whoever borrows for Shabbos—Shabbos repays him.’"}, {"location": "Shabbat 119a", "hebrew": "רַבִּי אַבָּא זָבֵן בִּתְלֵיסַר אִסְתִּירֵי פְּשִׁיטֵי בִּישְׂרָא מִתְּלֵיסַר טַבָּחֵי, וּמְשַׁלֵּים לְהוּ אַצִּינּוֹרָא דְּדַשָּׁא, וַאֲמַר לְהוּ: ״אַשּׁוּר הַיָּיא, אַשּׁוּר הַיָּיא״. רַבִּי אֲבָהוּ הֲוָה יָתֵיב אַתַּכְתָּקָא דְשִׁינָּא וּמוֹשֵׁיף נוּרָא. רַב עָנָן לָבֵישׁ גּוּנְדָּא, דְּתָנָא דְּבֵי רַבִּי יִשְׁמָעֵאל: בְּגָדִים שֶׁבִּישֵּׁל בָּהֶן קְדֵירָה לְרַבּוֹ — אַל יִמְזוֹג בָּהֶן כּוֹס לְרַבּוֹ.\nרַב סָפְרָא מְחָרֵיךְ רֵישָׁא. רָבָא מָלַח שִׁיבּוּטָא. רַב הוּנָא מַדְלֵיק שְׁרָגֵי. רַב פָּפָּא גָּדֵיל פְּתִילָתָא. רַב חִסְדָּא פָּרֵים סִילְקָא. רַבָּה וְרַב יוֹסֵף מְצַלְּחִי צִיבֵי. רַבִּי זֵירָא מְצַתֵּת צַתּוֹתֵי. רַב נַחְמָן בַּר יִצְחָק מְכַתֵּף וְעָיֵיל, מְכַתֵּף וְנָפֵיק. אָמַר: אִילּוּ מִקַּלְעִין לִי רַבִּי אַמֵּי וְרַבִּי אַסִּי, מִי לָא מְכַתֵּיפְנָא קַמַּיְיהוּ? וְאִיכָּא דְאָמְרִי: רַבִּי אַמֵּי וְרַבִּי אַסִּי מְכַתְּפִי וְעָיְילִי, מְכַתְּפִי וְנָפְקִי, אָמְרִי: אִילּוּ אִיקְּלַע לַן רַבִּי יוֹחָנָן, מִי לָא מְכַתְּפִינַן קַמֵּיהּ?!", "english": "Rabbi Abba bought meat with thirteen simple coins from thirteen butchers and would pay them by tipping the attendant, saying: “Hurry, hurry!” Rabbi Avahu sat on an ivory chair and stoked the fire. Rav Anan wore a special garment, following the teaching: Clothing in which one cooked a pot for his master—do not pour a cup for his master while wearing them. Rav Safra singed the head (of the animal). Rava salted the fish. Rav Huna lit the lamps. Rav Pappa braided the wicks. Rav Ḥisda chopped beets. Rabbah and Rav Yosef split wood. Rabbi Zeira kindled small sticks. Rav Naḥman bar Yitzḥak carried in and carried out, saying: If Rabbi Ami and Rabbi Assi visited me, would I not carry before them? (And some say: Rabbi Ami and Rabbi Assi themselves would carry in and out, saying: If Rabbi Yoḥanan visited us, would we not carry before him?)"}, {"location": "Beitzah 15b", "hebrew": "תָּנֵי רַב תַּחְלִיפָא אֲחוּהּ דְּרַבְנַאי חוֹזָאָה: כׇּל מְזוֹנוֹתָיו שֶׁל אָדָם קְצוּבִים לוֹ מֵרֹאשׁ הַשָּׁנָה וְעַד יוֹם הַכִּפּוּרִים, חוּץ מֵהוֹצָאַת שַׁבָּתוֹת וְהוֹצָאַת יוֹם טוֹב וְהוֹצָאַת בָּנָיו לְתַלְמוּד תּוֹרָה, שֶׁאִם פָּחַת — פּוֹחֲתִין לוֹ, וְאִם הוֹסִיף — מוֹסִיפִין לוֹ.", "english": "Rav Taḥlifa, the brother of Ravnai of Ḥoza’ah, taught: A person’s sustenance is fixed for him from Rosh HaShanah until Yom HaKippurim—except for the expenses of Shabbos, the expenses of Yom Tov, and the expenses of his children’s Torah study: if he reduces, they reduce for him; if he increases, they increase for him."}, {"location": "Shabbat 75a", "hebrew": "אָמַר רַבִּי שִׁמְעוֹן בֶּן פַּזִּי, אָמַר רַבִּי יְהוֹשֻׁעַ בֶּן לֵוִי מִשּׁוּם בַּר קַפָּרָא: כָּל הַיּוֹדֵעַ לְחַשֵּׁב בִּתְקוּפוֹת וּמַזָּלוֹת וְאֵינוֹ מְחַשֵּׁב, עָלָיו הַכָּתוּב אוֹמֵר: ״וְאֵת פֹּעַל ה׳ לֹא יַבִּיטוּ וּמַעֲשֵׂה יָדָיו לֹא רָאוּ״. אָמַר רַבִּי שְׁמוּאֵל בַּר נַחְמָנִי אָמַר רַבִּי יוֹחָנָן: מִנַּיִן שֶׁמִּצְוָה עַל הָאָדָם לְחַשֵּׁב תְּקוּפוֹת וּמַזָּלוֹת — שֶׁנֶּאֱמַר: ״וּשְׁמַרְתֶּם וַעֲשִׂיתֶם כִּי הִיא חׇכְמַתְכֶם וּבִינַתְכֶם לְעֵינֵי הָעַמִּים״, אֵיזוֹ חָכְמָה וּבִינָה שֶׁהִיא לְעֵינֵי הָעַמִּים — הֱוֵי אוֹמֵר: זֶה חִישּׁוּב תְּקוּפוֹת וּמַזָּלוֹת.", "english": "Rabbi Shim’on ben Pazzi said in the name of Rabbi Yehoshua ben Levi, in the name of bar Kappara: Whoever knows how to calculate seasons and constellations and does not calculate—of him Scripture says: “They do not look at the work of HaShem, nor see the deed of His hands.” Rabbi Shmuel bar Naḥmani said in the name of Rabbi Yoḥanan: From where is it a mitzvah to calculate seasons and constellations? As it is said: “You shall keep and do, for it is your wisdom and understanding in the eyes of the nations”—what wisdom is ‘in the eyes of the nations’? You must say: the calculation of seasons and constellations."}, {"location": "Midrash Tehillim 19", "hebrew": "דבר אחר השמים מספרים כבוד אל. זה שאמר הכתוב (איוב לח לז) מי יספר שחקים בחכמה ונבלי שמים מי ישכיב. א\"ר שמואל בר אבא מכיר אני חוצות הרקיע כשם שאני מכיר חוצות נהרדעא. וכי שמואל עלה לרקיע. אלא על ידי שיגע בחכמתה של תורה למד מתוכה מה שיש בשחקים.", "english": "Another interpretation: “The heavens declare the glory of God.” This is what Scripture says: “Who can count the clouds with wisdom, and who can lay down the bottles of heaven?” Rabbi Shmuel bar Abba said: I know the pathways of the sky as well as I know the alleyways of Nehardea. Did Shmuel ascend to the sky? Rather, through laboring in Torah’s wisdom, he learned from within it what is in the heavens."}, {"location": "Bereishit Rabbah 39:14", "hebrew": "אָמַר רַבִּי אֶלְעָזָר בַּר זִמְרָא אִם מִתְכַּנְסִין כָּל בָּאֵי הָעוֹלָם לִבְרֹא אֲפִלּוּ יַתּוּשׁ אֶחָד אֵינָן יְכוֹלִין לִזְרֹק בּוֹ נְשָׁמָה.", "english": "Rabbi Elazar bar Zimra said: If all the inhabitants of the world gathered to create even one gnat, they could not cast a soul into it."}, {"location": "Sifrei, Va'etchanan 34", "hebrew": "ודברת בם, עשם עיקר ואל תעשם טפלה, שלא יהא משאך ומתנך אלא בהם, שלא תערב בהם דברים אחרים כפלוני, שמא תאמר למדתי חכמת ישראל אלך ואלמד חכמת האומות תלמוד לומר (ויקרא יח ד) ללכת בהם, ולא ליפטר מתוכם וכן הוא אומר (משלי ה יז) יהיו לך לבדך ואין לזרים אתך.", "english": "“And you shall speak of them”—make them primary and do not make them secondary: let your business and conversation be only about them; do not mix other matters into them, thinking: ‘I have learned the wisdom of Israel—now I will go learn the wisdom of the nations.’ Scripture says: “to walk in them”—do not depart from them; and it says: “They shall be yours alone, and not for strangers with you.”"}, {"location": "Eichah Rabbah 2:13", "hebrew": "מַלְכָּהּ וְשָׂרֶיהָ בַגּוֹיִם אֵין תּוֹרָה. אִם יֹאמַר לְךָ אָדָם יֵשׁ חָכְמָה בַּגּוֹיִם, תַּאֲמֵן, הֲדָא הוּא דִכְתִיב (עובדיה א, ח): וְהַאֲבַדְתִּי חֲכָמִים מֵאֱדוֹם וּתְבוּנָה מֵהַר עֵשָׂו. יֵשׁ תּוֹרָה בַּגּוֹיִם, אַל תַּאֲמֵן, דִּכְתִיב: מַלְכָּהּ וְשָׂרֶיהָ בַגּוֹיִם אֵין תּוֹרָה.", "english": "“Her king and her princes are among the nations—there is no Torah.” If a person tells you: There is wisdom among the nations—believe it, as it is written: “I will destroy the wise from Edom…” But if he tells you: There is Torah among the nations—do not believe it, as it is written: “Her king and her princes are among the nations—there is no Torah.”"}, {"location": "Megillah 16a", "hebrew": "אָמַר רַבִּי יוֹחָנָן: כָּל הָאוֹמֵר דְּבַר חָכְמָה, אֲפִילּוּ בְּאוּמּוֹת הָעוֹלָם, נִקְרָא חָכָם.", "english": "Rabbi Yoḥanan said: Anyone who says a matter of wisdom—even among the nations of the world—is called wise."}, {"location": "Berakhot 58a", "hebrew": "תָּנוּ רַבָּנַן: הָרוֹאֶה חַכְמֵי יִשְׂרָאֵל, אוֹמֵר ״בָּרוּךְ... שֶׁחָלַק מֵחׇכְמָתוֹ לִירֵאָיו״. חַכְמֵי אוּמּוֹת הָעוֹלָם, אוֹמֵר: ״בָּרוּךְ... שֶׁנָּתַן מֵחׇכְמָתוֹ לְבָשָׂר וָדָם״.", "english": "Our Rabbis taught: One who sees sages of Israel says: “Blessed… Who has shared of His wisdom with those who fear Him.” (One who sees) sages of the nations of the world says: “Blessed… Who has given of His wisdom to flesh and blood.”"}, {"location": "Mekhilta DeRabbi Yishmael, Tractate Pischa 18:22", "hebrew": "מִכָּן אָמָרוּ: מִן הַתּוֹרָה, חַיָּב אָדָם לָמוּל אֶת בְּנוֹ, וְלִפְדּוֹתוֹ, וּלְלַמְּדוֹ תוֹרָה, וּלְלַמְּדוֹ אֻמָּנוּת, וּלְהַשִּׂיאוֹ אִשָּׁה. רַבִּי עֲקִיבָה אוֹמֵר: אַף לְלַמְּדוֹ שַׁיִט. רַבִּי אוֹמֵר: אַף יִשּׁוּב מְדִינָה.", "english": "From here they said: By Torah law, a man is obligated to circumcise his son, redeem him (if a firstborn), teach him Torah, teach him a trade, and marry him off. Rabbi Akiva says: Also teach him to swim. Rabbi says: Also (teach him) civic settlement—how to live within society/statecraft."}, {"location": "Eichah Rabbah 1:33", "hebrew": "אָמַר רַבִּי יְהוּדָה בֹּא וּרְאֵה כַּמָּה חֲבִיבִין תִּינוֹקוֹת לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא, גָּלְתָה סַנְהֶדְרִין וְלֹא גָּלְתָה שְׁכִינָה עִמָּהֶם, גָּלוּ מִשְׁמָרוֹת וְלֹא גָּלְתָה שְׁכִינָה עִמָּהֶם, וְכֵיוָן שֶׁגָּלוּ תִּינוֹקוֹת גָּלְתָה שְׁכִינָה עִמָּהֶם, הֲדָא הוּא דִכְתִיב: עוֹלָלֶיהָ הָלְכוּ שְׁבִי לִפְנֵי צָר. מִיָּד וַיֵּצֵא מִבַּת צִיּוֹן כָּל הֲדָרָהּ.", "english": "Rabbi Yehudah said: Come and see how beloved children are before the Holy One, blessed be He. The Sanhedrin was exiled and the Shechinah was not exiled with them; the priestly watches were exiled and the Shechinah was not exiled with them. But once the children were exiled, the Shechinah was exiled with them—as it is written: “Her young children went into captivity before the foe; and all her splendor departed from the daughter of Zion.”"}, {"location": "Bereishit Rabbah 9:6", "hebrew": "אָמַר רַבִּי שִׁמְעוֹן בֶּן אֶלְעָזָר, הִנֵּה טוֹב מְאֹד, וְהִנֵּה טוֹבָה שֵׁנָה. וְכִי שֵׁנָה טוֹבָה מְאֹד, אֶתְמְהָא. לֹא כֵן תְּנֵינַן יַיִן וְשֵׁנָה לָרְשָׁעִים נָאֶה לָהֶם וְנָאֶה לָעוֹלָם, אֶלָּא מִתּוֹךְ שֶׁאָדָם יָשֵׁן קִמְעָא הוּא עוֹמֵד וְיָגֵעַ בַּתּוֹרָה הַרְבֵּה.", "english": "Rabbi Shim’on ben Elazar said: “Behold, it was very good”—and behold, sleep is good. Is sleep ‘very good’? Rather: because a person sleeps a little, he rises and labors much in Torah. (For the wicked, wine and sleep are pleasant for them and pleasant for the world.)"}, {"location": "Bereishit Rabbah 14:9", "hebrew": "רַבִּי בִּיסְנִי וְרַבִּי אַחָא וְרַבִּי יוֹחָנָן בְּשֵׁם רַבִּי מֵאִיר אוֹמְרִים, הַנְּשָׁמָה הַזּוֹ מְמַלְּאָה אֶת כָּל הַגּוּף, וּבְשָׁעָה שֶׁאָדָם יָשֵׁן הִיא עוֹלָה וְשׁוֹאֶבֶת לוֹ חַיִּים מִלְּמַעְלָה.", "english": "Rabbi Bisni, Rabbi Aḥa, and Rabbi Yoḥanan in the name of Rabbi Meir said: The soul fills the whole body; and when a person sleeps, it ascends and draws for him life from above."}, {"location": "Pirkei DeRabbi Eliezer 12", "hebrew": "וְכֵיוָן שֶׁשָּׁמְעָה הָאָרֶץ הַלָּשׁוֹן הַזֶּה, עוֹד רָעֲדָה וְרָעֲשָׁה וְאָמְרָה לִפְנֵי בּוֹרְאָהּ: ״רִבּוֹן הָעוֹלָמִים, אֵין לִי כֹּחַ לָזוּן צֹאנוֹ שֶׁל אָדָם!״ אָמַר לָהּ הַקָּדוֹשׁ בָּרוּךְ הוּא: ״אֲנִי וְאַתְּ נָזוּן צֹאנוֹ שֶׁל אָדָם״, וְחָצוּ בֵּין שְׁנֵיהֶם: הַלַּיְלָה שֶׁל הַקָּדוֹשׁ בָּרוּךְ הוּא וְהַיּוֹם לָאָרֶץ. מֶה עָשָׂה הַקָּדוֹשׁ בָּרוּךְ הוּא? בָּרָא שְׁנַת חַיִּים, וְאָדָם שׁוֹכֵב וְיָשֵׁן וְהוּא מְזוֹנוֹ וּרְפוּאָתוֹ וְחַיִּים לוֹ וּמָנוֹחַ לוֹ, שֶׁנֶּאֱמַר: ״יָשַׁנְתִּי אָז יָנוּחַ לִי״. וְהַקָּדוֹשׁ בָּרוּךְ הוּא סוֹמֵךְ עִם הָאָרֶץ וּמַשְׁקֶה אוֹתָהּ וְהִיא נוֹתֶנֶת פֵּרוֹתֶיהָ מָזוֹן לְכָל הַבְּרִיּוֹת. אֲבָל מְזוֹנוֹתָיו שֶׁל אָדָם הָרִאשׁוֹן – ״בְּעִצָּבוֹן תֹּאכֲלֶנָּה כָּל יְמֵי חַיֶּיךָ״.", "english": "When the earth heard this language, it trembled and said before its Creator: ‘Master of the worlds, I have no strength to sustain Adam’s flock!’ The Holy One, blessed be He, said: ‘I and you will sustain Adam’s flock.’ They divided between them: the night belongs to the Holy One, and the day to the earth. What did the Holy One do? He created “sleep of life”: a person lies down and sleeps, and it becomes his nourishment, healing, life, and rest, as it is said: “I slept—then it was restful for me.” The Holy One supports the earth and waters it, and it yields its fruits as food for all creatures. But the food of the first man—“in sorrow you shall eat of it all the days of your life.”"}, {"location": "Sifrei Devarim 58:1", "hebrew": "ושמרתם זו משנה, ועשיתם זו מעשה, את כל החוקים אלו המדרשות, ואת המשפטים אלו הדינים, אשר אנכי נותן לפניכם היום, יהיו חביבים עליך היום כאילו היום קבלתם אותם מהר סיני, יהו רגילים בפיכם כאילו היום שמעתם אותם", "english": "“You shall keep” — this is Mishnah; “and you shall do” — this is deed; “all the statutes” — these are midrashim; “and the ordinances” — these are laws/judgments. “Which I give before you today” — let them be beloved to you today as though today you received them from Mount Sinai; let them be fluent in your mouth as though today you heard them."}, {"location": "Midrash Tanchuma, Ki Tavo 1", "hebrew": "מַהוּ הַיּוֹם הַזֶּה ה׳ אֱלֹהֶיךָ. וְכִי עַד עַכְשָׁו לֹא צִוָּה הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת יִשְׂרָאֵל. וַהֲלֹא אוֹתָהּ שָׁנָה שְׁנַת אַרְבָּעִים הָיְתָה, שֶׁנֶּאֱמַר: וַיְהִי בְּאַרְבָּעִים שָׁנָה בְּעַשְׁתֵּי עָשָׂר חֹדֶשׁ (דברים א, ג). וּמַה תַּלְמוּד לוֹמַר, הַיּוֹם הַזֶּה. אֶלָּא כָּךְ אָמַר מֹשֶׁה לְיִשְׂרָאֵל, בְּכָל יוֹם יְהֵא הַתּוֹרָה חֲבִיבָה עֲלֵיכֶם כְּאִלּוּ הַיּוֹם הַזֶּה קִבַּלְתֶּם אוֹתָהּ מֵהַר סִינָי.", "english": "“This day HaShem your God…” Was it only now that the Holy One commanded Israel? Was it not the fortieth year? Rather, Moshe said to Israel: Every day let the Torah be beloved to you as though this day you received it from Mount Sinai."}, {"location": "Seder Eliyahu Rabbah 18", "hebrew": "מיכן אמרו, יש בו באדם דרך ארץ ומקרא בלבד, מוסרין לו מלאך אחד לשמרו, שנאמר הנה אנכי שולח מלאך וגו'. קרא אדם תורה נביאים וכתובים, מוסרין לו שני מלאכים לשמרו, שנאמר כי מלאכיו יצוה לך וגו'. קרא אדם תודה נביאים וכתובים, ושנה משנה מדרש הלכות ואגדות ושימש חכמים, הקב\"ה משמרו בעצמו.", "english": "They said: If a person has only derech eretz and Scripture, one angel is assigned to guard him, as it is said: “Behold, I send an angel…” If he read Torah, Prophets, and Writings, two angels guard him, as it is said: “For He will command His angels…” If he read Torah, Prophets, and Writings; studied Mishnah, midrash, halachot and aggadot; and served the sages—then the Holy One, blessed be He, guards him Himself."}, {"location": "Vayikra Rabbah 3:7", "hebrew": "קרא אדם ולא שנה, עדיין בחוץ עומד. שנה ולא קרא, עדיין בחוץ עומד. קרא ושנה ולא שימש עדיין ת\"ח, דומה למי שנעלמו ממנו סתרי תורה, שנאמר (ירמיה לא) כי אחרי שובי נחמתי. אבל קרא אדם תורה נביאים וכתובים, ושנה משנה מדרש הלכות ואגדות, ושמש תלמידי חכמים, אפילו מת עליו או נהרג עליו, הרי הוא בשמחה לעולם, לכך נאמר, על כן עלמות אהבוך.", "english": "If a person read but did not study—he still stands outside. If he studied but did not read—he still stands outside. If he read and studied but did not serve Torah scholars—he is like one from whom Torah’s secrets are hidden… But if he read Torah, Prophets, and Writings; studied Mishnah, midrash, halachot and aggadot; and served Torah scholars—even if he dies or is killed, he is in joy forever; therefore it says: “Therefore maidens love you.”"}, {"location": "Sifrei, Ekev 49", "hebrew": "רצונך להכיר את מי שאמר והיה העולם למוד הגדה שמתוך כך אתה מכיר את מי שאמר והיה העולם ומדבק בדרכיו.", "english": "Do you want to recognize the One Who spoke and the world came into being? Learn aggadah—through it you recognize the One Who spoke and the world came into being and you cleave to His ways."}, {"location": "Shir HaShirim Zuta 2:11", "hebrew": "המשיח עתיד לחזק ידיהם של ישראל שנתרפו וכו'.", "english": "The Messiah is destined to strengthen the hands of Israel that have become weak…"}, {"location": "Shir HaShirim Zuta 2:4", "hebrew": "סמכוני באשישות. מה החולה הזה מצפה להרוחה, כך ישראל מצפים לגאולה. ד\"א למה נמשלו ישראל לחולה, מה החולה אינו אוכל לא דבלה ולא פת בריא, אלא פת חמה מעט. כך הדור הזה אינו מבקש מסכתות ולא קולין וחמורין, אלא טעמי האגדות ושיחות חכמים:", "english": "“Sustain me with raisin-cakes.” Just as a sick person longs for relief, so Israel longs for redemption. Another interpretation: Why are Israel likened to a sick person? Just as a sick person does not eat dried figs or ‘healthy bread,’ but only a little warm bread—so this generation does not seek tractates or complex arguments, but the ‘tastes’ of aggadah and the conversations of the sages."}, {"location": "Seder Eliyahu Rabbah 5", "hebrew": "אדם שעבר עבירות הרבה וקנסו עליו מיתה עד ארבעה דורות, שנאמר פוקד עון אבות וגו', וחזר ועשה תשובה, וקרא תורה נביאים וכתובים, ושנה משנה מדרש הלכות ואגדות, ושימש חכמים, אפילו נגזרו עליו מאה גזירות, הקב\"ה מעבירן הימינו, שנאמר (הושע ח) גם כי יתנו בגוים עתה אקבצם וגו', וכו'.", "english": "A person who committed many sins and a death penalty was decreed upon him for up to four generations… then repented and read Torah, Prophets, and Writings; studied Mishnah, midrash, halachot and aggadot; and served the sages—then even if a hundred decrees were issued against him, the Holy One removes them from him, as it is said: “Even if they give among the nations, now I will gather them…”"}, {"location": "Vayikra Rabbah 3:7", "hebrew": "אשרי אדם שיש בו דברי תורה, ושמורים בידו, ויודע להשיב בהן תשובה שלימה במקומה, עליו הכתוב אומר (משלי כ) מים עמוקים עצה בלב איש, ואומר (תהלים קל) ממעמקים קראתיך ה', ואומר (שם קב) תפלה לעני כי יעטוף.", "english": "Happy is the person who has words of Torah within him, guarded in his hand, and knows how to give a complete answer in its proper place. About him Scripture says: “Deep waters are counsel in a man’s heart,” and: “From the depths I call to You, HaShem,” and: “A prayer for the poor when he faints…”"}, {"location": "Midrash Tehillim 146", "hebrew": "ה' פוקח עורים (תהלים קמו, ח). וכשיבוא לרפאות העולם, אינו מרפא תחלה אלא העורים, שנאמר ה' פוקח עורים. ומי הן העורים, הדורות האלו שהולכות בתורה בְּעִוְרִים, שנאמר (ישעיה נט, י) נגששה כעורים קיר, כולם קורין ואין יודעין מה הן קורין, שונין ואין יודעין מה הן שונין. אבל לעתיד לבוא, אז תפקחנה עיני עורים (שם לה, ה).", "english": "“HaShem opens the eyes of the blind.” When He comes to heal the world, He heals first the blind, as it is said: “HaShem opens the eyes of the blind.” Who are the blind? These generations who walk in Torah like blind, as it is said: “We grope like blind men for a wall”—they read and do not know what they read; they study and do not know what they study. But in the future: “Then the eyes of the blind shall be opened.”"}, {"location": "Midrash Chaseirot VeYeteirot (Yalkut Midrashim vol. 8 pg. 152)", "hebrew": "אל תמנע טוב מבעליו בהיות לאל ידיך לעשות (משלי ג, כז). ידך כתיב, שאף על פי שאין הכל ספק בידיך, אין הקדוש ברוך הוא מבקש מן אדם אלא לפי כחו. בהיות לאל ידיך, אם היתה ספוקה בידיך עשה בשתי ידיך, ואם לאו, עשה ביד אחת.", "english": "“Do not withhold good from its owner when it is within your power to do it.” It is written “your hand” (singular), teaching: even though not everything is in your hands, the Holy One asks of a person only according to his strength. If it is fully within your ability, do it with two hands; if not, do it with one."}, {"location": "Yalkut Shimoni on Torah 737", "hebrew": "אָמַר רַבָּן שִׁמְעוֹן בֶּן גַּמְלִיאֵל כָּל יָמַי גָּדַלְתִּי בֵּין הַחֲכָמִים וְלֹא מָצָאתִי לַגּוּף טוֹב מִשְּׁתִיקָה. אָמְרוּ רַבּוֹתֵינוּ שְׁנֵי דִּיקוֹלוֹגִין הָיוּ עוֹמְדִין לִפְנֵי אַדְרִיָּנוּס. הָיָה אֶחָד מֵהֶן מְלַמֵּד עַל הַדִּבּוּר שֶׁהוּא יָפֶה, וְאֶחָד מְלַמֵּד עַל הַשְּׁתִיקָה שֶׁהוּא יָפֶה. אָמַר לוֹ הָאֶחָד, מָרִי, אֵין טוֹב מִן הַדִּבּוּר, אִלּוּלֵי הַדִּבּוּר הֵיאַךְ הַכַּלּוֹת מִתְקַלְּסוֹת, וְהֵיאַךְ הָיָה מַשָּׂא וּמַתָּן בָּעוֹלָם, וְהֵיאַךְ הָיוּ הַסְּפִינוֹת פּוֹרְשׂוֹת בַּיָּם. מִיָּד אָמַר לוֹ לְאוֹתוֹ שֶׁהָיָה מְלַמֵּד עַל הַשְּׁתִיקָה שֶׁהָיָה יָפֶה, הֵיאַךְ אַתָּה לָמֵד עַל הַשְּׁתִיקָה]. מִיָּד בָּא לְדַבֵּר. עָמַד אוֹתוֹ שֶׁהָיָה מְלַמֵּד עַל הַדִּבּוּר וּסְטָרוֹ עַל פִּיו. אָמַר לוֹ הַמֶּלֶךְ, לָמָּה סָטַרְתָּ אוֹתוֹ. אָמַר לוֹ מָרִי, אֲנִי לִמַּדְתִּי מִן הַדִּבּוּר עַל הַדִּבּוּר, וְזֶה בָּא לְלַמֵּד מִשֶּׁלִּי עַל שֶׁלּוֹ.", "english": "Rabban Shim’on ben Gamliel said: All my days I grew up among the wise, and I found nothing better for the body than silence. They told: Two advocates stood before Hadrian—one praised speech as beautiful, the other praised silence as beautiful. The one praising speech said: ‘My master, nothing is better than speech: without speech how would brides be praised, how would commerce exist, how would ships sail the sea?’ Immediately the king asked the one praising silence: ‘How do you praise silence?’ He began to speak. The one praising speech struck him on the mouth. The king asked: ‘Why did you strike him?’ He replied: ‘I taught about speech from my own field; this one came to teach about silence using my tools.’"}, {"location": "Esther Rabbah 2:3", "hebrew": "עוֹבָדָא הֲוָה בְּגַבְרָא חַד דַּהֲוָה שְׁמֵיהּ בַּרְבּוֹהִין הָלְכוּ רַבּוֹתֵינוּ אֶצְלוֹ עַל עֵסֶק מִגְבַּת חֲכָמִים, שָׁמְעִין לִבְרֵיהּ דַּאֲמַר לֵיהּ בַּמָּה אֲנַן אָכְלִין יוֹמָא דֵין, אֲמַר לֵיהּ בִּטְרוֹקְסִימוֹן, מִן חַד בְּמָנֶא אוֹ מִן תְּרֵין בְּמָנֶא, אֲמַר לֵיהּ מִן תְּרֵין בְּמָנֶא, דְּאִינוּן כְּמִישִׁין וּזְלִילִין. אָמְרֵי הֵיכָן אֲנַן אָזְלִין גַּבֵּי הָדֵין, נֵיזֵיל וְנַעֲבֵיד עֲבִידְתָּן בְּקַרְתָּא וּבָתַר כֵּן נֵיתֵי לְגַבֵּיהּ. אֲזַלוּן וַעֲבַדוּן עִיבִידְתְּהוֹן בְּקַרְתָּא וַאֲתוֹ לְגַבֵּיהּ, וְאָמְרִין לֵיהּ הַב לָן מִצְוָותָא, אֲמַר לוֹן אֲזַלוּן לְגַבֵּי דָּא דְּבֵייתָא וְהִיא יָהֲבָה לְכוֹן חַד מוֹדְיָא דְּדִינָרִין. אֲזַלוּן לְגַבֵּי אִינְתְּתָא וַאֲמַרוּן לָהּ אֲמַר לִיךְ בַּעֲלִךְ הַב לָן מִצְוָותָא חַד מוֹדְיָא דְּדִינָרִין, אָמְרָה לוֹן הֵיכֵי אָמַר לְכוֹן גְּדִישׁ אוֹ מְחִיק, אָמְרוּ לָהּ סְתָם אֲמַר לָן. אָמְרָה אֲנָא יָהֲבָה לְכוֹן גְּדִישׁ, אִין אֲמַר לִי בַּעְלִי לָמָּה, אֲמִינָא לֵיהּ חֲבִיתִין מִן פַּרְנִי. אֲתוֹן לְגַבֵּיהּ אֲמַרוּן לֵיהּ בָּרְיָיךְ יְמַלֵּא חֶסְרוֹנָךְ. אֲמַר לוֹן הֵיכִי יְהַבְתֵּיהּ לְכוֹן גְּדִישׁ אוֹ מְחִיק, אָמְרוּ לֵיהּ סְתָם אֲמַרָן לָהּ וְאָמְרָה אֲנָא יָהֲבָה לְכוֹן יָתֵיהּ גְּדִישׁ וְאִין אָמַר בַּעְלִי לָמָּה, אֲנָא יָהֲבָה גַּדְרָאנֵיהּ מִן פּוּרְנִי. אֲמַר לְהוֹן אֵיכָן דְּכֵן הֲוֵית בְּדַעְתִּי לְמִתְנָא לְכוֹן. וְלָמָּה לָא אֲתֵיתוּן לְגַבִּי מֵרֵישׁ, אֲמַרוּן לֵיהּ שָׁמְעִינַן לְעַבְדָךְ דַּאֲמַר לָךְ בַּמֶּה אֲנַן אָכְלִין יוֹמָא דֵין, וַאֲמַרְתְּ לֵיהּ בִּטְרוֹקְסִימוֹן, וַאֲמַר לָךְ מִן חַד בְּמָנֶא אוֹ מִן תְּרֵין בְּמָנֶא, וַאֲמַרְתְּ לֵיהּ מִן תְּרֵין בְּמָנֶא דְּאִינוּן כְּמִישִׁין וּזְלִילִין. וַאֲמַרִין בַּר נָשׁ דְּאִית לֵיהּ כָּל הָדֵין מָמוֹנָא הוּא אָכֵיל בִּטְרוֹקְסִימוֹן מִן תְּרֵין בְּמָנֶא. אֲמַר לוֹן בְּנַפְשִׁי אֲנָא רַשַּׁיי בְּרַם בְּמִצְוָותָה דְּבָרְיִי לֵית אֲנָא יָכֵיל וְלָא רַשַּׁיי.", "english": "There was an incident involving a certain man whose name was Barbohin. Our Sages went to him regarding matters of fundraising for the Sages. They heard his son saying to him: ‘What are we eating today?’ He said to him: ‘Endives.’  ‘From those sold at one per maneh or from those sold at two per maneh?’ He said to him: ‘From those sold at two per maneh, as those are withered and inexpensive.’ They said: ‘What are we doing going to this [person]? Let us go and do our business in the city and afterward we will come to him.’ They went and did their business and came to him. They said: ‘Give us a donation for charity.’ He said to them: ‘Go to the one who is in the house and she will give you a modius  of dinars.’ They went to the wife and said to her: ‘Your husband said that you should give us a modius of dinars.’ She said to them: ‘What did he say to you, heaping or level?’ They said to her: ‘He did not specify.’ She said: ‘I will give you heaping, and if my husband asks why, I will say that I gave it from the account of my marriage settlement.’\nThey came to him and said to him: ‘May your Creator fill all you lack.’ He said to them: ‘What did she give you, level or heaping?’ They said to him: ‘We said to her that you did not specify, and she said: I will give you heaping, and if my husband says why, [tell him] I gave the extra from my marriage settlement.’ He said to them: ‘Indeed, that is what I intended to give to you. Why didn’t you come to me before?’\nThey said to him: ‘We heard your servant, who said to you: What are we eating today? You said to him: Endives. He said to you: From those sold at one per maneh or from those sold at two per maneh? You said to him: From those sold at two per maneh, as those are withered and inexpensive. We said: A person who has all this money, would he eat endives sold at two per maneh?’ He said: ‘For myself, I am permitted [to be frugal]; however, regarding the commandments of my Creator I am unable and I am not permitted.’"}, {"location": "Eichah Rabbah 5:21", "hebrew": "הֲשִׁיבֵנוּ ה' אֵלֶיךָ וְנָשׁוּבָה, אָמְרָה כְּנֶסֶת יִשְׂרָאֵל לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא רִבּוֹנוֹ שֶׁל עוֹלָם שֶׁלְךָ הוּא הֲשִׁיבֵנוּ. אָמַר לָהֶם שֶׁלָּכֶם הוּא, שֶׁנֶּאֱמַר (מלאכי ג, ז): שׁוּבוּ אֵלַי וְאָשׁוּבָה אֲלֵיכֶם, נְאֻם ה', אָמְרָה לְפָנָיו רִבּוֹנוֹ שֶׁל עוֹלָם שֶׁלְךָ הוּא, שֶׁנֶּאֱמַר (תהלים פה, ה): שׁוּבֵנוּ אֱלֹהֵי יִשְׁעֵנוּ, לְכָךְ נֶאֱמַר: הֲשִׁיבֵנוּ ה' אֵלֶיךָ וְנָשׁוּבָה.", "english": "“Return us, HaShem, to You and we will return.” The Assembly of Israel said before the Holy One: ‘Master of the world, the returning is Yours.’ He said: ‘It is yours,’ as it is said: “Return to Me and I will return to you.” She said: ‘Master of the world, it is Yours,’ as it is said: “Restore us, God of our salvation.” Therefore it says: “Return us, HaShem, to You—and we will return.”"}, {"location": "Esther Rabbah 10:14", "hebrew": "רַבִּי חִיָּא רַבָּה וְרַבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא הֲווֹן מְהַלְּכִין בַּהֲדָא בִּקְעָתָא דְּאַרְבֵּל, וַחֲזוֹן אֶת אַיֶּלֶת הַשַּׁחַר שֶׁבָּקְעָה אֶת הָאוֹרָה, אֲמַר לֵיהּ רַבִּי חִיָּא רַבָּה לְרַבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא כָּךְ הוּא גְּדֻלָּתָן שֶׁל יִשְׂרָאֵל בַּתְּחִלָּה קִימְעָא, כָּל מַה שֶּׁהוֹלֵךְ הוּא גָּדֵל וְרָבֶה וְהוֹלֵךְ, מַה טַּעַם (מיכה ז, ח): כִּי אֵשֵׁב בַּחשֶׁךְ ה' אוֹר לִי.", "english": "Rabbi Ḥiyya Rabbah and Rabbi Shim’on ben Ḥalafta were walking in the valley of Arbel and saw the dawn (the ‘hind of the morning’) breaking the light. Rabbi Ḥiyya said: So is Israel’s greatness: at first little by little, and as it goes it grows and increases and shines—‘Though I sit in darkness, HaShem is a light to me.’"}, {"location": "Jerusalem Talmud, Yoma 3:2", "hebrew": "רִבִּי חִיָיא רוֹבָא וְרִבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא הֲווּ מְהַלְּכִין בְּהָדָא בִקְעַת אַרְבֵּל בַּקְּרִיצְתָּה רָאוּ אַיֶּלֶת הַשַּׁחַר שֶׁבָּקַע אוֹרָהּ. אָמַר רִבִּי חִיָא רוֹבָה לְרִבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא. בִּרְבִּי. כָּךְ הִיא גְאולָּתָן שֶׁל יִשְׂרָאֵל. בַּתְּחִילָּה קִימְעָא קִימְעָא. כָּל שֶׁהִיא הוֹלֶכֶת הִיא הוֹלֶכֶת וּמֵאִיר. מַאי טַעֲמָא. כִּי יוֹשֵׁב בַּחשֶׁךְ יְי אוֹר לִי.", "english": "Rabbi Ḥiyya Rabbah and Rabbi Shim’on ben Ḥalafta were walking in the valley of Arbel and saw the dawn (the ‘hind of the morning’) breaking the light. Rabbi Ḥiyya said: So is Israel’s redemption: at first little by little, and as it goes it grows and increases and shines—‘Though I sit in darkness, HaShem is a light to me.’"}, {"location": "Ruth Rabbah 2:14", "hebrew": "אָמַר רַבִּי זְעֵירָא, מְגִלָּה זוֹ אֵין בָּהּ לֹא טֻמְאָה, וְלֹא טָהֳרָה, וְלֹא אִסּוּר, וְלֹא הֶתֵּר, וְלָמָּה נִכְתְּבָה לְלַמֶּדְךָ כַּמָּה שָׂכָר טוֹב לְגוֹמְלֵי חֲסָדִים.", "english": "Rabbi Ze’ira said: This Megillah (Ruth) contains neither impurity nor purity, neither prohibition nor permission. Why was it written? To teach you how great the good reward is for those who perform deeds of kindness."}, {"location": "Kohelet Rabbah 11:1", "hebrew": "רַבִּי אֶלְעָזָר בֶּן שָׁמוּעַ הֲוָה מְטַיֵּיל עַל כֵּיף יַמָּא רַבָּה, חֲמָא אִילְפָא דְּמִיטָרְפָא בְּיַמָּא, כַּהֲרִיפַת עַיִן טְבַעַת וּטְבַע כָּל מַה דַּהֲוָה בָּהּ, חֲמָא חַד גְּבַר דִּיתֵיב עַל קוּרְשָׁא דִּסְפִינְתָּא, מִגַּלָּא לְגַלָּא סְלֵיק לְיַבֶּשְׁתָּא כַּד הוּא הֲוָה עַרְטִילָאי, וַהֲוָה מִיטַּמַּר בְּכֵיף יַמָּא. אֲרָעַת עָנְתָה דְּיִשְׂרָאֵל סָלְקִין לְרִיגְלָא בִּירוּשְׁלֵם, אֲמַר לְהוֹן מִן בְּנֵי עֵשָׂו אֲחוּכוֹן אֲנָא, הָבוּ לִי זְעֵיר כְּסוּת וְאֵיכַסֵּי בָּהּ תַּתָּאִי, דְּעָרְעַנִי יַמָּא וְלָא אִישְׁתֵּזַב גַּבָּאי מִידֵּי. אָמְרִין לֵיהּ כֵּן יִתְעַרְעֲרָן כָּל אוּמָּתָךְ. תְּלָה עֵינֵיהּ וַחֲמָא יַת רַבִּי אֶלְעָזָר דַּהֲוָה מְטַיֵּיל בֵּינֵיהֶן, אֲמַר מִסְתַּכֵּל אֲנָא דְּאַתְּ גְּבַר סַב וְיַקִּיר מֵאוּמָּתָךְ, וְאַתְּ חַכִּים בִּיקָרֵי דִּבְרִיָּיתָא, אֶלָּא זְכֵי בִּי וְהַב לִי תַּכְסִית דַּאֲכַסֵּי בָּהּ תַּתָּאִי דְּעַרְעֲרָן יַמָּא. הֲוָה עַל רַבִּי אֶלְעָזָר בֶּן שָׁמוּעַ שֶׁבַע אִיצְטַלְוָון, שְׁלַח חַד וְיַהֲבֵיהּ לֵיהּ, אוֹבְלֵיהּ לְבֵיתֵיהּ וְאוֹכְלֵיהּ וְאַשְׁקֵיהּ וִיהַב לֵיהּ תְּרֵין מָאוָון דִּינָרִין, וְאַרְכְּבֵיהּ אַרְבְּעָה עֲשַׂר פַּרְסִין, וַעֲבַד לֵיהּ יְקָרָא סַגִּי עַד דְּאַעְלֵיהּ לְבֵיתֵיהּ. לְבָתַר יוֹמִין מֵת קֵיסָר הָרָשָׁע וְאֵימַנּוֹ לֵיהּ מַלְכָּא תְּחוֹתֵיהּ, גְּזַר עַל מְדִינְתָּא הַהִיא כָּל גּוּבְרִין לְקַטָּלָא וְכָל נְשַׁיָא לְבִיזָה. אֲמָרוּ לְרַבִּי אֶלְעָזָר בֶּן שָׁמוּעַ זִיל וּפַיֵּיס עֲלֵינַן, אֲמַר לוֹן אַתּוּן יָדְעִיתוּן הֲדָא מַלְכוּתָא עָבְדָא מִידֵּי עַל מַגָּן, אֲמָרוּ לֵיהּ אִית הָכָא אַרְבְּעָה אַלְפִין דִּינָרִין סַב יַתְהוֹן וְאִזֵיל וּפַיֵּיס עֲלֵינַן. נְסַב יַתְהוֹן וּסְלַק, וְקָם עַל תְּרַע מַלְכוּתָא, אֲמַר לוֹן אִיזְלוּן אִימְרוּן לְמַלְכָּא חַד גְּבַר יְהוּדָאי קָאֵים עַל תַּרְעָא בָּעֵי מִישְׁאַל שְׁלָמָא דְּמַלְכָּא, אֲמַר אַעֲלוּנֵיהּ, כַּד חֲמִינֵיהּ מַלְכָּא שְׁדָא מֵעַל כּוּרְסְיֵיהּ וּנְפַל עַל אַנְפּוֹהִי, אֲמַר לֵיהּ מַאי עִיסְקֵיהּ דְּמָרִי הָכָא, וּלְמָה אִיצְטָעֵר מָרִי לְהָכָא, אֲמַר בְּגִין דְּתִתְרַחַם עַל הֲדָא מְדִינְתָּא וְתִתְבַּטֵּל הֲדָא גְּזֵרְתָא. אֲמַר לֵיהּ אוֹרָיְיתָא כְּלוּם כְּתִיב בָּהּ שִׁיקְּרָא, אֲמַר לֵיהּ לָא. אֲמַר לֵיהּ לָא כְתִיב בְּתוֹרַתְכֶם (דברים כג, ד): לֹא יָבֹא עַמּוֹנִי וּמוֹאָבִי בִּקְהַל ה', לָמָּה, (דברים כג, ה): עַל דְּבַר אֲשֶׁר לֹא קִדְּמוּ אֶתְכֶם בַּלֶּחֶם וּבַמַּיִם, וּכְתִיב (דברים כג, ח): לֹא תְתַעֵב אֲדֹמִי כִּי אָחִיךָ הוּא, וַאֲנָא לָא בַּר עֵשָׂו אֲחוּכוֹן אֲנָא, וְלָא גְּמָלוּן לִי חֶסֶד, וּמַאן דַּעֲבַר אַדְאוֹרָיְיתָא חַיָּיב לְקַטָּלָא. אֲמַר לֵיהּ רַבִּי אֶלְעָזָר בֶּן שָׁמוּעַ אַף עַל פִּי דְּהִינוּן חַיָּיבִין לָךְ תִּישְׁבּוֹק וּתְרַחֵם עֲלֵיהוֹן. אֲמַר לֵיהּ וְאַתְּ יָדַע הֲדָא מַלְכוּתָא עָבְדָא מִידֵּי עַל מַגָּן, אָמַר לֵיהּ אִית עִמִּי אַרְבַּעַת אַלְפִין דִּינָרִין, סַב יַתְהוֹן וְאִיתְרַחַם עֲלֵיהוֹן. אֲמַר לֵיהּ אַרְבְּעָה אַלְפִין הַלָּלוּ יְהוֹן לָךְ יְהִיבִין חֲלַף תְּרֵין מָאוָון דִּיהַבְתְּ לִי, וּמְדִינְתָּא כּוּלָּהּ תְּהֵא מִשְׁתַּזְּבָא בְּגִינָךְ, חֲלַף מֵיכְלָא וּמִישְׁתְּיָא דְּאוֹכֵלְתְּ וְאַשְׁקֵת יָתִי. וְעוּל לְבֵי גְּעָא וְגִנְזֵי דִּידִי וְסַב לָךְ שַׁבְעִין אִיצְטַלְוָון דִּלְבוּשָׁן, חֲלַף אִיצְטְלָא דִּיהַבְתְּ לִי, וְזִיל בִּשְׁלָם עַל אוּמָּתָךְ וְאַשְׁבִּיקִין בְּגִינָךְ, וּקְרוֹן עֲלוֹי: שַׁלַּח לַחְמְךָ עַל פְּנֵי הַמָּיִם.", "english": "Rabbi Elazar ben Shamua was strolling on the coast of the Mediterranean Sea. He saw a ship that was being tossed in the sea, and in an instant, it sank along with everything that was on it. He saw one man who was sitting on one of the planks of the ship. [His plank was tossed] from one wave to another; he ascended to dry land when he was naked, and he hid on the seacoast. It was the season when Jews ascend to Jerusalem for the pilgrimage festival. He said to them: ‘I am from the descendants of Esau your brother. Give me some minimal garments, and I will cover my nakedness, as the sea stripped me bare and I was left with nothing.’ They said to him: ‘May your entire nation be stripped bare in this manner.’ He lifted his eyes and saw Rabbi Elazar ben Shamua strolling among them. He said: ‘I see that you are an elderly and respected man in your nation, and you are wise in the ways of the dignity of people. Perform charity for me and give me a covering, for the sea stripped me bare.’ Rabbi Elazar ben Shamua had on him seven cloaks. He removed one and gave it to him. He led him to his house, fed him, gave him to drink, gave him two hundred dinars, transported him fourteen parasangs, and accorded him great honor until he brought him into his [own] house.\nSometime later, the evil emperor died, and they appointed a king in his place. He decreed on that province that all the men were to be executed and all the women to be plundered. They said to Rabbi Elazar ben Shamua: ‘Go and appease them on our behalf.’ He said to them: ‘You know that this kingdom does nothing for free.’ They said to him: ‘There are four thousand dinars here; take them and appease them on our behalf.’ He took them and ascended, and stood at the gate of the royal palace.\nHe said to them: ‘Go and say to the king: One Jewish man is standing at the gate and he wishes to ask after the welfare of the king.’ [The king] said: ‘Bring him in.’ When the king saw him, he threw himself off his throne and fell on his face. He said: ‘What business does my master have here, and why did my master trouble himself to come here?’ [Rabbi Elazar ben Shamua] said: ‘It is so you will have mercy on that province and abrogate that decree.’ He said to him: ‘Is there any untruth written in the Torah?’ He said to him: ‘No.’ He said to him: ‘Is it not written in your Torah: “An Amonite and a Moavite shall not enter into the assembly of the Lord” (Deuteronomy 23:4)? Why? “Because they did not greet you with bread and with water” (Deuteronomy 23:5). And it is written: “Do not despise an Edomite, as he is your brother” (Deuteronomy 23:8). Am I not a descendant of Esau your brother? But they did not treat me with kindness. One who violates the Torah incurs liability to be executed.’\nRabbi Elazar ben Shamua said to him: ‘Even though they have incurred liability toward you, pardon them and have mercy on them.’ He said to him: ‘You know that this kingdom does nothing for free.’ He said to him: ‘I have with me four thousand dinars. Take them and have mercy on them.’ He said to him: ‘Let these four thousand be given to you in exchange for the two hundred that you gave me, and the entire province will be pardoned because of you, in exchange for the food and the drink that you fed me and gave me to drink. Go into my treasury and take for yourself seven cloaks of garments in exchange for the cloak that you gave to me. Go in peace to your people, and I will pardon them because of you.’ They read in his regard: “Cast your bread on the surface of the water.”"}, {"location": "Kohelet Rabbah 11:1", "hebrew": "אָמַר רַבִּי עֲקִיבָא כְּשֶׁהָיִיתִי בָּא בַּיָּם רָאִיתִי סְפִינָה שֶׁטָּבְעָה בַּיָּם, וְנִצְטָעַרְתִּי עַל תַּלְמִיד חָכָם אֶחָד שֶׁהָיָה בָּהּ וְנִטְבַּע, וּכְשֶׁבָּאתִי לִמְדִינַת קַפּוֹטְקְיָא רְאִיתִיו שֶׁהָיָה יוֹשֵׁב לְפָנַי וְשׁוֹאֵל שְׁאֵלוֹת, נַמְתִּי לוֹ, בְּנִי, הֵיאַךְ עָלִיתָ מִן הַיָּם, אָמַר לִי רַבִּי בִּצְלוֹתָךְ טְרָדַנִּי הַגַּל לַחֲבֵרוֹ, וַחֲבֵרוֹ לַחֲבֵרוֹ, עַד שֶׁהִגִּיעוּנִי לַיַּבָּשָׁה. אָמַרְתִּי לוֹ בְּנִי, מַה מַּעֲשִׂים יֵשׁ בְּיָדֶךָ, אָמַר כְּשֶׁנִּכְנַסְתִּי לַסְּפִינָה פָּגַע בִּי אִישׁ אֶחָד מִסְכֵּן, אָמַר לִי זְכֵי בִּי, וִיהֲבִית לֵיהּ חַד עִיגּוּל, אָמַר כְּמָה דִּיהַבְתְּ לִי נַפְשִׁי בְּמַתְּנָךְ, כֵּן יִתְיְהֵב לָךְ נַפְשָׁךְ. וְקָרָאתִי עָלָיו: שַׁלַּח לַחְמְךָ עַל פְּנֵי הַמָּיִם.", "english": "Rabbi Akiva said: When I was coming by sea, I saw a ship that sank in the sea, and I was very sorry about a certain Torah scholar who was on it and [must have] drowned. When I arrived at the province of Kapotkeya, I saw him, that he was sitting before me and asking questions. I said to him: ‘My son, how did you ascend from the sea?’ He said: ‘Rabbi, due to your prayer, each wave cast me to another, and another to another until they caused me to reach dry land.’ I said to him: ‘My son, what deeds do you have to your credit?’ He said: ‘When I boarded the ship, a certain unfortunate man encountered me. He said to me: Perform charity for me, and I gave him a loaf. He said to me: Just as you gave me my life with your gift, so may your life be given to you.’ I read in his regard: “Cast your bread on the surface of the water.”"}, {"location": "Shemot Rabbah 33:1; Midrash Tanchuma, Terumah 8", "hebrew": "וְיֵשׁ לְךָ מִקָּח שֶׁמִּי שֶׁמְּכָרוֹ נִמְכָּר עִמּוֹ, אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, מָכַרְתִּי לָכֶם תּוֹרָתִי, כִּבְיָכוֹל נִמְכַּרְתִּי עִמָּהּ, שֶׁנֶּאֱמַר: וְיִקְחוּ לִי תְּרוּמָה, מָשָׁל לְמֶלֶךְ שֶׁהָיָה לוֹ בַּת יְחִידָה, בָּא אֶחָד מִן הַמְּלָכִים וּנְטָלָהּ, בִּקֵּשׁ לֵילֵךְ לוֹ לְאַרְצוֹ וְלִטֹּל לְאִשְׁתּוֹ. אָמַר לוֹ: בִּתִּי שֶׁנָּתַתִּי לְךָ יְחִידִית הִיא, לִפְרשׁ מִמֶּנָּה אֵינִי יָכוֹל, לוֹמַר לְךָ אַל תִּטְלָהּ אֵינִי יָכוֹל לְפִי שֶׁהִיא אִשְׁתֶּךָ, אֶלָּא, זוֹ טוֹבָה עֲשֵׂה לִי, שֶׁכָּל מָקוֹם שֶׁאַתָּה הוֹלֵךְ קִיטוֹן אֶחָד עֲשֵׂה לִי, שֶׁאָדוּר אֶצְלְכֶם, שֶׁאֵינִי יָכוֹל לְהַנִּיחַ אֶת בִּתִּי. כָּךְ אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, נָתַתִּי לָכֶם אֶת הַתּוֹרָה, לִפְרשׁ הֵימֶנָּה אֵינִי יָכוֹל, לוֹמַר לָכֶם אַל תִּטְלוּהָ אֵינִי יָכוֹל, אֶלָּא בְּכָל מָקוֹם שֶׁאַתֶּם הוֹלְכִים בַּיִת אֶחָד עֲשׂוּ לִי שֶׁאָדוּר בְּתוֹכוֹ, שֶׁנֶּאֱמַר (שמות כה, ח): וְעָשׂוּ לִי מִקְדָּשׁ.", "english": "There is a purchase such that what is sold is sold together with it. The Holy One, blessed be He, said to Israel: ‘I sold you My Torah—so to speak, I am sold with it,’ as it is said: “And they shall take for Me a donation.” A parable: A king had an only daughter. Another king took her and wished to return to his land with her as his wife. The father said: ‘My daughter is my only one; I cannot separate from her. I cannot tell you not to take her, because she is your wife. But do me this favor: wherever you go, make for me one small chamber so I may dwell with you, for I cannot leave my daughter.’ So too the Holy One said: ‘I gave you the Torah; I cannot separate from it. I cannot tell you not to take it. Rather, wherever you go, make for Me one house so I may dwell within it,’ as it is said: “And they shall make for Me a sanctuary.”"}, {"location": "Avot 6:2", "hebrew": "חָרוּת עַל הַלֻּחֹת — אַל תִּקְרֵי חָרוּת אֶלָּא חֵרוּת, שֶׁאֵין לְךָ בֶּן חוֹרִין אֶלָּא מִי שֶׁעוֹסֵק בְּתַלְמוּד תּוֹרָה", "english": "“Engraved (ḥarut) on the tablets”—do not read ḥarut (engraved) but ḥerut (freedom): you have no one truly free except one who engages in Torah study."}, {"location": "Shir HaShirim Rabbah 1:4", "hebrew": "אָמַר רַבִּי מֵאִיר בְּשָׁעָה שֶׁעָמְדוּ יִשְׂרָאֵל לִפְנֵי הַר סִינַי לְקַבֵּל הַתּוֹרָה, אָמַר לָהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא אַלְעִיקֵי אֲנִי נוֹתֵן לָכֶם אֶת הַתּוֹרָה, אֶלָּא הָבִיאוּ לִי עֲרֵבִים טוֹבִים שֶׁתִּשְׁמְרוּהָ, וַאֲנִי נוֹתְנָהּ לָכֶם. אָמְרוּ לְפָנָיו רִבּוֹנוֹ שֶׁל עוֹלָם, אֲבוֹתֵינוּ עֲרֵבִים לָנוּ. אָמַר לָהֶם אֲבוֹתֵיכֶם צְרִיכִין עֲרֵבִים, לְמָה הַדָּבָר דּוֹמֶה לְאֶחָד שֶׁהָלַךְ לִלְווֹת מִן הַמֶּלֶךְ, אָמַר לוֹ הָבֵא לִי עָרֵב וַאֲנִי מַלְוֶה אוֹתְךָ, הָלַךְ וְהֵבִיא לוֹ עָרֵב אֶחָד, אָמַר לוֹ עֲרֵבְךָ צָרִיךְ עָרֵב, הָלַךְ וְהֵבִיא לוֹ עָרֵב שֵׁנִי, וְאָמַר לוֹ עֲרֵבְךָ צָרִיךְ עָרֵב, כֵּיוָן שֶׁהֵבִיא לוֹ עָרֵב שְׁלִישִׁי אָמַר תֵּדַע כִּי מִפְּנֵי זֶה אֲנִי מַלְוֶה לְךָ. כָּךְ בְּשָׁעָה שֶׁעָמְדוּ יִשְׂרָאֵל לְקַבֵּל הַתּוֹרָה אָמַר לָהֶם אֲנִי נוֹתֵן לָכֶם תּוֹרָתִי הָבִיאוּ לִי עֲרֵבִים טוֹבִים שֶׁתִּשְׁמְרוּהָ וְאֶתְּנֶנָּהּ לָכֶם, אָמְרוּ אֲבוֹתֵינוּ עוֹרְבִים אוֹתָנוּ, אָמַר לָהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא אֲבוֹתֵיכֶם יֵשׁ לִי עֲלֵיהֶם, אַבְרָהָם יֵשׁ לִי עָלָיו, שֶׁאָמַר (בראשית טו, ח): בַּמָּה אֵדַע. יִצְחָק יֵשׁ לִי עָלָיו, שֶׁהָיָה אוֹהֵב לְעֵשָׂו וַאֲנִי שְׂנֵאתִיו, שֶׁנֶּאֱמַר (מלאכי א, ג): וְאֶת עֵשָׂו שָׂנֵאתִי. יַעֲקֹב שֶׁאָמַר (ישעיה מ, כז): נִסְתְּרָה דַרְכִּי מֵה'. אֶלָּא הָבִיאוּ לִי עֲרֵבִים טוֹבִים, וַאֲנִי נוֹתְנָהּ לָכֶם. אָמְרוּ לְפָנָיו רִבּוֹנוֹ שֶׁל עוֹלָם נְבִיאֵינוּ עֲרֵבִין לָנוּ. אָמַר לָהֶם יֵשׁ לִי עֲלֵיהֶם, שֶׁנֶּאֱמַר (ירמיה ב, ח): וְהָרֹעִים פָּשְׁעוּ בִי וגו', וּכְתִיב (יחזקאל יג, ד): כְּשֻׁעָלִים בָּחֳרָבוֹת נְבִיאֶיךָ יִשְׂרָאֵל הָיוּ, אֶלָּא הָבִיאוּ לִי עֲרֵבִים טוֹבִים וְאֶתְּנֶנָּהּ לָכֶם, אָמְרוּ הֲרֵי בָּנֵינוּ עוֹרְבִים אוֹתָנוּ. אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא הָא וַדַּאי עֲרֵבִים טוֹבִים, עַל יְדֵיהֶם אֶתְּנֶנָּהּ לָכֶם, הֲדָא הוּא דִכְתִיב (תהלים ח, ג): מִפִּי עוֹלְלִים וְיֹנְקִים יִסַּדְתָּ עֹז, וְאֵין עֹז אֶלָּא תּוֹרָה, שֶׁנֶּאֱמַר (תהלים כט, יא): ה' עֹז לְעַמּוֹ יִתֵּן.", "english": "Rabbi Meir said: When Israel stood before Mount Sinai to receive the Torah, the Holy One said: ‘I will not give you My Torah for free—bring Me good guarantors that you will guard it, and I will give it to you.’ They said: ‘Our fathers are guarantors.’ He said: ‘Your fathers need guarantors.’ They offered the prophets; He said: ‘I have claims against them.’ They said: ‘Our children are guarantors.’ He said: ‘Indeed, these are good guarantors—through them I will give it to you,’ as it is said: “From the mouths of babes and sucklings You established strength,” and “strength” is Torah: “HaShem will give strength to His people.”"}, {"location": "Bereishit Rabbah 68:9", "hebrew": "וַיִּפְגַע בַּמָּקוֹם (בראשית כח, יא), רַב הוּנָא בְּשֵׁם רַבִּי אַמֵּי אָמַר מִפְּנֵי מָה מְכַנִּין שְׁמוֹ שֶׁל הַקָּדוֹשׁ בָּרוּךְ הוּא וְקוֹרְאִין אוֹתוֹ מָקוֹם, שֶׁהוּא מְקוֹמוֹ שֶׁל עוֹלָם וְאֵין עוֹלָמוֹ מְקוֹמוֹ, מִן מַה דִּכְתִיב (שמות לג, כא): הִנֵּה מָקוֹם אִתִּי, הֱוֵי הַקָּדוֹשׁ בָּרוּךְ הוּא מְקוֹמוֹ שֶׁל עוֹלָם וְאֵין עוֹלָמוֹ מְקוֹמוֹ.", "english": "“And he encountered the place.” Rav Huna in the name of Rabbi Ami said: Why do we call the Holy One, blessed be He, ‘Place’ (Makom)? Because He is the place of the world, and the world is not His place—as it is written: “Behold, there is a place with Me.”"}, {"location": "Bereishit Rabbah 8:7", "hebrew": "רַבִּי יְהוֹשֻׁעַ דְּסִכְנִין בְּשֵׁם רַבִּי שְׁמוּאֵל אָמַר, בְּנַפְשׁוֹתָן שֶׁל צַדִּיקִים נִמְלָךְ, הֲדָא הוּא דִּכְתִיב (דברי הימים א ד, כג): הֵמָּה הַיּוֹצְרִים וְישְׁבֵי נְטָעִים וּגְדֵרָה עִם הַמֶּלֶךְ בִּמְלַאכְתּוֹ יָשְׁבוּ שָׁם. הֵמָּה הַיּוֹצְרִים, עַל שֵׁם (בראשית ב, ז): וַיִּיצֶר ה' אֱלֹהִים אֶת הָאָדָם עָפָר מִן הָאֲדָמָה. יוֹשְׁבֵי נְטָעִים, עַל שֵׁם (בראשית ב, ח): וַיִּטַּע ה' אֱלֹהִים גַּן בְּעֵדֶן מִקֶּדֶם. וּגְּדֵרָה, עַל שֵׁם (ירמיה ה, כב): אֲשֶׁר שַׂמְתִּי חוֹל גְּבוּל לַיָּם. עִם הַמֶּלֶךְ בִּמְלַאכְתּוֹ יָשְׁבוּ, עִם הַמֶּלֶךְ מֶלֶךְ מַלְכֵי הַמְלָכִים הַקָּדוֹשׁ בָּרוּךְ הוּא יָשְׁבוּ נְפָשׁוֹת שֶׁל צַדִּיקִים, שֶׁבָּהֶן נִמְלַךְ הַקָּדוֹשׁ בָּרוּךְ הוּא וּבָרָא אֶת הָעוֹלָם.", "english": "Rabbi Yehoshua of Sikhnin in the name of Rabbi Shmuel said: He consulted with the souls of the righteous, as it is written: “They are the potters and the inhabitants of plantations and hedges; with the king in his work they dwelt there.” “They are the potters” — as in “And HaShem formed (vayyitzer) man…” “Inhabitants of plantations” — as in “HaShem planted a garden…” “And hedges” — as in “I set sand as a boundary for the sea…” “With the king in his work they dwelt” — with the King of kings: the souls of the righteous, with whom the Holy One consulted and created the world."}, {"location": "Kohelet Rabbah 3:11", "hebrew": "אֶת הַכֹּל עָשָׂה יָפֶה בְעִתּוֹ. אָמַר רַבִּי אַבָּהוּ מִכָּאן שֶׁהָיָה הַקָּדוֹשׁ בָּרוּךְ הוּא בּוֹנֶה עוֹלָמוֹת וּמַחֲרִיבָן, בּוֹרֵא עוֹלָמוֹת וּמַחֲרִיבָן, עַד שֶׁבָּרָא אֶת אֵלּוּ וְאָמַר דֵּין הַנְיָין לִי, יָתְהוֹן לָא הַנְיָין לִי.", "english": "“He has made everything beautiful in its time.” Rabbi Abbahu said: From here we learn that the Holy One, blessed be He, was building worlds and destroying them, creating worlds and destroying them, until He created these and said: ‘These please Me; those did not please Me.’"}, {"location": "Bereishit Rabbah 9:7", "hebrew": "רַבִּי נַחְמָן בַּר שְׁמוּאֵל בַּר נַחְמָן בְּשֵׁם רַב שְׁמוּאֵל בַּר נַחְמָן אָמַר, הִנֵּה טוֹב מְאֹד, זֶה יֵצֶר טוֹב. וְהִנֵּה טוֹב מְאֹד, זֶה יֵצֶר רָע. וְכִי יֵצֶר הָרָע טוֹב מְאֹד, אֶתְמְהָא. אֶלָּא שֶׁאִלּוּלֵי יֵצֶר הָרָע לֹא בָּנָה אָדָם בַּיִת, וְלֹא נָשָׂא אִשָּׁה, וְלֹא הוֹלִיד, וְלֹא נָשָׂא וְנָתַן. וְכֵן שְׁלֹמֹה אוֹמֵר (קהלת ד, ד): כִּי הִיא קִנְאַת אִישׁ מֵרֵעֵהוּ.", "english": "Rabbi Naḥman bar Shmuel bar Naḥman in the name of Rav Shmuel bar Naḥman said: “Behold, it was very good”—this is the good inclination; “and behold, it was very good”—this is the evil inclination. Is the evil inclination ‘very good’? Rather, if not for the evil inclination a person would not build a house, marry, beget children, or conduct business; as Shlomo says: “It is a man’s rivalry with his fellow.”"}, {"location": "Bereishit Rabbah 9:8", "hebrew": "אָמַר רַב הוּנָא הִנֵּה טוֹב מְאֹד, זוֹ מִדַּת הַטּוֹב. וְהִנֵּה טוֹב מְאֹד, זוֹ מִדַּת יִסּוּרִין. וְכִי מִדַּת יִסּוּרִין טוֹבָה מְאֹד, אֶתְמְהָא. אֶלָּא שֶׁעַל יָדֶיהָ הַבְּרִיּוֹת בָּאִים לְחַיֵּי הָעוֹלָם הַבָּא. וְכֵן שְׁלֹמֹה אוֹמֵר (משלי ו, כג): וְדֶרֶךְ חַיִּים תּוֹכְחוֹת מוּסָר, אֲמַרְתְּ, צֵא וּרְאֵה אֵיזֶהוּ דֶּרֶךְ מְבִיאָה אֶת הָאָדָם לְחַיֵּי הָעוֹלָם הַבָּא, הֱוֵי אוֹמֵר זוֹ מִדַּת יִסּוּרִין.", "english": "Rav Huna said: “Behold, it was very good”—this is the trait of goodness; “and behold, it was very good”—this is the trait of sufferings. Are sufferings ‘very good’? Rather, through them creatures come to the life of the World to Come; as it is said: “And the way of life is the rebukes of discipline.” Which path brings a person to the World to Come? You must say: sufferings."}, {"location": "Devarim Rabbah 6:14", "hebrew": "אָמַר רַב אַסֵּי, אֵין אָדָם אוֹמֵר לָשׁוֹן הָרָע עַד שֶׁכּוֹפֵר בְּהַקָּדוֹשׁ בָּרוּךְ הוּא, שֶׁנֶּאֱמַר (תהלים יב, ה): אֲשֶׁר אָמְרוּ לִלְשֹׁנֵנוּ נַגְבִּיר שְׂפָתֵינוּ אִתָּנוּ מִי אָדוֹן לָנוּ.", "english": "Rav Assi said: A person does not speak lashon hara until he denies the Holy One, blessed be He, as it is said: “They said: We will strengthen our tongue; our lips are with us—who is lord over us?”"}, {"location": "Vayikra Rabbah 19:2", "hebrew": "רַבִּי חָנִין דְּצִפּוֹרִין פָּתַר קְרָא בִּתְלוּלִית זוֹ שֶׁל עָפָר, מִי שֶׁטִּפֵּשׁ מַהוּ אוֹמֵר מִי יָכוֹל לְקַצּוֹת אֶת זוֹ, מִי שֶׁפִּקֵּחַ מַהוּ אוֹמֵר הֲרֵינִי קוֹצֵץ שְׁתֵּי מַשְׁפָּלוֹת הַיּוֹם, שְׁתֵּי מַשְׁפָּלוֹת לְמָחָר, עַד שֶׁאֲנִי קוֹצֵץ אֶת כֻּלָּהּ. כָּךְ מִי שֶׁטִּפֵּשׁ אוֹמֵר מִי יָכוֹל לִלְמֹד אֶת הַתּוֹרָה, נְזִיקִין שְׁלשִׁים פְּרָקִים, כֵּלִים שְׁלשִׁים פְּרָקִים. מִי שֶׁפִּקֵּחַ מַהוּ אוֹמֵר, הֲרֵינִי שׁוֹנֶה שְׁתֵּי הֲלָכוֹת הַיּוֹם שְׁתֵּי הֲלָכוֹת לְמָחָר עַד שֶׁאֲנִי שׁוֹנֶה אֶת כָּל הַתּוֹרָה כֻּלָּהּ.", "english": "Rabbi Ḥanin of Tzipporin explained a verse with a mound of earth: A fool says: ‘Who can cut all of this?’ A wise person says: ‘I will cut two furrows today, two tomorrow, until I cut it all.’ So too: a fool says: ‘Who can learn Torah—Nezikin is thirty chapters, Kelim is thirty chapters!’ A wise person says: ‘I will learn two halachot today, two tomorrow, until I learn the whole Torah.’"}, {"location": "Vayikra Rabbah 19:2", "hebrew": "אָמַר רַבִּי אַמֵּי (משלי כד, ז): רָאמוֹת לֶאֱוִיל חָכְמוֹת. אָמַר רַבִּי יוֹחָנָן לְכִכָּר תָּלוּי בַּאֲוִירוֹ שֶׁל בַּיִת, מִי שֶׁטִּפֵּשׁ אוֹמֵר מִי יָכוֹל לְהוֹרִיד אֶת זֶה, מִי שֶׁפִּקֵּחַ אוֹמֵר וְלֹא אַחֵר תְּלָאוֹ, אֶלָּא מֵבִיא שְׁנֵי קָנִים וּמְסַפְּקָן זֶה לָזֶה וּמוֹרִידוֹ. כָּךְ מִי שֶׁטִּפֵּשׁ אוֹמֵר מִי יָכוֹל לִלְמֹד תּוֹרָה שֶׁבְּלִבּוֹ שֶׁל חָכָם, מִי שֶׁפִּקֵּחַ אוֹמֵר וְהוּא לֹא מֵאַחֵר לְמָדָהּ, אֶלָּא הֲרֵינִי לוֹמֵד שְׁתֵּי הֲלָכוֹת הַיּוֹם וּשְׁתַּיִם לְמָחָר עַד שֶׁאֲנִי לוֹמֵד אֶת כָּל הַתּוֹרָה כֻּלָּהּ.", "english": "Rabbi Ami said: “Wisdoms are too high for a fool.” Rabbi Yoḥanan said: It is like a loaf hanging in the air of a house: a fool says, ‘Who can bring it down?’ A wise person says: ‘He didn’t hang it there for nothing.’ He brings two reeds, fits them together, and brings it down. So too: a fool says, ‘Who can learn the Torah that is in a sage’s heart?’ A wise person says: ‘He did not learn it from another’—rather, ‘I will learn two halachot today and two tomorrow until I learn the whole Torah.’"}, {"location": "Bereishit Rabbah 5:5", "hebrew": "אָמַר רַבִּי יוֹחָנָן תְּנָאִין הִתְנָה הַקָּדוֹשׁ בָּרוּךְ הוּא עִם הַיָּם שֶׁיְהֵא נִקְרַע לִפְנֵי יִשְׂרָאֵל, הֲדָא הוּא דִּכְתִיב (שמות יד, כז): וַיָּשָׁב הַיָּם לְאֵיתָנוֹ, לִתְנָאוֹ שֶׁהִתְנָה עִמּוֹ. אָמַר רַבִּי יִרְמְיָה בֶּן אֶלְעָזָר לֹא עִם הַיָּם בִּלְבָד הִתְנָה הַקָּדוֹשׁ בָּרוּךְ הוּא, אֶלָּא עִם כָּל מַה שֶּׁנִּבְרָא בְּשֵׁשֶׁת יְמֵי בְרֵאשִׁית, הֲדָא הוּא דִכְתִיב (ישעיה מה, יב): אֲנִי יָדַי נָטוּ שָׁמַיִם וְכָל צְבָאָם צִוֵּיתִי, מִידֵי נָטוּ שָׁמַיִם וְכָל צְבָאָם צִוֵּיתִי, צִוִּיתִי אֶת הַיָּם שֶׁיִּהְיֶה נִקְרַע לִפְנֵי יִשְׂרָאֵל, צִוִּיתִי אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ שֶׁיִּשְׁתְּקוּ לִפְנֵי משֶׁה, שֶׁנֶּאֱמַר (דברים לב, א): הַאֲזִינוּ הַשָּׁמַיִם וַאֲדַבֵּרָה וְתִשְׁמַע הָאָרֶץ אִמְרֵי פִי, צִוִּיתִי אֶת הַשֶּׁמֶשׁ וְאֶת הַיָּרֵחַ שֶׁיַּעַמְדוּ לִפְנֵי יְהוֹשֻׁעַ, שֶׁנֶּאֱמַר (יהושע י, יב): שֶׁמֶשׁ בְּגִבְעוֹן דּוֹם, צִוִּיתִי אֶת הָעוֹרְבִים שֶׁיְכַלְכְּלוּ אֶת אֵלִיָּהוּ, שֶׁנֶּאֱמַר (מלכים א יז, ו): וְהָעֹרְבִים מְבִיאִים לוֹ לֶחֶם וּבָשָׂר וגו', צִוִּיתִי אֶת הָאוּר שֶׁלֹא תַּזִּיק לַחֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה, צִוִּיתִי אֶת הָאֲרָיוֹת שֶׁלֹא יַזִּיקוּ אֶת דָּנִיֵּאל, צִוִּיתִי אֶת הַשָּׁמַיִם שֶׁיִּפָּתְחוּ לְקוֹל יְחֶזְקֵאל, שֶׁנֶּאֱמַר (יחזקאל א, א): נִפְתְּחוּ הַשָּׁמַיִם וגו', צִוִּיתִי אֶת הַדָּג שֶׁיָּקִיא אֶת יוֹנָה, שֶׁנֶּאֱמַר (יונה ב, יא): וַיֹּאמֶר ה' לַדָּג וַיָּקֵא אֶת יוֹנָה.", "english": "Rabbi Yoḥanan said: The Holy One, blessed be He, made a condition with the sea that it would split before Israel, as it is said: “And the sea returned to its strength”—to its condition. Rabbi Yirmiyah ben Elazar said: Not only with the sea did He make a condition, but with everything created in the six days of Creation… ‘I commanded the sea to split before Israel; I commanded the heavens and the earth to be silent before Moshe… I commanded the sun and moon to stand before Yehoshua… I commanded the ravens to feed Eliyahu… I commanded the fire not to harm Ḥananya, Misha’el, and Azarya… the lions not to harm Daniel… the heavens to open for Yeḥezkel… the fish to vomit Yonah…’"}, {"location": "Devarim Rabbah 2:1", "hebrew": "אָמַר רַבִּי יוֹחָנָן עֲשָׂרָה לְשׁוֹנוֹת נִקְרֵאת תְּפִלָּה, וְאֵלּוּ הֵן: שַׁוְעָה, צְעָקָה, נְאָקָה, רִנָּה, פְּגִיעָה, בִּצּוּר, קְרִיאָה, נִפּוּל וּפִלּוּל וְתַחֲנוּנִים. שַׁוְעָה צְעָקָה, שֶׁנֶּאֱמַר (שמות ב, כג): וַיֵּאָנְחוּ בְנֵי יִשְׂרָאֵל מִן הָעֲבֹדָה וַיִּזְעָקוּ וגו'. נְאָקָה, דִּכְתִיב (תהלים י, כד): וַיִּשְׁמַע אֱלֹהִים אֶת נַאֲקָתָם. רִנָּה וּפְגִיעָה, דִּכְתִיב (ירמיה ז, טז): אַל תִּתְפַּלֵּל בְּעַד הָעָם הַזֶּה וְאַל תִּשָֹּׂא בַּעֲדָם רִנָּה וּתְפִלָּה וְאַל תִּפְגַּע בִּי. בִּצּוּר וּקְרִיאָה, דִּכְתִיב (תהלים יח, ז): בַּצַּר לִי אֶקְרָא ה'. נִפּוּל, דִּכְתִיב (דברים ט, יח): וָאֶתְנַפַּל לִפְנֵי ה'. פִּלּוּל, דִּכְתִיב (תהלים קו, ל): וַיַּעֲמֹד פִּינְחָס וַיְפַלֵּל. וְתַחֲנוּנִים, דִּכְתִיב: וָאֶתְחַנַּן אֶל ה'. וּמִכֻּלָּן לֹא נִתְפַּלֵל משֶׁה אֶלָּא בִּלְשׁוֹן תַּחֲנוּנִים. אָמַר רַבִּי יוֹחָנָן, מִכָּאן אַתָּה לָמֵד, שֶׁאֵין לִבְרִיָה כְּלוּם אֵצֶל בּוֹרְאָה, שֶׁהֲרֵי משֶׁה רַבָּן שֶׁל כָּל הַנְּבִיאִים לֹא בָא אֶלָּא בִּלְשׁוֹן תַּחֲנוּנִים.", "english": "Rabbi Yoḥanan said: Prayer is called by ten expressions: supplication, outcry, groan, song, entreaty, distress, calling, falling, pleading, and requests. He cites verses for each. From all of them, Moshe prayed only in the language of requests (“Va’etḥannan”). Rabbi Yoḥanan said: From here you learn that a creature has nothing before its Creator—for Moshe, master of all prophets, came only with requests."}, {"location": "Shemot Rabbah 47:5", "hebrew": "וַיְהִי שָׁם עִם ה', וְכִי אֶפְשָׁר לוֹ לְאָדָם לִהְיוֹת אַרְבָּעִים יוֹם בְּלֹא מַאֲכָל וּבְלֹא מִשְׁתֶּה, רַבִּי תַּנְחוּמָא בְּשֵׁם רַבִּי אֶלְעָזָר בֶּן רַבִּי אָבִין בְּשֵׁם רַבִּי מֵאִיר אוֹמֵר, הַמָּשָׁל אוֹמֵר אֲזַלְתְּ לְקַרְתָּא הַלֵּךְ בְּנִימוּסֶיהָ, לְמַעְלָה שֶׁאֵין אֲכִילָה וּשְׁתִיָּה עָלָה משֶׁה וְנִדְמָה לָהֶם, לְמַטָּה שֶׁיֵּשׁ אֲכִילָה וּשְׁתִיָּה יָרְדוּ מַלְאֲכֵי הַשָּׁרֵת וְאָכְלוּ וְשָׁתוּ, שֶׁנֶּאֱמַר (בראשית יח, ח): וְהוּא עֹמֵד עֲלֵיהֶם תַּחַת הָעֵץ וַיֹּאכֵלוּ,", "english": "And he was there with the LORD—can a human being really be forty days without food or drink? Rabbi Tanḥuma said in the name of Rabbi Elazar son of Rabbi Avin in the name of Rabbi Meir: The proverb says: When you go to a town, follow its customs. Above, where there is no eating or drinking, Moses went up and appeared like them; below, where there is eating and drinking, the ministering angels came down and ate and drank, as it says: “And he stood over them under the tree, and they ate.”"}, {"location": "Eruvin 13b", "hebrew": "תָּנוּ רַבָּנַן: שְׁתֵּי שָׁנִים וּמֶחֱצָה נֶחְלְקוּ בֵּית שַׁמַּאי וּבֵית הִלֵּל. הַלָּלוּ אוֹמְרִים: נוֹחַ לוֹ לְאָדָם שֶׁלֹּא נִבְרָא יוֹתֵר מִשֶּׁנִּבְרָא, וְהַלָּלוּ אוֹמְרִים: נוֹחַ לוֹ לְאָדָם שֶׁנִּבְרָא יוֹתֵר מִשֶּׁלֹּא נִבְרָא. נִמְנוּ וְגָמְרוּ: נוֹחַ לוֹ לְאָדָם שֶׁלֹּא נִבְרָא יוֹתֵר מִשֶּׁנִּבְרָא, עַכְשָׁיו שֶׁנִּבְרָא — יְפַשְׁפֵּשׁ בְּמַעֲשָׂיו. וְאָמְרִי לַהּ: יְמַשְׁמֵשׁ בְּמַעֲשָׂיו.", "english": "The Sages taught: For two and a half years Beit Shammai and Beit Hillel disputed. These said: It would have been better for a person not to have been created than to have been created. Those said: It would have been better for a person to have been created than not to have been created. They counted and concluded: It would have been better for a person not to have been created than to have been created; now that one has been created—let one examine one’s deeds. And some say: Let one scrutinize one’s deeds."}, {"location": "Berakhot 54a", "hebrew": "חַיָּיב אָדָם לְבָרֵךְ עַל הָרָעָה כְּשֵׁם שֶׁמְּבָרֵךְ עַל הַטּוֹבָה, שֶׁנֶּאֱמַר: ״וְאָהַבְתָּ אֵת ה׳ אֱלֹהֶיךָ בְּכׇל לְבָבְךָ וְגוֹ׳״. ״בְּכָל לְבָבְךָ״ — בִּשְׁנֵי יְצָרֶיךָ, בְּיֵצֶר טוֹב וּבְיֵצֶר הָרָע. ״וּבְכׇל נַפְשְׁךָ״ — אֲפִילּוּ הוּא נוֹטֵל אֶת נַפְשְׁךָ. ״וּבְכׇל מְאֹדֶךָ״ — בְּכָל מָמוֹנְךָ. דָּבָר אַחֵר: ״בְּכָל מְאֹדֶךָ״ — בְּכָל מִדָּה וּמִדָּה שֶׁהוּא מוֹדֵד לְךָ הֱוֵי מוֹדֶה לוֹ.", "english": "A person is obligated to bless over the bad just as one blesses over the good, as it is said: “You shall love the LORD your God with all your heart…” “With all your heart”—with your two inclinations, the good inclination and the evil inclination. “With all your soul”—even if He takes your soul. “With all your might”—with all your wealth. Another interpretation: “With all your might”—with whatever measure He measures out to you, acknowledge Him."}, {"location": "Bereishit Rabbah 65:20", "hebrew": "אַבָּא בַּר כַּהֲנָא לֹא עָמְדוּ פִּילוֹסוֹפִין בָּעוֹלָם כְּבִלְעָם בֶּן בְּעוֹר וּכְאַבְנִימוֹס הַגַּרְדִּי, נִתְכַּנְסוּ כָּל עוֹבְדֵי כּוֹכָבִים אֶצְלוֹ, אָמְרוּ לוֹ תֹּאמַר שֶׁאָנוּ יְכוֹלִים לִזְדַּוֵּג לְאֻמָּה זוֹ, אָמַר לְכוּ וְחִזְּרוּ עַל בָּתֵּי כְנֵסִיּוֹת וְעַל בָּתֵּי מִדְרָשׁוֹת שֶׁלָּהֶן, וְאִם מְצָאתֶם שָׁם תִּינוֹקוֹת מְצַפְצְפִין בְּקוֹלָן אֵין אַתֶּם יְכוֹלִים לְהִזְדַּוֵּג לָהֶם, שֶׁכָּךְ הִבְטִיחָן אֲבִיהֶן וְאָמַר לָהֶם, הַקֹּל קוֹל יַעֲקֹב, בִּזְמַן שֶׁקּוֹלוֹ שֶׁל יַעֲקֹב מָצוּי בְּבָתֵּי כְנֵסִיּוֹת אֵין הַיָּדַיִם יְדֵי עֵשָׂו, וְאִם לָאו, הַיָּדַיִם יְדֵי עֵשָׂו, אַתֶּם יְכוֹלִים לָהֶם.", "english": "Abba bar Kahana said: No philosophers arose in the world like Balaam son of Beor and like Avnimos the weaver. All the idolaters gathered to him and said: Tell us—can we prevail against this nation? He said to them: Go and look in their synagogues and study-halls; if you find there children chirping with their voices, you cannot prevail against them—for thus their Father promised them: “The voice is the voice of Jacob.” When Jacob’s voice is found in the synagogues, the hands are not the hands of Esau; and if not, the hands are the hands of Esau—you can prevail."}, {"location": "Bava Metzia 59a", "hebrew": "אָמַר רַב: לְעוֹלָם יְהֵא אָדָם זָהִיר בְּאוֹנָאַת אִשְׁתּוֹ, שֶׁמִּתּוֹךְ שֶׁדִּמְעָתָהּ מְצוּיָה, אוֹנָאָתָהּ קְרוֹבָה.", "english": "Rav said: A person should always be careful not to mistreat his wife, for since her tears are ready at hand, the punishment for her mistreatment is close at hand."}, {"location": "Vayikra Rabbah 21:4", "hebrew": "אָמַר רַבִּי יוֹחָנָן לְעוֹלָם יַעֲשֶׂה אָדָם עַצְמוֹ קַבַּרְנִיט הָאֵיךְ יָכוֹל לַעֲשׂוֹת מִצְוָה.", "english": "Rabbi Yoḥanan said: A person should always make himself like a captain—how can I do a mitzvah?"}, {"location": "Derech Eretz Rabbah 6:2", "hebrew": "לעולם לא יהא אדם קפדן בתוך סעודתו. מעשה בהלל הזקן שעשה סעודה לאדם א׳ ובא עני ועמד על פתחו. ואמר אשה אני צריך להכניס היום ואין לי פרנסה כלום. נטלה אשתו כל הסעודה ונתנה לו. ואח״כ לשה עיסה אחרת ובישלה אלפס אחר ובאתה והניחה לפניהם. אמר לה בתי מפני מה לא הבאת לנו מיד. שחה לו כל המעשים. אמר לה בתי אף אני לא דנתי אותך לכף חובה אלא לכף זכות. שכל המעשים שעשית לא עשית אלא לשם שמים:", "english": "A person should never be short-tempered during a meal. A story: Hillel the Elder made a meal for a man. A poor person came and stood at his doorway and said: I must bring in a bride today, and I have no means at all. Hillel’s wife took the entire meal and gave it to him. Afterwards she kneaded other dough, cooked another pot, and brought it and set it before them. He said to her: My daughter, why didn’t you bring it to us immediately? She told him everything. He said: My daughter, I did not judge you unfavorably, but favorably—for everything you did, you did only for the sake of Heaven."}, {"location": "Megillah 25b", "hebrew": "תַּנְיָא, רַבִּי שִׁמְעוֹן בֶּן אֶלְעָזָר אוֹמֵר: לְעוֹלָם יְהֵא אָדָם זָהִיר בִּתְשׁוּבוֹתָיו, שֶׁמִּתּוֹךְ תְּשׁוּבָה שֶׁהֱשִׁיבוֹ אַהֲרֹן לְמֹשֶׁה פָּקְרוּ הַמְעַרְעֲרִים, שֶׁנֶּאֱמַר: ״וָאַשְׁלִיכֵהוּ בָאֵשׁ וַיֵּצֵא הָעֵגֶל הַזֶּה״.", "english": "It was taught: Rabbi Shimon ben Elazar says: A person should always be careful with his replies, for through the reply that Aaron gave Moses, the skeptics found an opening, as it is said: “I threw it into the fire, and out came this calf.”"}, {"location": "Pesachim 3a", "hebrew": "אָמַר רַבִּי יְהוֹשֻׁעַ בֶּן לֵוִי: לְעוֹלָם אַל יוֹצִיא אָדָם דָּבָר מְגוּנֶּה מִפִּיו, שֶׁהֲרֵי עִקֵּם הַכָּתוּב שְׁמוֹנֶה אוֹתִיּוֹת, וְלֹא הוֹצִיא דָּבָר מְגוּנֶּה מִפִּיו. שֶׁנֶּאֱמַר: ״מִן הַבְּהֵמָה הַטְּהוֹרָה וּמִן הַבְּהֵמָה אֲשֶׁר אֵינֶנָּה טְהֹרָה״. רַב פָּפָּא אָמַר: תֵּשַׁע, שֶׁנֶּאֱמַר: ״כִּי יִהְיֶה בְךָ אִישׁ אֲשֶׁר לֹא יִהְיֶה טָהוֹר מִקְּרֵה לָיְלָה״. רָבִינָא אָמַר: עֶשֶׂר, וָיו דְּ״טָהוֹר״. רַב אַחָא בַּר יַעֲקֹב אָמַר: שֵׁשׁ עֶשְׂרֵה, שֶׁנֶּאֱמַר: ״כִּי אָמַר מִקְרֶה הוּא בִּלְתִּי טָהוֹר הוּא כִּי לֹא טָהוֹר״. תַּנְיָא דְּבֵי רַבִּי יִשְׁמָעֵאל: לְעוֹלָם יְסַפֵּר אָדָם בְּלָשׁוֹן נְקִיָּה, שֶׁהֲרֵי בַּזָּב קְרָאוֹ ״מֶרְכָּב״, וּבָאִשָּׁה קְרָאוֹ ״מוֹשָׁב״. וְאוֹמֵר: ״וְתִבְחַר לְשׁוֹן עֲרוּמִים״. וְאוֹמֵר: ״וְדַעַת שְׂפָתַי בָּרוּר מִלֵּלוּ״. מַאי ״וְאוֹמֵר״? וְכִי תֵּימָא: הָנֵי מִילֵּי בִּדְאוֹרָיְיתָא, אֲבָל בִּדְרַבָּנַן לָא — תָּא שְׁמַע: וְאוֹמֵר ״וְתִבְחַר לְשׁוֹן עֲרוּמִים״. וְכִי תֵּימָא: הָנֵי מִילֵּי בִּדְרַבָּנַן, אֲבָל בְּמִילֵּי דְעָלְמָא לָא — וְאוֹמֵר ״וְדַעַת שְׂפָתַי בָּרוּר מִלֵּלוּ״.", "english": "Rabbi Yehoshua ben Levi said: A person should never let an indecent word leave his mouth, for Scripture used an extra eight letters and did not utter an indecent word, as it says: “From the pure animal and from the animal that is not pure.” … The school of Rabbi Yishmael taught: A person should always speak in clean language…"}, {"location": "Tanna Devei Eliyahu Zuta 1", "hebrew": "משום דבי אליהו אמרו לעולם יהא אדם כשור לעול וכחמור למשא וכבהמה שחורשת בבקעה ובשדה כך יהא אדם עוסק וחורש בד\"ת בכל יום תמיד שנאמר (שם לב) אשריכם זורעי על כל מים ואין מים אלא ד\"ת שנאמר (שם נה) הוי כל צמא לכו למים.", "english": "In the name of the school of Elijah they said: A person should always be like an ox to the yoke, like a donkey to the burden, like an animal that plows in valley and field—so should a person toil and plow in words of Torah every day continually, as it says: “Happy are you who sow by all waters”—and ‘water’ means Torah."}, {"location": "Pesachim 3b", "hebrew": "אָמַר רַב הוּנָא אָמַר רַב מִשּׁוּם רַבִּי מֵאִיר: לְעוֹלָם יִשְׁנֶה אָדָם לְתַלְמִידוֹ דֶּרֶךְ קְצָרָה.", "english": "Rav Huna said Rav said in the name of Rabbi Meir: A person should always teach his student in a short way."}, {"location": "Bamidbar Rabbah 10:1", "hebrew": "כֻּלּוֹ מַחֲמַדִּים, רַבִּי חִיָּא בַּר אַבָּא בַּנֹּהַג שֶׁבָּעוֹלָם פּוֹעֵל עוֹשֶׂה עִם בַּעַל הַבַּיִת, עַל יְדֵי שֶׁהוּא מְנַבֵּל עַצְמוֹ בַּטִּיט הוּא נוֹתֵן לוֹ שְׂכָרוֹ, אֲבָל הַקָּדוֹשׁ בָּרוּךְ הוּא מַזְהִיר אֶת יִשְׂרָאֵל וְאוֹמֵר לָהֶן אַל תְּנַבְּלוּ עַצְמְכֶם בְּדָבָר רָע וַאֲנִי נוֹתֵן לָכֶם שְׂכַרְכֶם, הֲדָא הוּא דִכְתִיב (ויקרא יא, מג מד): אַל תְּשַׁקְּצוּ אֶת נַפְשֹׁתֵיכֶם בְּכָל הַשֶּׁרֶץ הַשֹּׁרֵץ וגו' כִּי אֲנִי ה' וגו', מַהוּ אֲנִי ה', נֶאֱמָן אֲנִי לְשַׁלֵּם מַתַּן שָׂכָר עַל כָּךְ, אֶתְמְהָה, הֱוֵי: כֻּלּוֹ מַחֲמַדִּים.", "english": "“All of him is delights”: In the way of the world, a laborer works for the householder; because he soils himself in mud, he gives him his wages. But the Holy One, blessed be He, warns Israel and says: Do not defile yourselves with an evil thing—and I will give you your reward… “I am the LORD”—I am faithful to pay the reward for this."}, {"location": "Tosefta Horayot 2:7", "hebrew": "מְנַיִן שֶׁכָּל הַשׁוֹנֶּה פֶּרֶק אֶחָד לַחֲבֵרוֹ, מַעֲלֶה עָלָיו הַכָּתוּב כְּאִלּוּ יְצָרוֹ וְרִקְּמוֹ וְהֵבִיאוֹ לָעוֹלָם? שֶׁנֶּאֱמַר: (ירמיה טו:יט) \"וְאִם תּוֹצִיא יָקָר מִזּוֹלֵל כְּפִי תִהְיֶה\" - כְּאוֹתוֹ הַפֶּה שֶׁזָּרָק בּוֹ נְשָׁמָה בָּאָדָם, כָּךְ כָּל הַמַּכְנִיס בִרְיָה אַחַת תַּחַת כַּנְפֵי הַשָּׁמַיִם, מַעֲלִין עָלָיו כְּאִלּוּ יְצָרוֹ וְרִקְּמוֹ וְהֵבִיאוֹ לָעוֹלָם.", "english": "From where do we learn that anyone who teaches one chapter to his fellow, Scripture considers it as though he formed him, fashioned him, and brought him into the world? As it says: “If you bring out the precious from the worthless, you shall be as My mouth.”"}, {"location": "Midrash Tanchuma, Ki Tavo 4", "hebrew": "וְהָיָה אִם שָׁמוֹעַ תִּשְׁמַע... דָּבָר אַחֵר, אִם שָׁמַעְתָּ בָּעוֹלָם הַזֶּה, תִּשְׁמַע לָעוֹלָם הַבָּא מִפִּי הַקָּדוֹשׁ בָּרוּךְ הוּא. אָמַר רַבִּי יוֹנָה אָבִיו שֶׁל רַבִּי מָנָא בְּשֵׁם רַבִּי לֵוִי שֶׁאָמַר בְּשֵׁם רַבִּי אַבָּא, לֹא הָיְתָה הַתּוֹרָה צְרִיכָה לִינָּתֵן לְיִשְׂרָאֵל בָּעוֹלָם הַזֶּה. לָמָּה, שֶׁהַכֹּל עֲתִידִין לִהְיוֹת לְמֵדִין תּוֹרָה מִפִּי הַקָּדוֹשׁ בָּרוּךְ הוּא לָעוֹלָם הַבָּא. לָמָּה נִתְּנָה לָהֶם בָּעוֹלָם הַזֶּה? שֶׁכְּשֶׁיָּבֹא הַקָּדוֹשׁ בָּרוּךְ הוּא לְלַמְּדָם בָּעוֹלָם הַבָּא, יִהְיוּ הַכֹּל יוֹדְעִין בְּאֵיזֶה פָּרָשָׁה הוּא עָסוּק. לְפִיכָךְ, אִם שָׁמוֹעַ בָּעוֹלָם הַזֶּה, תִּשְׁמַע לָעוֹלָם הַבָּא מִפִּי הַקָּדוֹשׁ בָּרוּךְ הוּא.", "english": "“And it shall be, if you surely listen…” Another interpretation: If you listened in this world, you will listen in the World to Come from the mouth of the H
