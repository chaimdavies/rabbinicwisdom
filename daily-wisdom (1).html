<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2c2418">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Wisdom">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Daily Wisdom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Frank+Ruhl+Libre:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#faf8f5;--fg:#2c2418;--muted:#6b6050;--faint:#8a7e6e;--border:#e8e0d4;
  --accent:#b8a88a;--card:#fff;--success:#4a7c59;
  --font-body:'Cormorant Garamond','Georgia',serif;
  --font-hebrew:'Frank Ruhl Libre','David',serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);font-family:var(--font-body);color:var(--fg);overflow-x:hidden}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}

/* Header */
.header{
  position:sticky;top:0;z-index:10;background:var(--bg);
  border-bottom:1px solid #d4c5b0;
  padding:16px 20px;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:640px;margin:0 auto}
.header h1{font-size:18px;font-weight:500;letter-spacing:0.04em;color:var(--fg)}
.header .sub{font-size:11px;color:var(--faint);letter-spacing:0.06em;margin-top:1px}
.nav{display:flex;gap:6px}
.nav button{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:6px;padding:6px 12px;font-size:12px;font-family:var(--font-body);
  cursor:pointer;font-weight:500;transition:all 0.2s;
}
.nav button.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}

/* Main */
.main{max-width:640px;margin:0 auto;padding:24px 20px 100px}

/* Day view */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.day-nav button{
  background:none;border:none;font-size:24px;color:var(--muted);
  cursor:pointer;padding:8px 12px;font-family:var(--font-body);
  transition:color 0.2s;
}
.day-nav button:disabled{color:var(--border);cursor:default}
.day-nav .center{text-align:center}
.day-nav .today-badge{font-size:11px;color:var(--faint);letter-spacing:0.12em;font-weight:500;margin-bottom:2px}
.day-nav h2{font-size:28px;font-weight:300;color:var(--fg)}
.source-loc{
  text-align:center;font-size:13px;color:var(--muted);
  letter-spacing:0.08em;font-weight:500;margin-bottom:24px;text-transform:uppercase;
}

/* Hebrew card */
.hebrew-card{
  text-align:center;direction:rtl;margin-bottom:24px;padding:20px;
  background:var(--card);border-radius:10px;border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.hebrew-card p{
  font-family:var(--font-hebrew);font-size:17px;line-height:1.9;color:var(--fg);
  transition:max-height 0.4s ease;
}
.hebrew-card p.collapsed{max-height:200px;overflow:hidden}
.hebrew-card .expand-btn{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,var(--card) 50%);
  border:none;padding:36px 0 10px;cursor:pointer;
  font-family:var(--font-body);font-size:13px;color:var(--faint);font-style:italic;
  direction:ltr;
}
.hebrew-card .collapse-btn{
  background:none;border:none;cursor:pointer;margin-top:10px;
  font-family:var(--font-body);font-size:13px;color:var(--faint);font-style:italic;direction:ltr;
}

/* English */
.english{
  text-align:center;margin-bottom:36px;padding:0 4px;
  font-size:15px;line-height:1.75;color:#3d3426;font-style:italic;
}

/* Divider */
.divider{width:50px;height:1px;background:#d4c5b0;margin:0 auto 36px}

/* Reflection */
.reflection-title{
  text-align:center;font-size:17px;font-weight:400;font-style:italic;
  color:var(--muted);margin-bottom:16px;
}
textarea{
  width:100%;min-height:140px;padding:14px 16px;
  font-family:var(--font-body);font-size:15px;line-height:1.7;color:var(--fg);
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  resize:vertical;outline:none;transition:border-color 0.2s;
}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--accent);font-style:italic}
.save-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
.save-row .timestamp{font-size:11px;color:#a89e8e}
.save-btn{
  background:var(--fg);color:var(--bg);border:none;border-radius:8px;
  padding:11px 24px;font-size:14px;font-family:var(--font-body);
  font-weight:500;cursor:pointer;letter-spacing:0.04em;transition:all 0.3s;
  margin-left:auto;
}
.save-btn:disabled{background:#d4c5b0;cursor:default}
.save-btn.saved{background:var(--success)}

/* Journal */
.journal-header h2{font-size:26px;font-weight:400;margin-bottom:6px}
.journal-header .count{color:var(--faint);font-size:14px;margin-bottom:28px}
.journal-entry{
  padding:16px 20px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;transition:border-color 0.2s;margin-bottom:14px;
}
.journal-entry:active{border-color:var(--accent)}
.journal-entry .meta{display:flex;justify-content:space-between;margin-bottom:6px}
.journal-entry .day-label{font-size:12px;color:var(--faint);font-weight:500;letter-spacing:0.05em}
.journal-entry .date{font-size:11px;color:#a89e8e}
.journal-entry .source-name{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px}
.journal-entry .text{font-size:14px;color:var(--fg);line-height:1.6}
.empty{text-align:center;padding:50px 0;color:var(--faint)}
.empty p:first-child{font-size:17px;font-style:italic}
.empty p:last-child{font-size:13px;margin-top:6px}

/* Browse grid */
.browse h2{font-size:26px;font-weight:400;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:5px}
.grid button{
  background:var(--card);color:var(--muted);border:1px solid var(--border);
  border-radius:5px;padding:8px 2px;font-size:11px;font-family:var(--font-body);cursor:pointer;
  transition:all 0.15s;
}
.grid button.is-today{background:var(--fg);color:var(--bg);font-weight:600;border-color:var(--fg)}
.grid button.is-current{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid button.has-reflection{border-color:var(--success);position:relative}
.grid button.has-reflection::after{
  content:'✓';position:absolute;top:1px;right:2px;font-size:7px;color:var(--success);font-weight:700;
}
.browse .legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.browse .legend span{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:4px}
.browse .legend .dot{width:10px;height:10px;border-radius:2px;border:1px solid var(--border)}
.browse .legend .dot.today-dot{background:var(--fg);border-color:var(--fg)}
.browse .legend .dot.refl-dot{background:var(--card);border-color:var(--success);position:relative}

/* Settings */
.settings h2{font-size:26px;font-weight:400;margin-bottom:24px}
.settings .field{margin-bottom:24px}
.settings label{display:block;font-size:13px;color:var(--faint);letter-spacing:0.05em;font-weight:500;margin-bottom:8px}
.settings input[type="date"]{
  font-family:var(--font-body);font-size:15px;color:var(--fg);
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;width:100%;outline:none;
}
.settings input[type="date"]:focus{border-color:var(--accent)}
.settings .hint{font-size:12px;color:#a89e8e;margin-top:6px;line-height:1.5}
.settings .actions{display:flex;gap:10px;margin-top:8px}
.settings .actions button{
  font-family:var(--font-body);font-size:13px;border-radius:6px;padding:8px 18px;
  cursor:pointer;font-weight:500;transition:all 0.2s;
}
.settings .btn-primary{background:var(--fg);color:var(--bg);border:none}
.settings .btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.settings .current-info{
  padding:14px 18px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;margin-bottom:20px;font-size:14px;line-height:1.6;color:var(--fg);
}

/* Loading spinner */
.loading{text-align:center;color:var(--faint);font-style:italic;padding:20px}

@media(max-width:360px){
  .header h1{font-size:16px}
  .nav button{padding:5px 8px;font-size:11px}
  .day-nav h2{font-size:24px}
  .hebrew-card p{font-size:15px}
  .english{font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>Daily Wisdom</h1>
      <div class="sub">406 DAYS OF TORAH REFLECTION</div>
    </div>
    <div class="nav">
      <button id="btn-today" class="active" onclick="showView('today',true)">Today</button>
      <button id="btn-browse" onclick="showView('browse')">Browse</button>
      <button id="btn-journal" onclick="showView('journal')">Journal</button>
      <button id="btn-settings" onclick="showView('settings')" style="font-size:15px;padding:5px 10px">⚙</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="view-today"></div>
  <div id="view-browse" style="display:none"></div>
  <div id="view-journal" style="display:none"></div>
  <div id="view-settings" style="display:none"></div>
</div>

<script>
const SOURCES = [{"location": "Bereishit Rabbah 93:4", "hebrew": "דָּבָר אַחֵר, וַיִּגַּשׁ אֵלָיו יְהוּדָה וגו', כְּתִיב (משלי כ, ה): מַיִם עֲמֻקִּים עֵצָה בְלֶב אִישׁ וגו', לִבְאֵר עֲמֻקָּה מְלֵאָה צוֹנֵן וְהָיוּ מֵימֶיהָ צוֹנְנִין וְיָפִין וְלֹא הָיְתָה בְּרִיָּה יְכוֹלָה לִשְׁתּוֹת הֵימֶנָּה, בָּא אֶחָד וְקָשַׁר חֶבֶל בְּחֶבֶל וְנִימָה בְּנִימָה מְשִׁיחָה בִּמְשִׁיחָה וְדָלָה הֵימֶנָּה וְשָׁתָה, הִתְחִילוּ הַכֹּל דּוֹלִין הֵימֶנָּה וְשׁוֹתִין, כָּךְ לֹא זָז יְהוּדָה מֵשִׁיב לְיוֹסֵף דָּבָר עַל דָּבָר עַד שֶׁעָמַד עַל לִבּוֹ.", "english": "Another interpretation: “Then Yehudah approached him…” as it is written (Mishlei 20:5): “Deep waters are counsel in a man’s heart…”—like a deep well filled with cool water, whose waters were cool and pleasant, yet no creature could drink from it. One came and tied rope to rope, strand to strand, cord to cord, and drew from it and drank. Then everyone began drawing from it and drinking. So too, Yehudah did not cease answering Yosef, word upon word, until he stood upon his heart (i.e., reached what was in his heart)."}, {"location": "Bereishit Rabbah 8:5", "hebrew": "אָמַר רַבִּי סִימוֹן, בְּשָׁעָה שֶׁבָּא הַקָּדוֹשׁ בָּרוּךְ הוּא לִבְרֹאת אֶת אָדָם הָרִאשׁוֹן, נַעֲשׂוּ מַלְאֲכֵי הַשָּׁרֵת כִּתִּים כִּתִּים, וַחֲבוּרוֹת חֲבוּרוֹת, מֵהֶם אוֹמְרִים אַל יִבָּרֵא, וּמֵהֶם אוֹמְרִים יִבָּרֵא, הֲדָא הוּא דִכְתִיב (תהלים פה, יא): חֶסֶד וֶאֱמֶת נִפְגָּשׁוּ צֶדֶק וְשָׁלוֹם נָשָׁקוּ. חֶסֶד אוֹמֵר יִבָּרֵא, שֶׁהוּא גּוֹמֵל חֲסָדִים. וֶאֱמֶת אוֹמֵר אַל יִבָּרֵא, שֶׁכֻּלּוֹ שְׁקָרִים. צֶדֶק אוֹמֵר יִבָּרֵא, שֶׁהוּא עוֹשֶׂה צְדָקוֹת. שָׁלוֹם אוֹמֵר אַל יִבָּרֵא, דְּכוּלֵיהּ קְטָטָה. מֶה עָשָׂה הַקָּדוֹשׁ בָּרוּךְ הוּא נָטַל אֱמֶת וְהִשְׁלִיכוֹ לָאָרֶץ, הֲדָא הוּא דִכְתִיב (דניאל ח, יב): וְתַשְׁלֵךְ אֱמֶת אַרְצָה, אָמְרוּ מַלְאֲכֵי הַשָּׁרֵת לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא, רִבּוֹן הָעוֹלָמִים מָה אַתָּה מְבַזֶּה תַּכְסִיס אַלְטִיכְסְיָה שֶׁלָּךְ, תַּעֲלֶה אֱמֶת מִן הָאָרֶץ, הֲדָא הוּא דִכְתִיב (תהלים פה, יב): אֱמֶת מֵאֶרֶץ תִּצְמָח. רַבָּנָן אָמְרֵי לָהּ בְּשֵׁם רַבִּי חֲנִינָא בַּר אִידֵי וְרַבִּי פִּינְחָס וְרַבִּי חֶלְקִיָּה בְּשֵׁם רַבִּי סִימוֹן אָמַר, מְאֹד, הוּא אָדָם. הֲדָא הוּא דִכְתִיב (בראשית א, לא): וַיַּרְא אֱלֹהִים אֶת כָּל אֲשֶׁר עָשָׂה וְהִנֵּה טוֹב מְאֹד, וְהִנֵּה טוֹב אָדָם. רַב הוּנָא רַבָּהּ שֶׁל צִפּוֹרִין אֲמַר עַד שֶׁמַּלְאֲכֵי הַשָּׁרֵת מִדַּיְּנִין אֵלּוּ עִם אֵלּוּ וּמִתְעַסְּקִין אֵלּוּ עִם אֵלּוּ בְּרָאוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא. אָמַר לָהֶן מָה אַתֶּם מִדַּיְּנִין כְּבָר נַעֲשָׂה אָדָם.", "english": "Rabbi Simon said: When the Holy One, blessed be He, came to create the first human, the ministering angels formed themselves into groups and factions. Some said: “Let him not be created,” and some said: “Let him be created.” This is what is written: “Kindness and truth met; righteousness and peace kissed” (Psalms 85:11). Kindness said: “Let him be created,” for he will perform acts of kindness. Truth said: “Let him not be created,” for he is entirely falsehood. Righteousness said: “Let him be created,” for he will do acts of righteousness. Peace said: “Let him not be created,” for he is entirely strife. What did the Holy One, blessed be He, do? He took Truth and cast it to the earth—this is what is written: “And it cast truth to the ground” (Daniel 8:12). The ministering angels said before the Holy One, blessed be He: “Master of the worlds! Why do You disgrace the very seal of Your court? Let Truth arise from the earth!” This is what is written: “Truth will sprout from the earth” (Psalms 85:12). The Rabbis said in the name of Rabbi Ḥanina bar Idi, and Rabbi Pinḥas, and Rabbi Ḥelkiyah, in the name of Rabbi Simon: “Very” is the human. This is what is written: “And God saw all that He had made, and behold, it was very good” (Genesis 1:31)—“and behold, it was good”: this is the human. Rav Huna, the elder of Tzippori, said: While the ministering angels were still debating with one another, the Holy One, blessed be He, created him. He said to them: “Why are you debating? The human has already been made.”"}, {"location": "Bereishit Rabbah 12:15", "hebrew": "אִם בּוֹרֵא אֲנִי אֶת הָעוֹלָם בְּמִדַּת הָרַחֲמִים, הֲוֵי חֶטְיָיה סַגִּיאִין. בְּמִדַּת הַדִּין, הָאֵיךְ הָעוֹלָם יָכוֹל לַעֲמֹד. אֶלָּא... עֵרַב חֲמִין בְּצוֹנֵן", "english": "If I create the world with the attribute of mercy, its sins will be many. With the attribute of strict justice—how can the world endure? Rather… He mixed the hot with the cold (i.e., mercy with judgment)."}, {"location": "Eichah Rabbah 5:22", "hebrew": "כִּי אִם מָאֹס מְאַסְתָּנוּ קָצַפְתָּ עָלֵינוּ עַד מְֹאד, אָמַר רַבִּי שִׁמְעוֹן בֶּן לָקִישׁ אִם מְאִיסָה הִיא לֵית סְבָר, וְאִם קְצִיפָה הִיא, אִית סְבָר, דְּכָל מַאן דְּכָעֵיס סוֹפֵיהּ לְאִיתְרַצְּיָא.", "english": "“For if You have utterly rejected us, You have raged against us exceedingly.” Rabbi Shimon ben Lakish said: If it is rejection, there is no hope; but if it is anger, there is hope— for whoever becomes angry ultimately becomes appeased."}, {"location": "Vayikra Rabbah 9:3", "hebrew": "מַעֲשֶׂה בְּרַבִּי יַנַּאי שֶׁהָיָה מְהַלֵּךְ בַּדֶּרֶךְ וְרָאָה אָדָם אֶחָד שֶׁהָיָה מְשֻׁפַּע בְּיוֹתֵר, אֲמַר לֵיהּ מַשְׁגַּח רַבִּי מִתְקַבְּלָא גַבָּן, אֲמַר לוֹ אִין, הִכְנִיסוֹ לְבֵיתוֹ הֶאֱכִילוֹ וְהִשְׁקָהוּ, בְּדָקוֹ בְּמִקְרָא וְלֹא מְצָאוֹ, בְּמִשְׁנָה וְלֹא מְצָאוֹ, בְּאַגָּדָה וְלֹא מְצָאוֹ, בְּתַלְמוּד וְלֹא מְצָאוֹ, אֲמַר לֵיהּ סַב בְּרִיךְ, אֲמַר לֵיהּ יְבָרֵךְ יַנַּאי בְּבֵיתֵיהּ, אֲמַר לֵיהּ אִית בָּךְ אֲמַר מַה דַּאֲנָא אֲמַר לָךְ, אֲמַר לֵיהּ אִין, אֲמַר לֵיהּ אֱמֹר אָכוֹל כַּלְבָּא פִּיסְתְּיָא דְּיַנַּאי, קָם תַּפְסֵיהּ אֲמַר לֵיהּ יְרוּתָתִי גַבָּךְ דְּאַתְּ מוֹנֵעַ לִי, אֲמַר לֵיהּ וּמַה יַרְתּוּתָךְ גַבִּי, אֲמַר לֵיהּ חַד זְמַן הֲוֵינָא עָבַר קַמֵּי בֵּית סִפְרָא, וּשְׁמָעִית קָלְהוֹן דְּמֵנִיקַיָא אָמְרִין (דברים לג, ד): תּוֹרָה צִוָּה לָנוּ משֶׁה מוֹרָשָׁה קְהִלַּת יַעֲקֹב, מוֹרָשָׁה קְהִלַּת יַנַּאי אֵין כְּתִיב כָּאן אֶלָּא קְהִלַּת יַעֲקֹב. אֲמַר לֵיהּ לָמָּה זָכִיתָ לְמֵיכְלָא עַל פְּתוֹרִי, אֲמַר לוֹ מִיּוֹמַי לָא שְׁמָעִית מִילָא בִּישָׁא וְחִזַּרְתִּי לְמָרַהּ, וְלָא חָמֵית תְּרֵין דְּמִתְכַּתְּשִׁין דֵּין עִם דֵּין וְלָא יְהַבִית שְׁלָמָא בֵּינֵיהוֹן. אֲמַר לֵיהּ כָּל הֲדָא דֶּרֶךְ אֶרֶץ גַּבָּךְ וְקָרִיתָךְ כַּלְבָּא, קָרָא עֲלֵיהּ שָׁם דֶּרֶךְ, דְּשָׁיֵם אָרְחֵיהּ סַגֵּי שָׁוֵי,", "english": "A story about Rabbi Yannai: He was walking along the road and saw a man who was exceedingly well-dressed. He said to him: “Would the rabbi care to be my guest?” He said to him: “Yes.” He brought him into his house and fed him and gave him to drink. He examined him in Scripture and found nothing; in Mishnah and found nothing; in Aggadah and found nothing; in Talmud and found nothing. He said to him: “Take [the cup] and recite the blessing.” The man said to him: “May Yannai be blessed in his house.” He said to him: “Do you know to say what I say to you?” He said to him: “Yes.” He said to him: “Say: ‘A dog has eaten Yannai’s bread.’” He rose and seized him. He said to him: “My inheritance is with you, and you are withholding it from me.” He said to him: “What inheritance of yours is with me?” He said to him: “Once I passed by a schoolhouse and heard the voice of the children saying: ‘Moses commanded us the Torah, an inheritance of the congregation of Jacob’ (Deuteronomy 33:4). It does not say ‘the congregation of Yannai,’ but ‘the congregation of Jacob.’” He said to him: “Why have you merited to eat at my table?” He said to him: “In all my days I have not repeated an evil report to its subject; and I have not seen two people quarreling with one another without making peace between them.” He said to him: “All this proper conduct is in you, and I called you a dog!” He applied to him the verse about “the name of the way,” for one who sets his path aright is greatly worthy."}, {"location": "Sifrei, Vezot Habracha 345", "hebrew": "דבר אחר אל תהי קורא מאורשה אלא מורשה מלמד שהתורה מורשה לישראל משל למה הדבר דומה לבן מלכים שנשבה כשהוא קטן למדינת הים אם מבקש לחזור אפילו לאחר מאה שנה אינו בוש לחזור מפני שהוא אומר לירושתי אני חוזר כך תלמיד חכם שפירש מדברי תורה והלך לו לדברים אחרים אם מבקש לחזור אפילו לאחר מאה שנה אינו בוש לחזור מפני שהוא אומר לירושתי אני חוזר לכך נאמר מורשה קהלת יעקב", "english": "Another interpretation: Do not read “me’orasa,” but “morasha”—this teaches that the Torah is an inheritance for Yisrael. To what is the matter comparable? To a prince who was taken captive as a child to a distant land: if he seeks to return—even after a hundred years—he is not ashamed to return, for he says: “I return to my inheritance.” So too a talmid chacham who separated from words of Torah and went to other matters—if he seeks to return, even after a hundred years, he is not ashamed to return, for he says: “I return to my inheritance.” Therefore it says: “an inheritance of the congregation of Yaakov.”"}, {"location": "Shemot Rabbah 33:7", "hebrew": "דבר אחר: מורשה, אל תהי קורא מורשה, אלא מאורסה. מה חתן זה, כל זמן שלא נשא ארוסתו הוא הוה פראדורין לבית חמיו, משנשאה הרי אביה בא אצלה. כך עד שלא נתנה תורה לישראל: (שמות יט): ומשה עלה אל האלהים. משנתנה תורה, אמר הקדוש ברוך הוא למשה: ועשו לי מקדש ושכנתי בתוכם: דבר אחר: אל תהי קורא מורשה, אלא מאורסה. מלמד, שהתורה ארוסה לישראל, שנאמר (הושע ב): וארשתיך לי לעולם.", "english": "Another interpretation: “morasha”—do not read “morasha,” but “me’orasa” (betrothed). Just as a chasan: as long as he has not married his arusah, he goes as a frequent visitor (??? “pradorin”) to his father-in-law’s house; once he marries her, her father comes to her. So too, before the Torah was given to Yisrael: “And Moshe went up to HaElokim” (Shemos 19). After the Torah was given, HaKadosh Baruch Hu said to Moshe: “Make for Me a Mikdash, and I will dwell among them.” Another interpretation: Do not read “morasha,” but “me’orasa”—this teaches that the Torah is betrothed to Yisrael, as it says (Hoshea 2): “I will betroth you to Me forever.”"}, {"location": "Midrash Tanchuma, Vayakhel 1", "hebrew": "אַתְּ מוֹצֵא שְׁלֹשָׁה שֵׁמוֹת נִקְרְאוּ לוֹ לְאָדָם, אֶחָד מַה שֶּׁקּוֹרְאִים לוֹ אָבִיו וְאִמּוֹ, וְאֶחָד מַה שֶּׁקּוֹרְאִין לוֹ בְּנֵי אָדָם, וְאֶחָד מַה שֶּׁקּוֹנֶה הוּא לְעַצְמוֹ. טוֹב מִכֻּלָּן מַה שֶּׁקּוֹנֶה הוּא לְעַצְמוֹ. תֵּדַע לְךָ, שֶׁהֲרֵי בְּצַלְאֵל עַל יְדֵי שֶׁקָּנָה שֵׁם טוֹב, זָכָה שֶׁיַּעֲשֶׂה מְלֶאכֶת הַמִּשְׁכָּן.", "english": "You find that three names are called for a person: one, what his father and mother call him; one, what people call him; and one, what he acquires for himself. Best of all is what he acquires for himself. Know this: for Betzalel, through acquiring a good name, merited to do the work of the Mishkan."}, {"location": "Megillah 15a", "hebrew": "וְאָמַר רַבִּי אֶלְעָזָר אָמַר רַבִּי חֲנִינָא: כׇּל הָאוֹמֵר דָּבָר בְּשֵׁם אוֹמְרוֹ מֵבִיא גְּאוּלָּה לָעוֹלָם, שֶׁנֶּאֱמַר: ״וַתֹּאמֶר אֶסְתֵּר לַמֶּלֶךְ בְּשֵׁם מׇרְדֳּכָי״.", "english": "Rabbi Elazar said in the name of Rabbi Chanina: Whoever says a matter in the name of the one who said it brings ge’ulah to the world, as it is said: “And Esther told the king in the name of Mordechai.”"}, {"location": "Devarim Rabbah 2:37", "hebrew": "וְאָהַבְתָּ אֵת ה' אֱלֹהֶיךָ בְּכָל לְבָבְךָ וּבְכָל נַפְשְׁךָ (דברים ו, ה), מַהוּ בְּכָל לְבָבְךָ וּבְכָל נַפְשְׁךָ, בְּכָל נֶפֶשׁ וְנֶפֶשׁ שֶׁבָּרָא בְּךָ. אָמַר רַבִּי מֵאִיר עַל כָּל נְשִׁימָה וּנְשִׁימָה שֶׁאָדָם מַעֲלֶה חַיָּב לְקַלֵּס אֶת יוֹצְרוֹ, מִנַּיִן, שֶׁנֶּאֱמַר (תהלים קנ, ו): כֹּל הַנְּשָׁמָה תְּהַלֵּל יָהּ.", "english": "“And you shall love Hashem your G-d with all your heart and with all your soul” (Devarim 6:5)—what is “with all your heart and with all your soul”? With every soul and soul that He created within you. Rabbi Meir said: For every breath and breath that a person draws, he is obligated to praise his Creator—whence? As it is said (Tehillim 150:6): “Let every neshamah praise Kah.”"}, {"location": "Bereishit Rabbah 10:6", "hebrew": "אָמַר רַבִּי סִימוֹן אֵין לְךָ כָּל עֵשֶׂב וְעֵשֶׂב, שֶׁאֵין לוֹ מַזָּל בָּרָקִיעַ שֶׁמַּכֶּה אוֹתוֹ, וְאוֹמֵר לוֹ גְּדַל", "english": "Rabbi Simon said: You have no blade of grass that does not have a mazal in the firmament that strikes it and says to it: “Grow!”"}, {"location": "Vayikra Rabbah 34:3", "hebrew": "דָּבָר אַחֵר, וְכִי יָמוּךְ, הֲדָא הוּא דִכְתִיב (משלי יא, יז): גֹּמֵל נַפְשׁוֹ אִישׁ חָסֶד, זֶה הִלֵּל הַזָּקֵן, שֶׁבְּשָׁעָה שֶׁהָיָה נִפְטַר מִתַּלְמִידָיו הָיָה מְהַלֵּךְ וְהוֹלֵךְ עִמָּם, אָמְרוּ לוֹ תַּלְמִידָיו רַבֵּנוּ לְהֵיכָן אַתָּה הוֹלֵךְ אָמַר לָהֶם לַעֲשׂוֹת מִצְוָה, אָמְרוּ לוֹ וְכִי מַה מִּצְוָה זוֹ, אָמַר לָהֶן לִרְחֹץ בְּבֵית הַמֶּרְחָץ, אָמְרוּ לוֹ וְכִי זוֹ מִצְוָה הִיא, אָמַר לָהֶם, הֵן. מָה אִם אִיקוֹנִין שֶׁל מְלָכִים שֶׁמַּעֲמִידִים אוֹתָן בְּבָתֵּי טַרְטִיאוֹת וּבְבָתֵּי קִרְקָסִיאוֹת, מִי שֶׁנִּתְמַנֶּה עֲלֵיהֶם הוּא מוֹרְקָן וְשׁוֹטְפָן וְהֵן מַעֲלִין לוֹ מְזוֹנוֹת, וְלֹא עוֹד אֶלָּא שֶׁהוּא מִתְגַּדֵּל עִם גְּדוֹלֵי מַלְכוּת, אֲנִי שֶׁנִּבְרֵאתִי בְּצֶלֶם וּבִדְמוּת, דִּכְתִיב (בראשית ט, ו): כִּי בְּצֶלֶם אֱלֹהִים עָשָׂה אֶת הָאָדָם, עַל אַחַת כַּמָּה וְכַמָּה.", "english": "Another interpretation of “And if he becomes poor…”: This is what is written, “One who does kindness to his own soul is a man of kindness” (Proverbs 11:17). This refers to Hillel the Elder. For when he would take leave of his students, he would walk along with them. His students said to him: “Our teacher, where are you going?” He said to them: “To perform a mitzvah.” They said to him: “And what mitzvah is this?” He said to them: “To bathe in the bathhouse.” They said to him: “Is that a mitzvah?” He said to them: “Yes. If statues of kings, which are set up in theaters and circuses—one who is appointed over them scrubs them and washes them, and they provide him with sustenance, and not only that, but he is counted among the nobles of the kingdom—then I, who was created in image and likeness, as it is written: ‘For in the image of God He made the human’ (Genesis 9:6), all the more so.”"}, {"location": "Kohelet Rabbah 5:14", "hebrew": "תָּנֵי בְּשֵׁם רַבִּי מֵאִיר, כְּשֶׁאָדָם בָּא לָעוֹלָם יָדָיו הֵן קְפוּצוֹת, כְּלוֹמַר כָּל הָעוֹלָם כֻּלּוֹ שֶׁלִּי הוּא, אֲנִי נוֹחֲלוֹ. וּכְשֶׁהוּא נִפְטַר מִן הָעוֹלָם יָדָיו הֵן פְּשׁוּטוֹת, כְּלוֹמַר לֹא נָחַלְתִּי מִן הָעוֹלָם הַזֶּה כְּלוּם, שֶׁכֵּן שְׁלֹמֹה אוֹמֵר: כַּאֲשֶׁר יָצָא מִבֶּטֶן אִמּוֹ עָרוֹם יָשׁוּב לָלֶכֶת כְּשֶׁבָּא וּמְאוּמָה וגו'.", "english": "It was taught in the name of Rabbi Meir: When a person comes into the world, his hands are clenched—meaning: “The whole world is mine; I will inherit it.” And when he departs from the world, his hands are open—meaning: “I inherited nothing from this world.” For so Shlomo says: “As he came forth from his mother’s womb, naked shall he return to go as he came, and he will take nothing…”"}, {"location": "Vayikra Rabbah 4:6", "hebrew": "תָּנֵי חִזְקִיָּה (ירמיה נ, יז): שֶׂה פְזוּרָה יִשְׂרָאֵל, נִמְשְׁלוּ יִשְׂרָאֵל לְשֶׂה, מַה שֶּׂה הַזֶּה לוֹקֶה עַל רֹאשׁוֹ אוֹ בְּאֶחָד מֵאֵבָרָיו וְכָל אֵבָרָיו מַרְגִּישִׁין, כָּךְ הֵן יִשְׂרָאֵל, אֶחָד מֵהֶן חוֹטֵא וְכֻלָּן מַרְגִּישִׁין, (במדבר טז, כב): הָאִישׁ אֶחָד יֶחֱטָא, תָּנֵי רַבִּי שִׁמְעוֹן בֶּן יוֹחָאי, מָשָׁל לִבְנֵי אָדָם שֶׁהָיוּ יוֹשְׁבִין בִּסְפִינָה נָטַל אֶחָד מֵהֶן מַקְדֵּחַ וְהִתְחִיל קוֹדֵחַ תַּחְתָּיו, אָמְרוּ לוֹ חֲבֵרָיו מַה אַתָּה יוֹשֵׁב וְעוֹשֶׂה, אָמַר לָהֶם מָה אִכְפַּת לָכֶם לֹא תַחְתִּי אֲנִי קוֹדֵחַ, אָמְרוּ לוֹ שֶׁהַמַּיִם עוֹלִין וּמְצִיפִין עָלֵינוּ אֶת הַסְּפִינָה. כָּךְ אָמַר אִיּוֹב (איוב יט, ד): וְאַף אָמְנָם שָׁגִיתִי אִתִּי תָּלִין מְשׁוּגָתִי, אָמְרוּ לוֹ חֲבֵרָיו (איוב לד, לז): כִּי יֹסִיף עַל חַטָּאתוֹ פֶשַׁע בֵּינֵינוּ יִשְׂפּוֹק, אַתָּה מַסְפִּיק בֵּינֵינוּ אֶת עֲוֹנוֹתֶיךָ.", "english": "Ḥizkiyah taught (on “Israel is a scattered sheep,” Jeremiah 50:17): Israel is compared to a sheep: just as a sheep is struck on its head or on one of its limbs and all its limbs feel it, so too Israel—one of them sins and all of them feel it, as it is written: “Shall one man sin, and You be angry with the entire congregation?” (Numbers 16:22). Rabbi Shimon bar Yoḥai taught: A parable of people who were sitting in a ship. One of them took a drill and began drilling beneath his own seat. His companions said to him: “What are you sitting and doing?” He said to them: “What do you care? Am I not drilling under my own place?” They said to him: “The water is rising and flooding the ship over us!” So Job said: “And if indeed I have erred, my error lodges with me” (Job 19:4). His companions said to him: “For he adds rebellion to his sin; among us he claps his hands…” (Job 34:37)—you are bringing your sins down upon us."}, {"location": "Kohelet Rabbah 1:4", "hebrew": "רַבִּי אַבָּא בַּר כַּהֲנָא וְאַמְרֵי לָהּ בְּשֵׁם רַבִּי אַדָא בַּר חוּנְיָא יִהְיֶה בְּעֵינֶיךָ דּוֹר שֶׁבָּא כַּדּוֹר שֶׁהָלַךְ, שֶׁלֹא תֹאמַר אִלּוּ הָיָה רַבִּי עֲקִיבָא קַיָּם הָיִיתִי קוֹרֵא לְפָנָיו, אִלּוּ הָיוּ רַבִּי זֵירָא וְרַבִּי יוֹחָנָן קַיָּמִין הָיִיתִי שׁוֹנֶה לִפְנֵיהֶם, אֶלָּא דּוֹר שֶׁבָּא בְּיָמֶיךָ וְחָכָם שֶׁבְּיָמֶיךָ כְּדוֹר שֶׁהָלַךְ וַחֲכָמִים הָרִאשׁוֹנִים שֶׁהָיוּ לְפָנֶיךָ... לְלַמֶּדְךָ שֶׁכָּל מִי שֶׁנִּתְמַנָּה פַּרְנָס עַל הַצִּבּוּר אֲפִלּוּ הוּא קַל שֶׁבַּקַּלִּים, הֲרֵי הוּא כְּאַבִּיר שֶׁבָּאַבִּירִים הָרִאשׁוֹנִים.", "english": "Rabbi Abba bar Kahana—some say in the name of Rabbi Ada bar Ḥunya—said: Let the generation that comes in your days be in your eyes like the generation that has gone, so that you will not say: “If Rabbi Akiva were alive, I would read before him”; “If Rabbi Zeira and Rabbi Yoḥanan were alive, I would study before them.” Rather, the generation that comes in your days and the sage in your days are like the generation that has gone and the earlier sages who were before you… To teach you that anyone who is appointed as a leader over the community—even if he is the least of the least—is regarded like the mightiest of the mighty among the earlier leaders."}, {"location": "Shemot Rabbah 2:5; Mekhilta DeRabbi Shimon Ben Yochai 3:1", "hebrew": "וְאוֹמֵר (ישעיה סג, ט): בְּכָל צָרָתָם לוֹ צָר, אָמַר לוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא לְמשֶׁה, אִי אַתָּה מַרְגִּישׁ שֶׁאֲנִי שָׁרוּי בְּצַעַר כְּשֵׁם שֶׁיִּשְׂרָאֵל שְׁרוּיִם בְּצַעַר, הֱוֵי יוֹדֵעַ מִמָּקוֹם שֶׁאֲנִי מְדַבֵּר עִמְּךָ מִתּוֹךְ הַקּוֹצִים כִּבְיָכוֹל אֲנִי שֻׁתָּף בְּצַעֲרָן.", "english": "And it says (Yeshayah 63:9): “In all their distress, He is distressed.” HaKadosh Baruch Hu said to Moshe: If you do not sense that I dwell in pain just as Yisrael dwell in pain, know—from the place that I am speaking with you, from within the thorns—that כביכול I am a partner in their suffering."}, {"location": "Shemot Rabbah 15:12", "hebrew": "דָּבָר אַחֵר, הַחֹדֶשׁ הַזֶּה לָכֶם, רַבִּי מֵאִיר אוֹמֵר לִי וְלָכֶם הִיא הַגְּאֻלָּה, כִּבְיָכוֹל אֲנִי נִפְדֵיתִי עִמָּכֶם, שֶׁנֶּאֱמַר (שמואל ב ז, כג): אֲשֶׁר פָּדִיתָ לְּךָ מִמִּצְרַיִם גּוֹיִם וֵאלֹהָיו", "english": "Another interpretation: “This month is for you.” Rabbi Meir says: For Me and for you is the redemption—כביכול I was redeemed with you, as it is said (Shmuel II 7:23): “Whom You redeemed for Yourself from Mitzrayim—nations and its gods.”"}, {"location": "Kohelet Rabbah 1:3", "hebrew": "אָמַר רַבִּי יוּדָן בְּשֵׁם רַבִּי אַיְּבוּ אֵין אָדָם יוֹצֵא מִן הָעוֹלָם וַחֲצִי תַּאֲוָתוֹ בְּיָדוֹ, אֶלָּא אִן אִית לֵיהּ מְאָה בָּעֵי לְמֶעֱבַד יַתְהוֹן תַּרְתֵּין מָאוָון, וְאִן אִית לֵיהּ תַּרְתֵּי מָאוָון בָּעֵי לְמֶעֱבַד יַתְהוֹן אַרְבָּעָה מְאָה.", "english": "Rabbi Yudan said in the name of Rabbi Ayvu: A person does not leave the world with even half his desire in his hand. Rather, if he has a hundred, he wants to make them two hundred; and if he has two hundred, he wants to make them four hundred."}, {"location": "Sanhedrin 97a", "hebrew": "כִּי הָא דְּרַבִּי זֵירָא, כִּי הֲוָה מַשְׁכַּח רַבָּנַן דְּמִעַסְּקִי בֵּיהּ, אֲמַר לְהוּ: בְּמָטוּתָא, בָּעֵינָא מִנַּיְיכוּ לָא תְּרַחֲקוּהּ, דִּתְנֵינָא: שְׁלֹשָׁה בָּאִין בְּהֶיסַּח הַדַּעַת, אֵלּוּ הֵן: מָשִׁיחַ, מְצִיאָה, וְעַקְרָב.", "english": "As with Rabbi Zeira: when he would find Rabbanan engaged with him, he said to them: “Please, I ask of you—do not distance it, for we learned: Three come in a moment of distraction (hesech ha-da’as): Mashiach, a find, and a scorpion.”"}, {"location": "Yoma 86a", "hebrew": "אַבָּיֵי אָמַר, כִּדְתַנְיָא: ״וְאָהַבְתָּ אֵת ה׳ אֱלֹהֶיךָ״, שֶׁיְּהֵא שֵׁם שָׁמַיִם מִתְאַהֵב עַל יָדְךָ. שֶׁיְּהֵא קוֹרֵא וְשׁוֹנֶה וּמְשַׁמֵּשׁ תַּלְמִידֵי חֲכָמִים, וִיהֵא מַשָּׂאוֹ וּמַתָּנוֹ בְּנַחַת עִם הַבְּרִיּוֹת, מָה הַבְּרִיּוֹת אוֹמְרוֹת עָלָיו — אַשְׁרֵי אָבִיו שֶׁלִּמְּדוֹ תּוֹרָה, אַשְׁרֵי רַבּוֹ שֶׁלִּמְּדוֹ תּוֹרָה. אוֹי לָהֶם לַבְּרִיּוֹת שֶׁלֹּא לָמְדוּ תּוֹרָה, פְּלוֹנִי שֶׁלִּמְּדוֹ תּוֹרָה — רְאוּ כַּמָּה נָאִים דְּרָכָיו, כַּמָּה מְתוּקָּנִים מַעֲשָׂיו. עָלָיו הַכָּתוּב אוֹמֵר: ״וַיֹּאמֶר לִי עַבְדִּי אָתָּה יִשְׂרָאֵל אֲשֶׁר בְּךָ אֶתְפָּאָר״. אֲבָל מִי שֶׁקּוֹרֵא וְשׁוֹנֶה וּמְשַׁמֵּשׁ תַּלְמִידֵי חֲכָמִים, וְאֵין מַשָּׂאוֹ וּמַתָּנוֹ בֶּאֱמוּנָה, וְאֵין דִּבּוּרוֹ בְּנַחַת עִם הַבְּרִיּוֹת, מָה הַבְּרִיּוֹת אוֹמְרוֹת עָלָיו — אוֹי לוֹ לִפְלוֹנִי שֶׁלָּמַד תּוֹרָה. אוֹי לוֹ לְאָבִיו שֶׁלִּמְּדוֹ תּוֹרָה, אוֹי לוֹ לְרַבּוֹ שֶׁלִּמְּדוֹ תּוֹרָה. פְּלוֹנִי שֶׁלָּמַד תּוֹרָה — רְאוּ כַּמָּה מְקוּלְקָלִין מַעֲשָׂיו וְכַמָּה מְכוֹעָרִין דְּרָכָיו, וְעָלָיו הַכָּתוּב אוֹמֵר: ״בֶּאֱמוֹר לָהֶם עַם ה׳ אֵלֶּה וּמֵאַרְצוֹ יָצָאוּ״.", "english": "Abaye said, as it is taught: “You shall love the LORD your God” (Deuteronomy 6:5)—that the Name of Heaven should become beloved through you. That one should read Scripture and study Mishnah, and attend upon Torah scholars, and that one’s business dealings be conducted pleasantly with people. What do people say about him? “Happy is his father who taught him Torah; happy is his teacher who taught him Torah. Woe to those who did not learn Torah—so-and-so who learned Torah, see how pleasant are his ways, how refined are his deeds.” Of him Scripture says: “He said to me: You are My servant, Israel, in whom I will be glorified” (Isaiah 49:3). But one who reads and studies and attends upon Torah scholars, yet his business dealings are not faithful, and his speech is not pleasant with people—what do people say about him? “Woe to so-and-so who learned Torah; woe to his father who taught him Torah; woe to his teacher who taught him Torah. So-and-so who learned Torah—see how corrupted are his deeds, how ugly are his ways.” Of him Scripture says: “In their saying of them: These are the people of the LORD, yet they have gone out of His land” (Ezekiel 36:20)."}, {"location": "Sotah 5a", "hebrew": "אָמַר רַב חִסְדָּא, וְאִיתֵּימָא מָר עוּקְבָא: כׇּל אָדָם שֶׁיֵּשׁ בּוֹ גַּסּוּת הָרוּחַ, אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא: אֵין אֲנִי וָהוּא יְכוֹלִין לָדוּר בָּעוֹלָם, שֶׁנֶּאֱמַר: ״מְלׇשְׁנִי בַסֵּתֶר רֵעֵהוּ אוֹתוֹ אַצְמִית גְּבַהּ עֵינַיִם וּרְחַב לֵבָב אֹתוֹ לֹא אוּכָל״. אַל תִּקְרֵי ״אֹתוֹ״, אֶלָּא ״אִתּוֹ לֹא אוּכָל״.", "english": "Rav Chisda said—and some say Mar Ukva: Any person who has haughtiness of spirit, HaKadosh Baruch Hu says: “I and he cannot dwell in the world,” as it is said: “One who slanders his fellow in secret, him will I cut off; one with haughty eyes and a broad heart—him I cannot [bear].” Do not read “oto lo uchal” (“him I cannot”), but “ito lo uchal” (“with him I cannot”)."}, {"location": "Sotah 5b", "hebrew": "אָמַר רַבִּי יְהוֹשֻׁעַ בֶּן לֵוִי: בֹּא וּרְאֵה כַּמָּה גְּדוֹלִים נְמוּכֵי הָרוּחַ לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא, שֶׁבְּשָׁעָה שֶׁבֵּית הַמִּקְדָּשׁ קַיָּים אָדָם מַקְרִיב עוֹלָה — שְׂכַר עוֹלָה בְּיָדוֹ. מִנְחָה — שְׂכַר מִנְחָה בְּיָדוֹ. אֲבָל מִי שֶׁדַּעְתּוֹ שְׁפָלָה, מַעֲלֶה עָלָיו הַכָּתוּב כְּאִילּוּ הִקְרִיב כׇּל הַקָּרְבָּנוֹת כּוּלָּם, שֶׁנֶּאֱמַר: ״זִבְחֵי אֱלֹהִים רוּחַ נִשְׁבָּרָה״. וְלֹא עוֹד, אֶלָּא שֶׁאֵין תְּפִלָּתוֹ נִמְאֶסֶת, שֶׁנֶּאֱמַר: ״לֵב נִשְׁבָּר וְנִדְכֶּה אֱלֹהִים לֹא תִבְזֶה״.", "english": "Rabbi Yehoshua ben Levi said: Come and see how great are the humble in spirit before the Holy One, blessed be He. When the Temple stood, a person would offer a burnt offering—he would have the reward of a burnt offering in his hand; a meal offering—he would have the reward of a meal offering in his hand. But one whose mind is lowly, Scripture considers it as though he had offered all the offerings, as it is said: “The sacrifices of God are a broken spirit” (Psalms 51:19). And not only that, but his prayer is not despised, as it is said: “A broken and crushed heart, O God, You will not despise” (Psalms 51:19)."}, {"location": "Jerusalem Talmud, Berakhot 9:1", "hebrew": "אָמַר רִבִּי יוֹחָנָן כִּי מִי אֲשֶׁר יְחוּבָּר. יבחר כְּתִיב. אֶלָּא כָּל הַחַיִים יֵשׁ בִּטָּחוֹן שֶׁכָּל זְמָן שֶׁאָדָם חַי יֵשׁ לוֹ תִקְוָה. מֵת אָבְדָה תִקְוָותוֹ. מַה טַעֲמָא בְּמוֹת אָדָם רָשָׁע תֹּאבֵד תִּקְוָה.", "english": "Rabbi Yochanan said: “For who is he that is joined?”—it is written “yivchar” (???). Rather: as long as the living (are alive) there is confidence, for as long as a person lives he has hope; once he dies, his hope is lost. What is the reason? “With the death of a wicked man, hope will perish.”"}, {"location": "Yoma 86b", "hebrew": "אָמַר רֵישׁ לָקִישׁ: גְּדוֹלָה תְּשׁוּבָה שֶׁזְּדוֹנוֹת נַעֲשׂוֹת לוֹ כִּשְׁגָגוֹת, שֶׁנֶּאֱמַר: ״שׁוּבָה יִשְׂרָאֵל עַד ה׳ אֱלֹהֶיךָ כִּי כָשַׁלְתָּ בַּעֲוֹנֶךָ״, הָא ״עָוֹן״ — מֵזִיד הוּא, וְקָא קָרֵי לֵיהּ מִכְשׁוֹל. אִינִי?! וְהָאָמַר רֵישׁ לָקִישׁ: גְּדוֹלָה תְּשׁוּבָה שֶׁזְּדוֹנוֹת נַעֲשׂוֹת לוֹ כִּזְכִיּוֹת, שֶׁנֶּאֱמַר: ״וּבְשׁוּב רָשָׁע מֵרִשְׁעָתוֹ וְעָשָׂה מִשְׁפָּט וּצְדָקָה עֲלֵיהֶם (חָיֹה) יִחְיֶה״! לָא קַשְׁיָא: כָּאן מֵאַהֲבָה, כָּאן מִיִּרְאָה.", "english": "Reish Lakish said: Great is teshuvah, for deliberate sins become for him like inadvertent sins, as it is said: “Return, Yisrael, unto Hashem your G-d, for you have stumbled in your iniquity”—“avon” is deliberate, yet it calls it a stumbling. Is that so?! But Reish Lakish said: Great is teshuvah, for deliberate sins become for him like merits, as it is said: “And when a wicked man returns from his wickedness and does justice and righteousness—by them he shall live”! It is not difficult: here (it is) from love; here (it is) from fear."}, {"location": "Yevamot 65b", "hebrew": "וְאָמַר רַבִּי אִילְעָא מִשּׁוּם רַבִּי אֶלְעָזָר בְּרַבִּי שִׁמְעוֹן: כְּשֵׁם שֶׁמִּצְוָה עַל אָדָם לוֹמַר דָּבָר הַנִּשְׁמָע — כָּךְ מִצְוָה עַל אָדָם שֶׁלֹּא לוֹמַר דָּבָר שֶׁאֵינוֹ נִשְׁמָע. רַבִּי אַבָּא אוֹמֵר: חוֹבָה, שֶׁנֶּאֱמַר: ״אַל תּוֹכַח לֵץ פֶּן יִשְׂנָאֶךָּ הוֹכַח לְחָכָם וְיֶאֱהָבֶךָּ״.", "english": "Rabbi Il’a said in the name of Rabbi Elazar son of Rabbi Shimon: Just as it is a mitzvah for a person to say a matter that will be heard, so it is a mitzvah for a person not to say a matter that will not be heard. Rabbi Abba says: It is an obligation, as it is said: “Do not rebuke a scoffer lest he hate you; rebuke a wise man and he will love you.”"}, {"location": "Bamidbar Rabbah 22:4", "hebrew": "בּוֹר שֶׁשָּׁתִיתָ מִמֶּנּוּ אַל תִּזְרֹק בּוֹ אֶבֶן.", "english": "A well from which you drank—do not throw a stone into it."}, {"location": "Pesachim 54a", "hebrew": "אָמַר רַב יְהוּדָה בְּרַבִּי חִיָּיא: בֹּא וּרְאֵה, שֶׁלֹּא כְּמִדַּת הַקָּדוֹשׁ בָּרוּךְ הוּא מִדַּת בָּשָׂר וְדָם. מִדַּת בָּשָׂר וָדָם: אָדָם נוֹתֵן סַם לַחֲבֵירוֹ — לָזֶה יָפֶה, וְלָזֶה קָשֶׁה. אֲבָל הַקָּדוֹשׁ בָּרוּךְ הוּא אֵינוֹ כֵּן: נָתַן תּוֹרָה לְיִשְׂרָאֵל — סַם חַיִּים לְכׇל גּוּפוֹ, שֶׁנֶּאֱמַר: ״וּלְכׇל בְּשָׂרוֹ מַרְפֵּא״", "english": "Rav Yehudah said in the name of Rabbi Chiya: Come and see that the measure of HaKadosh Baruch Hu is not like the measure of flesh and blood. The measure of flesh and blood: a person gives a medicine to his fellow—this one benefits, and that one is harmed. But HaKadosh Baruch Hu is not so: He gave Torah to Yisrael—a medicine of life for his entire body, as it is said: “And healing to all his flesh.”"}, {"location": "Taanit 23a", "hebrew": "אָמַר רָבָא: הַיְינוּ דְּאָמְרִי אִינָשֵׁי: אוֹ חַבְרוּתָא אוֹ מִיתוּתָא.", "english": "Rava said: This is what people say: Either companionship (chavrusa) or death."}, {"location": "Sukkah 52b", "hebrew": "אָמַר רַבִּי שִׁמְעוֹן בֶּן לָקִישׁ: יִצְרוֹ שֶׁל אָדָם מִתְגַּבֵּר עָלָיו בְּכׇל יוֹם וּמְבַקֵּשׁ לַהֲמִיתוֹ, שֶׁנֶּאֱמַר: ״צוֹפֶה רָשָׁע לַצַּדִּיק וּמְבַקֵּשׁ לַהֲמִיתוֹ״, וְאִלְמָלֵא הַקָּדוֹשׁ בָּרוּךְ הוּא שֶׁעוֹזֵר לוֹ — אֵינוֹ יָכוֹל לוֹ, שֶׁנֶּאֱמַר: ״ה׳ לֹא יַעַזְבֶנּוּ בְיָדוֹ וְלֹא יַרְשִׁיעֶנּוּ בְּהִשָּׁפְטוֹ״.", "english": "Rabbi Shimon ben Lakish said: A person’s yetzer strengthens itself against him every day and seeks to kill him, as it is said: “The wicked watches the righteous and seeks to kill him.” And were it not for HaKadosh Baruch Hu helping him, he could not overcome it, as it is said: “Hashem will not abandon him into his hand, and will not condemn him when he is judged.”"}, {"location": "Avot DeRabbi Natan Ch. 31", "hebrew": "אִם הָיְתָה נְטִיעָה בְּתוֹךְ יָדְךָ וְיֹאמְרוּ לְךָ: הֲרֵי לְךָ מָשִׁיחַ! – בֹּא וְנָטַע אֶת הַנְּטִיעָה וְאַחַר כָּךְ צֵא וְהַקְבִּילוֹ.", "english": "If you have a sapling in your hand and they tell you: “Behold, Mashiach is here!”—go and plant the sapling, and afterward go out and greet him."}, {"location": "Tosefta Bikkurim 2:10", "hebrew": "קוֹצְצֵי אִילָנוֹת טוֹבוֹת אֵינָן רוֹאִין סִימָן בְּרָכָה לְעוֹלָם.", "english": "Those who cut down good trees never see a sign of blessing forever."}, {"location": "Taanit 23a", "hebrew": "יוֹמָא חַד הֲוָה אָזֵל בְּאוֹרְחָא, חַזְיֵיהּ לְהָהוּא גַּבְרָא דַּהֲוָה נָטַע חָרוּבָא, אֲמַר לֵיהּ: הַאי, עַד כַּמָּה שְׁנִין טָעֵין? אֲמַר לֵיהּ: עַד שִׁבְעִין שְׁנִין. אֲמַר לֵיהּ: פְּשִׁיטָא לָךְ דְּחָיֵית שִׁבְעִין שְׁנִין? אֲמַר לֵיהּ הַאי גַּבְרָא: עָלְמָא בְּחָרוּבָא אַשְׁכַּחְתֵּיהּ. כִּי הֵיכִי דִּשְׁתַלוּ לִי אֲבָהָתִי, שְׁתַלִי נָמֵי לִבְרָאִי.", "english": "One day he was going on the road; he saw a man who was planting a carob tree. He said to him: “This—until how many years does it bear?” He said to him: “Until seventy years.” He said to him: “Is it obvious to you that you will live seventy years?” That man said to him: “I found the world with carob trees. Just as my fathers planted for me, so too I plant for my children.”"}, {"location": "Midrash Tanchuma, Kedoshim 8", "hebrew": "״כִּי תָּבֹאוּ אֶל הָאָרֶץ וּנְטַעְתֶּם״. אָמַר לָהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל: אַף עַל פִּי שֶׁתִּמְצְאוּ אוֹתָהּ מְלֵאָה כָּל טוּב, לֹא תֹּאמְרוּ ׳נֵשֵׁב וְלֹא נִטַּע׳, אֶלָּא הֱווּ זְהִירִין בִּנְטִיעוֹת, שֶׁנֶּאֱמַר: ״וּנְטַעְתֶּם כָּל עֵץ מַאֲכָל״. כְּשֵׁם שֶׁנִּכְנַסְתֶּם וּמְצָאתֶם נְטִיעוֹת שֶׁנָּטְעוּ אֲחֵרִים, אַף אַתֶּם הֱיוּ נוֹטְעִים לְבָנֵיכֶם. שֶׁלֹּא יֹאמַר אָדָם: אֲנִי זָקֵן, כַּמָּה שָׁנִים אֲנִי חַי, מָה אֲנִי עוֹמֵד מִתְיַגֵּעַ לַאֲחֵרִים, לְמָחָר אֲנִי מֵת.", "english": "“When you come to the land and you shall plant.” HaKadosh Baruch Hu said to Yisrael: Even though you will find it filled with all goodness, do not say, “We will sit and not plant.” Rather, be careful with plantings, as it is said: “And you shall plant every food-bearing tree.” Just as you entered and found plantings that others planted, so too you should be planting for your children—so that a person not say: “I am old; how many years do I live? Why should I toil for others? Tomorrow I die.”"}, {"location": "Bamidbar Rabbah 23:7", "hebrew": "אֵין חֲבִיבָה כְּאֶרֶץ יִשְׂרָאֵל. אָמַר לוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא לְמשֶׁה: הֵן הָאָרֶץ חֲבִיבָה עָלַי, שֶׁנֶּאֱמַר (דברים יא:יב): ״אֶרֶץ אֲשֶׁר ה׳ אֱלֹהֶיךָ דֹּרֵשׁ אֹתָהּ תָּמִיד״. וְיִשְׂרָאֵל חֲבִיבִין עָלַי, שֶׁנֶּאֱמַר (דברים ז:ח): ״כִּי מֵאַהֲבַת ה׳ אֶתְכֶם״. אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא: אֲנִי אַכְנִיס אֶת יִשְׂרָאֵל שֶׁהֵן חֲבִיבִין עָלַי, לְאֶרֶץ שֶׁחֲבִיבָה עָלַי, שֶׁנֶּאֱמַר: ״כִּי אַתֶּם בָּאִים אֶל הָאָרֶץ כְּנָעַן״.", "english": "Nothing is beloved like Eretz Yisrael. HaKadosh Baruch Hu said to Moshe: Behold, the land is beloved to Me, as it is said (Devarim 11:12): “A land that Hashem your G-d seeks continually.” And Yisrael are beloved to Me, as it is said (Devarim 7:8): “For from Hashem’s love of you.” HaKadosh Baruch Hu said: I will bring Yisrael—who are beloved to Me—into the land that is beloved to Me, as it is said: “For you are coming to the land of Kena’an.”"}, {"location": "Jerusalem Talmud, Kiddushin 4:12", "hebrew": "רַבִּי חִזְקִיָּה ר׳ כֹּהֵן בְּשֵׁם רַב: עָתִיד אָדָם לִתֵּן דִּין וְחֶשְׁבּוֹן עַל כָּל שֶׁרָאת עֵינוֹ וְלֹא אָכַל. ר׳ לְעֵזֶר חָשַׁשׁ לַהֲדָא שְׁמוּעָתָא וּמַצְמִיחַ לֵיהּ פְּרִיטִין וְאָכִיל בְּהוֹן מִכָּל מִילָה חֲדָא בְּשַׁתָּא.", "english": "Rabbi Chizkiyah, Rabbi Kohen, in the name of Rav: A person is destined to give judgment and accounting for everything his eye saw and he did not eat. Rabbi Eliezer feared this teaching and would grow small coins for himself (???), and would eat one of each thing once a year."}, {"location": "Taanit 7a", "hebrew": "אָמַר רַבִּי יוֹחָנָן — מַאי דִּכְתִיב: ״כִּי הָאָדָם עֵץ הַשָּׂדֶה״, וְכִי אָדָם עֵץ שָׂדֶה הוּא? אֶלָּא, מִשּׁוּם דִּכְתִיב: ״כִּי מִמֶּנּוּ תֹאכֵל וְאֹתוֹ לֹא תִכְרֹת״, וּכְתִיב: ״אֹתוֹ תַשְׁחִית וְכָרָתָּ״. הָא כֵּיצַד? אִם תַּלְמִיד חָכָם הָגוּן הוּא — ״מִמֶּנּוּ תֹאכֵל וְאֹתוֹ לֹא תִכְרֹת״, וְאִם לָאו — ״אֹתוֹ תַשְׁחִית וְכָרָתָּ״.", "english": "Rabbi Yochanan said: What is this that is written: “For man is the tree of the field”—is a person a tree of the field?! Rather, because it is written: “For from it you may eat, and it you shall not cut down,” and it is written: “It you shall destroy and cut down.” How so? If he is a fitting talmid chacham—“from it you may eat, and it you shall not cut down”; but if not—“it you shall destroy and cut down.”"}, {"location": "Bereishit Rabbah 17:4", "hebrew": "אָמַר רַבִּי אַחָא: בְּשָׁעָה שֶׁבָּא הַקָּדוֹשׁ בָּרוּךְ הוּא לִבְרֹאת אֶת הָאָדָם... הֵבִיא אֶת הַבְּהֵמָה וְאֶת הַחַיָּה וְאֶת הָעוֹף לִפְנֵי אָדָם, אָמַר לוֹ ״זֶה, מַה שְׁמוֹ?״ אָמַר ״זֶה שׁוֹר, זֶה חֲמוֹר, זֶה סוּס וְזֶה גַּמָּל.״ ״וְאַתָּה, מַה שְׁמֶךָ?״ אָמַר לוֹ, ״אֲנִי נָאֶה לְהִקָּרֵא אָדָם, שֶׁנִבְרֵאתִי מִן הָאֲדָמָה.״", "english": "Rabbi Acha said: At the hour HaKadosh Baruch Hu came to create man… He brought the behemah, the chayah, and the bird before Adam. He said to him: “This—what is its name?” He said: “This is an ox, this is a donkey, this is a horse, and this is a camel.” “And you—what is your name?” He said to Him: “It is fitting that I be called Adam, for I was created from the adamah (ground).”"}, {"location": "Kohelet Rabbah 7:13", "hebrew": "בְּשָׁעָה שֶׁבָּרָא הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת אָדָם הָרִאשׁוֹן, נְטָלוֹ וְהֶחֱזִירוֹ עַל כָּל אִילָנֵי גַּן עֵדֶן, וְאָמַר לוֹ: ״רְאֵה מַעֲשַׂי כַּמָּה נָאִים וּמְשֻׁבָּחִין הֵן, וְכָל מַה שֶּׁבָּרָאתִי בִּשְׁבִילְךָ בָּרָאתִי, תֵּן דַּעְתְּךָ שֶׁלֹא תְקַלְקֵל וְתַחֲרִיב אֶת עוֹלָמִי, שֶׁאִם קִלְקַלְתָּ אֵין מִי שֶׁיְתַקֵּן אַחֲרֶיךָ״.", "english": "When HaKadosh Baruch Hu created Adam HaRishon, He took him and brought him around all the trees of Gan Eden, and said to him: “See My works—how beautiful and praiseworthy they are; and everything that I created, I created for you. Set your mind not to ruin and destroy My world—for if you ruin it, there is no one to repair after you.”"}, {"location": "Avot DeRabbi Natan Ch. 31", "hebrew": "הַקָּדוֹשׁ בָּרוּךְ הוּא, יְהֵא שְׁמוֹ הַגָּדוֹל מְבֹרָךְ לְעוֹלָם וּלְעוֹלְמֵי עוֹלָמִים, בְּחָכְמָתוֹ וּבִתְבוּנָתוֹ בָּרָא אֶת כָּל הָעוֹלָם כֻּלּוֹ, וּבָרָא אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ עֶלְיוֹנִים וְתַחְתּוֹנִים. וְיָצַר בְּאָדָם כָּל מַה שֶׁבָּרָא בְּעוֹלָמוֹ.", "english": "HaKadosh Baruch Hu—may His Great Name be blessed forever and for all eternity—by His wisdom and by His understanding created the entire world, and created the heavens and the earth, the upper and the lower; and He formed within man everything that He created in His world."}, {"location": "Bereishit Rabbah 13:2", "hebrew": "״וְכֹל שִׂיחַ הַשָּׂדֶה״ - כָּל הָאִילָנוֹת כְּאִלּוּ מְשִׂיחִין אֵלּוּ עִם אֵלּוּ. כָּל הָאִילָנוֹת כְּאִלּוּ מְשִׂיחִין עִם הַבְּרִיּוֹת.", "english": "“And every shrub of the field”—all the trees are as if conversing with one another; all the trees are as if conversing with the creatures."}, {"location": "Sifrei Devarim 20:19", "hebrew": "״כִּי הָאָדָם עֵץ הַשָּׂדֶה״ - שֶׁחַיָּיו שֶׁל אָדָם אֵינוֹ אֶלָּא מִן הָאִילָן.", "english": "“For man is the tree of the field”—for a person’s life is only from the tree (i.e., sustained by it)."}, {"location": "Mishnah Sanhedrin 4:5", "hebrew": "״כָּל הַמְאַבֵּד נֶפֶשׁ אַחַת מִיִּשְׂרָאֵל, מַעֲלֶה עָלָיו הַכָּתוּב כְּאִלּוּ אִבֵּד עוֹלָם מָלֵא. לְפִיכָךְ כָּל אֶחָד וְאֶחָד חַיָּב לוֹמַר: בִּשְׁבִילִי נִבְרָא הָעוֹלָם.״", "english": "“Anyone who destroys one soul from Yisrael—the verse credits him as if he destroyed an entire world. Therefore each and every person is obligated to say: The world was created for me.”"}, {"location": "Jerusalem Talmud, Berakhot 9:1", "hebrew": "הָרוֹאֶה אוֹכְלוֹסִין אוֹמֵר בָּרוּךְ חֲכַם הָרָזִים. כְּשֵׁם שֶׁאֵין פַּרְצוּפֵיהֶן דּוֹמִין זֶה לָזֶה. כַּךְ אֵין דַּעְתָּן דוֹמֶה זֶה לָזֶה.", "english": "One who sees multitudes says: “Baruch Chacham HaRazim” (“Blessed is the Knower of secrets”). Just as their faces are not alike one to another, so their minds are not alike one to another."}, {"location": "Midrash Tanchuma, Pinchas 10", "hebrew": "אִם רָאָה אוּכְלֻסִין הַרְבֵּה שֶׁל בְּנֵי אָדָם, אוֹמֵר, בָּרוּךְ חֲכַם הָרָזִים. כְּשֵׁם שֶׁאֵין פַּרְצוּפֵיהֶם שָׁוִין זֶה לָזֶה, כָּךְ אֵין דַּעְתָּם שָׁוִין זֶה לָזֶה, אֶלָּא כָּל אֶחָד וְאֶחָד יֵשׁ לוֹ דַּעַת בִּפְנֵי עַצְמוֹ. וְכֵן אוֹמֵר, לַעֲשׂוֹת לָרוּחַ מִשְׁקָל וּמַיִם תִּכֵּן בְּמִדָּה (איוב כח, כה), כָּל בְּרִיָּה וּבְרִיָּה יֵשׁ לוֹ דַּעַת בִּפְנֵי עַצְמוֹ.", "english": "If one sees many multitudes of people, he says: “Baruch Chacham HaRazim.” Just as their faces are not equal one to another, so their minds are not equal one to another; rather each and every one has understanding of his own. And so it says: “To make for the wind a weight, and He established waters by measure” (Iyov 28:25)—each and every creature has understanding of its own."}, {"location": "Mekhilta DeRabbi Yishmael, Vayasa 17:6; Midrash Tanchuma, Beshalach 22", "hebrew": "\"הִנְנִי עֹמֵד לְפָנֶיךָ שָּׁם עַל־הַצּוּר בְּחֹרֵב\" - אָמַר לוֹ הַמָּקוֹם: כָּל מָקוֹם שֶׁאַתְּ מוֹצֵא רֹשֶׁם רַגְלֵי אָדָם, שָׁם אֲנִי לְפָנֶיךָ.", "english": "\"Behold, I stand before you there upon the rock at Chorev\"—HaMakom said to him: Any place where you find the imprint of a person’s feet, there I am before you."}, {"location": "Midrash Tanchuma, Ki Tavo 1", "hebrew": "אָמַר רַבִּי יוֹחָנָן, כָּל הָעוֹשֶׂה תּוֹרָה לַאֲמִתָּה, מַעֲלֶה עָלָיו הַכָּתוּב כְּאִלּוּ עָשָׂה אֶת עַצְמוֹ, שֶׁנֶּאֱמַר: וְאוֹתִי צִוָּה ה' בָּעֵת הַהִוא לְלַמֵּד וְגוֹ' (דברים ד, יד). לַעֲשׂוֹת אוֹתָם לֹא נֶאֱמַר, אֶלָּא לַעֲשֹׂתְכֶם אוֹתָם (שם), מִכָּאן שֶׁמַּעֲלִין עָלָיו כְּאִלּוּ הוּא עָשָׂה וּבָרָא אֶת עַצְמוֹ.", "english": "Rabbi Yochanan said: Whoever “does” Torah in truth, the verse credits him as if he made himself, as it is said: “And Hashem commanded me at that time to teach…” (Devarim 4:14). It does not say “to do them,” but rather “to do you them” (i.e., to form you by them); from here they credit him as if he made and created himself."}, {"location": "Vayikra Rabbah 7:2", "hebrew": "אָמַר רַבִּי אֲלֶכְּסַנְדְּרִי הַהֶדְיוֹט הַזֶּה אִם מְשַׁמֵּשׁ הוּא בְּכֵלִים שְׁבוּרִים גְּנַאי הוּא לוֹ, אֲבָל הַקָּדוֹשׁ בָּרוּךְ הוּא כְּלֵי תַּשְׁמִישׁוֹ שְׁבוּרִים, שֶׁנֶּאֱמַר (תהלים לד, יט): קָרוֹב ה' לְנִשְׁבְּרֵי לֵב, (תהלים קמז, ג): הָרוֹפֵא לִשְׁבוּרֵי לֵב, (ישעיה נז, טו): וְאֶת דַּכָּא וּשְׁפַל רוּחַ.", "english": "Rabbi Alexandri said: This common man—if he uses broken vessels, it is a disgrace for him; but HaKadosh Baruch Hu, His “vessels of use” are broken, as it is said: “Hashem is close to the brokenhearted” (Tehillim 34:19); “Who heals the brokenhearted” (Tehillim 147:3); “And with the crushed and lowly of spirit” (Yeshayah 57:15)."}, {"location": "Mekhilta DeRabbi Yishmael, Shirah 9:6", "hebrew": "הָעוֹלָם מִתְּחִלָּתוֹ לֹא נִבְנָה אֶלָּא בְחֶסֶד, שֶׁנֶּאֱמַר: (תהלים פט,ג) ״כִּי אָמַרְתִּי, עוֹלָם חֶסֶד יִבָּנֶה.״", "english": "From its beginning, the world was built only with chesed, as it is said (Tehillim 89:3): “For I said: A world of chesed shall be built.”"}, {"location": "Midrash Tanchuma, Metzora 1", "hebrew": "כָּל שֶׁנַּעֲשֶׂה רַחְמָן עַל הָאַכְזָרִי, לַסּוֹף נַעֲשֶׂה אַכְזָר עַל הָרַחְמָנִים.", "english": "Whoever becomes compassionate to the cruel, in the end becomes cruel to the compassionate."}, {"location": "Bava Kamma 92a", "hebrew": "כָּל הַמְבַקֵּשׁ רַחֲמִים עַל חֲבֵירוֹ וְהוּא צָרִיךְ לְאוֹתוֹ דָּבָר, הוּא נַעֲנֶה תְּחִילָּה.", "english": "Whoever seeks mercy for his fellow while he needs that very matter—he is answered first."}, {"location": "Vayikra Rabbah 34:8", "hebrew": "יוֹתֵר מִמַּה שֶּׁבַּעַל הַבַּיִת עוֹשֶׂה עִם הֶעָנִי, הֶעָנִי עוֹשֶׂה עִם בַּעַל הַבַּיִת.", "english": "More than what the householder does for the poor person, the poor person does for the householder."}, {"location": "Sukkah 49b", "hebrew": "כָּל הָעוֹשֶׂה צְדָקָה וּמִשְׁפָּט, כְּאִילּוּ מִילֵּא כָּל הָעוֹלָם כּוּלּוֹ חֶסֶד.", "english": "Whoever practices charity (tzedakah) and justice (mishpat) is as though they filled the entire world with kindness (chesed)."}, {"location": "Yalkut Shimoni, Chukat 764", "hebrew": "רַבִּי אַבָּהוּ וְרַבִּי שִׁמְעוֹן בֶּן לָקִישׁ הָווּ עָלִין לַהֲדָא קֵיסָרִין, אֲמַר לֵיהּ רַבִּי אַבָּהוּ לְרַבִּי שִׁמְעוֹן בֶּן לָקִישׁ מָה אֲנָן עָלִין לִמְדִינָתְהוֹן דִּמְחָרְפָיָא וּמְגַדְּפָיָא, נָחַת רֵישׁ לָקִישׁ מִן חֲמַרֵיהּ וְסָפָא לֵיהּ חֲלָא וִיהֲבֵי בְּפוּמֵיהּ, אֲמַר לֵיהּ מַהוּ כֵּן, אֲמַר לֵיהּ אֵין הַקָּדוֹשׁ בָּרוּךְ הוּא רוֹצֶה בְּמִי שֶׁהוּא אוֹמֵר דֵּילָטוֹרְיָא עַל כָּל יִשְׂרָאֵל", "english": "Rabbi Abbahu and Rabbi Shimon ben Lakish were going up to Caesarea. Rabbi Abbahu said to Rabbi Shimon ben Lakish: “Why are we going up to the province of those who insult and blaspheme?” Reish Lakish got down from his donkey and ??? gave him vinegar and put it in his mouth. He said to him: “Why so?” He replied: “The Holy One, blessed be He, does not want one who speaks as an informer/slanderer (דילטוריא) against all of Israel.”"}, {"location": "Yevamot 65b", "hebrew": "״כְּשֵׁם שֶׁמִּצְוָה עַל אָדָם לוֹמַר דָּבָר הַנִּשְׁמָע, כָּךְ מִצְוָה עַל אָדָם שֶׁלֹּא לוֹמַר דָּבָר שֶׁאֵינוֹ נִשְׁמָע.״", "english": "Just as it is a mitzvah for a person to say something that will be heard, so too it is a mitzvah for a person not to say something that will not be heard."}, {"location": "Sifrei Ha'azinu 307", "hebrew": "אֵל אֱמוּנָה – שֶׁהֶאֱמִין בָּעוֹלָמוֹ וּבְרָאוֹ.", "english": "“A faithful God (El Emunah)” — for He believed in His world and created it."}, {"location": "Bamidbar Rabbah 4:20", "hebrew": "כָּל הַמַּרְבֶּה כְּבוֹד שָׁמַיִם וּמְמַעֵט כְּבוֹד עַצְמוֹ, כְּבוֹד שָׁמַיִם מִתְרַבֶּה וּכְבוֹדוֹ מִתְרַבֶּה.", "english": "Whoever increases the honor of Heaven and diminishes their own honor— the honor of Heaven increases, and their own honor increases."}, {"location": "Bereishit Rabbah 95:3", "hebrew": "מֵהֵיכָן לָמַד אַבְרָהָם אֶת הַתּוֹרָה? רַבָּן שִׁמְעוֹן אוֹמֵר נַעֲשׂוּ שְׁתֵּי כִּלְיוֹתָיו כִּשְׁתֵּי כַּדִּים שֶׁל מַיִם וְהָיוּ נוֹבְעוֹת תּוֹרָה.", "english": "From where did Abraham learn the Torah? Rabban Shimon says: his two kidneys became like two jugs of water, and they gushed forth Torah."}, {"location": "Avodah Zarah 17b", "hebrew": "אָמַר רַב הוּנָא: כׇּל הָעוֹסֵק בַּתּוֹרָה בִּלְבַד דּוֹמֶה כְּמִי שֶׁאֵין לוֹ אֱלוֹהַּ, שֶׁנֶּאֱמַר: ״וְיָמִים רַבִּים לְיִשְׂרָאֵל לְלֹא אֱלֹהֵי אֱמֶת וְגוֹ׳״. מַאי ״לְלֹא אֱלֹהֵי אֱמֶת״? שֶׁכׇּל הָעוֹסֵק בַּתּוֹרָה בִּלְבַד דּוֹמֶה כְּמִי שֶׁאֵין לוֹ אֱלוֹהַּ.", "english": "Rav Huna said: Anyone who engages in Torah alone is like one who has no God, as it says: “Many days Israel was without the true God…” What is “without the true God”? It means that one who engages in Torah alone is like one who has no God."}, {"location": "Midrash Tanchuma, Noach 3", "hebrew": "וְלֹא קִבְּלוּ יִשְׂרָאֵל אֶת הַתּוֹרָה עַד שֶׁכָּפָה עֲלֵיהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת הָהָר כְּגִיגִית, שֶׁנֶּאֱמַר: וַיִּתְיַצְּבוּ בְּתַחְתִּית הָהָר (שמות יט, יז). וְאָמַר רַב דִּימִי בַּר חָמָא: אָמַר לָהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, אִם מְקַבְּלִים אַתֶּם אֶת הַתּוֹרָה, מוּטָב, וְאִם לָאו, שָׁם תְּהֵא קְבוּרַתְכֶם. וְאִם תֹּאמַר, עַל הַתּוֹרָה שֶׁבִּכְתָב כָּפָה עֲלֵיהֶם אֶת הָהָר, וַהֲלֹא מִשָּׁעָה שֶׁאָמַר לָהֶם מְקַבְּלִין אַתֶּם אֶת הַתּוֹרָה, עָנוּ כֻלָּם וְאָמְרוּ נַעֲשֶׂה וְנִשְׁמָע, מִפְּנֵי שֶׁאֵין בָּהּ יְגִיעָה וְצַעַר וְהִיא מְעַט, אֶלָּא אָמַר לָהֶן עַל הַתּוֹרָה שֶׁבְּעַל פֶּה, שֶׁיֵּשׁ בָּהּ דִּקְדּוּקֵי מִצְוֹת קַלּוֹת וַחֲמוּרוֹת, וְהִיא עַזָּה כַמָּוֶת וְקָשָׁה כִשְׁאוֹל קִנְאָתָהּ, לְפִי שֶׁאֵין לוֹמֵד אוֹתָהּ אֶלָּא מִי שֶׁאוֹהֵב הַקָּדוֹשׁ בָּרוּךְ הוּא בְּכָל לִבּוֹ וּבְכָל נַפְשׁוֹ וּבְכָל מְאֹדוֹ, שֶׁנֶּאֱמַר: וְאָהַבְתָּ אֵת ה' אֱלֹהֶיךָ בְּכָל לְבָבְךָ וּבְכָל נַפְשְׁךָ וּבְכָל מְאֹדֶךָ (דברים ו, ה).", "english": "Israel did not accept the Torah until the Holy One, blessed be He, overturned the mountain above them like a barrel, as it is said: “And they stood at the bottom of the mountain” (Exodus 19:17). Rav Dimi bar Ḥama said: The Holy One, blessed be He, said to Israel: If you accept the Torah—good; and if not—there will be your burial. And if you say: He overturned the mountain over them for the Written Torah—did they not already answer, “We will do and we will hear”? Rather, He said this regarding the Oral Torah: for it contains the fine points of commandments, light and weighty, and it is fierce as death and its jealousy is hard as Sheol, for one does not learn it except one who loves the Holy One, blessed be He, with all one’s heart, soul, and might, as it is said: “You shall love the LORD your God with all your heart, with all your soul, and with all your might” (Deuteronomy 6:5)."}, {"location": "Midrash Mishlei 31", "hebrew": "אמר הקב\"ה לישראל: בניי, היו מתעסקים בתורה ביום ובלילה, ומעלה אני עליכם כאילו אתם מעמידין שמים וארץ, שנאמר (יהושע א ח): \"לא ימוש ספר התורה הזה מפיך והגית בו יומם ולילה\", ואומר (יהושע א ט): \"הלא ציוויתיך חזק ואמץ אל תערוץ ואל תחת\".", "english": "The Holy One, blessed be He, said to Israel: My children, occupy yourselves with Torah day and night, and I will credit you as though you establish heaven and earth, as it says: “This book of the Torah shall not depart from your mouth; you shall meditate on it day and night,” and it says: “Have I not commanded you—be strong and courageous; do not be frightened and do not be dismayed.”"}, {"location": "Derech Eretz Zuta 2:6", "hebrew": "הָוֵי מְיַקֵּר אֶת כָּל הָאָדָם... אִם חָפֵץ אַתָּה לְהִדָּבֵק בְּאַהֲבַת חֲבֵרְךָ, הֱוִי נוֹשֵׂא וְנוֹתֵן בְּטוֹבָתוֹ.", "english": "Cherish every person… If you desire to cleave to the love of your fellow, be engaged in (and promote) their welfare."}, {"location": "Avot DeRabbi Natan Ch. 12", "hebrew": "שְׁנֵי בְּנֵי אָדָם שֶׁעָשׂוּ מְרִיבָה זֶה עִם זֶה, הָלַךְ אַהֲרֹן וְיָשַׁב אֵצֶל אֶחָד מֵהֶם, אָמַר לוֹ: 'בְּנִי, רְאֵה חֲבֵרְךָ מַהוּ אוֹמֵר? מְטָרֵף אֶת לִבּוֹ וְקוֹרֵעַ אֶת בְּגָדָיו, אוֹמֵר אוֹי לִי הֵיאַךְ אֶשָּׂא אֶת עֵינַי וְאֶרְאֶה אֶת חֲבֵרַי בֹּשְׁתִּי הֵימֶנּוּ, שֶׁאֲנִי הוּא שֶׁסָּרַחְתִּי עָלָיו! הוּא יוֹשֵׁב אֶצְלוֹ עַד שֶׁמֵּסִיר קִנְאָה מִלִּבּוֹ. וְהוֹלֵךְ אַהֲרֹן וְיוֹשֵׁב אֵצֶל הָאַחֵר וְאָמַר לוֹ [אותם דברים]... וּכְשֶׁנִּפְגְּשׁוּ זֶה בָּזֶה גָּפְפוּ וְנָשְׁקוּ זֶה לָזֶה.", "english": "Two people quarreled with one another. Aaron went and sat with one of them and said: “My son, see what your fellow is saying: he is tearing at his heart and rending his garments, saying, ‘Woe to me—how can I lift my eyes and see my friend? I am ashamed before him, for I am the one who wronged him!’” Aaron sat with him until he removed jealousy from his heart. Then Aaron went and sat with the other and said the same… When they met one another, they embraced and kissed."}, {"location": "Vayikra Rabbah 9:9", "hebrew": "גָּדוֹל הַשָּׁלוֹם, שֶׁאֲפִלּוּ יִשְׂרָאֵל עוֹבְדִים עֲבוֹדַת כּוֹכָבִים וְשָׁלוֹם בֵּינֵיהֶם, אָמַר הַמָּקוֹם: כִּבְיָכוֹל אֵינִי יָכוֹל לִשְׁלֹט בָּהֶם.", "english": "Great is peace: even if Israel worship idols, yet there is peace among them, the Omnipresent says: “As it were, I cannot rule over them.”"}, {"location": "Sukkah 52b", "hebrew": "אִם פָּגַע בְּךָ מְנֻוּוֹל זֶה, מָשְׁכֵהוּ לְבֵית הַמִּדְרָשׁ.", "english": "If this vile one (i.e., the evil inclination) confronts you, drag it to the study hall."}, {"location": "Midrash Mishlei 24:3", "hebrew": "משל למלך בשר ודם שהיה מהלך במדבר, ומצא שם טרקלין וחדרים גדולים, נכנס ושורה בתוכן; כך יצר הרע, אם אין מוצא דברי תורה, שולט ביניהן, ואין אתה יכול להוציאו מתוכו.", "english": "A parable: A mortal king was walking in the wilderness and found a palace and great rooms; he entered and dwelt inside them. So too the evil inclination—if it does not find words of Torah, it rules among them, and you cannot drive it out from within."}, {"location": "Pesachim 68a", "hebrew": "עֲתִידִין צַדִּיקִים שֶׁיְּחַיּוּ מֵתִים", "english": "In the future, the righteous will revive the dead."}, {"location": "Menachot 99a", "hebrew": "פְּעָמִים שֶׁבִּטּוּלָהּ שֶׁל תּוֹרָה זֶה הוּא יִסּוּדָהּ", "english": "Sometimes, its neglect is its foundation."}, {"location": "Sanhedrin 92b", "hebrew": "אֲפִלּוּ בִּשְׁעַת הַסַּכָּנָה, לֹא יְשַׁנֶּה אָדָם אֶת עַצְמוֹ מִן הָרַבָּנוּת שֶׁלּוֹ", "english": "Even in a time of danger, a person should not change themselves from their rabbinate/role. ???"}, {"location": "Bereishit Rabbah 68:6", "hebrew": "בִּזְמַן שֶׁהַצַּדִּיק בָּעִיר הוּא זִיוָהּ הוּא הֲדָרָהּ, יָצָא מִשָּׁם פָּנָה זִיוָהּ פָּנָה הֲדָרָהּ.", "english": "When the righteous person is in the city, they are its radiance and its glory; when they depart, its radiance and its glory depart."}, {"location": "Mishnah Sanhedrin 6:5", "hebrew": "אָמַר רַבִּי מֵאִיר: בְּשָׁעָה שֶׁאָדָם מִצְטַעֵר, שְׁכִינָה מַה הַלָּשׁוֹן אוֹמֶרֶת כִּבְיָכוֹל? קַלַּנִי מֵרֹאשִׁי, קַלַּנִי מִזְּרוֹעִי.", "english": "Rabbi Meir said: When a person is in pain, what does the Shechinah say, as it were? “My head is heavy for Me; My arm is heavy for Me.”"}, {"location": "Midrash Tehillim 27", "hebrew": "לְמָה הַצַּדִּיקִים דּוֹמִין? לְמִי שֶׁמְּהַלֵּךְ וַאֲבוּקָה בְּיָדוֹ, הִגִּיעַ לְאֶבֶן מְשַׁמֵּר אֶת נַפְשׁוֹ שֶׁלֹּא יִכָּשֵׁל, הִגִּיעַ לְגֻמָּץ מְשַׁמֵּר אֶת עַצְמוֹ שֶׁלֹּא יִפֹּל בְּתוֹכוֹ.", "english": "To what are the righteous compared? To one who walks with a torch in hand: reaching a stone, they guard themselves so they do not stumble; reaching a pit, they guard themselves so they do not fall into it."}, {"location": "Shemot Rabbah 2:2", "hebrew": "אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא, מִי שֶׁהוּא יוֹדֵעַ לִרְעוֹת הַצֹּאן אִישׁ לְפִי כֹחוֹ, יָבֹא וְיִרְעֶה בְּעַמִּי. הֲדָא הוּא דִכְתִיב (תהלים עח, עא): מֵאַחַר עָלוֹת הֱבִיאוֹ לִרְעוֹת בְּיַעֲקֹב עַמּוֹ. וְאַף משֶׁה לֹא בְחָנוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא אֶלָּא בַּצֹּאן, אָמְרוּ רַבּוֹתֵינוּ, כְּשֶׁהָיָה משֶׁה רַבֵּינוּ עָלָיו הַשָּׁלוֹם רוֹעֶה צֹאנוֹ שֶׁל יִתְרוֹ בַּמִּדְבָּר, בָּרַח מִמֶּנּוּ גְּדִי, וְרָץ אַחֲרָיו עַד שֶׁהִגִּיעַ לַחֲסִית, כֵּיוָן שֶׁהִגִּיעַ לַחֲסִית, נִזְדַּמְּנָה לוֹ בְּרֵכָה שֶׁל מַיִם, וְעָמַד הַגְּדִי לִשְׁתּוֹת, כֵּיוָן שֶׁהִגִּיעַ משֶׁה אֶצְלוֹ, אָמַר אֲנִי לֹא הָיִיתִי יוֹדֵעַ שֶׁרָץ הָיִיתָ מִפְּנֵי צָמָא, עָיֵף אַתָּה, הִרְכִּיבוֹ עַל כְּתֵפוֹ וְהָיָה מְהַלֵּךְ. אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא, יֵשׁ לְךָ רַחֲמִים לִנְהֹג צֹאנוֹ שֶׁל בָּשָׂר וָדָם כָּךְ חַיֶּיךָ אַתָּה תִרְעֶה צֹאנִי יִשְׂרָאֵל, הֱוֵי: וּמשֶׁה הָיָה רוֹעֶה.", "english": "The Holy One, blessed be He, said: The one who knows how to pasture the flock—each according to its strength—let him come and pasture My people. This is what is written: “From behind the nursing ewes He brought him, to shepherd Jacob His people” (Psalms 78:71). And so Moses— the Holy One, blessed be He, tested him only with the sheep. Our Rabbis said: When Moses our teacher, peace be upon him, was shepherding Jethro’s flock in the wilderness, a young goat ran away from him. He ran after it until it reached a shaded place. When it reached that spot, a pool of water appeared before it, and the kid stood and drank. When Moses reached it, he said: “I did not know that you ran because of thirst. You are weary.” He placed it on his shoulder and walked. The Holy One, blessed be He, said: “You have compassion to lead the flock of flesh and blood—by your life, you will shepherd My flock, Israel.” Thus: “And Moses was shepherding…”"}, {"location": "Shemot Rabbah 30:13", "hebrew": "״חָכָם שֶׁהוּא יוֹדֵעַ הֲלָכוֹת וּמִדְרָשׁוֹת וְאַגָּדוֹת, וְיָתוֹם וְאַלְמָנָה הוֹלְכִין אֶצְלוֹ שֶׁיַּעֲשֶׂה דִּין בֵּינֵיהֶן וְהוּא אוֹמֵר לָהֶן ׳עָסוּק אֲנִי בְּמִשְׁנָתִי, אֵינִי פָּנוּי׳... מַעֲלֶה אֲנִי עָלֶיךָ כְּאִלּוּ הֶחֱרַבְתָּ אֶת הָעוֹלָם.״", "english": "“A sage who knows halakhot, midrashot, and aggadot, and an orphan and widow come to him to judge between them, and he says to them, ‘I am busy with my Mishnah; I am not free’… I regard you as though you destroyed the world.”"}, {"location": "Midrash Tanchuma, Pinchas 10", "hebrew": "בְּבַקָּשָׁה מִמְּךָ, אִם בִּקַּשְׁתָּ לְמָנוֹת עֲלֵיהֶם מַנְהִיג, מְנֵה עֲלֵיהֶם אָדָם שֶׁיְּהֵא סוֹבֵל לְכָל אֶחָד וְאֶחָד לְפִי דַּעְתּוֹ.", "english": "Please—if you seek to appoint a leader over them, appoint over them a person who can bear each and every one according to their understanding."}, {"location": "Midrash Tanchuma, Tetzaveh 8", "hebrew": "מִפְּנֵי מָה זָכָה שָׁאוּל לַמַּלְכוּת? מִפְּנֵי שֶׁהָיָה זְקֵנוֹ מַדְלִיק נֵרוֹת לָרַבִּים בִּמְבוֹאוֹת הָאֲפֵלִין.", "english": "Why did Saul merit kingship? Because his grandfather would light lamps for the public in dark alleyways."}, {"location": "Derech Eretz Zuta 9:24", "hebrew": "אֲפִלּוּ בְּשָׁעָה שֶׁיִּשְׂרָאֵל עוֹבְדִים עֲבוֹדָה זָרָה, וְיֵשׁ שָׁלוֹם בֵּינֵיהֶן, אוֹמֵר הַקָּדוֹשׁ בָּרוּךְ הוּא: אֵין רְצוֹנִי לִנְגֹּעַ בָּהֶן.", "english": "Even when Israel worships idolatry, if there is peace among them, the Holy One, blessed be He, says: “It is not My will to touch them.”"}, {"location": "Shir HaShirim Rabbah 5:2; Pesikta DeRav Kahana 24", "hebrew": "פִּתְחִי לִי, רַבִּי יַסָּא אָמַר, אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, בָּנַי, פִּתְחוּ לִי פֶּתַח אֶחָד שֶׁל תְּשׁוּבָה כְּחֻדָּהּ שֶׁל מַחַט, וַאֲנִי פּוֹתֵחַ לָכֶם פְּתָחִים שֶׁיִּהְיוּ עֲגָלוֹת וּקְרוֹנִיּוֹת נִכְנָסוֹת בּוֹ... רַבִּי לֵוִי אָמַר אִלּוּ הָיוּ יִשְׂרָאֵל עוֹשִׂין תְּשׁוּבָה אֲפִלּוּ יוֹם אֶחָד, מִיָּד הֵן נִגְאָלִין, וּמִיָּד בֶּן דָּוִד בָּא, מַה טַּעַם (תהלים צה, ז): כִּי הוּא אֱלֹהֵינוּ וַאֲנַחְנוּ עַם מַרְעִיתוֹ וְצֹאן יָדוֹ הַיּוֹם אִם בְּקֹלוֹ תִשְׁמָעוּ,", "english": "“Open for Me,” Rabbi Yasa said—The Holy One, blessed be He, said to Israel: My children, open for Me one opening of repentance like the eye of a needle, and I will open for you openings through which wagons and carriages can enter… Rabbi Levi said: If Israel would repent even one day, they would immediately be redeemed, and the son of David would immediately come, as it says: “Today, if you will heed His voice.”"}, {"location": "Megillah 29a", "hebrew": "בּוֹא וּרְאֵה כַּמָּה חֲבִיבִין יִשְׂרָאֵל לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא: שֶׁבְּכָל מָקוֹם שֶׁגָּלוּ, שְׁכִינָה עִמָּהֶן.", "english": "Come and see how beloved Israel is before the Holy One, blessed be He: in every place they were exiled, the Shechinah is with them."}, {"location": "Shemot Rabbah 41:6", "hebrew": "(שמות לא:יח) \"וַיִּתֵּן אֶל משֶׁה\", אָמַר רַבִּי אַבָּהוּ, כָּל אַרְבָּעִים יוֹם שֶׁעָשָׂה משֶׁה לְמַעְלָה, הָיָה לוֹמֵד תּוֹרָה וְשׁוֹכֵחַ, אָמַר לוֹ: רִבּוֹן הָעוֹלָם, יֵשׁ לִי אַרְבָּעִים יוֹם, וְאֵינִי יוֹדֵעַ דָּבָר! מֶה עָשָׂה הַקָּדוֹשׁ בָּרוּךְ הוּא - מִשֶּׁהִשְׁלִים אַרְבָּעִים יוֹם נָתַן לוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת הַתּוֹרָה מַתָּנָה, שֶׁנֶּאֱמַר: \"וַיִּתֵּן אֶל משֶׁה\".", "english": "“And He gave to Moses” (Exodus 31:18)—Rabbi Abbahu said: Throughout the forty days Moses was above, he would learn Torah and forget. He said: Master of the universe, I have forty days and I know nothing! What did the Holy One, blessed be He, do? When forty days were completed, the Holy One, blessed be He, gave him the Torah as a gift, as it says: “And He gave to Moses.”"}, {"location": "Jerusalem Talmud, Horayot 3:5", "hebrew": "אָמַר רִבִּי יוֹחָנָן. כָּל אוֹתָן אַרְבְּעִים יוֹם שֶׁעָשָׂה מֹשֶׁה בָהָר הָיָה לָמֵד תּוֹרָה וּמְשַׁכְּחָהּ. וּבְסוֹף נִתְּנָה לוֹ בְּמַתָּנָה. כָּל כָּךְ לָמָּה. בִּשְׁבִיל לְהַחֲזִיר אֶת הַטִּיפְּשִׁים", "english": "Rabbi Yohanan said: All those forty days that Moses was on the mountain he would learn Torah and forget it; in the end it was given to him as a gift. Why all this? To answer/bring back the foolish. ???"}, {"location": "Vayikra Rabbah 1:15", "hebrew": "וַיִּקְרָא אֶל משֶׁה וַיְדַבֵּר ה', מִכָּן אָמְרוּ כָּל תַּלְמִיד חָכָם שֶׁאֵין בּוֹ דַעַת, נְבֵלָה טוֹבָה הֵימֶנּוּ, תֵּדַע לְךָ שֶׁכֵּן, צֵא וּלְמַד מִמּשֶׁה אֲבִי הַחָכְמָה, אֲבִי הַנְּבִיאִים, שֶׁהוֹצִיא יִשְׂרָאֵל מִמִּצְרַיִם, וְעַל יָדוֹ נַעֲשׂוּ כַּמָּה נִסִּים בְּמִצְרַיִם וְנוֹרָאוֹת עַל יַם סוּף, וְעָלָה לִשְׁמֵי מָרוֹם וְהוֹרִיד תּוֹרָה מִן הַשָּׁמַיִם, וְנִתְעַסֵּק בִּמְלֶאכֶת הַמִּשְׁכָּן וְלֹא נִכְנַס לִפְנַי וְלִפְנִים עַד שֶׁקָּרָא לוֹ, שֶׁנֶּאֱמַר (ויקרא א, א): וַיִּקְרָא אֶל משֶׁה וַיְדַבֵּר", "english": "“He called to Moses, and the LORD spoke…” From here they said: Any Torah scholar who lacks discernment (da‘at) is worse than a carcass. Know that this is so: go and learn from Moses, the father of wisdom, the father of prophets—who brought Israel out from Egypt, through whom many miracles were done in Egypt and awesome deeds at the Sea of Reeds; who ascended to the heights of heaven and brought down Torah from heaven; who occupied himself with the work of the Tabernacle—yet he did not enter the innermost sanctum until he was called, as it is said: “He called to Moses, and the LORD spoke…” (Leviticus 1:1)."}, {"location": "Bamidbar Rabbah 12:4", "hebrew": "\"תּוֹכוֹ רָצוּף אַהֲבָה מִבְּנוֹת יְרוּשָׁלָיִם\" (שה\"ש ג:י)... רַבִּי עֲזַרְיָה בְּשֵׁם רַבִּי יְהוּדָה בַּר סִימוֹן אָמַר: זוֹ הַשְּׁכִינָה, כְּמָה דְתֵימָא (דברים ו:ה): \"וְאָהַבְתָּ אֵת ה' אֱלֹקֶיךָ\".", "english": "“Its interior is inlaid with love, from the daughters of Jerusalem” (Song of Songs 3:10)… Rabbi Azaryah in the name of Rabbi Yehudah bar Simon said: This is the Shechinah, as it says: “And you shall love the LORD your God.”"}, {"location": "Tanna Devei Eliyahu Zuta 2", "hebrew": "פַּעַם אַחַת הָיִיתִי מְהַלֵּךְ בַּדֶּרֶךְ וּמְצָאֻנִי אָדָם אֶחָד, וּבָא אֵלַי בְּדֶרֶךְ מִינוּת, וְיֵשׁ בּוֹ מִקְרָא וְאֵין בּוֹ מִשְׁנָה. אָמַר לִי: מִקְרָא נִתַּן לָנוּ מֵהַר סִינַי, מִשְׁנָה לֹא נִתַּן לָנוּ מֵהַר סִינַי? וְאָמַרְתִּי לוֹ: בְּנִי, וַהֲלֹא מִקְרָא וּמִשְׁנָה מִפִּי הַגְּבוּרָה נֶאֶמְרוּ.\nוּמָה בֵּין מִקְרָא לַמִּשְׁנָה? מָשְׁלוּ מָשָׁל לְמָה הַדָּבָר דּוֹמֶה, לְמֶלֶךְ בָּשָׂר וְדָם שֶׁהָיוּ לוֹ שְׁנֵי עֲבָדִים, וְהָיָה אוֹהֲבָם אַהֲבָה גְּמוּרָה. נָתַן לְזֶה קַב חִטִּין וְלָזֶה קַב חִטִּין, לְזֶה אֲגֻדָּה שֶׁל פִּשְׁתָּן וְלָזֶה אֲגֻדָּה שֶׁל פִּשְׁתָּן.\nהַפִּקֵּחַ שֶׁבָּהֶן מַה עָשָׂה? נָטַל אֶת הַפִּשְׁתָּן וַאֲרָגוֹ מַפָּה, נָטַל אֶת הַחִטָּה וְעָשָׂה סֹלֶת, בֵּרְרָהּ, טְחָנָהּ, וְלָשָׁהּ וְאַפְאָהּ, וְסִדְּרָה עַל גַּבֵּי הַשֻּׁלְחָן, וּפָרַס עָלֶיהָ מַפָּה, וְהִנִּיחָה עַד שֶׁלֹּא בָּא הַמֶּלֶךְ.\nהַטִּפֵּשׁ שֶׁבָּהֶן לֹא עָשָׂה וְלֹא כְּלוּם. לְיָמִים בָּא הַמֶּלֶךְ בְּתוֹךְ בֵּיתוֹ וְאָמַר לָהֶן: בְּנִי, הָבִיאוּ לִי מָה שֶׁנָּתַתִּי לָכֶם. אֶחָד הוֹצִיא אֶת פַּת הַסֹּלֶת עַל גַּבֵּי הַשֻּׁלְחָן וּמַפָּה פְּרוּסָה עָלָיו, וְאֶחָד הוֹצִיא אֶת הַחִטִּין בַּקֻּפָּה, וַאֲגֻדָּה שֶׁל  פִּשְׁתָּן עֲלֵיהֶן.\nאוֹי לָהּ לְאוֹתָהּ בּוּשָׁה! אוֹי לָהּ לְאוֹתָה כְּלִמָּה! הָוֵי אוֹמֵר אֵיזֶה מֵהֶן חָבִיב? זֶה שֶׁהוֹצִיא אֶת הַשֻּׁלְחָן וְאֶת פַת הַסֹּלֶת וּמַפָּה פְּרוּסָה עָלָיו. \nוְאָמַרְתִּי לוֹ, בְּנִי, כְּשֶׁנָּתַן הַקָּדוֹשׁ בָּרוּךְ הוּא תּוֹרָה לְיִשְׂרָאֵל, לֹא נָתְנָה לָהֶן אֶלָּא כְּחִטִּים לְהוֹצִיא מֵהֶן סֹלֶת, וּכְפִשְׁתָּן לְהוֹצִיא מִמֶּנּוּ בֶּגֶד.", "english": "“Once I was walking on the road and a man found me and came to me in a way of heresy; he had Scripture but not Mishnah. He said to me: Scripture was given to us from Mount Sinai—was Mishnah not given to us from Mount Sinai? I said to him: My son, surely both Scripture and Mishnah were spoken from the mouth of the Mighty One.”\nAnd what is the difference between Scripture and Mishnah? They gave a parable: To what is the matter comparable? To a mortal king who had two servants and loved them with complete love. He gave this one a kav of wheat and that one a kav of wheat; to this one a bundle of flax and that one a bundle of flax.\nWhat did the clever one among them do? He took the flax and wove it into a cloth; he took the wheat and made fine flour, sifted it, ground it, kneaded it, baked it, arranged it on a table, spread a cloth over it, and set it aside until the king came.\nThe foolish one among them did nothing. When the king came into his house and said: My children, bring me what I gave you—one brought out the fine bread on a table with a cloth spread over it; the other brought out the wheat in a basket with the bundle of flax on top.\nWoe for that shame! Woe for that disgrace! Say then: which of them is beloved? The one who brought out the table and the fine bread, with a cloth spread over it.\nAnd I said to him: My son, when the Holy One, blessed be He, gave Torah to Israel, He gave it to them only like wheat—from which to bring out fine flour—and like flax—from which to bring out a garment."}, {"location": "Chagigah 3b", "hebrew": "״בַּעֲלֵי אֲסֻפּוֹת״—אֵלּוּ תַּלְמִידֵי חֲכָמִים, שֶׁיּוֹשְׁבִין אֲסוּפּוֹת אֲסוּפּוֹת וְעוֹסְקִין בַּתּוֹרָה. הַלָּלוּ מְטַמְּאִין וְהַלָּלוּ מְטַהֲרִין, הַלָּלוּ אוֹסְרִין וְהַלָּלוּ מַתִּירִין, הַלָּלוּ פּוֹסְלִין וְהַלָּלוּ מַכְשִׁירִין, שֶׁמָּא יֹאמַר אָדָם: הֵיאַךְ אֲנִי לָמֵד תּוֹרָה מֵעַתָּה—תַּלְמוּד לוֹמַר: ״כּוּלָּם נִתְּנוּ מֵרוֹעֶה אֶחָד״. אֵל אֶחָד נְתָנָן, פַּרְנָס אֶחָד אֲמָרָן, מִפִּי אֲדוֹן כָּל הַמַּעֲשִׂים בָּרוּךְ הוּא, דִּכְתִיב: ״וַיְדַבֵּר אֱלֹקִים אֶת כָּל הַדְּבָרִים הָאֵלֶּה״. אַף אַתָּה, עֲשֵׂה אָזְנֶיךָ כַּאֲפַרְכֶּסֶת, וּקְנֵה לְךָ לֵב מֵבִין לִשְׁמוֹעַ אֶת דִּבְרֵי מְטַמְּאִים וְאֶת דִּבְרֵי מְטַהֲרִים, אֶת דִּבְרֵי אוֹסְרִין וְאֶת דִּבְרֵי מַתִּירִין, אֶת דִּבְרֵי פוֹסְלִין וְאֶת דִּבְרֵי מַכְשִׁירִין.", "english": "“Masters of collections”—these are Torah scholars, who sit in groups upon groups and engage in Torah. Some declare something impure and others declare it pure; some forbid and others permit; some disqualify and others deem fit. Lest a person say, “How can I learn Torah from now on?” Scripture teaches: “All of them were given by one Shepherd.” One God gave them; one leader spoke them; from the mouth of the Master of all deeds, blessed be He, as it is written: “And God spoke all these words.” You too—make your ears like a funnel, and acquire for yourself an understanding heart to hear the words of those who declare impure and the words of those who declare pure; the words of those who forbid and the words of those who permit; the words of those who disqualify and the words of those who deem fit."}, {"location": "Bereishit Rabbah 61:1", "hebrew": "אָמַר רַבִּי שִׁמְעוֹן אָב לֹא לִמְּדוֹ, וְרַב לֹא הָיָה לוֹ, וּמֵהֵיכָן לָמַד אֶת הַתּוֹרָה, אֶלָּא זִמֵּן לוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא שְׁתֵּי כִלְיוֹתָיו כְּמִין שְׁנֵי רַבָּנִים, וְהָיוּ נוֹבְעוֹת וּמְלַמְּדוֹת אוֹתוֹ תּוֹרָה וְחָכְמָה.״", "english": "Rabbi Shimon said: Abraham—his father did not teach him, and he had no rabbi; from where did he learn Torah? Rather, the Holy One, blessed be He, prepared for him his two kidneys like two rabbis, and they would gush forth and teach him Torah and wisdom."}, {"location": "Eichah Rabbah Petichta", "hebrew": "״הַלְוַאי אוֹתִי עָזָבוּ וְתוֹרָתִי שָׁמָרוּ, מִתּוֹךְ שֶׁהָיוּ מִתְעַסְּקִין בָּהּ הַמָּאוֹר שֶׁבָּהּ הָיָה מַחֲזִירָן לְמוּטָב.״", "english": "“Would that they left Me but kept My Torah; for through occupying themselves with it, the light within it would bring them back to the good.”"}, {"location": "Midrash Tanchuma, Naso 16", "hebrew": "״בְּשָׁעָה שֶׁבָּרָא הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת הָעוֹלָם, נִתְאַוָּה שֶׁיְּהֵא לוֹ דִּירָה בַּתַּחְתּוֹנִים כְּמוֹ שֶׁיֵּשׁ בָּעֶלְיוֹנִים.״", "english": "“When the Holy One, blessed be He, created the world, He desired that He should have a dwelling in the lower realms, as He has in the upper realms.”"}, {"location": "Midrash Tanchuma, Tetzaveh 2", "hebrew": "״אָמְרָה כְּנֶסֶת יִשְׂרָאֵל לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא: ... אַתָּה מֵאִיר לְכָל הָעוֹלָם, וְאַתָּה מְצַוֶּה לְהַעֲלֹת נֵר תָמִיד? אָנוּ בְּאוֹרְךָ נִרְאֶה אוֹר, וְאַתָּה אוֹמֵר לְהַדְלִיק נֵרוֹת?״ ״אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא: חָבִיב עָלַי נֵרוֹת שֶׁאַהֲרֹן מַדְלִיק מִן הַמְּאוֹרוֹת שֶׁקָּבַעְתִּי בַּשָּׁמַיִם.״", "english": "The Assembly of Israel said before the Holy One, blessed be He: … You illuminate the whole world—yet You command to raise a continual lamp? In Your light we see light, and You say to light lamps? The Holy One, blessed be He, said: Dear to Me are the lamps that Aaron lights, more than the luminaries I set in the heavens."}, {"location": "Bereishit Rabbah 65:22", "hebrew": "דָּבָר אַחֵר, וַיָּרַח אֶת רֵיחַ בְּגָדָיו וַיְבָרֲכֵהוּ, כְּגוֹן יוֹסֵף מְשִׁיתָא וְיָקוּם אִישׁ צְרוֹרוֹת. יוֹסֵף מְשִׁיתָא, בְּשָׁעָה שֶׁבִּקְּשׁוּ שׂוֹנְאִים לְהִכָּנֵס לְהַר הַבַּיִת אָמְרוּ יִכָּנֵס מֵהֶם וּבָהֶם תְּחִלָּה, אֲמָרִין לֵיהּ עוּל וּמַה דְּאַתְּ מַפִּיק דִּידָךְ, נִכְנַס וְהוֹצִיא מְנוֹרָה שֶׁל זָהָב, אָמְרוּ לוֹ אֵין דַּרְכּוֹ שֶׁל הֶדְיוֹט לְהִשְׁתַּמֵּשׁ בָּזוֹ, אֶלָּא עוּל זְמַן תִּנְיָנוּת וּמַה דְּאַתְּ מַפִּיק דִּידָךְ, וְלֹא קִבֵּל עָלָיו. אָמַר רַבִּי פִּינְחָס נָתְנוּ לוֹ מֶכֶס שָׁלשׁ שָׁנִים, וְלֹא קִבֵּל עָלָיו, אָמַר לֹא דַּיִּי שֶׁהִכְעַסְתִּי לֵאלֹהַי פַּעַם אַחַת אֶלָּא שֶׁאַכְעִיסֶנּוּ פַּעַם שְׁנִיָּה. מֶה עָשׂוּ לוֹ נָתְנוּ אוֹתוֹ בַּחֲמוֹר שֶׁל חָרָשִׁים וְהָיוּ מְנַסְּרִים בּוֹ, הָיָה מְצַוֵּחַ וְאוֹמֵר וַוי אוֹי אוֹי שֶׁהִכְעַסְתִּי לְבוֹרְאִי.", "english": "Another interpretation: “And he smelled the scent of his garments and blessed him”—as in the cases of Yosef Meshita and Yakum Ish Tzerorot. Yosef Meshita: when the enemies sought to enter the Temple Mount, they said, “Let one of them go in first.” They told him, “Go in, and whatever you bring out will be yours.” He entered and brought out a golden menorah. They said to him, “It is not the way of a commoner to use this; rather, go in a second time, and whatever you bring out will be yours.” But he would not accept. Rabbi Pinchas said: they even offered him three years’ exemption from taxes, and he would not accept. He said, “Is it not enough that I angered my God once—must I anger Him a second time?” What did they do to him? They put him on a carpenter’s donkey and sawed him in it; and he kept crying out, “Woe, woe—alas that I angered my Creator!”"}, {"location": "Berakhot 63a", "hebrew": "דָּרַשׁ בַּר קַפָּרָא: אֵיזוֹהִי פָּרָשָׁה קְטַנָּה שֶׁכָּל גּוּפֵי תוֹרָה תְּלוּיִין בָּהּ — ״בְּכָל דְּרָכֶיךָ דָעֵהוּ וְהוּא יְיַשֵּׁר אֹרְחֹתֶיךָ״. אָמַר רָבָא: אֲפִילּוּ לִדְבַר עֲבֵירָה.", "english": "Bar Kappara taught: Which is the small passage on which all the essential bodies of Torah depend? “In all your ways know Him, and He will straighten your paths.” Rava said: even regarding a matter of transgression."}, {"location": "Bereishit Rabbah 44:1", "hebrew": "(תהלים יח, לא): הָאֵל תָּמִים דַּרְכּוֹ אִמְרַת ה' צְרוּפָה מָגֵן הוּא לְכֹל הַחוֹסִים בּוֹ, אִם דְּרָכָיו תְּמִימִים, הוּא עַל אַחַת כַּמָּה וְכַמָּה, רַב אָמַר לֹא נִתְּנוּ הַמִּצְווֹת אֶלָּא לְצָרֵף בָּהֶן אֶת הַבְּרִיּוֹת, וְכִי מָה אִיכְפַּת לֵיהּ לְהַקָּדוֹשׁ בָּרוּךְ הוּא לְמִי שֶׁשּׁוֹחֵט מִן הַצַּוָּאר אוֹ מִי שֶׁשּׁוֹחֵט מִן הָעֹרֶף, הֱוֵי לֹא נִתְּנוּ הַמִּצְווֹת אֶלָּא לְצָרֵף בָּהֶם אֶת הַבְּרִיּוֹת.", "english": "“God—His way is perfect; the word of the LORD is refined; He is a shield to all who take refuge in Him” (Psalm 18:31). If His ways are perfect, how much more so! Rav said: The mitzvot were given only to refine (לצרף) the creatures—what does the Holy One, blessed be He, care whether one slaughters from the neck or from the nape? Rather, the mitzvot were given only to refine the creatures."}, {"location": "Ketubot 111b", "hebrew": "(דברים ל, כ) ״לאהבה את ה' אלקיך ולדבקה בו״ – וכי אפשר לאדם לידבק בשכינה? אלא כל המשיא בתו לתלמיד חכם והעושה פרקמטיא לתלמידי חכמים והמהנה תלמידי חכמים מנכסיו מעלה עליו הכתוב כאילו מדבק בשכינה.", "english": "“To love the LORD your God and to cleave to Him” (Deut. 30:20)—is it possible for a person to cleave to the Shechinah? Rather: whoever marries their daughter to a Torah scholar, does business for Torah scholars, and benefits Torah scholars from their property—Scripture considers it as though they cleave to the Shechinah."}, {"location": "Midrash Tanchuma, Kedoshim 5", "hebrew": "קְדֹשִׁים תִּהְיוּ. לָמָּה, לְפִי שֶׁהִדְבַּקְתִּי אֶתְכֶם לְמָתְנַי, שֶׁנֶּאֱמַר: כִּי כַּאֲשֶׁר יִדְבַּק הָאֵזוֹר אֶל מָתְנֵי אִישׁ וְגוֹ' (ירמיה יג, יא). לְפִיכָךְ, קְדֹשִׁים תִּהְיוּ כִּי קָדוֹשׁ אֲנִי ה'.", "english": "“You shall be holy.” Why? Because I attached you to My loins, as it says: “For as the belt clings to a man’s loins…” Therefore: you shall be holy, for I, the LORD, am holy."}, {"location": "Bereishit Rabbah 80:7", "hebrew": "רֵישׁ לָקִישׁ אָמַר בִּשְׁלשָׁה לְשׁוֹנוֹת שֶׁל חִבָּה חִבֵּב הַקָּדוֹשׁ בָּרוּךְ הוּא אֶת יִשְׂרָאֵל, בִּדְבִיקָה, בַּחֲשִׁיקָה וּבַחֲפִיצָה. בִּדְבִיקָה (דברים ד, ד): וְאַתֶּם הַדְּבֵקִים. בַּחֲשִׁיקָה (דברים ז, ז): לֹא מְרֻבְּכֶם מִכָּל הָעַמִּים חָשַׁק ה'. וּבַחֲפִיצָה (מלאכי ג, יב): וְאִשְּׁרוּ אֶתְכֶם כָּל הַגּוֹיִם וגו'.", "english": "Reish Lakish said: With three expressions of affection the Holy One, blessed be He, cherished Israel—through cleaving, through desire, and through delight/choosing (דביקה, חשיקה, חפיצה). Through cleaving: “you who cleave…” Through desire: “the LORD desired…” Through delight/choosing: “all the nations will call you happy…”"}, {"location": "Bamidbar Rabbah 17:6", "hebrew": "לְמַעַן תִּזְכְּרוּ וַעֲשִׂיתֶם אֶת כָּל מִצְוֹתָי, מָשָׁל לְאֶחָד מֻשְׁלָךְ לְתוֹךְ הַמַּיִם, הוֹשִׁיט הַקַּבַּרְנִיט אֶת הַחֶבֶל וְאָמַר לוֹ תְּפֹס חֶבֶל זֶה בְּיָדְךָ וְאַל תַּנִּיחֵהוּ, שֶׁאִם תַּנִּיחֵהוּ אֵין לְךָ חַיִּים. אַף כָּךְ אָמַר לָהֶם הַקָּדוֹשׁ בָּרוּךְ הוּא לְיִשְׂרָאֵל, כָּל זְמַן שֶׁאַתֶּם מְדֻבָּקִין בַּמִּצְוֹת (דברים ד, ד): וְאַתֶּם הַדְּבֵקִים בַּה' אֱלֹהֵיכֶם חַיִּים כֻּלְכֶם הַיּוֹם. וְכֵן הוּא אוֹמֵר (משלי ד, יג): הַחֲזֵק בַּמּוּסָר אַל תֶּרֶף נִצְּרֶהָ כּ
