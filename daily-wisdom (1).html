מִפְּנֵי הַגְּשָׁמִים. אָמְרוּ לוֹ: רַבִּי, כְּשֵׁם שֶׁהִתְפַּלַּלְתָּ שֶׁיֵּרְדוּ, כָּךְ הִתְפַּלֵּל וְיֵלְכוּ לָהֶם. אָמַר לָהֶם: כָּךְ מְקוּבְּלַנִי שֶׁאֵין מִתְפַּלְּלִין עַל רוֹב הַטּוֹבָה. אַף עַל פִּי כֵן, הָבִיאוּ לִי פַּר הוֹדָאָה. הֵבִיאוּ לוֹ פַּר הוֹדָאָה, סָמַךְ שְׁתֵּי יָדָיו עָלָיו, וְאָמַר לְפָנָיו: רִבּוֹנוֹ שֶׁל עוֹלָם! עַמְּךָ יִשְׂרָאֵל שֶׁהוֹצֵאתָ מִמִּצְרַיִם אֵינָן יְכוֹלִין לֹא בְּרוֹב טוֹבָה וְלֹא בְּרוֹב פּוּרְעָנוּת. כָּעַסְתָּ עֲלֵיהֶם — אֵינָן יְכוֹלִין לַעֲמוֹד, הִשְׁפַּעְתָּ עֲלֵיהֶם טוֹבָה — אֵינָן יְכוֹלִין לַעֲמוֹד, יְהִי רָצוֹן מִלְּפָנֶיךָ שֶׁיִּפָּסְקוּ הַגְּשָׁמִים, וִיהֵא רֶיוַח בָּעוֹלָם. מִיָּד נָשְׁבָה הָרוּחַ, וְנִתְפַּזְּרוּ הֶעָבִים, וְזָרְחָה הַחַמָּה, וְיָצְאוּ הָעָם לַשָּׂדֶה וְהֵבִיאוּ לָהֶם כְּמֵהִין וּפִטְרִיּוֹת. שָׁלַח לוֹ שִׁמְעוֹן בֶּן שָׁטַח: אִלְמָלֵא חוֹנִי אַתָּה, גּוֹזְרַנִי עָלֶיךָ נִידּוּי. שֶׁאִילּוּ שָׁנִים כִּשְׁנֵי אֵלִיָּהוּ שֶׁמַּפְתְּחוֹת גְּשָׁמִים בְּיָדוֹ שֶׁל אֵלִיָּהוּ, לֹא נִמְצָא שֵׁם שָׁמַיִם מִתְחַלֵּל עַל יָדְךָ, אֲבָל מָה אֶעֱשֶׂה לְךָ, שֶׁאַתָּה מִתְחַטֵּא לִפְנֵי הַמָּקוֹם וְעוֹשֶׂה לְךָ רְצוֹנְךָ, כְּבֵן שֶׁמִּתְחַטֵּא עַל אָבִיו וְעוֹשֶׂה לוֹ רְצוֹנוֹ, וְאוֹמֵר לוֹ: אַבָּא, הוֹלִיכַנִי לְרׇחְצֵנִי בְּחַמִּין. שׇׁטְפֵנִי בְּצוֹנֵן. תֵּן לִי אֱגוֹזִים, שְׁקֵדִים, אֲפַרְסְקִים וְרִמּוֹנִים — וְנוֹתֵן לוֹ. וְעָלֶיךָ הַכָּתוּב אוֹמֵר: ״יִשְׂמַח אָבִיךָ וְאִמֶּךָ וְתָגֵל יוֹלַדְתֶּךָ״.", "english": "The Sages taught: Once most of Adar had passed and rain had not fallen. They sent to Ḥoni the Circle-Drawer: 'Pray and rain will fall!' He prayed and rain did not fall. He drew a circle and stood within it, as Ḥabakkuk did, as it is said: 'I will stand on my watch and set myself upon the rampart.' He said: 'Master of the universe! Your children have turned their faces toward me, for I am like a member of Your household. I swear by Your great Name that I will not move from here until You have mercy on Your children.'\nRain began to drip. His students said: 'Rabbi, we have seen you, and we will not die; it seems the rains come only to release you from your oath.' He said: 'Not so I asked, but rains to fill cisterns, pits, and caves.' Then they fell with fury, until each drop was as large as the mouth of a barrel; the Sages estimated no drop was less than a log. His students said: 'Rabbi, we have seen you, and we will not die; it seems the rains come to destroy the world.' He said: 'Not so I asked, but rains of favor, blessing, and generosity.' They fell properly, until the people went up to the Temple Mount because of the rains. They said: 'Rabbi, just as you prayed for them to come, pray that they go.' He said: 'This is my tradition: one does not pray over an abundance of goodness. Nevertheless, bring me a thanksgiving bull.' They brought it; he laid both hands on it and said: 'Master of the universe! Your people Israel, whom You brought out of Egypt, cannot endure either too much good or too much punishment. If You are angry with them, they cannot stand; if You pour good upon them, they cannot stand. May it be Your will that the rains cease and there be relief in the world.' Immediately the wind blew, the clouds scattered, the sun shone, and the people went out and brought truffles and mushrooms.\nShimon ben Shetaḥ sent to him: 'If you were not Ḥoni, I would decree excommunication upon you. For were the years like the years of Elijah—whose keys of rain are in his hand—there would not be desecration of Heaven’s Name through you. But what can I do to you, since you ingratiate yourself before the Omnipresent and He does your will, like a son who ingratiates himself before his father and his father does his will: “Father, bathe me in hot water; rinse me in cold; give me nuts, almonds, peaches, and pomegranates”—and he gives him. Of you the verse says: “Let your father and your mother rejoice, and let her who bore you be glad.”'"}, {"location": "Bava Metzia 85a", "hebrew": "הָהוּא עִגְלָא דַּהֲווֹ קָא מַמְטוּ לֵיהּ לִשְׁחִיטָה. אֲזַל תַּלְיֵאּ לְרֵישֵׁיהּ בְּכַנְפֵיהּ דְּרַבִּי וְקָא בָכֵי. אֲמַר לֵיהּ: זִיל, לְכָךְ נוֹצַרְתָּ. אָמְרִי הוֹאִיל וְלָא קָא מְרַחֵם – לֵיתוֹ עֲלֵיהּ יִסּוּרִין.", "english": "A calf was being led to slaughter. It went and hid its head in Rabbi’s cloak and cried. He said to it: 'Go, for this you were created.' They said: Since he did not have compassion, suffering came upon him."}, {"location": "Sanhedrin 97a", "hebrew": "אָמַר רָבָא: מֵרֵישׁ הֲוָה אָמֵינָא, לֵיכָּא קוּשְׁטָא בְּעָלְמָא. אֲמַר לִי הָהוּא מֵרַבָּנַן, וְרַב טָבוּת שְׁמֵיהּ – וְאָמְרִי לַהּ רַב טָבְיוֹמֵי שְׁמֵיהּ – דְּאִי הֲווֹ יָהֲבִי לֵיהּ כֹּל חֲלָלֵי דְּעָלְמָא לָא הֲוָה מְשַׁנֵּי בְּדִיבּוּרֵיהּ. זִימְנָא חֲדָא אִיקְּלַעִי לְהָהוּא אַתְרָא, וְקוּשְׁטָא שְׁמֵיהּ, וְלָא הֲווֹ מְשַׁנֵּי בְּדִיבּוּרַיְיהוּ, וְלָא הֲוָה מָיֵית אִינִישׁ מֵהָתָם בְּלָא זִימְנֵיהּ. נְסֵיבִי אִיתְּתָא מִינְּהוֹן, וַהֲווֹ לִי תְּרֵין בְּנִין מִינַּהּ. יוֹמָא חַד הֲוָה יָתְבָא דְּבֵיתְהוּ וְקָא חָיְיפָא רֵישָׁא. אֲתַאי שִׁיבָבְתַהּ, טְרַפָא אַדַּשָּׁא. סְבַרִי: לָאו אוֹרַח אַרְעָא. אֲמַרִי לַהּ: לֵיתַהּ הָכָא. שְׁכִיבוּ לֵיהּ תְּרֵין בְּנֵיהּ. אֲתוֹ אִינָשֵׁי דְּאַתְרָא לְקַמֵּיהּ, אֲמַרוּ לֵיהּ: מַאי הַאי? אֲמַר לְהוּ: הָכִי הֲוָה מַעֲשֶׂה. אֲמַרוּ לֵיהּ: בְּמָטוּתָא מִינָּךְ, פּוֹק מֵאַתְרִין וְלָא תְּגָרֵי בְּהוּ מוֹתָנָא בְּהָנָךְ אִינָשֵׁי.", "english": "Rava said: At first I used to say: There is no truth in the world. A certain rabbi told me—Rav Tavut was his name (and some say Rav Tavyomei was his name)—that even if they gave him all the spaces of the world, he would not change his speech. Once I came to a place called Kushta, and they did not alter their words; and no one there died before his time. I married a woman from there and had two sons.\nOne day she was sitting at home washing her hair. Her neighbor came and knocked. I thought: It is not proper conduct. I said to her: 'She is not here.' My two sons died. The people of the place came to me and said: 'What is this?' I told them what happened. They said: 'Please, leave our place and do not stir up death among these people.'"}, {"location": "Berakhot 6a", "hebrew": "אָמַר רַב אָשֵׁי: חָשַׁב אָדָם לַעֲשׂוֹת מִצְוָה, וְנֶאֱנַס, וְלֹא עֲשָׂאָהּ — מַעֲלֶה עָלָיו הַכָּתוּב כְּאִילּוּ עֲשָׂאָהּ.", "english": "Rav Ashi said: If a person intended to perform a mitzvah but was prevented and did not do it, Scripture credits him as though he did it."}, {"location": "Berakhot 10a", "hebrew": "רַבִּי יוֹחָנָן וְרַבִּי אֱלִיעֶזֶר דְאָמְרִי תַּרְוַיְיהוּ: אֲפִילּוּ חֶרֶב חַדָּה מוּנַּחַת עַל צַוָּארוֹ שֶׁל אָדָם, אַל יִמְנַע עַצְמוֹ מִן הָרַחֲמִים. שֶׁנֶּאֱמַר: ״הֵן יִקְטְלֵנִי לוֹ אֲיַחֵל״.", "english": "Rabbi Yoḥanan and Rabbi Eliezer both said: Even if a sharp sword rests upon a person’s neck, he should not withhold himself from mercy, as it is said: 'Though He slay me, I will hope in Him.'"}, {"location": "Pesachim 85b", "hebrew": "אָמַר רַבִּי יְהוֹשֻׁעַ בֶּן לֵוִי: אֲפִילּוּ מְחִיצָה שֶׁל בַּרְזֶל אֵינָהּ מַפְסֶקֶת בֵּין יִשְׂרָאֵל לַאֲבִיהֶם שֶׁבַּשָּׁמַיִם.", "english": "Rabbi Yehoshua ben Levi said: Even an iron partition does not separate Israel from their Father in Heaven."}, {"location": "Berakhot 10b", "hebrew": "אָמַר רַבִּי יוֹסֵי בְּרַבִּי חֲנִינָא: מִכָּאן שֶׁהָאִשָּׁה מַכֶּרֶת בְּאוֹרְחִין יוֹתֵר מִן הָאִישׁ.", "english": "Rabbi Yosei son of Rabbi Ḥanina said: From here we learn that a woman recognizes guests better than a man does."}, {"location": "Makkot 10b; Midrash Tanchuma, Mishpatim 2", "hebrew": "אָמַר רַבָּה בַּר רַב הוּנָא אָמַר רַב הוּנָא, וְאָמְרִי לַהּ אָמַר רַב הוּנָא אָמַר רַבִּי אֶלְעָזָר: מִן הַתּוֹרָה וּמִן הַנְּבִיאִים וּמִן הַכְּתוּבִים – בַּדֶּרֶךְ שֶׁאָדָם רוֹצֶה לֵילֵךְ בָּהּ – מוֹלִיכִין אוֹתוֹ.", "english": "Rabba bar Rav Huna said in the name of Rav Huna—and some say Rav Huna said in the name of Rabbi Elazar: From the Torah, the Prophets, and the Writings: In the path a person wishes to go, they lead him."}, {"location": "Kohelet Rabbah 2:21", "hebrew": "אָמַר רַבִּי יוּדָן בְּרַבִּי סִימוֹן גָּדוֹל כֹּחָן שֶׁל נְבִיאִים שֶׁמְדַמִּים אֶת הַצּוּרָה לְיוֹצְרָהּ, הֲדָא הוּא דִכְתִיב (דניאל ח, טז): וָאֶשְׁמַע קוֹל אָדָם בֵּין אוּלָי.", "english": "Rabbi Yudan son of Rabbi Simon said: Great is the power of the prophets, who liken the form to its Maker, as it is written: 'And I heard the voice of a man between Ulai.'"}, {"location": "Kohelet Rabbah 11:8:1", "hebrew": "כִּי אִם שָׁנִים הַרְבֵּה, יִשְׂמַח בְּשִׂמְחַת הַתּוֹרָה, וְיִזְכֹּר אֶת יְמֵי חַיֵּי הַחשֶׁךְ, אֵלּוּ יְמֵי הָרָעָה. כִּי הַרְבֵּה יִהְיוּ, תּוֹרָה שֶׁאָדָם לָמֵד בָּעוֹלָם הַזֶּה, הֶבֶל הִיא לִפְנֵי תּוֹרָתוֹ שֶׁל מָשִׁיחַ.", "english": "If a person lives many years, let him rejoice in the joy of Torah, and remember the days of darkness—these are the days of evil. Even if they are many: the Torah a person learns in this world is vanity compared to the Torah of the Messiah."}, {"location": "Bereishit Rabbah 4:4", "hebrew": "אָמַר רַבִּי חֲנִינָא בַּר אִיסֵי פְּעָמִים שֶׁאֵין הָעוֹלָם וּמְלוֹאוֹ מַחֲזִיקִים כְּבוֹד אֱלָהוּתוֹ, פְּעָמִים שֶׁהוּא מְדַבֵּר עִם הָאָדָם מִבֵּין שַׂעֲרוֹת רֹאשׁוֹ,", "english": "Rabbi Ḥanina bar Isi said: Sometimes the world and all it contains cannot hold the glory of His divinity; and sometimes He speaks with a person from between the hairs of his head."}, {"location": "Bereishit Rabbah 15:1", "hebrew": "וַיִּטַּע ה' אֱלֹהִים גַּן בְּעֵדֶן מִקֶּדֶם (בראשית ב, ח), דְּבֵי רַבִּי יַנַּאי אָמְרִין, לָמָּה הוּא מַזְכִּיר שֵׁם מָלֵא בִּנְטִיעַת הַגַּן, שֶׁמִּתְּחִלַּת בְּרִיָּתָהּ הִיא צְרִיכָה כִּוּוּן. קֹדֶם עַד שֶׁלֹא נוֹצְרָה מִמְּעֵי אִמָּהּ, אָדָם צָרִיךְ לְכַוֵּן אֶת רוּחוֹתֶיהָ, הֲדָא הוּא דִכְתִיב (תהלים קד, טז): יִשְׂבְּעוּ עֲצֵי ה' אַרְזֵי לְבָנוֹן אֲשֶׁר נָטָע, אָמַר רַבִּי חֲנִינָא כְּקַרְנֵי חֲגָבִים הָיוּ, וַעֲקָרָן הַקָּדוֹשׁ בָּרוּךְ הוּא וּשְׁתָלָן בְּתוֹךְ גַּן עֵדֶן.", "english": "On 'The LORD God planted a garden in Eden from the east': the house of Rabbi Yannai said: Why does Scripture use the full Name in the planting of the garden? To teach that from its very creation it required precise direction. Before a child is formed in its mother’s womb, a person must set its directions—this is what is written: 'The trees of the LORD are satisfied, the cedars of Lebanon that He planted.' Rabbi Ḥanina said: They were like the horns of locusts, and the Holy One, blessed be He, uprooted them and planted them within the Garden of Eden."}, {"location": "Eichah Rabbah 3:8", "hebrew": "חַסְדֵּי ה' כִּי לֹא תָמְנוּ כִּי לֹא כָלוּ רַחֲמָיו, אָמַר רַבִּי שִׁמְעוֹן בֶּן לָקִישׁ מִשֶּׁהַקָּדוֹשׁ בָּרוּךְ הוּא מִתְיָאֵשׁ מִן הַצַּדִּיקִים בָּעוֹלָם הַזֶּה, הוּא חוֹזֵר וּמְרַחֵם עֲלֵיהֶם", "english": "On 'The kindnesses of the LORD—for we are not consumed; His mercies never end': Reish Lakish said: When the Holy One, blessed be He, despairs of the righteous in this world, He returns and has mercy upon them."}, {"location": "Eichah Rabbah 3:8", "hebrew": "חֶלְקִי ה' אָמְרָה נַפְשִׁי, רַבִּי אַבָּהוּ בְּשֵׁם רַבִּי יוֹחָנָן אָמַר לְמֶלֶךְ שֶׁנִּכְנַס לִמְדִינָה וְהָיוּ עִמּוֹ דֻּכָּסִין וְאִפַּרְכִין וְאִיסְטְרַטִילוּטִין, וְהָיוּ גְּדוֹלֵי מְדִינָה יוֹשְׁבִים בְּאֶמְצַע הַמְּדִינָה, חַד אֲמַר אֲנָא נָסֵיב דֻּכָּסִין לְגַבִּי. וְחַד אֲמַר אֲנָא נָסֵיב אִפַּרְכִין לְגַבִּי, וְחַד אֲמַר אֲנָא נָסֵיב אִיסְטְרַטִילוּטִין לְגַבִּי. הָיָה פִּקֵּחַ אֶחָד לְשָׁם אֲמַר אֲנָא נָסֵיב לְמַלְכָּא, דְּכוֹלָּא מִתְחַלְּפִין וּמַלְכָּא אֵינוֹ מִתְחַלֵּף. כֵּן עוֹבְדֵי כּוֹכָבִים, מֵהֶן עוֹבְדִין לַחַמָּה, וּמֵהֶן עוֹבְדִין לַלְּבָנָה, וּמֵהֶן עוֹבְדִין לְעֵץ וָאֶבֶן, אֲבָל יִשְׂרָאֵל אֵינָן עוֹבְדִין אֶלָּא לְהַקָּדוֹשׁ בָּרוּךְ הוּא, הֲדָא הוּא דִכְתִיב: חֶלְקִי ה' אָמְרָה נַפְשִׁי, שֶׁאֲנִי מְיַחֵד אוֹתוֹ שְׁתֵּי פְּעָמִים בְּכָל יוֹם, וְאוֹמֵר (דברים ו, ד): שְׁמַע יִשְׂרָאֵל ה' אֱלֹהֵינוּ ה' אֶחָד.", "english": "On 'The LORD is my portion, says my soul': Rabbi Abbahu in the name of Rabbi Yoḥanan gave a parable: A king entered a province with dukes, governors, and generals. The nobles of the province sat in the center. One said: 'I will take the dukes.' Another: 'I will take the governors.' Another: 'I will take the generals.' A wise man there said: 'I will take the king, for all the others can change, but the king does not change.' So too the idolaters: some serve the sun, some the moon, some wood and stone; but Israel serve only the Holy One, blessed be He. This is 'The LORD is my portion, says my soul'—for I proclaim His oneness twice each day, saying: 'Hear O Israel: the LORD our God, the LORD is One.'"}, {"location": "Bereishit Rabbah 52:5", "hebrew": "וַיָּבֹא אֱלֹהִים וגו' בַּחֲלוֹם הַלָּיְלָה (בראשית כ, ג), אָמַר רַבִּי יוֹסֵי אֵין הַקָּדוֹשׁ בָּרוּךְ הוּא נִגְלָה עַל נְבִיאֵי אֻמּוֹת הָעוֹלָם אֶלָּא בְּשָׁעָה שֶׁדֶּרֶךְ בְּנֵי אָדָם לִפְרשׁ זֶה מִזֶּה, הֲדָא הוּא דִכְתִיב (איוב ד, יב יג): בִּשְׂעִפִּים מֵחֶזְיוֹנוֹת לָיְלָה, וְאֵלַי דָּבָר יְגֻנָּב וגו', מַה בֵּין נְבִיאֵי יִשְׂרָאֵל לִנְבִיאֵי אֻמּוֹת הָעוֹלָם, רַבִּי חֲנִינָא בַּר פַּפָּא וְרַבָּנָן, רַבִּי חֲנִינָא בַּר פַּפָּא אָמַר מָשָׁל לְמֶלֶךְ שֶׁהָיָה נָתוּן הוּא וְאוֹהֲבוֹ בִּטְרַקְלִין, וִילוֹן מֻנָּח בֵּינֵיהֶם, כָּל זְמַן שֶׁהָיָה רוֹצֶה לְדַבֵּר עִם אוֹהֲבוֹ הָיָה קוֹפֵל אֶת הַוִּילוֹן וּמְדַבֵּר עִמּוֹ, אֲבָל לִנְבִיאֵי אֻמּוֹת הָעוֹלָם אֵינוֹ מְקַפֵּל אוֹתוֹ אֶלָּא מְדַבֵּר עִמָּהֶם מֵאַחֲרֵי הַוִּילוֹן. וְרַבָּנָן אָמְרֵי לְמֶלֶךְ שֶׁהָיָה לוֹ אִשָּׁה וּפִילֶגֶשׁ, כְּשֶׁהוּא הוֹלֵךְ אֵצֶל אִשְׁתּוֹ הוּא הוֹלֵךְ בְּפַרְהֶסְיָא, וּכְשֶׁהוּא הוֹלֵךְ אֵצֶל שִׁפְחָתוֹ הוֹלֵךְ בְּמַטְמוֹנִיּוֹת. כָּךְ אֵין הַקָּדוֹשׁ בָּרוּךְ הוּא נִגְלָה עַל אֻמּוֹת הָעוֹלָם אֶלָּא בַּלַּיְלָה (במדבר כב, כ):", "english": "On 'God came… in a dream of the night': Rabbi Yose said: The Holy One, blessed be He, reveals Himself to the prophets of the nations only at a time when people commonly separate from one another, as it is said: 'In thoughts from the visions of the night… a word was stolen to me.' What is the difference between the prophets of Israel and the prophets of the nations? Rabbi Ḥanina bar Pappa and the Rabbis: Rabbi Ḥanina bar Pappa said, it is like a king who sat with his beloved in a chamber, with a curtain between them; whenever he wished to speak, he would fold back the curtain and speak. But to the prophets of the nations he does not fold it back; he speaks with them from behind the curtain. The Rabbis said: It is like a king who had a wife and a concubine: when he goes to his wife he goes openly; when he goes to his maidservant he goes in secret. So the Holy One, blessed be He, reveals Himself to the nations only at night."}, {"location": "Megillah 13b", "hebrew": "אָמַר רֵישׁ לָקִישׁ: אֵין הַקָּדוֹשׁ בָּרוּךְ הוּא מַכֶּה אֶת יִשְׂרָאֵל אֶלָּא אִם כֵּן בּוֹרֵא לָהֶם רְפוּאָה תְּחִילָּה, שֶׁנֶּאֱמַר: ״כְּרׇפְאִי לְיִשְׂרָאֵל וְנִגְלָה עֲוֹן אֶפְרַיִם״.", "english": "Reish Lakish said: The Holy One, blessed be He, does not strike Israel unless He first creates their healing, as it is said: 'When I would heal Israel, then the iniquity of Ephraim was revealed.'"}, {"location": "Vayikra Rabbah 32:5", "hebrew": "רַב הוּנָא אָמַר בְּשֵׁם בַּר קַפָּרָא בִּשְׁבִיל אַרְבָּעָה דְּבָרִים נִגְאֲלוּ יִשְׂרָאֵל מִמִצְרַיִם, שֶׁלֹּא שִׁנּוּ אֶת שְׁמָם וְאֶת לְשׁוֹנָם וְלֹא אָמְרוּ לָשׁוֹן הָרָע, וְלֹא נִמְצָא בֵּינֵיהֶם אֶחָד מֵהֶן פָּרוּץ בְּעֶרְוָה.", "english": "Rav Huna said in the name of bar Kappara: Israel were redeemed from Egypt for four reasons: they did not change their names, they did not change their language, they did not speak slander, and not one of them was found to be sexually licentious."}, {"location": "Midrash Tanchuma, Vayakhel 8", "hebrew": "וְלָמָּה נִתְּנָה הַתּוֹרָה בַּמִּדְבָּר. לוֹמַר, מָה הַמִּדְבָּר מֻפְקָר לְכָל בְּנֵי אָדָם, אַף דִּבְרֵי תוֹרָה מֻפְקָרִין לְכָל מִי שֶׁיִּרְצֶה לִלְמֹד. שֶׁלֹּא יְהֵא אָדָם אוֹמֵר, אֲנִי בֶּן תּוֹרָה וְתוֹרָה נְתוּנָה לִי וְלַאֲבוֹתַי וְאַתָּה וַאֲבוֹתֶיךָ לֹא הֱיִיתֶם בְּנֵי תוֹרָה אֶלָּא אֲבוֹתֶיךָ גֵּרִים הָיוּ, לְכָךְ כְּתִיב: מוֹרָשָׁה קְהִלַּת יַעֲקֹב (דברים לג, ד), לְכָל מִי שֶׁמִּתְקַהֵל בְּיַעֲקֹב. אֲפִלּוּ הַגֵּרִים שֶׁעוֹסְקִין בַּתּוֹרָה, שְׁקוּלִים הֵם כְּכֹהֵן גָּדוֹל, שֶׁנֶּאֱמַר: אֲשֶׁר יַעֲשֶׂה אֹתָם הָאָדָם וָחַי בָּהֶם אֲנִי ה' אֱלֹהֵיכֶם (ויקרא יח, ה), כֹּהֵן וְלֵוִי וְיִשְׂרָאֵל לֹא נֶאֱמַר אֶלָּא אָדָם.", "english": "Why was the Torah given in the wilderness? To teach: just as the wilderness is ownerless and open to all people, so the words of Torah are open to anyone who wishes to learn—so that no one will say: 'I am of Torah-stock; Torah was given to me and my fathers, but you and your fathers were not.' Therefore it says: 'An inheritance of the congregation of Jacob'—for all who gather into Jacob. Even converts who engage in Torah are equal to a High Priest, as it is said: 'Which a person shall do and live by them'—it does not say priest, Levite, or Israelite, but 'a person'."}, {"location": "Arakhin 15b", "hebrew": "תָּנָא דְּבֵי רַבִּי יִשְׁמָעֵאל: כׇּל הַמְסַפֵּר לָשׁוֹן הָרָע מַגְדִּיל עֲוֹנוֹת כְּנֶגֶד שָׁלֹשׁ עֲבֵירוֹת, עֲבוֹדָה זָרָה וְגִילּוּי עֲרָיוֹת וּשְׁפִיכוּת דָּמִים.", "english": "The school of Rabbi Yishmael taught: Whoever speaks slander magnifies his sins corresponding to three transgressions: idolatry, sexual immorality, and bloodshed."}, {"location": "Sotah 9b", "hebrew": "תָּנוּ רַבָּנַן: סוֹטָה נָתְנָה עֵינֶיהָ בְּמִי שֶׁאֵינוֹ רָאוּי לָהּ, מַה שֶּׁבִּיקְּשָׁה — לֹא נִיתַּן לָהּ, וּמַה שֶּׁבְּיָדָהּ — נְטָלוּהוּ מִמֶּנָּה. שֶׁכׇּל הַנּוֹתֵן עֵינָיו בְּמַה שֶּׁאֵינוֹ שֶׁלּוֹ — מַה שֶּׁמְבַקֵּשׁ אֵין נוֹתְנִין לוֹ, וּמַה שֶּׁבְּיָדוֹ — נוֹטְלִין הֵימֶנּוּ.", "english": "The Sages taught: A suspected adulteress set her eyes on one who was not fit for her. What she sought was not given to her, and what she had was taken from her. For whoever sets his eyes on what is not his—what he seeks is not given, and what is in his hand is taken from him."}, {"location": "Bamidbar Rabbah 12:3", "hebrew": "בְּשָׁעָה שֶׁאָמַר לוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא (שמות כה, ח): וְעָשׂוּ לִי מִקְדָּשׁ וְשָׁכַנְתִּי בְּתוֹכָם, אָמַר משֶׁה מִי יוּכַל לַעֲשׂוֹת לוֹ מִקְדָּשׁ שֶׁיִּשְׁרֶה בְּתוֹכוֹ, (מלכים א ח, כז): הִנֵּה הַשָּׁמַיִם וּשְׁמֵי הַשָּׁמַיִם לֹא יְכַלְכְּלוּךָ וגו', וְאוֹמֵר (ירמיה כג, כד): הֲלֹא אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ אֲנִי מָלֵא וגו', וְאוֹמֵר (ישעיה סו, א): הַשָּׁמַיִם כִּסְאִי וְהָאָרֶץ הֲדֹם רַגְלָי וגו'. אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא אֵינִי מְבַקֵּשׁ, לְפִי כֹּחִי אֶלָּא לְפִי כֹּחָן, כְּשֶׁאֲנִי מְבַקֵּשׁ כָּל הָעוֹלָם כֻּלּוֹ אֵינוֹ יָכוֹל לְהַחֲזִיק כְּבוֹדִי וְלֹא שֶׁמֶשׁ אֶחָד מִשֶּׁלִּי, אֶלָּא אֲנִי אֵינִי מְבַקֵּשׁ מִיָּדְךָ אֶלָּא עֶשְׂרִים בַּדָּרוֹם וְעֶשְׂרִים בַּצָּפוֹן וּשְׁמוֹנֶה בַּמַּעֲרָב. לְכָךְ משֶׁה אָמַר: ישֵׁב בְּסֵתֶר עֶלְיוֹן, הַקָּדוֹשׁ בָּרוּךְ הוּא שֶׁהוּא יוֹשֵׁב בְּסִתְרוֹ שֶׁל עוֹלָם הוּא רוֹאֶה אֶת הַכֹּל וְאֵינוֹ נִרְאֶה, הוּא נִתְאַוָּה לָלוּן בְּצִלֵּנוּ.", "english": "When the Holy One, blessed be He, said (Exodus 25:8): 'Let them make Me a sanctuary, and I will dwell among them,' Moses said: Who can make a sanctuary for Him to dwell within it? Is it not said: 'Behold, the heavens and the highest heavens cannot contain You,' and 'Do I not fill heaven and earth?' and 'The heavens are My throne and the earth My footstool'? The Holy One, blessed be He, said: I do not ask according to My power, but according to their power. When I ask, the whole world cannot contain My glory—not even one of My suns; rather, I ask of you only twenty boards on the south, twenty on the north, and eight on the west. Therefore Moses said: 'He who dwells in the shelter of the Most High'—the Holy One, blessed be He, who sits in the hiddenness of the world and sees all yet is not seen, desired to lodge in our shade."}, {"location": "Megillah 31a", "hebrew": "אָמַר רַבִּי יוֹחָנָן: כׇּל מָקוֹם שֶׁאַתָּה מוֹצֵא גְּבוּרָתוֹ שֶׁל הַקָּדוֹשׁ בָּרוּךְ הוּא, אַתָּה מוֹצֵא עִנְוְותָנוּתוֹ.", "english": "Rabbi Yoḥanan said: Wherever you find the might of the Holy One, blessed be He, there you find His humility."}, {"location": "Shemot Rabbah 28:4", "hebrew": "אֵת כָּל הַדְּבָרִים הָאֵלֶּה לֵאמֹר, שֶׁהוּא עוֹשֶׂה אֶת הַכֹּל בְּבַת אֶחָת, מֵמִית וּמְחַיֶּה בְּבַת אֶחָת, מַכֶּה וְרוֹפֵא בְּבַת אֶחָת, אִשָּׁה עַל הַמַּשְׁבֵּר, יוֹרְדֵי הַיָּם וְהוֹלְכֵי מִדְבָּרוֹת וַחֲבוּשֵׁי בְּבֵית הָאֲסוּרִין, אֶחָד בַּמִּזְרָח וְאֶחָד בַּמַּעֲרָב וְאֶחָד בַּצָּפוֹן וְאֶחָד בַּדָּרוֹם, שׁוֹמֵעַ כֻּלָּן בְּבַת אַחַת, וְכֵן הוּא אוֹמֵר (ישעיה מה, ז): יוֹצֵר אוֹר וּבוֹרֵא חשֶׁךְ. עָפָר כְּמוֹ כֵן נֶהְפַּךְ לְאָדָם, חָזַר נֶהְפַּךְ לֶעָפָר, שֶׁנֶּאֱמַר (עמוס ה, ח): וְהֹפֵךְ לַבֹּקֶר צַלְמָוֶת, מַהוּ לַבֹּקֶר, כִּתְחִלָּתוֹ, בִּתְחִלָּתוֹ מַהוּ אוֹמֵר (שמות ז, כ): וַיֵּהָפְכוּ כָּל הַמַּיִם אֲשֶׁר בַּיְאֹר לְדָם, חָזַר וְנֶהְפַּךְ הַדָּם לְמַיִם. בָּשָׂר חַי נֶהְפַּךְ לְמֵת, חָזַר הַמֵּת וְנֶהְפַּךְ לְחָי. הַמַּטֶּה נֶהְפַּךְ לְנָחָשׁ, חָזַר הַנָּחָשׁ וְנֶהְפַּךְ לְמַטֶּה. הַיָּם נֶהְפַּךְ לְיַבָּשָׁה, חָזְרָה הַיַּבָּשָׁה וְנֶהְפְּכָה לְיָם, וְכֵן הוּא אוֹמֵר (עמוס ה, ח) (עמוס ט, ו): הַקּוֹרֵא לְמֵי הַיָּם וגו'. וְכֵן דִּבּוּר (שמות כ, ח): זָכוֹר אֶת יוֹם הַשַּׁבָּת לְקַדְּשׁוֹ, וְאוֹמֵר (במדבר כח, ט): וּבְיוֹם הַשַּׁבָּת שְׁנֵי כְבָשִׂים בְּנֵי שָׁנָה. דִּבּוּר (ויקרא יח, טז): עֶרְוַת אֵשֶׁת אָחִיךָ לֹא תְגַלֵּה, (דברים כה, ה): כִּי יֵשְׁבוּ אַחִים יַחְדָּו, וְכֻלָּן אֲמָרָן בְּבַת אַחַת, הֱוֵי: וַיְדַבֵּר אֱלֹהִים אֶת כָּל הַדְּבָרִים הָאֵלֶּה לֵאמֹר.", "english": "‘All these words, saying’—that He does everything at once: He puts to death and brings to life at once; He strikes and heals at once. A woman in childbirth, those who go down to the sea, those who travel deserts, and prisoners in jail—one in the east, one in the west, one in the north, and one in the south—He hears them all at once. Thus it says: 'Who forms light and creates darkness.' Likewise dust is turned into a person, and the person returns and is turned into dust… Water of the Nile was turned to blood, and blood returned and was turned back to water… A living body turns to dead, and the dead returns to living… A staff turns to a serpent, and the serpent returns to a staff… The sea turns to dry land, and the dry land returns and turns back to sea… And so too: 'Remember the Sabbath day to sanctify it' and 'On the Sabbath day, two lambs…' and 'You shall not uncover the nakedness of your brother’s wife' and 'When brothers dwell together…'—all of them were spoken in a single utterance. Therefore: 'God spoke all these words, saying.'"}, {"location": "Shemot Rabbah 28:5", "hebrew": "בּוֹא וּרְאֵה שֶׁאֵין מִדּוֹתָיו שֶׁל הַקָּדוֹשׁ בָּרוּךְ הוּא כְּמִדַּת בָּשָׂר וָדָם, מֶלֶךְ בָּשָׂר וָדָם אֵינוֹ יָכוֹל לִהְיוֹת עוֹשֶׂה מִלְחָמָה וְלִהְיוֹת סוֹפֵר וּמְלַמֵּד תִּינוֹקוֹת, וְהַקָּדוֹשׁ בָּרוּךְ הוּא אֵינֶנּוּ כֵן, אֶתְמוֹל בַּיָּם כְּעוֹשֶׂה מִלְחָמָה, שֶׁנֶּאֱמַר (שמות טו, ג): ה' אִישׁ מִלְחָמָה, וְאוֹמֵר (איוב כו, יב): בְּכֹחוֹ רָגַע הַיָּם, וְהַיּוֹם בְּמַתַּן תּוֹרָה יָרַד לְלַמֵּד תּוֹרָה לְבָנָיו, וְכֵן הוּא אוֹמֵר (איוב לו, כב): הֶן אֵל יַשְׂגִּיב בְּכֹחוֹ מִי כָמֹהוּ מוֹרֶה, הֱוֵי: וַיְדַבֵּר אֱלֹהִים אֵת כָּל הַדְּבָרִים הָאֵלֶּה.", "english": "Come and see that the attributes of the Holy One, blessed be He, are not like the attributes of flesh and blood. A human king cannot wage war and be a scribe and a teacher of children; but the Holy One, blessed be He, is not so. Yesterday at the sea He was like one waging war, as it is said: 'The LORD is a man of war,' and 'By His power He stilled the sea.' And today at the giving of the Torah He descended to teach Torah to His children, as it is said: 'Behold, God is exalted in His power; who is a teacher like Him?' Therefore: 'God spoke all these words.'"}, {"location": "Shemot Rabbah 28:6", "hebrew": "דָּבָר אַחֵר, וַיְדַבֵּר אֱלֹהִים אֵת כָּל הַדְּבָרִים הָאֵלֶּה לֵאמֹר, אָמַר רַבִּי יִצְחָק, מַה שֶּׁהַנְּבִיאִים עֲתִידִים לְהִתְנַבְּאוֹת בְּכָל דּוֹר וָדוֹר קִבְּלוּ מֵהַר סִינַי, שֶׁכֵּן משֶׁה אוֹמֵר לָהֶם לְיִשְׂרָאֵל (דברים כט, יד): כִּי אֶת אֲשֶׁר יֶשְׁנוֹ פֹּה עִמָּנוּ עֹמֵד הַיּוֹם וְאֵת אֲשֶׁר אֵינֶנּוּ פֹּה עִמָּנוּ הַיּוֹם, עִמָּנוּ עוֹמֵד הַיּוֹם, אֵין כְּתִיב כָּאן, אֶלָּא עִמָּנוּ הַיּוֹם, אֵלּוּ הַנְּשָׁמוֹת הָעֲתִידוֹת לְהִבָּרְאוֹת שֶׁאֵין בָּהֶם מַמָּשׁ, שֶׁלֹא נֶאֶמְרָה בָּהֶם עֲמִידָה, שֶׁאַף עַל פִּי שֶׁלֹא הָיוּ בְּאוֹתָהּ שָׁעָה, כָּל אֶחָד וְאֶחָד קִבֵּל אֶת שֶׁלּוֹ. וְכֵן הוּא אוֹמֵר (מלאכי א, א): מַשָֹּׂא דְּבַר ה' אֶל יִשְׂרָאֵל בְּיַד מַלְאָכִי, בִּימֵי מַלְאָכִי לֹא נֶאֱמַר, אֶלָּא בְּיַד מַלְאָכִי, שֶׁכְּבָר הָיְתָה הַנְּבוּאָה בְּיָדוֹ מֵהַר סִינַי, וְעַד אוֹתָהּ שָׁעָה לֹא נִתְּנָה לוֹ רְשׁוּת לְהִתְנַבְּאוֹת. וְכֵן יְשַׁעְיָה אָמַר (ישעיה מח, טז): מֵעֵת הֱיוֹתָהּ שָׁם אָנִי, אָמַר יְשַׁעְיָה מִיּוֹם שֶׁנִּתְּנָה תּוֹרָה בְּסִינַי שָׁם הָיִיתִי וְקִבַּלְתִּי אֶת הַנְּבוּאָה הַזֹּאת, אֶלָּא (ישעיה מח, טז): וְעַתָּה אֲדֹנָי אֱלֹהִים שְׁלָחַנִּי וְרוּחוֹ, עַד עַכְשָׁיו לֹא נִתַּן לוֹ רְשׁוּת לְהִתְנַבְּאוֹת. וְלֹא כָּל הַנְּבִיאִים בִּלְבָד קִבְּלוּ מִסִּינַי נְבוּאָתָן, אֶלָּא אַף הַחֲכָמִים הָעוֹמְדִים בְּכָל דּוֹר וָדוֹר כָּל אֶחָד וְאֶחָד קִבֵּל אֶת שֶׁלּוֹ מִסִּינַי, וְכֵן הוּא אוֹמֵר (דברים ה, יט): אֶת הַדְּבָרִים הָאֵלֶּה דִּבֶּר ה' אֶל כָּל קְהַלְכֶם.", "english": "Another explanation: 'God spoke all these words'—Rabbi Yitzḥak said: Whatever the prophets would prophesy in every generation was received from Mount Sinai. For Moses says: 'With those who are here with us standing today, and with those who are not here with us today.' It does not say 'standing' regarding those not yet existent—these are the souls yet to be created, lacking substance; yet each one received what was his. Likewise it says: 'The burden of the word of the LORD… by the hand of Malachi'—it does not say 'in the days of Malachi,' but 'by the hand of Malachi,' for his prophecy was already in his hand from Sinai, and until that moment he had not been permitted to prophesy. Likewise Isaiah said: 'From the time it was, there am I'—from the day the Torah was given at Sinai I was there and received this prophecy; but 'And now the Lord GOD has sent me and His spirit'—until now he had not been permitted to prophesy. Not only the prophets received their prophecy from Sinai, but also the sages who arise in every generation—each received what was his from Sinai, as it is said: 'These words the LORD spoke to all your assembly.'"}, {"location": "Pesikta Rabbati 14", "hebrew": "אמרו רבותינו מעשה היה בישראל אחד שהיה לו פרה אחת חורשת נתמעטה ידו ומכרה לו לגוי אחד כיון שלקחה הגוי וחרשה (עמה) [עמו] ששת ימים של חול בשבת הוציאה שתחרוש עמו ורבצה לו תחת העול היה הולך ומכה אותה והיא אינה זזה ממקומה כיון שראה כן הלך ואמר לאותו ישראל שמכרה לו בא טול פרתך שמא צער יש בה שהרי כמה אני מכה אותה והיא אינה זזה ממקומה אותו ישראל הבין לומר בשביל של שבת והיתה למודה לנוח בשבת א\"ל בא ואני מעמידה כיון שבא ואמר לה באזנה פרה פרה את יודעת כשהיית ברשותי היית חורשת ימי החול בשבת היית נינוח עכשיו שגרמו עונותי ואת ברשות גוי בבקשה ממך עמדי וחרשי ומיד עמדה וחרשה א\"ל אותו הגוי אני מבקשך טול פרתך עד עכשיו אני בא ומיסב אחריך שתהא בא ומעמידה על אחת חוץ מזו ומזו (ואיני) [איני] מניחך עד שתאמר לי מה עשית לה באזנה אני נתייגעתי בה והכיתי אותה ולא עמדה התחיל אותו ישראל מפייסו ואומר לו לא כשוף ולא כשפים עשיתי אלא כך וכך הסחתי לה באזנה ועמדה וחרשה מיד נתיירא הגוי אמר ומה אם פרה שאין לה לא שיחה ולא דעת הכירה את בוראה ואני שייצרני יוצרי בדמותו ונתן בי דעת איני הולך ומכיר את בוראי מיד בא ונתגייר ולמד וזכה לתורה והיו קוראים שמו יוחנן בן תורתה ועד עכשיו רבותינו אומרים הלכה משמו ואם תמיה אתה שעל ידי פרה נתקרב אדם אחד לכנפי שכינה הרי על ידי פרה היא (טהרתו) [טהרתן] של כל ישראל ממה שקראו בענין זאת חקת התורה:", "english": "Our Rabbis said: There was once in Israel a man who had one cow for plowing. His means declined and he sold it to a gentile. The gentile plowed with it for the six weekdays. On Sabbath he brought it out to plow, but it lay down under the yoke. He struck it and it would not move. He went to the Jew and said: 'Come take your cow—perhaps it is in pain, for I strike it and it does not move.' The Jew understood: it was because of Sabbath; it had been trained to rest. He said: 'Come, and I will make it stand.' He whispered in its ear: 'Cow, cow: when you were in my possession you plowed on weekdays; on Sabbath you rested. Now, because of my sins, you are in a gentile’s possession—please stand and plow.' Immediately it stood and plowed.\nThe gentile said: 'I beg you, take your cow. Until now I kept turning after you; but I will not leave you until you tell me what you did to it. I toiled and struck it and it did not stand.' The Jew said: 'I did no sorcery—only this is what I said in its ear.' The gentile trembled and said: 'If a cow, which has neither speech nor understanding, recognized its Creator, then I—whom my Maker formed in His image and gave understanding—shall I not go recognize my Creator?' Immediately he came and converted, learned, and merited Torah; and they called him Yoḥanan son of the Cow. And to this day the sages cite a halakhah in his name. If you wonder that through a cow a person was brought near under the wings of the Divine Presence—through a cow comes the purification of all Israel, as it is read in the section 'This is the statute of the Torah.'"}, {"location": "Kiddushin 31a", "hebrew": "בְּעוֹ מִינֵּיהּ מֵרַב עוּלָּא: עַד הֵיכָן כִּיבּוּד אָב וָאֵם? אָמַר לָהֶם: צְאוּ וּרְאוּ מָה עָשָׂה נׇכְרִי אֶחָד בְּאַשְׁקְלוֹן, וְדָמָא בֶּן נְתִינָה שְׁמוֹ. פַּעַם אַחַת בִּקְּשׁוּ חֲכָמִים פְּרַקְמַטְיָא בְּשִׁשִּׁים רִיבּוֹא שָׂכָר, וְהָיָה מַפְתֵּחַ מוּנָּח תַּחַת מְרַאֲשׁוֹתָיו שֶׁל אָבִיו, וְלֹא צִיעֲרוֹ. אָמַר רַב יְהוּדָה אָמַר שְׁמוּאֵל: שָׁאֲלוּ אֶת רַבִּי אֱלִיעֶזֶר: עַד הֵיכָן כִּיבּוּד אָב וָאֵם? אָמַר לָהֶם: צְאוּ וּרְאוּ מָה עָשָׂה נׇכְרִי אֶחָד לְאָבִיו בְּאַשְׁקְלוֹן, וְדָמָא בֶּן נְתִינָה שְׁמוֹ. בִּקְּשׁוּ מִמֶּנּוּ חֲכָמִים אֲבָנִים לָאֵפוֹד בְּשִׁשִּׁים רִיבּוֹא שָׂכָר, וְרַב כָּהֲנָא מַתְנֵי בִּשְׁמוֹנִים רִיבּוֹא, וְהָיָה מַפְתֵּחַ מוּנָּח תַּחַת מְרַאֲשׁוֹתָיו שֶׁל אָבִיו, וְלֹא צִיעֲרוֹ. לְשָׁנָה הָאַחֶרֶת נָתַן הַקָּדוֹשׁ בָּרוּךְ הוּא שְׂכָרוֹ, שֶׁנּוֹלְדָה לוֹ פָּרָה אֲדֻמָּה בְּעֶדְרוֹ. נִכְנְסוּ חַכְמֵי יִשְׂרָאֵל אֶצְלוֹ, אָמַר לָהֶם: יוֹדֵעַ אֲנִי בָּכֶם שֶׁאִם אֲנִי מְבַקֵּשׁ מִכֶּם כׇּל מָמוֹן שֶׁבָּעוֹלָם אַתֶּם נוֹתְנִין לִי, אֶלָּא אֵין אֲנִי מְבַקֵּשׁ מִכֶּם אֶלָּא אוֹתוֹ מָמוֹן שֶׁהִפְסַדְתִּי בִּשְׁבִיל כְּבוֹד אַבָּא.", "english": "They asked Rav Ulla: To what extent is honoring father and mother? He said: Go and see what a certain gentile did in Ashkelon—Dama ben Netina was his name. Once the Sages sought merchandise from him for a profit of six hundred thousand, but the key lay under his father’s pillow, and he did not distress him.\nRav Yehudah said in the name of Shmuel: They asked Rabbi Eliezer: To what extent is honoring father and mother? He said: Go and see what a certain gentile did for his father in Ashkelon—Dama ben Netina was his name. The Sages sought from him stones for the ephod for a profit of six hundred thousand (and Rav Kahana taught: eight hundred thousand), but the key lay under his father’s pillow and he did not distress him. The next year the Holy One, blessed be He, gave him his reward: a red heifer was born in his herd. The sages of Israel came to him. He said: I know you—if I demanded all the money in the world, you would give it to me. But I ask from you only the money I lost for my father’s honor."}, {"location": "Jerusalem Talmud, Kiddushin 1:7", "hebrew": "יֵשׁ שֶׁהוּא מַאֲכִיל אֶת אָבִיו פְּטוּמוֹת וְיוֹרֵשׁ גְּיהִנָּם. וְיֵשׁ שֶׁהוּא כוֹדְנוֹ לָרֵיחַיִם וְיוֹרֵשׁ גַּן עֵדֶן. כֵּיצַד הוּא מַאֲכִיל אֶת אָבִיו פְּטוּמוֹת וְיוֹרֵשׁ גְּיהִנָּם. חַד בַּר נַשׁ הֲוָה מַייכִל לְאָבוֹי תַּרְנוֹגַלִּין פְּטִימָן. חַד זְמָן אֲמַר לֵיהּ אָבוֹי. בְּרִי. אִילֵּין מְנָן לָךְ. אֲמַר לֵיהּ. סַבָּא סַבָּא. אֲכוֹל וַאֲדִישׁ. דִּכְלָבָיָיא אָכְלִין וּמַדְּשִׁין. נִמְצָא מַאֲכִיל אֶת אָבִיו פְּטוּמוֹת וְיוֹרֵשׁ גְּיהִנָּם. כֵּיצַד כּוֹדְנוֹ בָּרֵיחַיִים וְיוֹרֵשׁ גַּן עֵדֶן. חַד בַּר נַשׁ הֲוָה טְחִין בְּרֵיחָיָיא. אֲתַא מִצְוְותָא לַטְּחוֹנִיָיא. אֲמַר לֵיהּ. אַבָּא. עוּל וּטְחוֹן תַּחְתָּיי. אִין מָטַת מְבַזְּיָיה טַב לִי אֲנָא וְלָא אַתְּ. אִין מָטַת מִילְקִי טַב לִי אֲנָא וְלָא אַתְּ. וְנִמְצָא כּוֹדְנוֹ לָרֵיחַיִים וְיוֹרֵשׁ גַּן עֵדֶן.", "english": "There is one who feeds his father fattened delicacies and inherits Gehenna, and there is one who grinds for him at the millstones and inherits the Garden of Eden. How so? One fed his father fattened chickens. Once his father said: 'My son, where are these from?' He replied: 'Old man, old man—eat and be quiet, like dogs that eat and are silent.' Thus he feeds him delicacies and inherits Gehenna.\nHow does one grind for him at the millstones and inherit the Garden of Eden? A man was grinding at the mill. A royal levy came for grinding. He said to his father: 'Father, go and grind in my place. If humiliation comes, better it come upon me and not upon you; if lashes come, better they come upon me and not upon you.' Thus he harnesses himself to the millstones and inherits the Garden of Eden."}, {"location": "Ruth Rabbah 3:4", "hebrew": "רַבִּי חִיָּא רַבָּה וְרַבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא הֲווֹ יָתְבִין לָעֲיִין בְּאוֹרָיְיתָא בַּהֲדֵין בֵּית מִדְרָשָׁא רַבָּא דִּטְבֶרְיָא בַּעֲרוּבַת פִּסְחָא, וְאִית דְּאָמְרֵי בַּעֲרוּבַת צוֹמָא רַבָּא, וּשְׁמַעֵי קָלְהוֹן דִּבְרִיָּיאתָא בָּיְיבִין, אֲמַר לֵיהּ אִילֵּין בְּרִיָּיתָא מָה עִסְקוֹן, אֲמַר דְּאִית לֵיהּ זָבַן וּדְלֵית לֵיהּ אָזֵיל לְגַבֵּי מָרֵי עֲבִדְתֵּיהּ וְהוּא יָהֵיב לֵיהּ. אֲמַר לֵיהּ אִם כֵּן הוּא אַף אֲנָא אִיזֵיל גַּבֵּי מָרֵי עֲבִדְתִּי וְהוּא יָהֵב לִי, נְפַק וְצַלֵּי בַּהֲדָא אִילוּסִיס דִּטְבֶרְיָא, וַחֲזָא חַד יְדָא מוֹשְׁטָא לֵיהּ חֲדָא מַרְגָּלִיתָא, אֲזַל טָעִין גַּבֵּי רַבֵּנוּ, אֲמַר לֵיהּ הָדָא מְנָא אִית לָךְ, הָדָא מִילָא דְאִיסְטוֹפִיטָא הִיא, אֶלָּא הֵא לָךְ תְּלָתָא דִינָרִין, וַאֲזֵל וַעֲבֵד לִיקָרָא דְיוֹמָא, וּבָתַר יוֹמָא טָבָא אֲנַן שָׁטְחִין קָלֵיהּ וּמַה דְּהוּא עָבֵיד טִימִיתַהּ תִּיסַב. נְסַב תְּלָתָא דִינָרִין וַאֲזֵיל זְבַן זְבוּנִין וְעָל לְבֵיתֵיהּ, אָמְרָה לֵיהּ דְּבִיתְהוּ שִׁמְעוֹן שָׁרֵית גָּנֵיב, כָּל פָּעֳלָךְ לֵית הִיא אֶלָּא מְאָה מָנֶה וְאִילֵין זְבִינָתָה מָה אִינוּן, מִיָּד תַּנֵּי לָהּ עוֹבָדָא. אָמְרָה לֵיהּ מַאי אַתְּ בָּעֵי תְּהֵי גְּנוּנָךְ חָסֵר מִן דְּחַבְרָךְ חֲדָא מַרְגָּלִיתָא לְעַלְמָא דְּאָתֵי. אֲמַר לָהּ וּמַה נַּעֲבֵד, אָמְרָה לֵיהּ זִיל תַּחֲזוֹר זְבִינָתָא לְמָרֵיהוֹן וְדִינָרַיָּא לְמָרֵיהוֹן וּמַרְגָּלִיתָא לְמָרָא. כַּד שָׁמַע רַבֵּינוּ מִצְטָעֵר, שְׁלַח וְאַיְתֵיתַהּ, אֲמַר לָהּ כָּל הָדֵין צַעְרָא צְעַרְתְּ לְהָדֵין צַדִיקָא. אָמְרָה לֵיהּ מָה אַתְּ בָּעֵי דִּיהֵא גְּנוּנֵיהּ חָסֵר מִדִּידְכוֹן חֲדָא מַרְגָּלִיתָא לְעַלְמָא דְּאָתֵי. אֲמַר לָהּ וְאִין הֲוָה חָסֵר לֵית בָּן מְמַלְּיָיה יָתֵיהּ. אָמְרָה לֵיהּ רַבִּי בַּהֲדֵין עַלְמָא זְכֵינַן מֶחֱמֵי אַפָּךְ, וְלֹא אָמַר רֵישׁ לָקִישׁ כָּל צַדִּיק וְצַדִּיק יֵשׁ לוֹ מָדוֹר בִּפְנֵי עַצְמוֹ, וְהוֹדָה לָהּ.", "english": "Rabbi Ḥiyya the Great and Rabbi Shimon ben Ḥalafta were sitting and studying Torah in the great study hall of Tiberias on the eve of Passover (and some say on the eve of Yom Kippur). They heard the voices of the townspeople crying. He said: 'These people—what are they doing?' He replied: 'One who has goes and buys; one who does not has goes to his employer and he gives him.' He said: 'If so, I too will go to my Master and He will give me.' He went out and prayed in that portico of Tiberias, and he saw a hand extending a pearl to him.\nHe brought it to our Rabbi, who said: 'Where do you have this from? This is a matter of “stop it” (an improper miracle).' Rather: 'Here are three dinars; go and honor the day, and after the festival we will spread it out and whatever value it yields you may take.' He took three dinars, bought provisions, and went home. His wife said to him: 'Shimon, have you begun stealing? All your wages are only a hundred maneh—what are these purchases?' Immediately he told her the story.\nShe said to him: 'What—do you want your banquet in the world to come to be missing one pearl compared to your companion?' He said: 'What shall we do?' She said: 'Go return the purchases to their owners, the dinars to their owner, and the pearl to its Owner.' When our Rabbi heard, he was distressed; he sent and brought her and said: 'All this distress you caused this righteous man!' She said: 'What—do you want his banquet to be missing one pearl in the world to come?' He said to her: 'If it were missing, we would not be able to fill it.' She said: 'Rabbi, in this world we merited to see your face; did not Reish Lakish say: Each righteous person has his own abode?' And he conceded to her."}, {"location": "Esther Rabbah 10:15", "hebrew": "אַתְּ מוֹצֵא שֶׁמִּדּוֹת טוֹבוֹת שֶׁל הַקָּדוֹשׁ בָּרוּךְ הוּא בְּהַשְׁפֵּעַ בְּפִרוּי וְרִבּוּי, הַטּוֹב בְּרִבּוּי, הַחֶסֶד בְּרִבּוּי, הָרַחֲמִים בְּרִבּוּי, הַצְּדָקָה בְּרִבּוּי, הָאֱמוּנָה בְּרִבּוּי, הַפְּדוּת בְּרִבּוּי, הַבְּרָכָה בְּרִבּוּי, הַשֶּׁבַח בְּרִבּוּי, הַשָּׁלוֹם בְּרִבּוּי.", "english": "You find that the good attributes of the Holy One, blessed be He, are in abundance: goodness in abundance, kindness in abundance, mercy in abundance, righteousness in abundance, faithfulness in abundance, redemption in abundance, blessing in abundance, praise in abundance, peace in abundance."}, {"location": "Kiddushin 81a", "hebrew": "הָנָךְ שְׁבוּיָיתָא דַּאֲתַאי לִנְהַרְדְּעָא. אַסְּקִינְהוּ לְבֵי רַב עַמְרָם חֲסִידָא, אַשְׁקוּלוּ דַּרְגָּא מִקַּמַּיְיהוּ. בַּהֲדֵי דְּקָא חָלְפָה חֲדָא מִנַּיְיהוּ נְפַל נְהוֹרָא בְּאִיפּוּמָּא. שַׁקְלֵיהּ רַב עַמְרָם לְדַרְגָּא דְּלָא הֲווֹ יָכְלִין בֵּי עַשְׂרָה לְמִדְלְיֵיהּ, דַּלְיֵיהּ לְחוֹדֵיהּ, סָלֵיק וְאָזֵיל. כִּי מְטָא לְפַלְגָא [דְּ]דַרְגָּא אִיפְּשַׁח, רְמָא קָלָא: נוּרָא בֵּי עַמְרָם! אֲתוֹ רַבָּנַן, אֲמַרוּ לֵיהּ: כַּסֵּיפְתִּינַן. אֲמַר לְהוּ: מוּטָב תִּיכַּסְפוּ בֵּי עַמְרָם בְּעָלְמָא הָדֵין וְלָא תִּיכַּסְפוּ מִינֵּיהּ לְעָלְמָא דְּאָתֵי. אַשְׁבְּעֵיהּ דְּיִנְפַּק מִינֵּיהּ, נְפַק מִינֵּיהּ כִּי עַמּוּדָא דְנוּרָא. אֲמַר לֵיהּ: חֲזִי, דְּאַתְּ נוּרָא וַאֲנָא בִּישְׂרָא, וַאֲנָא עֲדִיפְנָא מִינָּךְ.", "english": "Certain captive women were brought to Nehardea. They brought them to the house of Rav Amram the Pious and removed the ladder from before them. As one passed, a light fell upon the landing. Rav Amram took the ladder—which ten men could not lift—and lifted it alone and went up. When he reached halfway up, he halted and cried out: 'Fire in the house of Amram!' The rabbis came and said: 'You have shamed us.' He said: 'Better that you be shamed in the house of Amram in this world than that you be shamed by me in the world to come.' They made him swear that his impulse depart. It went out from him like a column of fire. He said to it: 'See—you are fire and I am flesh, and I am stronger than you.'"}, {"location": "Kiddushin 81a", "hebrew": "רַבִּי מֵאִיר הֲוָה מִתְלוֹצֵץ בְּעוֹבְרֵי עֲבֵירָה. יוֹמָא חַד אִידְּמִי לֵיהּ שָׂטָן כְּאִיתְּתָא בְּהָךְ גִּיסָא דְנַהֲרָא, לָא הֲוָה מַבָּרָא – נְקַט מִצְרָא וְקָא עָבַר. כִּי מְטָא פַּלְגָא מִצְרָא שַׁבְקֵיהּ, אָמַר: אִי לָאו דְּקָא מַכְרְזִי בִּרְקִיעָא ״הִזָּהֲרוּ בְּרַבִּי מֵאִיר וְתוֹרָתוֹ״ שַׁוֵּיתֵיהּ לִדְמָךְ תַּרְתֵּי מָעֵי. \nרַבִּי עֲקִיבָא הֲוָה מִתְלוֹצֵץ בְּעוֹבְרֵי עֲבֵירָה. יוֹמָא חַד אִידְּמִי לֵיהּ שָׂטָן כְּאִיתְּתָא בְּרֵישׁ דִּיקְלָא. נַקְטֵיהּ לְדִיקְלָא וְקָסָלֵיק וְאָזֵיל. כִּי מְטָא לְפַלְגֵיהּ דְּדִיקְלָא שַׁבְקֵיהּ, אָמַר: אִי לָאו דְּמַכְרְזִי בִּרְקִיעָא ״הִזָּהֲרוּ בְּרַבִּי עֲקִיבָא וְתוֹרָתוֹ״ שַׁוֵּיתֵיהּ לִדְמָךְ תַּרְתֵּי מָעֵי.", "english": "Rabbi Meir used to mock sinners. One day Satan appeared to him as a woman on the other side of the river. There was no ferry, so he took hold of a rope and crossed. When he reached halfway, Satan left him. He said: 'If not for the proclamation in Heaven—“Be careful with Rabbi Meir and his Torah”—I would have made you worth two stomachfuls of dung.'\nRabbi Akiva used to mock sinners. One day Satan appeared to him as a woman at the top of a palm tree. He seized the palm and climbed. When he reached halfway up the tree, Satan left him. He said: 'If not for the proclamation in Heaven—“Be careful with Rabbi Akiva and his Torah”—I would have made you worth two stomachfuls of dung.'"}, {"location": "Eichah Rabbah 1:1", "hebrew": "שְׁלשָׁה נִתְנַבְּאוּ בְּלָשׁוֹן אֵיכָה — משֶׁה, יְשַׁעְיָה, וְיִרְמְיָה... מָשָׁל לְמַטְרוֹנָה שֶׁהָיוּ לָהּ שְׁלשָׁה שׁוֹשְׁבִינִין, אֶחָד רָאָהּ בְּשַׁלְוָתָהּ, אֶחָד בְּפַחֲזָתָהּ, אֶחָד בְּנִיוּוּלָהּ", "english": "Three prophesied in the language of 'How'—Moses, Isaiah, and Jeremiah… A parable: A matron had three groomsmen; one saw her in tranquility, one in wantonness, and one in degradation."}, {"location": "Sukkah 2a", "hebrew": "״בַּסּוּכּוֹת תֵּשְׁבוּ שִׁבְעַת יָמִים״. אָמְרָה תּוֹרָה: כׇּל שִׁבְעַת הַיָּמִים צֵא מִדִּירַת קֶבַע וְשֵׁב בְּדִירַת עֲרַאי.", "english": "‘In booths you shall dwell seven days’—the Torah said: For all seven days, leave your permanent dwelling and sit in a temporary dwelling."}, {"location": "Yalkut Shimoni on Torah 653:4", "hebrew": "אמר רבי אליעזר בר מרוס למה אנו עושין סוכה אחר יום הכפורים [לומר לך שכן] אתה מוצא בראש השנה יושב הקדוש ברוך הוא בדין על באי העולם וביום הכפורים הוא חותם את הידן שמא יצא דינן של ישראל לגלות ועל ידי כן עשוין סוכה וגולין מבתיהן לסוכה והקדוש ברוך הוא מעלה עליהן כאלו גלו לבבל שנאמר חולי ונוחי בת ציון כיולדה כי עתה תצאי מרקריה ושבנת בשדה וכבאת עד בבל שם תנצלי שם יגאלך ה' מכף אויביך:", "english": "Rabbi Eliezer bar Maros said: Why do we make a sukkah after Yom Kippur? To teach: On Rosh Hashanah the Holy One, blessed be He, sits in judgment over the world’s inhabitants; on Yom Kippur He seals the verdict. Perhaps Israel’s verdict is exile; therefore they make a sukkah and go out from their houses into a sukkah, and the Holy One, blessed be He, credits them as though they were exiled to Babylon, as it is said: 'Writhe and groan, daughter of Zion, like a woman in labor; for now you shall go out from the city and dwell in the field, and you shall come to Babylon; there you shall be saved, there the LORD will redeem you from the hand of your enemies.'"}, {"location": "Yalkut Shimoni on Torah 653:3", "hebrew": "דבר אחר וסוכה תהיה לצל יומם כל מי שמקיים מצות סוכה בעולם הזה הקדוש ברוך הוא מיסך עליו מן המזיקין שלא יזיקו אותו שכן הוא אומר באברתו יסך לך. כל [מי] שמקיים מצות סוכה בעולם הזה הקדוש ברוך הוא נותן לו חלק לעתיד לבוא בסוכתה של סדום שנאמר אלהים דבר בקדשו אעלוזה אחלקה שכם ועמק סכות אמדד. מהו עמק סכות זו סוכתה של סדום שהיתה מסוככת בשבעה אילנות שהן מסוככות זו על גב זו גפן תאנה ורמון ופרסק ושקדים ואגוז ותמרים על גביהם.", "english": "Another interpretation: 'And a sukkah shall be for shade by day'—whoever fulfills the mitzvah of sukkah in this world, the Holy One, blessed be He, shelters him from harmful forces so they do not harm him, as it is said: 'With His pinion He will shelter you.' Whoever fulfills the mitzvah of sukkah in this world, the Holy One, blessed be He, gives him a share in the world to come in the 'valley of Sukkot,' as it is said: 'God spoke in His holiness: I will rejoice; I will divide Shechem and measure the valley of Sukkot.' What is 'the valley of Sukkot'? It is the sukkah of Sodom, roofed by seven trees one above another: vine, fig, pomegranate, peach, almonds, nuts, and date palms above them."}, {"location": "Midrash Tehillim 76", "hebrew": "ויהי בשלם סוכו ומעונתו בציון. אמר רבי ברכיה מתחלת ברייתו של עולם עשה הקב\"ה סוכה בירושלים כביכול שהיה מתפלל בתוכה ואומר יהי רצון מלפני שיהו בני עושין רצוני כדי שלא אחריב ביתי ומקדשי שנאמר ויהי בשלם סוכו ומעונתו. כיון שגרם החטא מה כתיב (איכה ב ו) ויחמוס כגן סוכו שיחת מועדו. מקום שהיה מתוועד בתפלה. וכיון שחרב מתפלל יהי רצון מלפני להכרית יצר הרע שמחטיא את בני ויעשו תשובה ואקרב בנין ביתי ומקדשי. הוי ויהי בשלם סוכו.", "english": "On 'In Salem is His sukkah, and His dwelling place in Zion': Rabbi Berekhiah said: From the beginning of the world’s creation the Holy One, blessed be He, made a sukkah in Jerusalem, as it were, and prayed within it, saying: 'May it be My will that My children do My will so I will not destroy My House and My Sanctuary,' as it is said: 'In Salem is His sukkah.' When sin caused it, what is written? 'He has laid waste His booth like a garden; He has destroyed His appointed place'—the place where He would meet in prayer. And when it was destroyed He prays: 'May it be My will to cut off the evil inclination that causes My children to sin, that they repent, and I will draw near the rebuilding of My House and My Sanctuary.' Thus: 'In Salem is His sukkah.'"}, {"location": "Vayikra Rabbah 30:12", "hebrew": "דָּבָר אַחֵר, פְּרִי עֵץ הָדָר, אֵלּוּ יִשְׂרָאֵל, מָה אֶתְרוֹג זֶה יֵשׁ בּוֹ טַעַם וְיֵשׁ בּוֹ רֵיחַ, כָּךְ יִשְׂרָאֵל יֵשׁ בָּהֶם בְּנֵי אָדָם שֶׁיֵּשׁ בָּהֶם תּוֹרָה וְיֵשׁ בָּהֶם מַעֲשִׂים טוֹבִים. כַּפֹּת תְּמָרִים, אֵלּוּ יִשְׂרָאֵל, מָה הַתְּמָרָה הַזּוֹ יֵשׁ בּוֹ טַעַם וְאֵין בּוֹ רֵיחַ, כָּךְ הֵם יִשְׂרָאֵל יֵשׁ בָּהֶם שֶׁיֵּשׁ בָּהֶם תּוֹרָה וְאֵין בָּהֶם מַעֲשִׂים טוֹבִים. וַעֲנַף עֵץ עָבֹת, אֵלּוּ יִשְׂרָאֵל, מָה הֲדַס יֵשׁ בּוֹ רֵיחַ וְאֵין בּוֹ טַעַם, כָּךְ יִשְׂרָאֵל יֵשׁ בָּהֶם שֶׁיֵּשׁ בָּהֶם מַעֲשִׂים טוֹבִים וְאֵין בָּהֶם תּוֹרָה. וְעַרְבֵי נָחַל, אֵלּוּ יִשְׂרָאֵל, מָה עֲרָבָה זוֹ אֵין בָּהּ טַעַם וְאֵין בָּהּ רֵיחַ, כָּךְ הֵם יִשְׂרָאֵל יֵשׁ בָּהֶם בְּנֵי אָדָם שֶׁאֵין בָּהֶם לֹא תּוֹרָה וְלֹא מַעֲשִׂים טוֹבִים, וּמָה הַקָּדוֹשׁ בָּרוּךְ הוּא עוֹשֶׂה לָהֶם, לְאַבְּדָן אִי אֶפְשָׁר, אֶלָּא אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא יֻקְשְׁרוּ כֻלָּם אֲגֻדָּה אַחַת וְהֵן מְכַפְּרִין אֵלּוּ עַל אֵלּוּ, וְאִם עֲשִׂיתֶם כָּךְ אוֹתָהּ שָׁעָה אֲנִי מִתְעַלֶּה, הֲדָא הוּא דִכְתִיב (עמוס ט, ו): הַבּוֹנֶה בַשָּׁמַיִם מַעֲלוֹתָו, וְאֵימָתַי הוּא מִתְעֲלֶה כְּשֶׁהֵן עֲשׂוּיִין אֲגֻדָּה אַחַת, שֶׁנֶּאֱמַר (עמוס ט, ו): וַאֲגֻדָּתוֹ עַל אֶרֶץ יְסָדָהּ, לְפִיכָךְ משֶׁה מַזְהִיר לְיִשְׂרָאֵל: וּלְקַחְתֶּם לָכֶם בַּיּוֹם הָרִאשׁוֹן.", "english": "Another interpretation: 'The fruit of a beautiful tree'—these are Israel: just as the citron has taste and fragrance, so Israel include people who have Torah and good deeds. 'Palm branches'—these are Israel: just as the date palm has taste but no fragrance, so Israel include those with Torah but without good deeds. 'A branch of a leafy tree'—these are Israel: just as the myrtle has fragrance but no taste, so Israel include those with good deeds but without Torah. 'Willows of the brook'—these are Israel: just as the willow has neither taste nor fragrance, so Israel include those with neither Torah nor good deeds. What does the Holy One, blessed be He, do with them? He cannot destroy them; rather He says: Let them all be bound together as one bundle, and they will atone for one another. If you do so, at that moment I am exalted, as it is said: 'He builds His upper chambers in the heavens'—and when is He exalted? When they are made one bundle, as it is said: 'And His bundle He founded upon the earth.' Therefore Moses warns Israel: 'And you shall take for yourselves on the first day.'"}, {"location": "Vayikra Rabbah 23:2", "hebrew": "רַבִּי אֶלְעָזָר פָּתַר קְרָא בִּגְאֻלַּת מִצְרַיִם, מַה שּׁוֹשַׁנָּה זוֹ כְּשֶׁהִיא נְתוּנָה בֵּין הַחוֹחִים הִיא קָשָׁה עַל בַּעֲלָהּ לְלָקְטָהּ, כָּךְ הָיְתָה גְּאֻלָּתָן שֶׁל יִשְׂרָאֵל קָשָׁה לִפְנֵי הַקָּדוֹשׁ בָּרוּךְ הוּא לִגָּאֵל, הֲדָא הוּא דִכְתִיב (דברים ד, לד): אוֹ הֲנִסָּה אֱלֹהִים לָבוֹא לָקַחַת לוֹ גּוֹי מִקֶּרֶב גּוֹי וגו'. אֵלּוּ וָאֵלּוּ עֲרֵלִים, אֵלּוּ מְגַדְּלֵי בְּלוֹרִית וְאֵלּוּ מְגַדְּלֵי בְּלוֹרִיּת, אֵלּוּ לוֹבְשֵׁי כִּלְאַיִם וְאֵלּוּ לוֹבְשֵׁי כִּלְאַיִם, אִם כֵּן לֹא הָיְתָה נוֹתֶנֶת מִדַּת הַדִּין לְיִשְׂרָאֵל שֶׁיִּגָּאֲלוּ מִמִּצְרַיִם לְעוֹלָם. אָמַר רַבִּי שְׁמוּאֵל בַּר נַחְמָנִי אִלּוּלֵי שֶׁאָסַר הַקָּדוֹשׁ בָּרוּךְ הוּא עַצְמוֹ בִּשְׁבוּעָה לֹא נִגְאֲלוּ יִשְׂרָאֵל לְעוֹלָם, הֲדָא הוּא דִכְתִיב (שמות ו, ו): לָכֵן אֱמֹר לִבְנֵי יִשְׂרָאֵל אֲנִי ה', וְאֵין לָכֵן אֶלָּא שְׁבוּעָה, כְּמָה דְאַתְּ אָמַר (שמואל א ג, יד): וְלָכֵן נִשְׁבַּעְתִּי לְבֵית עֵלִי.", "english": "Rabbi Elazar interpreted the verse concerning the redemption from Egypt: Just as a rose placed among thorns is hard for its owner to gather, so Israel’s redemption was hard before the Holy One, blessed be He, to redeem, as it is written: 'Or has God attempted to come and take for Himself a nation from the midst of a nation…'—these and those were uncircumcised; these and those grew long locks; these and those wore mixed fibers. If so, strict justice would not allow Israel to be redeemed forever. Rabbi Shmuel bar Naḥmani said: If the Holy One, blessed be He, had not bound Himself with an oath, Israel would never have been redeemed, as it is said: 'Therefore say to the children of Israel: I am the LORD'—and 'therefore' means only an oath, as you say: 'Therefore I have sworn to the house of Eli.'"}, {"location": "Makkot 10b", "hebrew": "אֵין הַקָּדוֹשׁ בָּרוּךְ הוּא שָׂמֵחַ בְּמַפַּלְתָּן שֶׁל רְשָׁעִים. וְאָמַר רַבִּי יוֹחָנָן, מַאי דִּכְתִיב: ״וְלֹא קָרַב זֶה אֶל זֶה כׇּל הַלָּיְלָה״ — בִּקְּשׁוּ מַלְאֲכֵי הַשָּׁרֵת לוֹמַר שִׁירָה, אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא: מַעֲשֵׂה יָדַי טוֹבְעִין בַּיָּם, וְאַתֶּם אוֹמְרִים שִׁירָה?", "english": "The Holy One, blessed be He, does not rejoice in the downfall of the wicked. Rabbi Yoḥanan said: What is meant by 'And this one did not draw near that one all night'? The ministering angels sought to sing, but the Holy One, blessed be He, said: 'The work of My hands is drowning in the sea, and you would sing!'"}, {"location": "Taanit 25a", "hebrew": "חַד בֵּי שִׁמְשֵׁי חַזְיַיהּ לְבַרְתֵּיהּ דַּהֲווֹת עֲצִיבָא, אֲמַר לַהּ: בִּתִּי אַמַּאי עֲצִיבַתְּ? אֲמַרָה לֵיהּ: כְּלִי שֶׁל חוֹמֶץ נִתְחַלֵּף לִי בִּכְלִי שֶׁל שֶׁמֶן וְהִדְלַקְתִּי מִמֶּנּוּ אוּר לְשַׁבָּת. אֲמַר לַהּ: בִּתִּי, מַאי אִכְפַּת לִךְ? מִי שֶׁאָמַר לַשֶּׁמֶן וְיִדְלוֹק, הוּא יֹאמַר לַחוֹמֶץ וְיִדְלוֹק. תָּנָא: הָיָה דּוֹלֵק וְהוֹלֵךְ כׇּל הַיּוֹם כּוּלּוֹ, עַד שֶׁהֵבִיאוּ מִמֶּנּוּ אוּר לְהַבְדָּלָה.", "english": "One Friday evening, he saw that his daughter was sad. He said to her: “My daughter, why are you sad?” She said to him: “A vessel of vinegar was switched for me with a vessel of oil, and I lit from it the Shabbos lamp.” He said to her: “My daughter, what does it matter to you? He Who said to oil, ‘Burn,’ will say to vinegar, ‘Burn.’” It was taught: It kept burning and giving light the entire day, until they took fire from it for Havdalah."}, {"location": "Megillah 15a", "hebrew": "וְאָמַר רַבִּי אֶלְעָזָר אָמַר רַבִּי חֲנִינָא: לְעוֹלָם אַל תְּהִי בִּרְכַּת הֶדְיוֹט קַלָּה בְּעֵינֶיךָ, שֶׁהֲרֵי שְׁנֵי גְּדוֹלֵי הַדּוֹר בֵּרְכוּם שְׁנֵי הֶדְיוֹטוֹת, וְנִתְקַיְּימָה בָּהֶן, וְאֵלּוּ הֵן: דָּוִד וְדָנִיֵּאל. דָּוִד — דְּבָרְכֵיהּ אֲרַוְנָה, דִּכְתִיב: ״וַיֹּאמֶר אֲרַוְנָה אֶל הַמֶּלֶךְ וְגוֹ׳״. דָּנִיאֵל — דְּבָרְכֵיהּ דָּרְיָוֶשׁ, דִּכְתִיב: ״אֱלָהָךְ דִּי אַנְתְּ פָּלַח לֵיהּ בִּתְדִירָא הוּא יְשֵׁיזְבִינָּךְ״.", "english": "Rabbi Elazar said in the name of Rabbi Chanina: A layperson’s blessing should never be light in your eyes, for two great ones of the generation were blessed by two laypeople, and the blessing was fulfilled in them—namely: David and Daniel. David—Aravna blessed him, as it is written: “And Aravna said to the king…” Daniel—Daryavesh (Darius) blessed him, as it is written: “Your God, Whom you serve continually—He will deliver you.”"}, {"location": "Avodah Zara 3a", "hebrew": "הָיָה רַבִּי מֵאִיר אוֹמֵר: מִנַּיִן שֶׁאֲפִילּוּ גּוֹי וְעוֹסֵק בַּתּוֹרָה שֶׁהוּא כְּכֹהֵן גָּדוֹל? תַּלְמוּד לוֹמַר: ״אֲשֶׁר יַעֲשֶׂה אֹתָם הָאָדָם וָחַי בָּהֶם״, כֹּהֲנִים לְוִיִּם וְיִשְׂרְאֵלִים לֹא נֶאֱמַר, אֶלָּא ״הָאָדָם״, הָא לָמַדְתָּ שֶׁאֲפִילּוּ גּוֹי וְעוֹסֵק בַּתּוֹרָה הֲרֵי הוּא כְּכֹהֵן גָּדוֹל.", "english": "Rabbi Meir would say: From where is it derived that even a non-Jew who engages in Torah is like a Kohen Gadol? The verse teaches: “which a person shall do and live by them.” It does not say “Kohanim, Levi’im, and Yisraelim,” but rather “a person” (ha’adam). You learn from here that even a non-Jew who engages in Torah is considered like a Kohen Gadol."}, {"location": "Avodah Zara 3b", "hebrew": "אָמַר רַב יְהוּדָה אָמַר שְׁמוּאֵל, מַאי דִּכְתִיב: ״וַתַּעֲשֶׂה אָדָם כִּדְגֵי הַיָּם כְּרֶמֶשׂ לֹא מֹשֵׁל בּוֹ״, לָמָּה נִמְשְׁלוּ בְּנֵי אָדָם כִּדְגֵי הַיָּם? לוֹמַר לָךְ: מָה דָּגִים שֶׁבַּיָּם — כֵּיוָן שֶׁעוֹלִין לַיַּבָּשָׁה מִיָּד מֵתִים, אַף בְּנֵי אָדָם — כֵּיוָן שֶׁפּוֹרְשִׁין מִדִּבְרֵי תוֹרָה וּמִן הַמִּצְוֹת מִיָּד מֵתִים.", "english": "Rav Yehudah said in the name of Shmuel: What is the meaning of, “and You make man like the fish of the sea, like creeping things with no ruler over them”? Why are people compared to the fish of the sea? To tell you: Just as fish in the sea—once they come up onto dry land, they die immediately—so too people: once they separate from the words of Torah and from mitzvos, they die immediately."}, {"location": "Avodah Zara 5a", "hebrew": "אָמַר רֵישׁ לָקִישׁ: בּוֹאוּ וְנַחֲזִיק טוֹבָה לַאֲבוֹתֵינוּ, שֶׁאִלְמָלֵא הֵן לֹא חָטְאוּ — אָנוּ לֹא בָּאנוּ לָעוֹלָם, שֶׁנֶּאֱמַר: ״אֲנִי אָמַרְתִּי אֱלֹהִים אַתֶּם וּבְנֵי עֶלְיוֹן כֻּלְּכֶם״, חִבַּלְתֶּם מַעֲשֵׂיכֶם — ״אָכֵן כְּאָדָם תְּמוּתוּן וְגוֹ׳״.", "english": "Reish Lakish said: Come and acknowledge the good of our ancestors—for if they had not sinned, we would not have come into the world, as it is said: “I said: You are gods, and all of you are children of the Most High.” You ruined your deeds—therefore, “Indeed, like Adam you shall die…”"}, {"location": "Berachot 7b", "hebrew": "וְאָמַר רַבִּי יוֹחָנָן מִשּׁוּם רַבִּי שִׁמְעוֹן בֶּן יוֹחַי: גְּדוֹלָה שִׁמּוּשָׁהּ שֶׁל תּוֹרָה יוֹתֵר מִלִּמּוּדָהּ, שֶׁנֶּאֱמַר: ״פֹּה אֱלִישָׁע בֶּן שָׁפָט אֲשֶׁר יָצַק מַיִם עַל יְדֵי אֵלִיָּהוּ״. ״לָמַד״ לֹא נֶאֱמַר, אֶלָּא ״יָצַק״ — מְלַמֵּד שֶׁגְּדוֹלָה שִׁמּוּשָׁהּ יוֹתֵר מִלִּמּוּדָהּ.", "english": "Rabbi Yochanan said in the name of Rabbi Shimon ben Yochai: Greater is shimushah shel Torah (attending/serving Torah scholars) than its study, as it is said: “Here is Elisha son of Shafat, who poured water upon the hands of Eliyahu.” It does not say “he learned,” but rather “he poured”—teaching that shimushah is greater than its study."}, {"location": "Berachot 8a", "hebrew": "וְאָמַר רַבִּי חִיָּיא בַּר אַמֵּי מִשְּׁמֵיהּ דְּעוּלָּא: גָּדוֹל הַנֶּהֱנֶה מִיגִיעוֹ יוֹתֵר מִיְּרֵא שָׁמַיִם, דְּאִילּוּ גַּבֵּי יְרֵא שָׁמַיִם כְּתִיב ״אַשְׁרֵי אִישׁ יָרֵא אֶת ה׳״, וְאִילּוּ גַּבֵּי נֶהֱנָה מִיגִיעוֹ כְּתִיב: ״יְגִיעַ כַּפֶּיךָ כִּי תֹאכֵל אַשְׁרֶיךָ וְטוֹב לָךְ״. ״אַשְׁרֶיךָ״ — בָּעוֹלָם הַזֶּה, ״וְטוֹב לָךְ״ — לָעוֹלָם הַבָּא, וּלְגַבֵּי יְרֵא שָׁמַיִם, ״וְטוֹב לָךְ״ לָא כְּתִיב בֵּיהּ.", "english": "Rabbi Chiyya bar Ami said in the name of Ulla: Greater is one who benefits from the toil of his own hands than one who is yerei Shamayim (G-d-fearing). For regarding yerei Shamayim it is written: “Praiseworthy is the man who fears Hashem,” whereas regarding one who benefits from his own labor it is written: “When you eat the toil of your hands—praiseworthy are you, and it is good for you.” “Praiseworthy are you”—in this world; “and it is good for you”—in the World to Come. And regarding yerei Shamayim, “and it is good for you” is not written."}, {"location": "Avot 5:8", "hebrew": "כָּל הַמְזַכֶּה אֶת הָרַבִּים, אֵין חֵטְא בָּא עַל יָדוֹ. וְכָל הַמַּחֲטִיא אֶת הָרַבִּים, אֵין מַסְפִּיקִין בְּיָדוֹ לַעֲשׂוֹת תְּשׁוּבָה.", "english": "Whoever brings merit to the public—sin does not come through his hand. But whoever causes the public to sin—they do not grant him the opportunity to do teshuvah."}, {"location": "Nedarim 81a", "hebrew": "הִזָּהֲרוּ בִּבְנֵי עֲנִיִּים, שֶׁמֵּהֶן תֵּצֵא תּוֹרָה, שֶׁנֶּאֱמַר: ״יִזַּל מַיִם מִדַּלָּיו״, שֶׁמֵּהֶן תֵּצֵא תּוֹרָה.", "english": "Be careful with the children of the poor, for from them Torah will go forth, as it is said: “Water shall flow from his buckets”—from them Torah will go forth."}, {"location": "Berachot 33b", "hebrew": "וְאָמַר רַבִּי חֲנִינָא: הַכֹּל בִּידֵי שָׁמַיִם, חוּץ מִיִּרְאַת שָׁמַיִם. שֶׁנֶּאֱמַר: ״וְעַתָּה יִשְׂרָאֵל מָה ה׳ אֱלֹהֶיךָ שׁוֹאֵל מֵעִמָּךְ כִּי אִם לְיִרְאָה״. אַטּוּ יִרְאַת שָׁמַיִם מִילְּתָא זוּטַרְתָּא הִיא? וְהָאָמַר רַבִּי חֲנִינָא מִשּׁוּם רַבִּי שִׁמְעוֹן בֶּן יוֹחַי: אֵין לוֹ לְהַקָּדוֹשׁ בָּרוּךְ הוּא בְּבֵית גְּנָזָיו אֶלָּא אוֹצָר שֶׁל יִרְאַת שָׁמַיִם, שֶׁנֶּאֱמַר ״יִרְאַת ה׳ הִיא אוֹצָרוֹ״. אִין, לְגַבֵּי מֹשֶׁה מִילְּתָא זוּטַרְתָּא הִיא. דְּאָמַר רַבִּי חֲנִינָא: מָשָׁל לְאָדָם שֶׁמְבַקְּשִׁים מִמֶּנּוּ כְּלִי גָּדוֹל, וְיֵשׁ לוֹ — דּוֹמֶה עָלָיו כִּכְלִי קָטָן. קָטָן, וְאֵין לוֹ — דּוֹמֶה עָלָיו כִּכְלִי גָּדוֹל.", "english": "Rabbi Chanina said: Everything is in the hands of Heaven except yir’as Shamayim, as it is said: “And now, Yisrael—what does Hashem your G-d ask of you, except to fear…?” Is yir’as Shamayim a small matter? But Rabbi Chanina said in the name of Rabbi Shimon ben Yochai: The Holy One, blessed be He, has nothing in His treasuries except a treasury of yir’as Shamayim, as it is said: “The fear of Hashem—that is His treasure.” Yes—regarding Moshe it is a small matter. For Rabbi Chanina said: This is like a person from whom they request a large vessel: if he has it, it seems to him like a small vessel; but if they request a small vessel and he does not have it, it seems to him like a large vessel."}, {"location": "Midrash Tanchuma, Metzora 1", "hebrew": "אָמַר רַבִּי אֶלְעָזָר, כָּל שֶׁנַּעֲשֶׂה רַחְמָן עַל הָאַכְזָרִי, לַסּוֹף נַעֲשֶׂה אַכְזָר עַל הָרַחְמָנִים. כְּתִיב: וַיַּחְמֹל שָׁאוּל עַל אֲגָג וְעַל מֵיטַב הַצֹּאן וְהַבָּקָר (ש״א טו, ט). וּכְתִיב בְּנֹב עִיר הַכֹּהֲנִים, וְאֶת נֹב עִיר הַכֹּהֲנִים הִכָּה לְפִי חֶרֶב (ש״א כב, יט).", "english": "Rabbi Elazar said: Anyone who becomes compassionate to the cruel will ultimately become cruel to the compassionate. As it is written: “And Shaul had mercy on Agag and on the best of the sheep and cattle,” and it is written regarding Nov, the city of the Kohanim: “And Nov, the city of the Kohanim, he struck by the sword.”"}, {"location": "Avodah Zara 19b", "hebrew": "״וְעָלֵהוּ לֹא יִבּוֹל״, אָמַר רַב אַחָא בַּר אַדָּא אָמַר רַב, וְאָמְרִי לַהּ אָמַר רַב אַחָא בַּר אַבָּא אָמַר רַב הַמְנוּנָא אָמַר רַב: שֶׁאֲפִילּוּ שִׂיחַת חוּלִּין שֶׁל תַּלְמִידֵי חֲכָמִים צְרִיכָה תַּלְמוּד, שֶׁנֶּאֱמַר: ״וְעָלֵהוּ לֹא יִבּוֹל״.", "english": "“His leaf does not wither”—Rav Acha bar Adda said in the name of Rav (and some say: Rav Acha bar Abba said in the name of Rav Hamnuna who said in the name of Rav): Even the ordinary, mundane conversation of talmidei chachamim requires study, as it is said: “and his leaf does not wither.”"}];
const TOTAL = SOURCES.length;
const DB_NAME = 'daily-wisdom-db';
const DB_STORE = 'reflections';
let db = null;
let currentDay = 0;
let currentView = 'today';
let expandedHebrew = false;
let dayOverride = null; // stored as ISO date string e.g. '2025-06-15'

function getTodayDay() {
  const start = new Date('2026-01-01');
  let now;
  if (dayOverride) {
    now = new Date(dayOverride + 'T12:00:00');
  } else {
    now = new Date();
  }
  const diff = Math.floor((now - start) / 86400000);
  return ((diff % TOTAL) + TOTAL) % TOTAL;
}

function loadSettings() {
  try {
    const saved = localStorage.getItem('dw-day-override');
    if (saved && saved !== 'null' && saved !== '') dayOverride = saved;
  } catch { /* localStorage blocked */ }
  currentDay = getTodayDay();
}

// IndexedDB for reliable local storage
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(DB_STORE, { keyPath: 'day' });
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function saveReflection(day, text) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put({
      day, text, source: SOURCES[day].location, savedAt: new Date().toISOString()
    });
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

function getReflection(day) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(day);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = e => reject(e);
  });
}

function getAllReflections() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = e => reject(e);
  });
}

// Views
function showView(view, resetToToday) {
  currentView = view;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + view).classList.add('active');
  ['today','browse','journal','settings'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === view ? '' : 'none';
  });
  
  if (view === 'today') {
    if (resetToToday) currentDay = getTodayDay();
    renderDay();
  }
  else if (view === 'browse') renderBrowse();
  else if (view === 'journal') renderJournal();
  else if (view === 'settings') renderSettings();
}

function goToDay(day) {
  currentDay = day;
  expandedHebrew = false;
  showView('today', false);
}

async function renderDay() {
  const s = SOURCES[currentDay];
  const isToday = currentDay === getTodayDay();
  const longHeb = s.hebrew.length > 200;
  const ref = await getReflection(currentDay);
  
  const el = document.getElementById('view-today');
  el.innerHTML = `
    <div class="day-nav">
      <button onclick="navDay(-1)" ${currentDay === 0 ? 'disabled' : ''}>&larr;</button>
      <div class="center">
        <div class="today-badge">${isToday ? 'TODAY' : ''}</div>
        <h2>&mdash; Day ${currentDay + 1} &mdash;</h2>
      </div>
      <button onclick="navDay(1)" ${currentDay === TOTAL - 1 ? 'disabled' : ''}>&rarr;</button>
    </div>
    <div class="source-loc">${esc(s.location)}</div>
    <div class="hebrew-card" id="heb-card">
      <p id="heb-text" class="${longHeb && !expandedHebrew ? 'collapsed' : ''}">${esc(s.hebrew)}</p>
      ${longHeb && !expandedHebrew ? '<button class="expand-btn" onclick="toggleHeb()">Show full text ↓</button>' : ''}
      ${longHeb && expandedHebrew ? '<button class="collapse-btn" onclick="toggleHeb()">Show less ↑</button>' : ''}
    </div>
    <div class="english">${esc(s.english)}</div>
    <div class="divider"></div>
    <div class="reflection-title">Reflection</div>
    <textarea id="ref-input" placeholder="What does this teaching awaken in you today?...">${ref ? esc(ref.text) : ''}</textarea>
    <div class="save-row">
      <span class="timestamp" id="save-ts">${ref ? 'Saved: ' + new Date(ref.savedAt).toLocaleString() : ''}</span>
      <button class="save-btn" id="save-btn" onclick="doSave()">Save Reflection</button>
    </div>
  `;
}

function navDay(delta) {
  currentDay = Math.max(0, Math.min(TOTAL - 1, currentDay + delta));
  expandedHebrew = false;
  renderDay();
  window.scrollTo(0, 0);
}

function toggleHeb() {
  expandedHebrew = !expandedHebrew;
  renderDay();
}

async function doSave() {
  const text = document.getElementById('ref-input').value.trim();
  if (!text) return;
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...';
  btn.disabled = true;
  await saveReflection(currentDay, text);
  btn.textContent = '✓ Saved';
  btn.classList.add('saved');
  document.getElementById('save-ts').textContent = 'Saved: ' + new Date().toLocaleString();
  setTimeout(() => { btn.textContent = 'Save Reflection'; btn.classList.remove('saved'); btn.disabled = false; }, 2000);
}

async function renderBrowse() {
  const refs = await getAllReflections();
  const refDays = new Set(refs.map(r => r.day));
  const today = getTodayDay();
  
  let grid = '';
  for (let i = 0; i < TOTAL; i++) {
    let cls = '';
    if (i === today) cls = 'is-today';
    else if (i === currentDay) cls = 'is-current';
    if (refDays.has(i)) cls += ' has-reflection';
    grid += `<button class="${cls}" onclick="goToDay(${i})">${i + 1}</button>`;
  }
  
  document.getElementById('view-browse').innerHTML = `
    <div class="browse">
      <h2>Browse All Days</h2>
      <div class="legend">
        <span><span class="dot today-dot"></span> Today</span>
        <span><span class="dot refl-dot"></span> Has reflection</span>
      </div>
      <div class="grid">${grid}</div>
    </div>
  `;
}

function renderSettings() {
  const today = getTodayDay();
  
  // Calculate what the "real" day would be without override
  const realStart = new Date('2026-01-01');
  const realNow = new Date();
  const realDiff = Math.floor((realNow - realStart) / 86400000);
  const realDay = ((realDiff % TOTAL) + TOTAL) % TOTAL;
  
  const overrideDate = dayOverride || '';
  
  document.getElementById('view-settings').innerHTML = `
    <div class="settings">
      <h2>Settings</h2>
      
      <div class="current-info">
        <strong>Current "today":</strong> Day ${today + 1} — ${esc(SOURCES[today].location)}<br>
        ${dayOverride 
          ? '<span style="color:var(--faint);font-size:12px">Using custom date: ' + dayOverride + '</span>' 
          : '<span style="color:var(--faint);font-size:12px">Using actual date (Day ' + (realDay + 1) + ')</span>'}
      </div>
      
      <div class="field">
        <label>SET CUSTOM "TODAY" DATE</label>
        <input type="date" id="date-override" value="${overrideDate}">
        <div class="hint">
          Pick any date to change which day the app considers "today." 
          The 406-day cycle starts on January 1, 2026. Leave empty to use the real date.
        </div>
        <div class="actions">
          <button class="btn-primary" onclick="applyDateOverride()">Apply</button>
          <button class="btn-secondary" onclick="clearDateOverride()">Reset to Real Date</button>
        </div>
        <div id="settings-feedback" style="margin-top:12px;font-size:13px;display:none"></div>
      </div>
    </div>
  `;
}

function applyDateOverride() {
  const val = document.getElementById('date-override').value;
  const fb = document.getElementById('settings-feedback');
  if (!val) {
    fb.style.display = 'block';
    fb.style.color = '#a85';
    fb.textContent = 'Please pick a date, or use "Reset to Real Date."';
    return;
  }
  dayOverride = val;
  try { localStorage.setItem('dw-day-override', val); } catch {}
  currentDay = getTodayDay();
  
  fb.style.display = 'block';
  fb.style.color = 'var(--success)';
  fb.textContent = '✓ Applied! "Today" is now Day ' + (currentDay + 1) + ' — ' + SOURCES[currentDay].location;
  
  // Re-render the info box
  const info = document.querySelector('.current-info');
  if (info) {
    info.innerHTML = '<strong>Current "today":</strong> Day ' + (currentDay + 1) + ' — ' + esc(SOURCES[currentDay].location) + '<br><span style="color:var(--faint);font-size:12px">Using custom date: ' + dayOverride + '</span>';
  }
}

function clearDateOverride() {
  dayOverride = null;
  try { localStorage.removeItem('dw-day-override'); } catch {}
  currentDay = getTodayDay();
  renderSettings();
}

async function renderJournal() {
  const refs = await getAllReflections();
  refs.sort((a, b) => a.day - b.day);
  
  let html = `<div class="journal-header">
    <h2>Your Reflections</h2>
    <div class="count">${refs.length} reflection${refs.length !== 1 ? 's' : ''} saved</div>
  </div>`;
  
  if (refs.length === 0) {
    html += '<div class="empty"><p>No reflections yet.</p><p>Begin your journey with today\u2019s source text.</p></div>';
  } else {
    for (const r of refs) {
      const d = new Date(r.savedAt);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      html += `<div class="journal-entry" onclick="goToDay(${r.day})">
        <div class="meta">
          <span class="day-label">DAY ${r.day + 1}</span>
          <span class="date">${dateStr}</span>
        </div>
        <div class="source-name">${esc(r.source)}</div>
        <div class="text">${esc(r.text)}</div>
      </div>`;
    }
  }
  
  document.getElementById('view-journal').innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Swipe navigation
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (currentView !== 'today') return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 80) navDay(diff > 0 ? -1 : 1);
});

// Init
loadSettings();
openDB().then(() => renderDay());

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
