ִי הִיא חַיֶּיךָ. (במדבר טו, מ): וִהְיִיתֶם קְדשִׁים, בִּזְמַן שֶׁאַתֶּם עוֹשִׂים אֶת הַמִּצְווֹת אַתֶּם מְקֻדָּשִׁים וְאֵימַתְכֶם מֻטֶּלֶת עַל הָעוֹבְדֵי כּוֹכָבִים, פְּרַשְׁתֶּם מִן הַמִּצְווֹת נַעֲשֵׂיתֶם מְחֻלָּלִים.", "english": "“So that you will remember and do all My commandments”—this is like a person who was thrown into the water. The ship’s captain extended a rope and said to him, “Grab this rope in your hand and do not let go—because if you let go, you have no life.” So too the Holy One, blessed be He, said to Israel: as long as you cling to the commandments—“But you who cling to the LORD your God are all alive today” (Deut. 4:4). And so it says: “Hold fast to discipline; do not let go—guard it, for it is your life” (Prov. 4:13). “And you shall be holy” (Num. 15:40): when you do the commandments, you are sanctified and your awe falls upon the idolaters; but when you separate from the commandments, you become profaned."}, {"location": "Bereishit Rabbah 86:6", "hebrew": "תָּנֵי רַבִּי שִׁמְעוֹן בֶּן יוֹחָאי בְּכָל מָקוֹם שֶׁהַצַּדִּיקִים הוֹלְכִים הַשְּׁכִינָה הוֹלֶכֶת עֲלֵיהֶם.", "english": "Rabbi Shimon ben Yohai taught: In every place the righteous go, the Shechinah goes upon them."}, {"location": "Bereishit Rabbah 64:6", "hebrew": "(בראשית כה, כב): וַתֵּלֶךְ לִדְרשׁ אֶת ה', וְכִי בָּתֵּי כְנֵסִיּוֹת וּבָתֵּי מִדְרָשׁוֹת הָיוּ בְּאוֹתָן הַיָּמִים, וַהֲלוֹא לֹא הָלְכָה אֶלָּא לַמִּדְרָשׁ שֶׁל שֵׁם וְעֵבֶר, אֶלָּא לְלַמֶּדְךָ שֶׁכָּל מִי שֶׁהוּא מַקְבִּיל פְּנֵי זָקֵן כְּמַקְבִּיל פְּנֵי שְׁכִינָה.", "english": "“And she went to inquire of the LORD” (Gen. 25:22)—were there synagogues and study halls in those days? Rather, she went only to the study hall of Shem and Ever, to teach you that whoever greets an elder is like one who greets the Shechinah."}, {"location": "Midrash Tanchuma, Ki Tisa 27", "hebrew": "וְהָיָה כָּל מְבַקֵּשׁ ה' יֵצֵא (שמות לג, ז). כָּל מְבַקֵּשׁ מֹשֶׁה אֵין כְּתִיב כָּאן, אֶלָּא כָּל מְבַקֵּשׁ ה'. מִכָּאן אָמְרוּ: כָּל הַמְקַבֵּל פְּנֵי זָקֵן כְּאִלּוּ מְקַבֵּל פְּנֵי שְׁכִינָה, שֶׁנֶּאֱמַר: וְהָיָה כָּל מְבַקֵּשׁ ה'. אֲפִלּוּ הַמַּלְאָכִים וְהַשְּׂרָפִים וְהַגְּדוּדִים הָיוּ מְבַקְּשִׁים אוֹתוֹ וְאוֹמְרִים אֵלּוּ לָאֵלּוּ, הֲרֵי הוּא בְּמִשְׁכָּנוֹ שֶׁל מֹשֶׁה.", "english": "“And it came to pass, everyone who sought the LORD went out…” (Ex. 33:7)—it does not say “who sought Moses,” but “who sought the LORD.” From here they said: whoever greets an elder is as though they greet the Shechinah, as it says: “everyone who sought the LORD.” Even the angels and seraphim and the battalions would seek Him and say to one another: behold, He is in Moses’ dwelling."}, {"location": "Bereishit Rabbah 73:8", "hebrew": "(בראשית ל, ל): וַיְבָרֶךְ ה' אֹתְךָ לְרַגְלִי, כָּל מָקוֹם שֶׁהַצַּדִּיקִים הוֹלְכִים בְּרָכָה מִשְׁתַּלַּחַת, יָרַד יִצְחָק לִגְרָר, בָּאת בְּרָכָה לְרַגְלוֹ, שֶׁנֶּאֱמַר (בראשית כו, יב): וַיִּזְרַע יִצְחָק בָּאָרֶץ הַהִיא וַיִּמְצָא בַּשָּׁנָה וגו'. יָרַד יַעֲקֹב אֵצֶל לָבָן, וּבָאת בְּרָכָה לְרַגְלוֹ, שֶׁנֶּאֱמַר: וַיְבָרֶךְ ה' אֹתְךָ לְרַגְלִי. יוֹסֵף יָרַד אֵצֶל פּוֹטִיפַר, בָּאת בְּרָכָה לְרַגְלוֹ, שֶׁנֶּאֱמַר (בראשית לט, ה): וַיְבָרֶךְ ה' אֶת בֵּית הַמִּצְרִי.", "english": "“The LORD blessed you at my foot” (Gen. 30:30)—wherever the righteous go, blessing is sent forth. Isaac went down to Gerar—blessing came at his feet… Jacob went to Laban—blessing came at his feet… Joseph went to Potiphar—blessing came at his feet…"}, {"location": "Midrash Tehillim 27", "hebrew": "למה הרשעים דומים. למי שהיה מהלך באישון לילה ואפלה הגיע לאבן ונכשל בה הגיע לגומץ ונפל לתוכו. וכן הוא אומר (משלי ד יט) דרך רשעים כאפלה לא ידעו במה יכשלו. ולמה הצדיקים דומין. למי שמהלך ואבוקה בידו הגיע לאבן משמר את נפשו שלא יכשל. הגיע לגומץ משמר את עצמו שלא יפול בתוכו. כך אמר דוד באתי לחלל את השבת האירה לי (את) התורה. שנאמר (דברים ה יב) שמור את יום השבת. באתי לנאוף האירה לי (את) התורה. שנאמר (ויקרא כ י) מות יומת הנואף והנואפת. הדא הוא דכתיב (תהלים קיט קה) נר לרגלי דבריך.", "english": "To what are the wicked compared? To one who walks at midnight in darkness: he reaches a stone and stumbles, reaches a pit and falls into it—“The way of the wicked is like darkness; they do not know what they will stumble over.” And to what are the righteous compared? To one who walks with a torch in hand: he reaches a stone and guards himself, reaches a pit and guards himself. Thus David said: I came to desecrate Shabbat—Torah lit my way: “Keep the day of Shabbat.” I came to commit adultery—Torah lit my way: “The adulterer and adulteress shall surely be put to death.” As it is written: “Your word is a lamp to my feet.”"}, {"location": "Yoma 38b", "hebrew": "אָמַר רַבִּי חִיָּיא בַּר אַבָּא אָמַר רַבִּי יוֹחָנָן: אֵין צַדִּיק נִפְטָר מִן הָעוֹלָם עַד שֶׁנִּבְרָא צַדִּיק כְּמוֹתוֹ, שֶׁנֶּאֱמַר: ״וְזָרַח הַשֶּׁמֶשׁ וּבָא הַשָּׁמֶשׁ״. עַד שֶׁלֹּא כָּבְתָה שִׁמְשׁוֹ שֶׁל עֵלִי, זָרְחָה שִׁמְשׁוֹ שֶׁל שְׁמוּאֵל הָרָמָתִי. \nאָמַר רַבִּי חִיָּיא בַּר אַבָּא אָמַר רַבִּי יוֹחָנָן: רָאָה הַקָּדוֹשׁ בָּרוּךְ הוּא שֶׁצַּדִּיקִים מוּעָטִין, עָמַד וּשְׁתָלָן בְּכָל דּוֹר וָדוֹר, שֶׁנֶּאֱמַר: ״כִּי לַה׳ מְצוּקֵי אֶרֶץ וַיָּשֶׁת עֲלֵיהֶם תֵּבֵל״.", "english": "Rabbi Ḥiyya bar Abba said in the name of Rabbi Yoḥanan: A righteous person does not depart from the world until another righteous person like him has been created, as it is said: “The sun rises and the sun sets.” Before the sun of Eli was extinguished, the sun of Samuel the Ramathite rose. Rabbi Ḥiyya bar Abba said in the name of Rabbi Yoḥanan: The Holy One, blessed be He, saw that the righteous are few, so He arose and planted them in every generation, as it is said: “For to the LORD belong the pillars of the earth, and upon them He set the world.”"}, {"location": "Jerusalem Talmud, Avodah Zarah 2:1", "hebrew": "אָמַר רִבִּי נַחָמָן בְשֵׁם רִבִּי מָנָא. אֵין הָעוֹלָם יָכוֹל לִהְיוֹת פָּחוֹת מִל׳ צַדִּיקִים כְּאָבִינוּ אָבְרָהָם. וּמַה טַעַם? ״וְאַבְרָהָם הָיוֹ יִהְיֶה״ – יִהְיֶה מִינְייָן ל׳. פְּעָמִים שֶׁרוּבָּן בְּבָבֶל וּמִיעוּטָן בְּאֶרֶץ יִשְׂרָאֵל. פְּעָמִים שֶׁרוּבָּן בְּאֶרֶץ יִשְׂרָאֵל וּמִיעוּטָן בְּבָבֶל. סֵימָן יָפֶה לָעוֹלָם בְּשָׁעָה שֶׁרוּבָּן בָּאָרֶץ.", "english": "Rabbi Naḥman said in the name of Rabbi Mana: The world cannot exist with fewer than thirty righteous like our father Abraham. And what is the reason? “And Abraham shall surely be” — “shall be” indicates the number thirty. Sometimes most of them are in Babylonia and a minority in the Land of Israel; sometimes most are in the Land of Israel and a minority in Babylonia. It is a good sign for the world when most of them are in the Land."}, {"location": "Sanhedrin 97b", "hebrew": "אָמַר אַבָּיֵי: לָא פְחוֹת עָלְמָא מִתְּלָתִין וְשִׁיתָּא צַדִּיקֵי דִּמְקַבְּלִי אַפֵּי שְׁכִינָה בְּכֹל דָּרָא שֶׁנֶּאֱמַר ״אַשְׁרֵי כָּל חוֹכֵי לוֹ״ לוֹ בְּגִימַטְרִיָּא תְּלָתִין וְשִׁיתָּא הָווּ. אֵינִי, וְהָאָמַר רָבָא: דָּרָא דְּקַמֵּי קוּדְשָׁא בְּרִיךְ הוּא תַּמְנֵי סְרֵי אַלְפֵי [פַּרְסָא] הָוֵאי, שֶׁנֶּאֱמַר (יחזקאל מח:לה) ״סָבִיב שְׁמֹנָה עָשָׂר אָלֶף״? לָא קַשְׁיָא, הָא דְּמִסְתַּכְּלִי בְּאִיסְפַּקְלַרְיָא הַמְּאִירָה הָא דְּמִסְתַּכְּלִי בְּאִיסְפַּקְלַרְיָא שֶׁאֵינָהּ מְאִירָה.", "english": "Abaye said: The world is never fewer than thirty‑six righteous who receive the Divine Presence in every generation, as it is said: “Happy are all who wait for Him” — the word “lo” has the numerical value of thirty‑six. But didn’t Rava say: The camp before the Holy One, blessed be He, is eighteen thousand (parasangs), as it is said: “Around: eighteen thousand” (Ezekiel 48:35)? It is not difficult: this refers to those who look through a clear (illuminating) lens; that refers to those who look through a lens that is not clear."}, {"location": "Mekhilta DeRabbi Shimon Ben Yochai 14:29", "hebrew": "״ויאמינו בה' ובמשה עבדו״. אם במשה האמינו קל וחומר במקום! אלא ללמדך שכל המאמין ברועה ישראל כאלו האמין במי שאמר והיה העולם. כיוצא בו אתה אומר (במדבר כא ה) ״וידבר העם באלקים ובמשה״ אם באלקים דברו קל וחומר במשה! אלא ללמדך שכל המדבר ברועה ישראל כאלו מדבר במי שאמר והיה העולם:", "english": "“And they believed in the LORD and in Moses His servant.” If they believed in Moses, all the more so in God! Rather, it teaches you: Whoever believes in the shepherd of Israel is as though he believed in the One Who spoke and the world came into being. Similarly: “And the people spoke against God and against Moses.” If they spoke against God, all the more so against Moses! Rather, it teaches you: Whoever speaks against the shepherd of Israel is as though he spoke against the One Who spoke and the world came into being."}, {"location": "Shemot Rabbah 21:4", "hebrew": "״שומע תפלה עדיך כל בשר יבואו״ (תהלים סה, ג). מהו שומע תפלה? אמר רבי פנחס, בשם רבי מאיר ורבי ירמיה, בשם רבי חייא בר אבא: בשעה שישראל מתפללין, אין אתה מוצא שכולן מתפללין כאחד, אלא כל כנסיה וכנסיה מתפללת בפני עצמה. הכנסת הזו תחלה, ואחר כך הכנסת האחרת, ומאחר שכל הכנסיות גומרות כל התפלות, המלאך הממונה על התפלות, נוטל כל התפלות שהתפללו בכל הכנסיות כולן, ועושה אותן עטרות, ונותנן בראשו של הקדוש ברוך הוא, שנאמר: עדיך כל בשר יבאו, ואין עדיך אלא עטרה, שנאמר (ישעיה מט, יח): כי כלם כעדי תלבשי. וכן הוא אומר (שם שם, ג): ישראל אשר בך אתפאר, שהקדוש ברוך הוא מתעטר בתפלתן של ישראל, שנאמר (יחזקאל טז, יב): ועטרת תפארת בראשך.", "english": "“You who hear prayer — to You all flesh will come” (Psalms 65:3). What is “Who hears prayer”? Rabbi Pinḥas said, in the name of Rabbi Meir and Rabbi Yirmeya, in the name of Rabbi Ḥiyya bar Abba: When Israel prays, you do not find them all praying as one; rather, each congregation prays on its own — this synagogue first, and then the next. After all the synagogues finish all their prayers, the angel appointed over prayers takes all the prayers that were prayed in all the synagogues and makes them into crowns and places them on the head of the Holy One, blessed be He, as it is said: “to You all flesh will come.” And “to You” (adecha) means a crown/adornment, as it is said: “For all of them shall be an adornment (adi) that you wear” (Isaiah 49:18). And so too it says: “Israel, in whom I will be glorified” — the Holy One, blessed be He, adorns Himself with Israel’s prayers, as it is said: “and a crown of glory upon your head” (Ezekiel 16:12)."}, {"location": "Chagigah 27a", "hebrew": "פָּתַח בְּמִזְבֵּחַ וְסִיֵּים בְּשֻׁלְחָן! רַבִּי יוֹחָנָן וְרֵישׁ לָקִישׁ דְּאָמְרִי תַּרְוַיְיהוּ: בִּזְמַן שֶׁבֵּית הַמִּקְדָּשׁ קַיָּים — מִזְבֵּחַ מְכַפֵּר עַל אָדָם, עַכְשָׁיו — שֻׁלְחָנוֹ שֶׁל אָדָם מְכַפֵּר עָלָיו.", "english": "He began with an altar and ended with a table! Rabbi Yoḥanan and Reish Lakish both said: When the Temple stood, the altar atoned for a person; now, a person’s table atones for him."}, {"location": "Avot DeRabbi Natan 30", "hebrew": "רבי אחאי בן יאשיה אומר הלוקח תבואה מן השוק למה הוא דומה לתינוק שמתה אמו ומחזירין אותו על פתחי מיניקות אחרות ואינו שבע. הלוקח פת מן השוק למה הוא דומה כאלו חפור וקבור. האוכל משלו דומה לתינוק המתגדל על שדי אמו: הוא היה אומר בזמן שאדם אוכל משלו דעתו מיושבת עליו. ואפילו אוכל אדם משל אביו ומשל אמו ומשל בניו אין דעתו מיושבת עליו ואין צריך לומר משל אחרים:", "english": "Rabbi Aḥa’i ben Yoshiya said: One who buys grain from the marketplace — to what is he compared? To an infant whose mother died, and they pass him among the doorways of other wet nurses, and he is not satisfied. One who buys bread from the marketplace — to what is he compared? As though he were dug and buried. One who eats from his own is like an infant raised at his mother’s breast. He would say: When a person eats from his own, his mind is settled; even if one eats from his father’s, his mother’s, or his children’s, his mind is not settled — and needless to say, from others."}, {"location": "Vayikra Rabbah 16:8", "hebrew": "אָמַר רַבִּי אַחָא מֵאָדָם יְהֵא שֶׁלֹּא יָבוֹאוּ חֳלָיִים עָלָיו, מַאי טַעְמָא דְּאָמַר רַב אַחָא (דברים ז, טו): וְהֵסִיר ה' מִמְּךָ כָּל חֹלִי, מִמְךָ הוּא שֶׁלֹּא יָבוֹאוּ חֳלָיִים עָלֶיךָ... רַבָּנָן אָמְרִין תִּשְׁעִים וְתִשְׁעָה בִּפְשִׁיעָה וְאֶחָד בִּידֵי שָׁמָיִם.", "english": "Rabbi Aḥa said: A person should see to it that illnesses not come upon him. What is the reason? For Rabbi Aḥa said (Deuteronomy 7:15): “And the LORD will remove from you all sickness” — from you, meaning that illnesses should not come upon you. The Sages said: Ninety‑nine are due to negligence, and one is from Heaven."}, {"location": "Shabbat 82a", "hebrew": "אֲמַר לֵיהּ רַב הוּנָא לְרַבָּה בְּרֵיהּ: מַאי טַעְמָא לָא שְׁכִיחַתְּ קַמֵּיהּ דְּרַב חִסְדָּא, דִּמְחַדְּדָן שְׁמַעְתָּתֵיהּ? אֲמַר לֵיהּ: מַאי אֵיזִיל לְגַבֵּיהּ? דְּכִי אָזֵילְנָא לְגַבֵּיהּ מוֹתִיב לִי בְּמִילֵּי דְעָלְמָא. אָמַר לִי: מַאן דְּעָיֵיל לְבֵית הַכִּסֵּא לָא לִיתֵּיב בְּהֶדְיָא, וְלָא לִיטְרַח טְפֵי — דְּהַאי כַּרְכַּשְׁתָּא אַתְּלָת שִׁינֵּי יָתֵיב, דִילְמָא מִשְׁתַּמְטִי שִׁינֵּי דְכַרְכַּשְׁתָּא וְאָתֵי לִידֵי סַכָּנָה. אֲמַר לֵיהּ: הוּא עָסֵיק בְּחַיֵּי דִּבְרִיָּיתָא וְאַתְּ אָמְרַתְּ בְּמִילֵּי דְעָלְמָא?! כָּל שֶׁכֵּן זִיל לְגַבֵּיהּ.", "english": "Rav Huna said to Rabbah his son: Why are you not frequently found before Rav Ḥisda, whose teachings are sharp? He said to him: Why should I go to him? When I go, he seats me with matters of the world. He said to me: One who enters the privy should not sit immediately, and should not strain too much — for this “karḥashta” has three teeth; perhaps the teeth will dislodge and he will come to danger. Rav Huna said: He is engaged in matters of living creatures, and you call them “matters of the world”?! All the more so — go to him."}, {"location": "Yoma 75a", "hebrew": "״דְּאָגָה בְלֶב אִישׁ יַשְׁחֶנָּה״, רַבִּי אַמֵּי וְרַבִּי אַסִּי, חַד אָמַר: יַשִּׂחֶנָּה מִדַּעְתּוֹ, וְחַד אָמַר: יְשִׂיחֶנָּה לַאֲחֵרִים.", "english": "“Anxiety in a man’s heart — let him yashchenah.” Rabbi Ami and Rabbi Asi: One said: Let him remove it from his mind; and one said: Let him speak it out to others."}, {"location": "Yevamot 63b", "hebrew": "״אַל תֵּצַר צָרַת מָחָר, כִּי לֹא תֵדַע מַה יֵּלֶד יוֹם. שֶׁמָּא מָחָר בָּא וְאֵינֶנּוּ, נִמְצָא מִצְטַעֵר עַל הָעוֹלָם שֶׁאֵין שֶׁלּוֹ״.", "english": "“Do not worry about tomorrow’s trouble, for you do not know what a day will bring. Perhaps tomorrow will come and you will not be, and you will have suffered over a world that was never yours.”"}, {"location": "Midrash Tehillim 45:4", "hebrew": "רָחַשׁ לִבִּי דָּבָר טוֹב. לְהוֹדִיעֲךָ שֶׁלֹּא יָכְלוּ לְהִתְוַדּוֹת בְּפִיהֶם אֶלָּא כֵּיוָן שֶׁרָחַשׁ לִבָּם בִּתְשׁוּבָה קִבְּלָם הקב\"ה. וְכֵן אוֹמֵר (דִּבְרֵי הַיָּמִים-א כח ט) וְאַתָּה שְׁלֹמֹה בְנִי דַּע אֶת אֱלֹקֵי אָבִיךָ וְעָבְדֵהוּ בְּלֵב שָׁלֵם. וְכָל מַחֲשָׁבוֹת אֵינוֹ אוֹמֵר אֶלָּא (שם) וְכָל יֵצֶר מַחֲשָׁבוֹת. וּמַהוּ וְכָל יֵצֶר. עַד שֶׁאֵין הָאָדָם צַר אֶת הַמַּחֲשָׁבָה בְּלִבּוֹ הַקָּדוֹשׁ בָּרוּךְ הוּא מֵבִין. וְכֵן בְּנֵי קֹרַח לֹא הָיוּ יְכוֹלִין לוֹמַר שִׁירָה בְּפִיהֶם אֶלָּא רָחַשׁ לִבָּם בִּתְשׁוּבָה וּמִיָּד קִבְּלָם. וְלָמָּה לֹא הָיוּ יְכוֹלִין לוֹמַר שִׁירָה בְּפִיהֶם שְׁאוֹל פְּתוּחָה מִתַּחְתֵּיהֶם וְאֵשׁ מְלַהֶטֶת סְבִיבוֹתָם. וְכֵן הוּא אוֹמֵר (בַּמִּדְבָּר טז לה) וְאֵשׁ יָצְאָה מֵאֵת ה'. (תְּהִלִּים קו יז-יח) תִּפְתַּח אֶרֶץ וַתִּבְלַע דָּתָן. וַתִּבְעַר אֵשׁ בַּעֲדָתָם. וְהָיוּ בְּנֵי קֹרַח רוֹאִין שְׁאוֹל פְּתוּחָה מִכָּאן וְאֵשׁ מִכָּאן וְלֹא הָיוּ יְכוֹלִין לְהִתְוַדּוֹת מִפִּיהֶם. לְכָךְ רָחַשׁ לִבִּי.", "english": "“My heart is astir with a good matter.” To teach you: They could not confess with their mouths; only once their hearts were stirred in repentance did the Holy One, blessed be He, accept them. So too it says: “And you, Solomon my son, know the God of your father and serve Him with a whole heart” (I Chronicles 28:9) — for it says “every inclination of thoughts.” Before a person can even form the thought in his heart, the Holy One, blessed be He, understands. And so it was with the sons of Korah: they could not sing with their mouths until their hearts were stirred in repentance, and immediately He accepted them. And why could they not confess with their mouths? Because Sheol was open beneath them and fire blazed around them … therefore: “My heart is astir.”"}, {"location": "Yalkut Shimoni on Nach, Shmuel I, 131", "hebrew": "ויקם דוד ויברח ביום ההוא מפני שאול. זה שאמר הכתוב את הכל עשה יפה בעתו כל מה שעשה הקב\"ה בעולמו יפה, אמר לפני הקב\"ה רבש\"ע כל מה שעשית בעולמך יפה, חכמה יפה מן הכל חוך מן השטות, מה הנאה בשוטה הזה אדם מהלך בשוק וקורע בגדיו והתינוקות משחקין בו ורצין אחריו והעם משחקין עליו, זה נאה לפניך, אמר לו הקב\"ה לדוד דוד על שטות אתה קורא תגר חייך שתצטרך לו, וכן שלמה אומר בז לדבר יחבל לו ממושכן עליו כמד\"א אם חבול תחבול שלמת רעך. אמר לו הקב\"ה תצטער ותתפלל עליה עד שאתן לך ממנה, לא עשה דוד אלא הלך אצל פלשתים ויקם דוד ויברח ביום ההוא מפני שאול ויבא אל אכיש, אמר לו הקב\"ה דוד אצל אכיש אתה הולך אתמול הרגת את גלית והלכת ביום אצל אחיו וחרבו בידך ואחיו שומרי ראשו של אכיש הרי עדין לא נסתפגה דמו של גלית, כיון שבא אליו באו אצל אכיש וא\"ל נהרוג למי שהרג את אחינו, א\"ל אכיש לא מלחמה היתה ואילו הרג אחיכם אותו לא במלחמה היה הורגו ועכשיו שהרג זה כך התנה לו אחיכם אם יוכל להלחם אתי והכני, א\"ל אם כן עמוד מכסאך שהמלכות לדוד. וכה\"א הלא זה דוד מלך הארץ ואנחנו עבדים לו, באותה שעה נתירא דוד התחיל אומר יום אירא אני אליך אבטח, התחיל דוד להתפלל ואומר רבון העולמים ענני בזו השעה, אמר לו הקב\"ה דוד מה אתה מבקש אמר לו (לט) תן לי מעט מאותו דבר, אמר לו ולא אמרתי לך בז לדבר יחבל לו והשטות אתה מבקש, עשה עצמו כשוטה הזה כותב על הדלתות אכיש מלך גת מחוייב לי מאה רבוא ואשתו חמשים ובתו של אכיש היתה שוטה והיתה צועקת ומשתטה בפנים ודוד צועק ומשתטה מבחוץ, אמר להם אכיש יודעים אתם שחסר שוטים אני שנאמר חסר משוגעים אני, באותה שעה שמח דוד שמחה גדולה כשיצא לו השטות מתו השמחה, הדא הוא דכתיב אברכה את ה' בכל עת.", "english": "“David arose and fled that day from Saul.” This is what Scripture says: “He made everything beautiful in its time.” Everything the Holy One, blessed be He, made in His world is beautiful. David said before Him: Master of the universe, everything You made is beautiful — wisdom is beautiful above all; but what benefit is there in folly? A person walks in the marketplace, tears his clothes, children play at him, people mock him — is that pleasing before You? The Holy One, blessed be He, said to David: David, you challenge Me about folly? By your life, you will need it … David went to the Philistines and came to Achish … and when he was afraid, he prayed: “On the day I fear, in You I trust.” He asked: “Give me a little of that thing.” He made himself like a fool — writing on the doors, acting mad — and Achish said: “Do I lack madmen?” In that hour David rejoiced greatly, as it is written: “I will bless the LORD at all times.”"}, {"location": "Berakhot 8a", "hebrew": "וְאָמַר רַבִּי חִיָּיא בַּר אַמֵּי מִשְּׁמֵיהּ דְּעוּלָּא: גָּדוֹל הַנֶּהֱנֶה מִיגִיעוֹ יוֹתֵר מִיְּרֵא שָׁמַיִם, דְּאִילּוּ גַּבֵּי יְרֵא שָׁמַיִם כְּתִיב ״אַשְׁרֵי אִישׁ יָרֵא אֶת ה׳״, וְאִילּוּ גַּבֵּי נֶהֱנָה מִיגִיעוֹ כְּתִיב: ״יְגִיעַ כַּפֶּיךָ כִּי תֹאכֵל אַשְׁרֶיךָ וְטוֹב לָךְ״. ״אַשְׁרֶיךָ״ — בָּעוֹלָם הַזֶּה, ״וְטוֹב לָךְ״ — לָעוֹלָם הַבָּא, וּלְגַבֵּי יְרֵא שָׁמַיִם, ״וְטוֹב לָךְ״ לָא כְּתִיב בֵּיהּ.", "english": "Rabbi Ḥiyya bar Ami said in the name of Ulla: Greater is one who benefits from the labor of his hands than one who fears Heaven. For regarding a God‑fearing person it is written: “Happy is the man who fears the LORD,” whereas regarding one who benefits from his labor it is written: “When you eat the labor of your hands, happy are you, and it is good for you.” “Happy are you” — in this world; “and it is good for you” — in the World‑to‑Come. But regarding the God‑fearing person, “and it is good for you” is not written."}, {"location": "Mekhilta DeRabbi Shimon Ben Yochai 20:9", "hebrew": "\"שֵׁשֶׁת יָמִים תַּעֲבֹד\" רַבִּי אוֹמֵר הֲרֵי זוֹ גְּזֵרָה אַחֶרֶת שֶׁכְּשֵׁם שֶׁנִּצְטַוּוּ יִשְׂרָאֵל עַל מִצְוַת עֲשֵׂה שֶׁל שַׁבָּת כָּךְ נִצְטַוּוּ עַל הַמְּלָאכָה:\n\nר' אֶלְעָזָר בֶּן עֲזַרְיָה אוֹמֵר גְּדוֹלָה מְלָאכָה שֶׁלֹּא שַׁרְתָּ שְׁכִינָה בְּיִשְׂרָאֵל עַד שֶׁעָשׂוּ מְלָאכָה שנ' (כ\"ה ח') וְעָשׂוּ לִי מִקְדָּשׁ וְשָׁכַנְתִּי בְּתוֹכָם:\n\nר' יוֹסֵי הַגְּלִילִי אוֹמֵר גְּדוֹלָה מְלָאכָה שֶׁלֹּא קָנַס הַמָּקוֹם מִיתָה עַל אָדָם אֶלָּא מִתּוֹךְ בְּטֵלָה שנ' (בְּרֵאשִׁית כה:יז) וַיִּגְוַע וַיָּמָת וַיֵּאָסֶף אֶל עַמָּיו:\n\nר' עֲקִיבָה אוֹמֵר גְּדוֹלָה מְלָאכָה שֶׁהֲרֵי נֶהֱנֶה שָׁוֶה פְּרוּטָה מִן הֶקְדֵּשׁ מֵבִיא מְעִילָה וְחֻמְשָׁהּ וּמֵבִיא אָשָׁם בִּשְׁתֵּי סְלָעִים וְהַפּוֹעֲלִין שֶׁהָיוּ עוֹשִׂין בְּהֶקְדֵּשׁ נוֹטְלִין שְׂכָרָן מִתְּרוּמַת הַלִּשְׁכָּה:\n\nר' שִׁמְעוֹן אוֹמֵר גְּדוֹלָה מְלָאכָה שֶׁאֲפִילּוּ כֹּהֵן גָּדוֹל נִכְנַס בְּיוֹם הַכִּפּוּרִים שֶׁלֹּא בִּשְׁעַת עֲבוֹדָה חַיָּב מִיתָה וּבִשְׁעַת מְלָאכָה טְמֵאִים וּבַעֲלֵי מוּמִין מֻתָּרִין לְהִכָּנֵס:", "english": "“Six days shall you labor” — Rabbi says: This is another decree: just as Israel were commanded regarding the positive commandment of Shabbat, so they were commanded regarding labor. Rabbi Elazar ben Azarya says: Great is labor, for the Divine Presence did not rest upon Israel until they did labor, as it is said: “And they shall make Me a sanctuary, and I will dwell among them.” Rabbi Yosei haGelili says: Great is labor, for the Omnipresent did not decree death upon a person except through idleness, as it is said: “And he expired and died and was gathered to his people.” Rabbi Akiva says: Great is labor … and the workers who would labor in consecrated property would take their wages from the Temple treasury. Rabbi Shimon says: Great is labor, for even a High Priest who enters on Yom Kippur not at the time of service is liable to death, whereas at the time of labor the impure and blemished are permitted to enter."}, {"location": "Mishnat Rabbi Eliezer 20:5", "hebrew": "חֲבִיבָה הִיא הַמְּלָאכָה, שֶׁהֲרֵי כָּל בְּרִיּוֹת שֶׁבָּרָא הקב\"ה בְּעוֹלָמוֹ, לֹא מָסַר לָהֶן מְלָאכָה, אֶלָּא לִבְנֵי אָדָם בִּלְבַד. וְכֵן הָיָה ר' מֵאִיר אוֹמֵר, רָאִיתָ מִיָּמֶיךָ אֲרִי אַכָּר צְבִי קָיֵט, שׁוּעָל כּוֹרֵם, אוֹ אֶחָד מִן הַחַיּוֹת עוֹשֶׂה מְלָאכָה. [הֲרֵי אֵינָן עוֹשִׂין מְלָאכָה], וַהֲרֵי הֵן מִתְפַּרְנְסִין בְּלֹא מְלָאכָה, וּבְנֵי אָדָם אֵין מִתְפַּרְנְסִין אֶלָּא מִן הַמְּלָאכָה, לֹא מִפְּנֵי שֶׁהֵן קַלִּים מִן הַחַיּוֹת, אֶלָּא שֶׁהַמְּלָאכָה חֲבִיבָה.", "english": "Beloved is labor: for all the creatures the Holy One, blessed be He, created in His world, He did not assign labor to them — only to human beings. Thus Rabbi Meir would say: Have you ever seen a lion as a porter, a deer as a summer laborer, a fox as a vintner, or any animal doing labor? Yet they are sustained without labor. And human beings are sustained only through labor — not because they are less capable than the animals, but because labor is beloved."}, {"location": "Avot DeRabbi Natan 11:1", "hebrew": "שְׁמַעְיָה וְאַבְטַלְיוֹן קִבְּלוּ מֵהֶם שְׁמַעְיָה אוֹמֵר אֱהֹב אֶת הַמְּלָאכָה וּשְׂנָא אֶת הָרַבָּנוּת וְאַל תִּתְוַדַּע לָרָשׁוּת. אֱהֹב אֶת הַמְּלָאכָה כֵּיצַד? מְלַמֵּד שֶׁיְּהֵא אָדָם אוֹהֵב אֶת הַמְּלָאכָה וְאַל יִהְיֶה שׂוֹנֵא אֶת הַמְּלָאכָה. כְּשֵׁם שֶׁהַתּוֹרָה נִתְּנָה בִּבְרִית כָּךְ הַמְּלָאכָה נִתְּנָה בִּבְרִית שנא' (שְׁמוֹת כ':ט'-י') \"שֵׁשֶׁת יָמִים תַּעֲבֹד וְעָשִׂיתָ כָּל מְלַאכְתֶּךָ וְיוֹם הַשְּׁבִיעִי שַׁבָּת לַה' אֱלֹקֶיךָ״...\nר\"ש בֶּן אֶלְעָזָר אוֹמֵר: אַף אָדָם הָרִאשׁוֹן לֹא טָעַם כְּלוּם עַד שֶׁעָשָׂה מְלָאכָה שְׁנָא' (בְּרֵאשִׁית ב':ט\"ו) וַיַּנִּחֵהוּ בְגַן עֵדֶן לְעָבְדָהּ וּלְשָׁמְרָהּ וְהָדָר מִכֹּל עֵץ הַגָּן אָכֹל תֹּאכֵל.\nר\"ט אוֹמֵר: אַף הקב\"ה לֹא הִשְׁרָה שְׁכִינָתוֹ עַל יִשְׂרָאֵל עַד שֶׁעָשׂוּ מְלָאכָה שֶׁנֶּאֱמַר (שְׁמוֹת כ\"ה:ח') וְעָשׂוּ לִי מִקְדָּשׁ וְשָׁכַנְתִּי בְּתוֹכָם.\nרַבִּי יְהוּדָה בֶּן בְּתֵירָא אוֹמֵר: מִי שֶׁאֵין לוֹ מְלָאכָה לַעֲשׂוֹת מַה יַעֲשֶׂה אִם יֵשׁ לוֹ חָצֵר חֲרֵבָה אוֹ שָׂדֶה חֲרֵבָה יֵלֵךְ וְיִתְעַסֵּק בָּהּ שֶׁנֶּאֱמַר שֵׁשֶׁת יָמִים תַּעֲבֹד וְעָשִׂיתָ כָּל מְלַאכְתְּךָ וּמַה תַּלְמוּד לוֹמַר וְעָשִׂיתָ כָּל מְלַאכְתֶּךָ לְהָבִיא אֶת מִי שֶׁיֵּשׁ לוֹ חֲצֵרוֹת אוֹ שָׂדוֹת חֳרָבוֹת יֵלֵךְ וְיִתְעַסֵּק בָּהֶן", "english": "Shemaya and Avtalyon received (the tradition) from them. Shemaya says: Love labor, hate authority, and do not make yourself known to the government. “Love labor” — meaning: A person should love labor and not hate it. Just as the Torah was given in a covenant, so labor was given in a covenant, as it is said: “Six days shall you labor …” Rabbi Shimon ben Elazar says: Even the first אדם did not taste anything until he did labor, as it is said: “And He placed him in the Garden of Eden to work it and to guard it,” and only afterward: “From every tree of the garden you shall surely eat.” Rabbi (T.) says: Even the Holy One, blessed be He, did not cause His Presence to rest upon Israel until they did labor, as it is said: “And they shall make Me a sanctuary …” Rabbi Yehudah ben Beteira says: One who has no labor to do — what should he do? If he has a ruined courtyard or a ruined field, let him go and occupy himself with it …"}, {"location": "Shabbat 31a", "hebrew": "אָמַר רָבָא: בְּשָׁעָה שֶׁמַּכְנִיסִין אָדָם לְדִין, אוֹמְרִים לוֹ: נָשָׂאתָ וְנָתַתָּ בָּאֱמוּנָה? קָבַעְתָּ עִתִּים לַתּוֹרָה? עָסַקְתָּ בִּפְרִיָּה וּרְבִיָּה? צִפִּיתָ לִישׁוּעָה? פִּלְפַּלְתָּ בְּחׇכְמָה? הֵבַנְתָּ דָּבָר מִתּוֹךְ דָּבָר? וַאֲפִילּוּ הָכִי, אִי יִרְאַת ה׳ הִיא אוֹצָרוֹ — אִין, אִי לָא — לָא. מָשָׁל לְאָדָם שֶׁאָמַר לִשְׁלוּחוֹ: הַעֲלֵה לִי כּוֹר חִיטִּין לָעֲלִיָּיה. הָלַךְ וְהֶעֱלָה לוֹ. אָמַר לוֹ: עֵירַבְתָּ לִי בָּהֶן קַב חוֹמְטוֹן? אָמַר לוֹ: לָאו. אָמַר לוֹ: מוּטָב אִם לֹא הֶעֱלֵיתָה.", "english": "Rava said: When they bring a person in for judgment, they say to him: Did you conduct your business faithfully? Did you set fixed times for Torah? Did you engage in procreation? Did you hope for salvation? Did you engage in wisdom? Did you understand one thing מתוך another? And even so: If fear of the LORD is his treasure — yes; if not — no. A parable: A person said to his agent: Bring up for me a kor of wheat to the attic. He went and brought it. He said to him: Did you mix into it a kab of preservative? He said: No. He said: Better if you had not brought it up at all."}, {"location": "Bava Batra 110a", "hebrew": "אָמַר לָהֶן, כָּךְ מְקוּבְּלַנִי מִבֵּית אֲבִי אַבָּא: לְעוֹלָם יַשְׂכִּיר אָדָם עַצְמוֹ לַעֲבוֹדָה זָרָה, וְאַל יִצְטָרֵךְ לַבְּרִיּוֹת. וְהוּא סָבַר – לַעֲבוֹדָה זָרָה מַמָּשׁ; וְלָא הִיא, אֶלָּא ״עֲבוֹדָה זָרָה״ – עֲבוֹדָה שֶׁזָּרָה לוֹ, כְּדַאֲמַר לֵיהּ רַב לְרַב כָּהֲנָא: נְטוֹשׁ נְבֵילְתָּא בְּשׁוּקָא וּשְׁקוֹל אַגְרָא, וְלָא תֵּימָא: גַּבְרָא רַבָּא אֲנָא וְזִילָא בִּי מִילְּתָא.", "english": "He said to them: This is what I received from my father’s house: A person should always hire himself out even for “foreign worship,” rather than become dependent on people. And he thought it meant actual idolatry — but it does not; rather, “foreign worship” means work that is foreign (unfamiliar) to him — as Rav said to Rav Kahana: Strip carcasses in the marketplace and take the wage, and do not say: I am a great man and it is beneath my dignity."}, {"location": "Shabbat 30b", "hebrew": "״וְשִׁבַּחְתִּי אֲנִי אֶת הַשִּׂמְחָה״ — שִׂמְחָה שֶׁל מִצְוָה. ״וּלְשִׂמְחָה מַה זֹּה עוֹשָׂה״ — זוֹ שִׂמְחָה שֶׁאֵינָהּ שֶׁל מִצְוָה. לְלַמֶּדְךָ שֶׁאֵין שְׁכִינָה שׁוֹרָה לֹא מִתּוֹךְ עַצְבוּת וְלֹא מִתּוֹךְ עַצְלוּת וְלֹא מִתּוֹךְ שְׂחוֹק וְלֹא מִתּוֹךְ קַלּוּת רֹאשׁ וְלֹא מִתּוֹךְ שִׂיחָה וְלֹא מִתּוֹךְ דְּבָרִים בְּטֵלִים, אֶלָּא מִתּוֹךְ דְּבַר שִׂמְחָה שֶׁל מִצְוָה, שֶׁנֶּאֱמַר: ״וְעַתָּה קְחוּ לִי מְנַגֵּן וְהָיָה כְּנַגֵּן הַמְנַגֵּן וַתְּהִי עָלָיו יַד ה׳״.", "english": "“And I praised joy” — joy of a mitzvah. “And of joy, what does it accomplish?” — this is joy that is not of a mitzvah. To teach you that the Divine Presence rests neither amid sadness, nor amid laziness, nor amid laughter, nor amid frivolity, nor amid idle talk — but amid joy of a mitzvah, as it is said: “Now bring me a musician; and when the musician played, the hand of the LORD came upon him.”"}, {"location": "Berakhot 57b", "hebrew": "שְׁלֹשָׁה מְשִׁיבִין דַּעְתּוֹ שֶׁל אָדָם, אֵלּוּ הֵן: קוֹל, וּמַרְאֶה, וָרֵיחַ.", "english": "Three things restore a person’s mind: sound, sight, and scent."}, {"location": "Megillah 32a", "hebrew": "וְאָמַר רַבִּי שְׁפַטְיָה אָמַר רַבִּי יוֹחָנָן: כָּל הַקּוֹרֵא בְּלֹא נְעִימָה וְשׁוֹנֶה בְּלֹא זִמְרָה, עָלָיו הַכָּתוּב אוֹמֵר: ״וְגַם אֲנִי נָתַתִּי לָהֶם חוּקִּים לֹא טוֹבִים וְגוֹ׳״.", "english": "Rabbi Shefatyah said in the name of Rabbi Yoḥanan: Anyone who reads without pleasant melody and studies without song — Scripture says of him: “I also gave them statutes that were not good …”"}, {"location": "Arakhin 13b:10-12", "hebrew": "דתניא רבי יהודה אומר כנור של מקדש של שבעת נימין היה שנאמר (תהלים טז, יא) שובע שמחות [את] פניך אל תיקרי שובע אלא שבע ושל ימות המשיח שמונה שנאמר (תהלים יב, א) למנצח על השמינית על נימא שמינית של עולם הבא עשר שנאמר (תהלים צב, ד) עלי עשור ועלי נבל עלי הגיון בכנור", "english": "It was taught: Rabbi Yehudah says: The harp of the Temple had seven strings, as it is said: “sovaʿ semaḥot (fullness of joys) before You” — do not read sovaʿ (fullness) אלא shevaʿ (seven). In the days of Messiah — eight, as it is said: “For the leader, on the eighth.” In the World‑to‑Come — ten, as it is said: “on a ten‑stringed instrument …”"}, {"location": "Avot DeRabbi Natan 8:3", "hebrew": "וקנה לך חבר כיצד מלמד שיקנה האדם חבר לעצמו שיאכל עמו וישתה עמו ויקרא עמו וישנה עמו ויישן עמו ויגלה לו כל סתריו סתר תורה וסתר דרך ארץ שכשיושבין ועוסקין בתורה וטעה א' מהם הלכה או ראש הפרק או שיאמר על טמא טהור או על טהור טמא [ועל אסור מותר ועל מותר אסור חבירו מחזירו. ומניין] שכשחבירו מחזירו וקורא עמו שיש להם שכר טוב בעמלן שנא׳ (קהלת י) טובים השנים מן הא' אשר יש להם שכר טוב בעמלם:", "english": "And “acquire for yourself a friend” — how? It teaches that a person should acquire a friend for himself: to eat with him, drink with him, read with him, study with him, sleep with him, and reveal to him all his secrets — secrets of Torah and secrets of worldly conduct — so that when they sit and engage in Torah and one errs … his friend restores him. And from where? For when his friend restores him and reads with him, they have a good reward for their labor, as it is said: “Two are better than one … for they have a good reward for their toil.”"}, {"location": "Avot DeRabbi Natan Version B 18", "hebrew": "ואיזה הוא [חבר] זה שדברו חכמים בכל מקום. כל שדעתו הוגנת עליו, אוכלים ושותים שניהם כאחד, ומשיחים זה לזה ומגלה [לו] את נסתריו, עליהם הוא אומר טובים השנים מן האחד (קהלת ד' ט').", "english": "And what is a ‘friend’ of whom the Sages spoke everywhere? Anyone whose judgment is sound: they eat and drink together, converse with one another, and reveal their hidden matters; about them it says: “Two are better than one” (Ecclesiastes 4:9)."}, {"location": "Shir HaShirim Rabbah 8:12", "hebrew": "הַיּוֹשֶׁבֶת בַּגַּנִּים חֲבֵרִים מַקְשִׁיבִים, כְּשֶׁיִּשְׂרָאֵל נִכְנָסִין לְבָתֵּי כְנֵסִיּוֹת וְקוֹרִין קְרִיאַת שְׁמַע בְּכִוּוּן הַדַּעַת בְּקוֹל אֶחָד בְּדֵעָה וְטַעַם אֶחָד, הַקָּדוֹשׁ בָּרוּךְ הוּא אוֹמֵר לָהֶם: הַיּוֹשֶׁבֶת בַּגַּנִּים, כְּשֶׁאַתֶּם קוֹרִין חֲבֵרִים אֲנִי וּפַמַּלְיָא שֶׁלִּי מַקְשִׁיבִים לְקוֹלֵךְ הַשְׁמִיעִנִי, אֲבָל כְּשֶׁיִּשְׂרָאֵל קוֹרִין קְרִיאַת שְׁמַע בְּטֵרוּף הַדַּעַת, זֶה מַקְדִּים וְזֶה מְאַחֵר וְאֵינָם מְכַוְּנִין דַּעְתָּם בִּקְרִיאַת שְׁמַע, רוּחַ הַקֹּדֶשׁ צוֹוַחַת וְאוֹמֶרֶת: ״בְּרַח דּוֹדִי וּדְמֵה לְךָ לִצְבִי...״", "english": "“You who dwell in gardens — companions listen.” When Israel enter synagogues and recite Shema with intention, in one voice, with one mind and one meaning, the Holy One, blessed be He, says to them: You who dwell in gardens — when you call (to Me), I and My entourage listen to your voice; let Me hear it. But when Israel recite Shema in a confused rush — this one early and this one late, without directing their minds — the Holy Spirit cries out and says: “Flee, my beloved, and be like a gazelle …”"}, {"location": "Bereishit Rabbah 38:6", "hebrew": "אוֹתָן שֶׁל דּוֹר הַמַּבּוּל לֹא נִשְׁתַּיְּרָה מֵהֶן פְּלֵיטָה, וְאֵלּוּ שֶׁל דּוֹר הַפְלָגָה נִשְׁתַּיְירָה מֵהֶם פְּלֵטָה, אֶלָּא דּוֹר הַמַּבּוּל עַל יְדֵי שֶׁהָיוּ שְׁטוּפִים בְּגָזֵל, שֶׁנֶּאֱמַר (איוב כד, ב), גְּבֻלוֹת יַשִּׂיגוּ עֵדֶר גָּזְלוּ וַיִּרְעוּ, לְפִיכָךְ לֹא נִשְׁתַּיֵּיר מֵהֶן פְּלֵיטָה, אֲבָל אֵלּוּ עַל יְדֵי שֶׁהָיוּ אוֹהֲבִים זֶה אֶת זֶה, שֶׁנֶּאֱמַר: וַיְהִי כָל הָאָרֶץ שָׂפָה אֶחָת, לְפִיכָךְ נִשְׁתַּיְּרָה מֵהֶן פְּלֵיטָה. רַבִּי אוֹמֵר גָּדוֹל הַשָּׁלוֹם שֶׁאֲפִלּוּ יִשְׂרָאֵל עוֹבְדִים עֲבוֹדַת כּוֹכָבִים וְשָׁלוֹם בֵּינֵיהֶם, אָמַר הַמָּקוֹם כִּבְיָכוֹל אֵינִי יָכוֹל לִשְׁלֹט בָּהֶם, כֵּיוָן שֶׁשָּׁלוֹם בֵּינֵיהֶם, שֶׁנֶּאֱמַר (הושע ד, יז) חֲבוּר עֲצַבִּים אֶפְרָיִם הַנַּח לוֹ, אֲבָל מִשֶּׁנֶּחְלְקוּ מַה הוּא אוֹמֵר (הושע י, ב) חָלַק לִבָּם עַתָּה יֶאְשָׁמוּ. הָא לָמַדְתָּ גָּדוֹל הַשָּׁלוֹם וּשְׂנוּאָה הַמַּחְלֹקֶת.", "english": "Of those of the generation of the Flood, no remnant remained; but of those of the generation of the Dispersion, a remnant remained. Rather, the generation of the Flood — because they were immersed in robbery, as it is said: “They remove boundaries …” — therefore no remnant remained. But those — because they loved one another, as it is said: “And all the earth was of one language” — therefore a remnant remained. Rabbi says: Great is peace, for even if Israel worships idolatry yet there is peace among them, the Omnipresent כביכול says: I cannot rule over them, since there is peace among them … But once they are divided … you learn: Great is peace, and hated is dispute."}, {"location": "Avot DeRabbi Natan 12:3", "hebrew": "אוהב שלום כיצד? מלמד שיהא אדם אוהב שלום בישראל בין כל אחד ואחד כדרך שהיה אהרן אוהב שלום בין כל אחד ואחד, שנא' (מלאכי ב) תורת אמת היתה בפיהו ועולה לא נמצא בשפתיו בשלום ובמישור הלך אתי ורבים השיב מעון. (ר\"מ אומר מה ת\"ל ורבים השיב מעון) כשהיה אהרן מהלך בדרך פגע בו באדם רשע ונתן לו שלום, למחר בקש אותו האיש לעבור עבירה אמר אוי לי היאך אשא עיני אחר כך ואראה את אהרן בושתי הימנו שנתן לי שלום, נמצא אותו האיש מונע עצמו מן העבירה. וכן שני בני אדם שעשו מריבה זה עם זה הלך אהרן וישב אצל אחד מהם אמר לו בני ראה חברך מהו אומר מטרף את לבו וקורע את בגדיו אומר אוי לי היאך אשא את עיני ואראה את חברי בושתי הימנו שאני הוא שסרחתי עליו, הוא יושב אצלו עד שמסיר קנאה מלבו. והולך אהרן ויושב אצל האחר וא\"ל בני ראה חברך מהו אומר מטרף את לבו וקורע את בגדיו ואומר אוי לי היאך אשא את עיניו ואראה את חברי בושתי הימנו שאני הוא שסרחתי עליו הוא יושב אצלו עד שמסיר קנאה מלבו. וכשנפגשו זה בזה גפפו ונשקו זה לזה לכך נאמר (במדבר כ) ויבכו את אהרן שלשים יום כל בית ישראל.", "english": "How does one “love peace”? It teaches that a person should love peace in Israel between each and every one, the way Aaron loved peace between each and every one … When Aaron would meet a wicked person, he would greet him; the next day that person would want to sin and would say: Woe to me — how will I lift my eyes and see Aaron, who greeted me? And so he held back. Likewise, when two people quarreled, Aaron would sit with each one and tell him that the other is torn with regret — until jealousy left their hearts; and when they met, they embraced and kissed. Therefore it says: “And all the house of Israel wept for Aaron thirty days.”"}, {"location": "Chagigah 26a", "hebrew": "אָמַר רַבִּי יְהוֹשֻׁעַ בֶּן לֵוִי, דְּאָמַר קְרָא: ״וַיֵּאָסֵף כׇּל אִישׁ יִשְׂרָאֵל אֶל הָעִיר כְּאִישׁ אֶחָד חֲבֵרִים״, הַכָּתוּב עֲשָׂאָן כּוּלָּן חֲבֵרִים.", "english": "Rabbi Yehoshua ben Levi said, as the verse states: “And all the men of Israel gathered to the city as one man — friends” — Scripture made them all friends."}, {"location": "Jerusalem Talmud, Chagigah 3:6", "hebrew": "אָמַר רִבִּי יְהוֹשֻׁעַ בֶּן לֵוִי. יְרֽוּשָׁלַם הַבְּנוּיָה כְּעִיר שֶׁחוּבְּרָה לָּהּ יַחְדָּיו. עִיר שֶׁהִיא עוֹשָׂה כָל־יִשְׂרָאֵל חֲבֵרִים. מֵעַתָּה אֲפִילוּ בִּשְׁאַר יְמוֹת הַשָּׁנָה. אָמַר רִבִּי זְעוּרָה. וּבִלְבַד בְּשָׁעָה שֶׁשָּׁם עָלוּ שְׁבָטִים.", "english": "Rabbi Yehoshua ben Levi said: “Jerusalem, built as a city that is joined together.” A city that makes all Israel friends — from now, even during the rest of the days of the year. Rabbi Ze‘ura said: But only at the time when the tribes ascended there."}, {"location": "Taanit 7a", "hebrew": "אָמַר רַב נַחְמָן בַּר יִצְחָק: לָמָּה נִמְשְׁלוּ דִּבְרֵי תוֹרָה כְּעֵץ, שֶׁנֶּאֱמַר: ״עֵץ חַיִּים הִיא לַמַּחֲזִיקִים בָּהּ״, לוֹמַר לָךְ: מָה עֵץ קָטָן מַדְלִיק אֶת הַגָּדוֹל, אַף תַּלְמִידֵי חֲכָמִים קְטַנִּים מְחַדְּדִים אֶת הַגְּדוֹלִים. וְהַיְינוּ דְּאָמַר רַבִּי חֲנִינָא: הַרְבֵּה לָמַדְתִּי מֵרַבּוֹתַי, וּמֵחֲבֵירַי יוֹתֵר מֵרַבּוֹתַי, וּמִתַּלְמִידַי יוֹתֵר מִכּוּלָּן.", "english": "Rav Naḥman bar Yitzḥak said: Why were the words of Torah likened to a tree, as it is said: “It is a tree of life to those who grasp it”? To tell you: Just as a small piece of wood kindles a large one, so small תלמידי חכמים sharpen the great. And this is what Rabbi Ḥanina said: I learned much from my teachers, more from my colleagues than from my teachers, and from my students more than from all of them."}, {"location": "Taanit 7a", "hebrew": "וְאָמַר רַבִּי חֲנִינָא בַּר אִידִי: לָמָּה נִמְשְׁלוּ דִּבְרֵי תוֹרָה לְמַיִם, דִּכְתִיב: ״הוֹי כׇּל צָמֵא לְכוּ לַמַּיִם״, לוֹמַר לָךְ: מָה מַיִם מַנִּיחִין מָקוֹם גָּבוֹהַּ וְהוֹלְכִין לְמָקוֹם נָמוּךְ, אַף דִּבְרֵי תוֹרָה אֵין מִתְקַיְּימִין אֶלָּא בְּמִי שֶׁדַּעְתּוֹ שְׁפָלָה.", "english": "Rabbi Ḥanina bar Idi said: Why were the words of Torah likened to water, as it is written: “Ho, everyone who is thirsty, go to the water”? Just as water leaves a high place and goes to a low place, so the words of Torah endure only in one whose mind is humble."}, {"location": "Derech Eretz Zuta 8:2; Chullin 44b", "hebrew": "הַרְחֵק מִן הַכִּעוּר וּמִן הַדּוֹמֶה לוֹ וְקָרֵב לַדָּבָר הַמִּתְקַבֵּל וּלְכָל הַדּוֹמֶה לוֹ וֶהֱוִי זָהִיר מֵהַיּוֹעֲצָךְ לְפִי דַּרְכּוֹ", "english": "Keep far from ugliness and from what resembles it; draw near to what is acceptable and to all that resembles it; and be careful of your adviser, according to his way."}, {"location": "Derech Eretz Zuta 8:12", "hebrew": "הַנִּכְנָס לַמֶּרְחָץ נוֹתֵן כָּבוֹד לְיוֹצֵא. וְהַיּוֹצֵא מִן בֵּית הַכִּסֵּא נוֹתֵן כָּבוֹד לַנִּכְנָס:", "english": "One who enters the bathhouse gives honor to the one leaving; and one who leaves the privy gives honor to the one entering."}, {"location": "Derech Eretz Zuta 5:4", "hebrew": "הֲדַר תּוֹרָה חָכְמָה. הֲדַר חָכְמָה עֲנָוָה. הֲדַר עֲנָוָה יִרְאֶה. הֲדַר יִרְאָה מִצְוָה. הֲדַר מִצְוָה צְנִיעוּת.", "english": "The splendor of Torah is wisdom. The splendor of wisdom is humility. The splendor of humility is fear (of Heaven). The splendor of fear is a mitzvah. The splendor of a mitzvah is modesty."}, {"location": "Derech Eretz Zuta 3:11", "hebrew": "אַל תְּהֵא כְּאַסְקֻפָּה הָעֶלְיוֹנָה שֶׁמּוֹנַעַת אֶת הָרַגְלַיִם, וְלֹא כְּאֶמְצָעִית שֶׁכָּל הַיּוֹשֵׁב עַל יָדוֹ זוֹעֵף וְסוֹפָהּ לְהִסָּתֵר. הֱיֵה כְּאַסְקֻפָּה הַתַּחְתּוֹנָה שֶׁרֹב בְּנֵי אָדָם דּוֹרְסִין אוֹתָהּ לְסוֹף כָּל הַבִּנְיָן כֻּלָּהּ נִסְתָּר וְהִיא בִּמְקוֹמָהּ עוֹמֶדֶת:", "english": "Do not be like the upper threshold that prevents the feet, nor like the middle one on which whoever sits becomes angry and whose end is to be hidden. Be like the lower threshold: most people trample it, yet it supports the entire building, and it is hidden — but it stands in its place."}, {"location": "Berakhot 63b:12", "hebrew": "״הַסְכֵּת״ — עֲשׂוּ כִּתּוֹת כִּתּוֹת וְעִסְקוּ בַּתּוֹרָה. לְפִי שֶׁאֵין הַתּוֹרָה נִקְנֵית אֶלָּא בַּחֲבוּרָה.", "english": "“Hasket” — make groups and engage in Torah, for Torah is acquired only in a fellowship (ḥavurah)."}, {"location": "Derech Eretz Rabbah 6:2", "hebrew": "לְעוֹלָם לֹא יְהֵא אָדָם קַפְּדָן בְּתוֹךְ סְעֻדָּתוֹ. מַעֲשֶׂה בְּהִלֵּל הַזָּקֵן שֶׁעָשָׂה סְעוּדָה לְאָדָם אֶחָד וּבָא עָנִי וְעָמַד עַל פִּתְחוֹ. וְאָמַר אִשָּׁה אֲנִי צָרִיךְ לְהַכְנִיס הַיּוֹם וְאֵין לִי פַּרְנָסָה כְּלוּם. נָטְלָה אִשְׁתּוֹ כָּל הַסְּעוּדָה וְנָתְנָה לוֹ. וְאַחַר כָּךְ לָשָׁה עִסָּה אַחֶרֶת וּבִשְּׁלָה אַלְפָס אַחֵר וּבָאָתָהּ וְהִנִּיחָה לִפְנֵיהֶם. אָמַר לָהּ בִּתִּי מִפְּנֵי מָה לֹא הֵבֵאת לָנוּ מִיָּד. שָׂחָה לוֹ כָּל הַמַּעֲשִׂים. אָמַר לָהּ בִּתִּי אַף אֲנִי לֹא דַּנְתִּי אוֹתָךְ לְכַף חוֹבָה אֶלָּא לְכַף זְכוּת. שֶׁכָּל הַמַּעֲשִׂים שֶׁעָשִׂיתָ לֹא עָשִׂיתָ אֶלָּא לְשֵׁם שָׁמַיִם:", "english": "A person should never be strict during his meal. A story with Hillel the Elder: He made a meal for one man, and a poor person came and stood at the doorway, saying: I need to bring in a wife today (i.e., for marriage), and I have no livelihood at all. Hillel’s wife took the entire meal and gave it to him, and afterward she kneaded other dough and cooked in another pot and brought it and set it before them. Hillel said to her: My daughter, why did you not bring it to us immediately? She told him everything. He said to her: My daughter, I did not judge you unfavorably, but favorably — for everything you did, you did only for the sake of Heaven."}, {"location": "Eruvin 53b", "hebrew": "פַּעַם אַחַת הָיִיתִי מְהַלֵּךְ בַּדֶּרֶךְ, וְרָאִיתִי תִּינוֹק יוֹשֵׁב עַל פָּרָשַׁת דְּרָכִים. וְאָמַרְתִּי לוֹ: בְּאֵיזֶה דֶּרֶךְ נֵלֵךְ לָעִיר? אָמַר לִי: זוֹ קְצָרָה וַאֲרוּכָּה, וְזוֹ אֲרוּכָּה וּקְצָרָה. וְהָלַכְתִּי בִּקְצָרָה וַאֲרוּכָּה, כֵּיוָן שֶׁהִגַּעְתִּי לָעִיר מָצָאתִי שֶׁמַּקִּיפִין אוֹתָהּ גַּנּוֹת וּפַרְדֵּיסִין. חָזַרְתִּי לַאֲחוֹרַי. אָמַרְתִּי לוֹ: בְּנִי, הֲלֹא אָמַרְתָּ לִי קְצָרָה? אָמַר לִי: וְלֹא אָמַרְתִּי לְךָ אֲרוּכָּה? נְשַׁקְתִּיו עַל רֹאשׁוֹ, וְאָמַרְתִּי לוֹ: אַשְׁרֵיכֶם יִשְׂרָאֵל שֶׁכּוּלְּכֶם חֲכָמִים גְּדוֹלִים אַתֶּם, מִגְּדוֹלְכֶם וְעַד קְטַנְּכֶם.", "english": "Once I was walking on the road and I saw a child sitting at a crossroads. I said to him: Which road should we take to the city? He said to me: This one is short and long, and that one is long and short. I went on the short‑and‑long road; when I reached the city I found it surrounded by gardens and orchards, and I turned back. I said: My son, didn’t you tell me it was short? He said: Didn’t I tell you it was long? I kissed him on his head and said: Happy are you, Israel — for all of you are great sages, from your greatest to your smallest."}, {"location": "Kohelet Rabbah 4:9", "hebrew": "טוֹבִים הַשְּׁנַיִם מִן הָאֶחָד, טוֹבִים הַשְּׁנַיִם שֶׁהֵם יְגֵיעִין בַּתּוֹרָה, מִן הָאֶחָד, שֶׁעוֹסֵק זֶה לְעַצְמוֹ וְזֶה לְעַצְמוֹ. כִּי אִם יִפֹּלוּ הָאֶחָד יָקִים אֶת חֲבֵרוֹ, שֶׁאִם שָׁכַח הֲלָכָה אֶחָד מֵהֶם, חֲבֵרוֹ מַחֲזִיר הַהֲלָכָה.", "english": "Two are better than one — two who labor in Torah — than one who studies alone. “For if one falls, the other will raise his companion” — for if one forgets a law, his companion restores the law to him."}, {"location": "Shabbat 31a", "hebrew": "שׁוּב מַעֲשֶׂה בְּגוֹי אֶחָד שֶׁבָּא לִפְנֵי שַׁמַּאי. אָמַר לוֹ: גַּיְּירֵנִי עַל מְנָת שֶׁתְּלַמְּדֵנִי כָּל הַתּוֹרָה כּוּלָּהּ כְּשֶׁאֲנִי עוֹמֵד עַל רֶגֶל אַחַת! דְּחָפוֹ בְּאַמַּת הַבִּנְיָן שֶׁבְּיָדוֹ. בָּא לִפְנֵי הִלֵּל, גַּיְירֵיהּ. אָמַר לוֹ: דַּעֲלָךְ סְנֵי לְחַבְרָךְ לָא תַּעֲבֵיד — זוֹ הִיא כָּל הַתּוֹרָה כּוּלָּהּ, וְאִידַּךְ פֵּירוּשָׁהּ הוּא, זִיל גְּמוֹר.", "english": "Again, a story: A gentile came before Shammai and said: Convert me on condition that you teach me the entire Torah while I stand on one foot. He pushed him away with the builder’s measuring rod in his hand. He came before Hillel; Hillel converted him. He said to him: What is hateful to you, do not do to your fellow — this is the entire Torah; the rest is its explanation. Go and learn."}, {"location": "Eruvin 100b", "hebrew": "אָמַר רַבִּי יוֹחָנָן: אִילְמָלֵא לֹא נִיתְּנָה תּוֹרָה, הָיִינוּ לְמֵידִין צְנִיעוּת מֵחָתוּל, וְגָזֵל מִנְּמָלָה, וַעֲרָיוֹת מִיּוֹנָה.", "english": "Rabbi Yoḥanan said: Had the Torah not been given, we would have learned modesty from the cat, avoidance of theft from the ant, and sexual propriety from the dove."}, {"location": "Bereishit Rabbah 13:3", "hebrew": "אָמַר רַבִּי שִׁמְעוֹן בֶּן יוֹחָאי, שְׁלשָׁה דְבָרִים שְׁקוּלִין זֶה כָּזֶה, וְאֵלּוּ הֵן: אֶרֶץ, וְאָדָם, וּמָטָר. אָמַר רַבִּי לֵוִי בַּר חִיָּא וּשְׁלָשְׁתָּן מִשָּׁלשׁ אוֹתִיּוֹת, לְלַמֶּדְךָ שֶׁאִם אֵין אֶרֶץ אֵין מָטָר, וְאִם אֵין מָטָר אֵין אֶרֶץ, וְאִם אֵין שְׁנֵיהֶם אֵין אָדָם.", "english": "Rabbi Shimon bar Yoḥai said: Three things are balanced against each other—land, the human being, and rain. Rabbi Levi bar Ḥiyya said: all three are made of three letters, to teach you: if there is no land there is no rain; if there is no rain there is no land; and if there are not both of them, there is no human being."}, {"location": "Berakhot 43b", "hebrew": "אָמַר רַב יְהוּדָה: הַאי מַאן דְּנָפֵיק בְּיוֹמֵי נִיסָן וְחָזֵי אִילָנֵי דְּקָא מְלַבְלְבִי, אוֹמֵר: ״בָּרוּךְ שֶׁלֹּא חִיסֵּר בְּעוֹלָמוֹ כְּלוּם וּבָרָא בּוֹ בְּרִיּוֹת טוֹבוֹת וְאִילָנוֹת טוֹבוֹת לְהִתְנָאוֹת בָּהֶן בְּנֵי אָדָם״.", "english": "Rav Yehuda said: One who goes out in the days of Nisan and sees trees budding should say: “Blessed is He who has not left anything lacking in His world, and created within it good creatures and good trees for the enjoyment of human beings.”"}, {"location": "Bereishit Rabbah 10:7", "hebrew": "רַבָּנָן אָמְרֵי אֲפִלּוּ דְבָרִים שֶׁאַתָּה רוֹאֶה אוֹתָן שֶׁהֵן יְתֵירָה בָּעוֹלָם, כְּגוֹן זְבוּבִין וּפַרְעוֹשִׁין וְיַתּוּשִׁין, אַף הֵן בִּכְלַל בְּרִיָּתוֹ שֶׁל עוֹלָם הֵן, וּבַכֹּל הַקָּדוֹשׁ בָּרוּךְ הוּא עוֹשֶׂה שְׁלִיחוּתוֹ, אֲפִלּוּ עַל יְדֵי נָחָשׁ, אֲפִלּוּ עַל יְדֵי יַתּוּשׁ, אֲפִלּוּ עַל יְדֵי צְפַרְדֵּעַ. רַבִּי תַּנְחוּמָא אָמַר לָהּ בְּשֵׁם רַבִּי מְנַחְמָה, רַבִּי בֶּרֶכְיָה בְּשֵׁם רַבִּי חֶלְבּוֹ, רַבִּי אַחָא הֲוָה מִשְׁתָּעֵי הָדֵין עוֹבָדָא: חַד בַּר נָשׁ הֲוָה קָאֵים עַל כֵּיף נַהֲרָא, חֲמָא חַד עוּרְדְּעָן טָעֲנָה חָדָא עַקְרָב, וּמְגִיזָה יָתֵיהּ נַהֲרָא, וְכֵיוָן דְּעָבְדַת שְׁלִיחוּתֵיהּ אַחְזַרְתֵּא לְאַתְרֵהּ.", "english": "The Rabbis said: Even things you see as superfluous in the world—like flies, fleas, and mosquitoes—are included in the world’s creation. The Holy One, blessed be He, carries out His mission through everything: even through a snake, even through a mosquito, even through a frog. Rabbi Aḥa related an incident: A man was standing on a riverbank and saw a frog carrying a scorpion and ferrying it across the river; once it carried out its mission, it returned to its place."}, {"location": "Bereishit Rabbah 10:6", "hebrew": "בַּר סִירָא אָמַר, אֱלוֹהַּ הֶעֱלָה סַמִּים מִן הָאָרֶץ, בָּהֶם הָרוֹפֵא מְרַפֵּא אֶת הַמַּכָּה, וּבָהֶם הָרוֹקֵחַ מְרַקֵּחַ אֶת הַמִּרְקַחַת.", "english": "Ben Sira said: God brought forth medicines from the earth—by them the physician heals the wound, and by them the pharmacist compounds the remedy."}, {"location": "Shabbat 151b", "hebrew": "תַּנְיָא, רַבִּי גַּמְלִיאֵל בְּרַבִּי אוֹמֵר: ״וְנָתַן לְךָ רַחֲמִים וְרִחַמְךָ וְהִרְבֶּךָ״, כָּל הַמְרַחֵם עַל הַבְּרִיּוֹת — מְרַחֲמִין עָלָיו מִן הַשָּׁמַיִם, וְכֹל שֶׁאֵינוֹ מְרַחֵם עַל הַבְּרִיּוֹת — אֵין מְרַחֲמִין עָלָיו מִן הַשָּׁמַיִם.", "english": "It was taught: Rabban Gamliel son of Rabbi said on the verse “He will grant you mercy and show you mercy and multiply you”: Whoever has compassion on creatures—Heaven has compassion on him; and whoever does not have compassion on creatures—Heaven has no compassion on him."}, {"location": "Bereishit Rabbah 13:2", "hebrew": "וְכֹל שִׂיחַ הַשָּׂדֶה, כָּל הָאִילָנוֹת כְּאִלּוּ מְשִׂיחִין אֵלּוּ עִם אֵלּוּ. כָּל הָאִילָנוֹת כְּאִלּוּ מְשִׂיחִין עִם הַבְּרִיּוֹת. כָּל הָאִילָנוֹת לַהֲנָאָתָן שֶׁל בְּרִיּוֹת נִבְרְאוּ. מַעֲשֶׂה בְּאֶחָד שֶׁבָּצַר אֶת כַּרְמוֹ וְלָן בְּתוֹכוֹ וּבָאת הָרוּחַ וּפְגָעַתּוּ. כָּל שִׂיחָתָן שֶׁל בְּרִיּוֹת אֵינָהּ אֶלָּא עַל הָאָרֶץ, עָבְדַּת אַרְעָא, לָא עָבְדַּת. וְכָל תְּפִלָּתָן שֶׁל בְּרִיּוֹת אֵינָהּ אֶלָּא עַל הָאָרֶץ, מָרֵי תַּעֲבֵד אַרְעָא, מָרֵי תַּצְלִיחַ אַרְעָא. כָּל תְּפִלָּתָן שֶׁל יִשְׂרָאֵל אֵינוֹ אֶלָּא עַל בֵּית הַמִּקְדָּשׁ, מָרֵי יִתְבְּנֵי בֵּית מַקְדְּשָׁא, מָרֵי מָתַי יִתְבְּנֵי בֵּית מַקְדְּשָׁא.", "english": "‘Every shrub of the field’—all the trees are as though they converse with one another; all the trees are as though they converse with created beings; all the trees were created for the benefit of creatures. A story: one person harvested his vineyard and slept there, and the wind struck him. All the conversation of creatures is only about the land: “Work the land—don’t neglect it.” And all their prayer is only about the land: “Master, let the land be worked; Master, let the land succeed.” But all the prayer of Israel is only about the Temple: “Master, may the Temple be rebuilt; Master, when will the Temple be rebuilt?”"}, {"location": "Sanhedrin 5b", "hebrew": "אָמַר רַב: שְׁמוֹנָה עָשָׂר חֳדָשִׁים גָּדַלְתִּי אֵצֶל רוֹעֵה בְהֵמָה, לֵידַע אֵיזֶה מוּם קָבוּעַ וְאֵיזֶה מוּם עוֹבֵר.", "english": "Rav said: For eighteen months I grew up among shepherds of cattle, in order to know which blemish is permanent and which is passing."}, {"location": "Ketubot 5a", "hebrew": "דָּרַשׁ בַּר קַפָּרָא: גְּדוֹלִים מַעֲשֵׂה צַדִּיקִים יוֹתֵר מִמַּעֲשֵׂה שָׁמַיִם וָאָרֶץ, דְּאִילּוּ בְּמַעֲשֵׂה שָׁמַיִם וָאָרֶץ כְּתִיב: ״אַף יָדִי יָסְדָה אֶרֶץ וִימִינִי טִפְּחָה שָׁמָיִם״, וְאִלּוּ בְּמַעֲשֵׂה יְדֵיהֶם שֶׁל צַדִּיקִים כְּתִיב: ״מָכוֹן לְשִׁבְתְּךָ פָּעַלְתָּ ה׳ מִקְּדָשׁ אֲדֹנָי כּוֹנְנוּ יָדֶיךָ״.", "english": "Bar Kappara expounded: Greater are the deeds of the righteous than the making of heaven and earth—for regarding heaven and earth it is written, “My hand founded the earth and My right hand measured out the heavens,” whereas regarding the handiwork of the righteous it is written, “The place for Your dwelling You made, O Lord—the Sanctuary, O Lord, Your hands established.”"}, {"location": "Bereishit Rabbah 60:8", "hebrew": "אָמַר רַבִּי אַחָא יָפָה שִׂיחָתָן שֶׁל עַבְדֵי בָּתֵּי אָבוֹת מִתּוֹרָתָן שֶׁל בָּנִים, פָּרָשָׁתוֹ שֶׁל אֱלִיעֶזֶר שְׁנַיִם וּשְׁלשָׁה דַפִּים הוּא אוֹמְרָהּ וְשׁוֹנָהּ, וְשֶׁרֶץ מִגּוּפֵי תּוֹרָה וְאֵין דָּמוֹ מְטַמֵּא כִּבְשָׂרוֹ אֶלָּא מֵרִבּוּי הַמִּקְרָא.", "english": "Rabbi Aḥa said: More precious is the conversation of the servants of the patriarchs than the Torah of the children. The section about Eliezer is repeated over two or three pages, while that a creeping creature is among the foundations of Torah and that its blood does not impart impurity like its flesh is learned only from an extra wording in Scripture."}, {"location": "Bereishit Rabbah 47:6", "hebrew": "אָמַר רֵישׁ לָקִישׁ הָאָבוֹת הֵן הֵן הַמֶּרְכָּבָה, שֶׁנֶּאֱמַר: וַיַּעַל אֱלֹהִים מֵעַל אַבְרָהָם, (בראשית לה, יג): וַיַּעַל מֵעָלָיו אֱלֹהִים, (בראשית כח, יג): וְהִנֵּה ה' נִצָּב עָלָיו.", "english": "Reish Lakish said: The Patriarchs themselves are the Chariot, as it is said: “God went up from upon Abraham”; “God went up from upon him”; and “Behold, the Lord was standing over him.”"}, {"location": "Jerusalem Talmud, Peah 1:1", "hebrew": "רִבִּי בְּרֶכְיָה וְרִבִּי חִייָא דִּכְפַר תְּחוּמִין חַד אָמַר אֲפִילוּ כָּל־הָעוֹלָם כּוּלּוֹ אֵינוֹ שָׁוֶה אֲפִילוּ דָּבָר אֶחָד מִן הַתּוֹרָה. וְחַד אָמַר אֲפִילוּ כָּל־מִצְוֹתֶיהָ שֶׁל הַתּוֹרָה אֵינָן שָׁווֹת לְדָבָר אֶחָד מִן הַתּוֹרָה.", "english": "Rabbi Berekhya and Rabbi Ḥiyya of Kefar Teḥumin: one said, even the entire world is not worth even one matter of Torah; and one said, even all the mitzvot of the Torah are not worth even one matter of Torah."}, {"location": "Shir HaShirim Rabbah 2:2", "hebrew": "רַבִּי עֲזַרְיָה בְּשֵׁם רַבִּי יְהוּדָה אָמַר רַבִּי סִימוֹן, מָשָׁל לְמֶלֶךְ שֶׁהָיָה לוֹ פַּרְדֵּס וְיָרְדוּ וְנָטְעוּ שׁוּרָה שֶׁל תְּאֵנִים וְשׁוּרָה שֶׁל גְּפָנִים וְשׁוּרָה שֶׁל רִמּוֹנִים וְשׁוּרָה שֶׁל תַּפּוּחִים, וּמְסָרוֹ לְאָרִיס וְהָלַךְ לוֹ. לְאַחַר יָמִים בָּא הַמֶּלֶךְ וְהֵצִיץ בַּפַּרְדֵּס לֵידַע מֶה עָשָׂה, וּמָצָא מָלֵא חוֹחִין וְדַרְדַּרִים, הֵבִיא קַצָּצִים לְקַצְּצוֹ, וְרָאָה בוֹ שׁוֹשַׁנָּה אַחַת שֶׁל וֶרֶד וּנְטָלָהּ וְהֵרִיחַ בָּהּ וְשָׁבַת נַפְשׁוֹ עָלָיו, אָמַר הַמֶּלֶךְ בִּשְׁבִיל שׁוֹשַׁנָּה זוֹ יִנָּצֵל הַפַּרְדֵּס. כָּךְ הָעוֹלָם לֹא נִבְרָא אֶלָּא בִּשְׁבִיל יִשְׂרָאֵל, לְאַחַר עֶשְׂרִים וְשִׁשָּׁה דוֹרוֹת הֵצִיץ הַקָּדוֹשׁ בָּרוּךְ הוּא בְּעוֹלָמוֹ לִרְאוֹת מַה שֶּׁעָשָׂה, וּמְצָאוֹ מַיִם בְּמַיִם, דּוֹר אֱנוֹשׁ נִמְחֶה מִן הַמַּיִם, דּוֹר הַמַּבּוּל נִמְחֶה מִן הַמַּיִם, דּוֹר הַפְלָגָה, בְּמַיִם, הֵבִיא קַצָּצִים לְקַצְּצוֹ, שֶׁנֶּאֱמַר (תהלים כט, י): ה' לַמַּבּוּל יָשָׁב, וְרָאָה שׁוֹשַׁנָּה שֶׁל וֶרֶד, אֵלּוּ יִשְׂרָאֵל, וּנְטָלָהּ וְהֵרִיחַ בָּהּ, בְּשָׁעָה שֶׁסִּדְּרוּ יִשְׂרָאֵל עֲשֶׂרֶת הַדִּבְּרוֹת, וְשָׁבַת נַפְשׁוֹ עָלָיו, בְּשָׁעָה שֶׁאָמְרוּ יִשְׂרָאֵל (שמות כד, ז): נַעֲשֶׂה וְנִשְׁמָע, אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא בִּשְׁבִיל שׁוֹשַׁנָּה זוֹ יִנָּצֵל הַפַּרְדֵּס, בִּזְכוּת הַתּוֹרָה וְלוֹמְדֶיהָ, יִנָּצֵל הָעוֹלָם.", "english": "Rabbi Azaryah said in the name of Rabbi Yehudah; Rabbi Shimon said: A parable—there was a king who had an orchard. They went down and planted a row of fig trees, a row of vines, a row of pomegranates, and a row of apple trees, and he handed it over to a tenant farmer and went on his way. After some days the king came and peered into the orchard to see what had been done, and he found it full of thorns and thistles. He brought woodcutters to cut it down. But he saw one rose-flower there; he took it and smelled it, and his spirit was soothed. The king said, “For the sake of this one rose, the orchard will be saved.” כך too, the world was created only for the sake of Israel. After twenty-six generations the Holy One, blessed be He, peered into His world to see what had been done, and found it “water upon water”: the generation of Enosh was wiped out by water; the generation of the Flood was wiped out by water; the generation of the Dispersion—by water. He brought woodcutters to cut it down, as it is said: “The LORD sat enthroned at the Flood” (Ps. 29:10). But He saw a rose—these are Israel—and He took it and smelled it: when Israel arranged the Ten Commandments; and His spirit was soothed when Israel said, “We will do and we will hear” (Ex. 24:7). The Holy One, blessed be He, said, “For the sake of this rose, the orchard will be saved”: in the merit of the Torah and those who study it, the world is saved."}, {"location": "Taanit 7a", "hebrew": "תַּנְיָא, הָיָה רַבִּי בְּנָאָה אוֹמֵר: כׇּל הָעוֹסֵק בְּתוֹרָה לִשְׁמָהּ — תּוֹרָתוֹ נַעֲשֵׂית לוֹ סַם חַיִּים, שֶׁנֶּאֱמַר: ״עֵץ חַיִּים הִיא לַמַּחֲזִיקִים בָּהּ״, וְאוֹמֵר: ״רִפְאוּת תְּהִי לְשָׁרֶּךָ״, וְאוֹמֵר: ״כִּי מֹצְאִי מָצָא חַיִּים״. וְכָל הָעוֹסֵק בַּתּוֹרָה שֶׁלֹּא לִשְׁמָהּ — נַעֲשֵׂית לוֹ סַם הַמָּוֶת, שֶׁנֶּאֱמַר: ״יַעֲרֹף כַּמָּטָר לִקְחִי״, וְאֵין עֲרִיפָה אֶלָּא הֲרִיגָה, שֶׁנֶּאֱמַר: ״וְעָרְפוּ שָׁם אֶת הָעֶגְלָה בַּנָּחַל״.", "english": "It was taught: Rabbi Bena’ah would say: Whoever engages in Torah for its own sake—his Torah becomes for him an elixir of life, as it is said: “It is a Tree of Life to those who grasp it,” and it says: “Let it be healing to your navel,” and it says: “For whoever finds me has found life.” But whoever engages in Torah not for its own sake—his Torah becomes for him an elixir of death, as it is said: “May my teaching drip like rain,” and “dripping (ya’arof)” is nothing other than killing, as it is said: “And there they shall break the heifer’s neck in the wadi.”"}, {"location": "Sanhedrin 99b", "hebrew": "אָמַר רַבִּי אֲלֶכְּסַנְדְּרִי כׇּל הָעוֹסֵק בְּתוֹרָה לִשְׁמָהּ מֵשִׂים שָׁלוֹם בְּפָמַלְיָא שֶׁל מַעְלָה וּבְפָמַלְיָא שֶׁל מַטָּה שֶׁנֶּאֱמַר אוֹ יַחֲזֵק בְּמָעֻזִּי יַעֲשֶׂה שָׁלוֹם לִי שָׁלוֹם יַעֲשֶׂה לִּי.\nרַב אָמַר כְּאִילּוּ בָּנָה פַּלְטֵרִין שֶׁל מַעְלָה וְשֶׁל מַטָּה שֶׁנֶּאֱמַר וָאָשִׂים דְּבָרַי בְּפִיךָ וּבְצֵל יָדִי כִּסִּיתִיךָ לִנְטֹעַ שָׁמַיִם וְלִיסֹד אָרֶץ.\nרַבִּי יוֹחָנָן אָמַר אַף מֵגֵין עַל כׇּל הָעוֹלָם כּוּלּוֹ שֶׁנֶּאֱמַר וּבְצֵל יָדִי כִּסִּיתִיךָ וְלֵוִי אָמַר אַף מְקָרֵב אֶת הַגְּאוּלָּה שֶׁנֶּאֱמַר וְלֵאמֹר לְצִיּוֹן עַמִּי אָתָּה.", "english": "Rabbi Alexandri said: Whoever engages in Torah for its own sake brings peace to the heavenly entourage and to the earthly entourage, as it is said: “Or let him take hold of My strength; he will make peace for Me—peace he will make for Me.”\nRav said: It is as though he built a palace above and a palace below, as it is said: “And I will place My words in your mouth, and in the shadow of My hand I have covered you—to plant the heavens and to establish the earth.”\nRabbi Yoḥanan said: He even shields the entire world, as it is said: “And in the shadow of My hand I have covered you.” And Levi said: He even brings the Ge’ulah near, as it is said: “And to say to Tziyon: You are My people.”"}, {"location": "Avodah Zarah 19a", "hebrew": "וְאָמַר רָבָא: לְעוֹלָם לִיגְרֵיס אִינִישׁ, וְאַף עַל גַּב דִּמְשַׁכַּח, וְאַף עַל גַּב דְּלָא יָדַע מַאי קָאָמַר, שֶׁנֶּאֱמַר: ״גָּרְסָה נַפְשִׁי לְתַאֲבָה״, ״גָּרְסָה״ כְּתִיב וְלָא כְּתִיב ״טָחֲנָה״.", "english": "Rava said: A person should always learn (by repetition), even though he forgets, and even though he does not know what he is saying, as it is said: “My soul has ground itself with longing”—it is written “garsah” (ground/chewed) and it is not written “taḥanah” (milled)."}, {"location": "Bereishit Rabbah 1:1", "hebrew": "דָּבָר אַחֵר אָמוֹן, אֻמָּן. הַתּוֹרָה אוֹמֶרֶת אֲנִי הָיִיתִי כְּלִי אֻמְנוּתוֹ שֶׁל הַקָּדוֹשׁ בָּרוּךְ הוּא, בְּנֹהַג שֶׁבָּעוֹלָם מֶלֶךְ בָּשָׂר וָדָם בּוֹנֶה פָּלָטִין, אֵינוֹ בּוֹנֶה אוֹתָהּ מִדַּעַת עַצְמוֹ אֶלָּא מִדַּעַת אֻמָּן, וְהָאֻמָּן אֵינוֹ בּוֹנֶה אוֹתָהּ מִדַּעַת עַצְמוֹ אֶלָּא דִּפְתְּרָאוֹת וּפִנְקְסָאוֹת יֵשׁ לוֹ, לָדַעַת הֵיאךְ הוּא עוֹשֶׂה חֲדָרִים, הֵיאךְ הוּא עוֹשֶׂה פִּשְׁפְּשִׁין. כָּךְ הָיָה הַקָּדוֹשׁ בָּרוּךְ הוּא מַבִּיט בַּתּוֹרָה וּבוֹרֵא אֶת הָעוֹלָם, וְהַתּוֹרָה אָמְרָה בְּרֵאשִׁית בָּרָא אֱלֹהִים. וְאֵין רֵאשִׁית אֶלָּא תּוֹרָה, הֵיאַךְ מָה דְּאַתְּ אָמַר (משלי ח, כב): ה' קָנָנִי רֵאשִׁית דַּרְכּוֹ.", "english": "Another interpretation: “Amon” means “artisan.” The Torah says: I was the tool of craftsmanship of the Holy One, blessed be He. For the way of the world is that a flesh-and-blood king who builds a palace does not build it from his own understanding, but according to the understanding of an architect. And the architect does not build from his own understanding alone; he has plans and notebooks, to know how to make rooms and how to make doorways. So too the Holy One, blessed be He, looked into the Torah and created the world; and the Torah said: “In the beginning God created.” “Beginning” is nothing but Torah, as you say: “The LORD acquired me as the beginning of His way” (Prov. 8:22)."}, {"location": "Devarim Rabbah 8:3", "hebrew": "זֶה שֶׁאָמַר הַכָּתוּב (משלי כד, ז): רָאמוֹת לֶאֱוִיל חָכְמוֹת בַּשַּׁעַר לֹא יִפְתַּח פִּיהוּ, מַהוּ רָאמוֹת לֶאֱוִיל חָכְמוֹת, אָמַר רַבִּי תַּנְחוּמָא הַטִּפֵּשׁ הַזֶּה נִכְנַס לְבֵית הַכְּנֶסֶת וְהוּא רוֹאֶה אוֹתָן שֶׁנּוֹשְׂאִים וְנוֹתְנִים בַּתַּלְמוּד וְהוּא אֵינוֹ יוֹדֵעַ מָה הֵן אוֹמְרִין, הוּא מִתְבַּיֵּשׁ, שֶׁנֶּאֱמַר: בַּשַּׁעַר לֹא יִפְתַּח פִּיהוּ, וְאֵין שַׁעַר אֶלָּא סַנְהֶדְרִין, דִּכְתִיב (דברים כה, ז): וְעָלְתָה יְבִמְתּוֹ הַשַּׁעֲרָה אֶל הַזְּקֵנִים. דָּבָר אַחֵר, רַבָּנָן אָמְרֵי הַטִּפֵּשׁ הַזֶּה נִכְנַס לְבֵית הַכְּנֶסֶת וְרוֹאֶה אוֹתָן עוֹסְקִים בַּתּוֹרָה, וְהוּא אוֹמֵר לָהֶן הֵיאַךְ אָדָם לָמֵד תּוֹרָה תְּחִלָּה, אוֹמְרִים לוֹ תְּחִלָּה קוֹרֵא בַּמְגִלָּה, וְאַחַר כָּךְ בַּסֵּפֶר, וְאַחַר כָּךְ בַּנְּבִיאִים, וְאַחַר כָּךְ בַּכְּתוּבִים, מִשֶּׁהוּא גּוֹמֵר אֶת הַמִּקְרָא שׁוֹנֶה אֶת הַתַּלְמוּד, וְאַחַר כָּךְ בַּהֲלָכוֹת, וְאַחַר כָּךְ בַּאַגָּדוֹת, כֵּיוָן שֶׁשּׁוֹמֵעַ כָּךְ אוֹמֵר בְּלִבּוֹ אֵימָתַי אֲנִי לָמֵד כָּל זֹאת וְחוֹזֵר מִן הַשַּׁעַר, הֱוֵי בַּשַּׁעַר לֹא יִפְתַּח פִּיהוּ. אָמַר רַבִּי יַנַּאי לְמָה הַדָּבָר דּוֹמֶה, לְכִכָּר שֶׁהָיָה תָּלוּי בָּאֲוִיר, טִפֵּשׁ אוֹמֵר מִי יוּכַל לַהֲבִיאוֹ, וּפִקֵּחַ אוֹמֵר לֹא אֶחָד תָּלָה אוֹתוֹ, מֵבִיא סֻלָּם אוֹ קָנֶה וּמוֹרִיד אוֹתוֹ. כָּךְ כָּל מִי שֶׁהוּא טִפֵּשׁ אוֹמֵר אֵימָתַי אֶקְרָא כָּל הַתּוֹרָה, וּמִי שֶׁהוּא פִּקֵּחַ מַהוּ עוֹשֶׂה, שׁוֹנֶה פֶּרֶק אֶחָד בְּכָל יוֹם וָיוֹם עַד שֶׁמְסַיֵּם כָּל הַתּוֹרָה כֻּלָּהּ, אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא: לֹא נִפְלֵאת הִוא, וְאִם נִפְלֵאת הִיא, מִמְּךָ, שֶׁאֵין אַתָּה עָסוּק בָּהּ, הֱוֵי כִּי הַמִּצְוָה הַזֹּאת.", "english": "This is what Scripture says: “Wisdom is too high for a fool; at the gate he will not open his mouth” (Prov. 24:7). What does it mean, “Wisdom is too high for a fool”? Rabbi Tanchuma said: this fool enters the synagogue and sees them debating in Talmud, and he does not know what they are saying; he is ashamed, as it is said: “At the gate he will not open his mouth.” And “gate” refers to the Sanhedrin, as it is written: “And his brother’s wife shall go up to the gate, to the elders” (Deut. 25:7). Another interpretation: the fool enters the synagogue and sees them engaged in Torah, and he says to them, “How does a person begin learning Torah?” They tell him: first he reads in the scroll, then in the book; then in the Prophets; then in the Writings. After he finishes Scripture, he learns Talmud; afterward laws; afterward aggadot. When he hears this he says in his heart, “When will I ever learn all that?” and he turns back from the gate—thus, “At the gate he will not open his mouth.” Rabbi Yannai said: To what is this like? To a loaf of bread hanging in the air. A fool says, “Who can bring it?” But a wise person says, “Didn’t one person hang it?” He brings a ladder or a pole and takes it down. So too, anyone foolish says, “When will I read the whole Torah?” But one who is wise—what does he do? He learns one chapter each day, until he completes the entire Torah. The Holy One, blessed be He, said: “It is not too wondrous”—and if it is too wondrous, it is because of you, for you are not engaged in it—thus, “this commandment.”"}, {"location": "Avodah Zarah 19a", "hebrew": "״כִּי אִם בְּתוֹרַת ה׳ חֶפְצוֹ״, אָמַר רַבִּי: אֵין אָדָם לוֹמֵד תּוֹרָה אֶלָּא מִמָּקוֹם שֶׁלִּבּוֹ חָפֵץ, שֶׁנֶּאֱמַר: ״כִּי אִם בְּתוֹרַת ה׳ חֶפְצוֹ״. \nלֵוִי וְרַבִּי שִׁמְעוֹן בְּרַבִּי יָתְבִי קַמֵּיהּ דְּרַבִּי, וְקָא פָּסְקִי סִידְרָא. סְלֵיק סִפְרָא, לֵוִי אָמַר: לַיְיתוֹ [לַן] מִשְׁלֵי, רַבִּי שִׁמְעוֹן בְּרַבִּי אָמַר: לַיְיתוֹ [לַן] תִּילִּים. כַּפְיֵיהּ לְלֵוִי וְאַיְיתוֹ תִּילִּים, כִּי מְטוֹ הָכָא ״כִּי אִם בְּתוֹרַת ה׳ חֶפְצוֹ״, פָּרֵישׁ רַבִּי וַאֲמַר: אֵין אָדָם לוֹמֵד תּוֹרָה אֶלָּא מִמָּקוֹם שֶׁלִּבּוֹ חָפֵץ. אָמַר לֵוִי: רַבִּי, נָתַתָּ לָנוּ רְשׁוּת לַעֲמוֹד.", "english": "“Rather, in the Torah of HaShem is his desire”—Rabbi said: A person learns Torah only from the place his heart desires, as it is said: “Rather, in the Torah of HaShem is his desire.” \nLevi and Rabbi Shim’on son of Rabbi were sitting before Rabbi, and they were dividing the order (of study). When the book was finished, Levi said: Bring for us Mishlei. Rabbi Shim’on son of Rabbi said: Bring for us Tehillim. Rabbi compelled Levi and brought Tehillim. When they reached here—“Rather, in the Torah of HaShem is his desire”—Rabbi explained and said: A person learns Torah only from the place his heart desires. Levi said: Rabbi, you have given us permission to arise (to leave)."}, {"location": "Sifrei, Ha'azinu 306", "hebrew": "רַבִּי יְהוּדָה אוֹמֵר: לְעוֹלָם הָוֵי אָדָם כּוֹנֵס דִבְרֵי תוֹרָה כְּלָלִים, שֶׁאִם כּוֹנְסָן פְּרָטִים - מְיַגְּעִים אוֹתוֹ, וְאֵין יוֹדֵעַ מָה לַעֲשׂוֹת. מָשָׁל לְמֶלֶךְ שֶׁהָלַךְ לְקֵיסָרִי וְצָרִיךְ מֵאָה זוּז אוֹ מָאתַיִם זוּז הוֹצָאָה: נוֹטְלִים פְּרָט - מְיַגְּעִים אוֹתוֹ, וְאֵין יוֹדֵעַ מָה לַעֲשׂוֹת; אֲבָל אִם מְצָרְפָם, וְעוֹשֶׂה אוֹתוֹ סְלָעִים - פּוֹרֵט וּמוֹצִיא בְּכָל מָקוֹם שֶׁיִּרְצֶה.", "english": "Rabbi Yehudah says: A person should always gather words of Torah as general principles; for if he gathers them as particulars, they weary him and he does not know what to do. A parable: To a king who went to Caesarea and needs one hundred zuz or two hundred zuz for expenses—if they take (money) in small change, they weary him and he does not know what to do; but if he combines them and makes them into sela’im, he can break (a coin) and spend in any place he wishes."}, {"location": "Gittin 43a", "hebrew": "הֲדַר אוֹקֵים רַבָּה בַּר רַב הוּנָא אָמוֹרָא עֲלֵיהּ, וּדְרַשׁ: ״וְהַמַּכְשֵׁלָה הַזֹּאת תַּחַת יָדֶיךָ״ – אֵין אָדָם עוֹמֵד עַל דִּבְרֵי תוֹרָה, אֶלָּא אִם כֵּן נִכְשָׁל בָּהֶן.", "english": "Then Rabbah bar Rav Huna appointed a spokesman for him, and expounded: “And this stumbling-block shall be under your hand”—a person does not truly grasp words of Torah unless he has first stumbled in them."}, {"location": "Eruvin 54a", "hebrew": "אָמַר רַב מַתְנָה: מַאי דִּכְתִיב ״וּמִמִּדְבָּר מַתָּנָה״, אִם מֵשִׂים אָדָם עַצְמוֹ כְּמִדְבָּר זֶה שֶׁהַכֹּל דָּשִׁין בּוֹ — תַּלְמוּדוֹ מִתְקַיֵּים בְּיָדוֹ. וְאִם לָאו — אֵין תַּלְמוּדוֹ מִתְקַיֵּים בְּיָדוֹ.", "english": "Rav Matna said: What is the meaning of what is written, “And from the wilderness—Mattanah”? If a person makes himself like this wilderness, upon which everyone treads—his learning endures in his hand; and if not—his learning does not endure in his hand."}, {"location": "Berakhot 63a", "hebrew": "וְעוֹד פָּתַח רַבִּי יְהוּדָה בִּכְבוֹד תּוֹרָה וְדָרַשׁ: ״הַסְכֵּת וּשְׁמַע יִשְׂרָאֵל הַיּוֹם הַזֶּה נִהְיֵיתָ לְעָם״, וְכִי אוֹתוֹ הַיּוֹם נִתְּנָה תּוֹרָה לְיִשְׂרָאֵל? וַהֲלֹא אוֹתוֹ יוֹם סוֹף אַרְבָּעִים שָׁנָה הָיָה! אֶלָּא לְלַמֶּדְךָ שֶׁחֲבִיבָה תּוֹרָה עַל לוֹמְדֶיהָ בְּכָל יוֹם וָיוֹם כַּיּוֹם שֶׁנִּתְּנָה מֵהַר סִינַי.", "english": "Rabbi Yehudah further opened with the honor of Torah and expounded: “Be attentive and hear, Yisrael—this day you have become a people.” Was it on that day that Torah was given to Yisrael? Behold, that day was at the end of forty years! Rather, it teaches you that Torah is beloved to those who learn it every single day, like the day it was given from Har Sinai."}, {"location": "Berakhot 22a", "hebrew": "דְּתַנְיָא: ״וְהוֹדַעְתָּם לְבָנֶיךָ וְלִבְנֵי בָנֶיךָ״, וּכְתִיב בָּתְרֵיהּ ״יוֹם אֲשֶׁר עָמַדְתָּ לִפְנֵי ה׳ אֱלֹקֶיךָ בְּחוֹרֵב״, מָה לְהַלָּן בְּאֵימָה וּבְיִרְאָה וּבִרְתֵת וּבְזִיעַ, אַף כָּאן בְּאֵימָה וּבְיִרְאָה וּבִרְתֵת וּבְזִיעַ.", "english": "As it was taught: “And you shall make them known to your children and to your children’s children,” and it is written afterward: “The day you stood before HaShem your Elokim at Ḥorev”—just as there it was with awe and with fear and with trembling and with sweat, so too here it must be with awe and with fear and with trembling and with sweat."}, {"location": "Bava Batra 9a", "hebrew": "וְאָמַר רַב אַסִּי: שְׁקוּלָה צְדָקָה כְּנֶגֶד כָּל הַמִּצְוֹת, שֶׁנֶּאֱמַר: ״וְהֶעֱמַדְנוּ עָלֵינוּ מִצְוֹת וְגוֹ׳״ – ״מִצְוָה״ אֵין כְּתִיב כָּאן, אֶלָּא ״מִצְוֹת״.", "english": "Rav Assi said: Tzedakah is equal to all the mitzvos, as it is said: “And we established upon ourselves mitzvos…”—it does not say here “a mitzvah,” but rather “mitzvos.”"}, {"location": "Bava Batra 10a", "hebrew": "דָּרֵשׁ רַבִּי דּוֹסְתַּאי בְּרַבִּי יַנַּאי: בּוֹא וּרְאֵה, שֶׁלֹּא כְּמִדַּת הַקָּדוֹשׁ בָּרוּךְ הוּא – מִדַּת בָּשָׂר וָדָם; מִדַּת בָּשָׂר וָדָם, אָדָם מֵבִיא דּוֹרוֹן גָּדוֹל לַמֶּלֶךְ – סָפֵק מְקַבְּלִין אוֹתוֹ הֵימֶנּוּ, סָפֵק אֵין מְקַבְּלִין אוֹתוֹ הֵימֶנּוּ; [וְאִם תִּמְצָא לוֹמַר מְקַבְּלִים אוֹתוֹ מִמֶּנּוּ –] סָפֵק רוֹאֶה פְּנֵי הַמֶּלֶךְ, סָפֵק אֵינוֹ רוֹאֶה פְּנֵי הַמֶּלֶךְ. וְהַקָּדוֹשׁ בָּרוּךְ הוּא אֵינוֹ כֵּן, אָדָם נוֹתֵן פְּרוּטָה לֶעָנִי – זוֹכֶה וּמְקַבֵּל פְּנֵי שְׁכִינָה, שֶׁנֶּאֱמַר: ״אֲנִי בְּצֶדֶק אֶחֱזֶה פָנֶיךָ, אֶשְׂבְּעָה בְהָקִיץ תְּמוּנָתֶךָ״.", "english": "Rabbi Dostai son of Rabbi Yannai expounded: Come and see that the attribute of HaKadosh Baruch Hu is not like the attribute of flesh and blood. With flesh and blood: a person brings a great gift to the king—perhaps they accept it from him, perhaps they do not accept it from him; and even if you would say they accept it from him—perhaps he sees the king’s face, perhaps he does not see the king’s face. But HaKadosh Baruch Hu is not so: a person gives a perutah to a poor man—he merits and receives the Face of the Shechinah, as it is said: “As for me, in righteousness I will behold Your face; I will be satisfied, upon awakening, with Your likeness.”"}, {"location": "Shabbat 156b", "hebrew": "וּמִדְּרַבִּי עֲקִיבָא נָמֵי אֵין מַזָּל לְיִשְׂרָאֵל. דְּרַבִּי עֲקִיבָא הַוְיָא לֵיהּ בְּרַתָּא, אָמְרִי לֵיהּ כַּלְדָּאֵי: הָהוּא יוֹמָא דְּעָיְילָה לְבֵי גְנָנָא, טָרֵיק לַהּ חִיוְיָא, וּמִיתָא. הֲוָה דָּאֵיג אַמִּילְּתָא טוּבָא. הָהוּא יוֹמָא שְׁקַלְתַּהּ לְמַכְבַּנְתָּא, דַּצְתַּהּ בְּגוּדָא, אִיתְרְמִי אִיתִּיב בְּעֵינֵיהּ דְּחִיוְיָא. לְצַפְרָא כִּי קָא שָׁקְלָה לַהּ, הֲוָה קָא סָרֵיךְ וְאָתֵי חִיוְיָא בָּתְרַהּ. אֲמַר לַהּ אֲבוּהּ: מַאי עֲבַדְתְּ? אֲמַרָה לֵיהּ בְּפַנְיָא אֲתָא עַנְיָא, קְרָא אַבָּבָא וַהֲווֹ טְרִידִי כּוּלֵּי עָלְמָא בִּסְעוּדְתָּא, וְלֵיכָּא דְּשָׁמְעֵיהּ. קָאֵימְנָא, שְׁקַלְתֵּיהּ לְרִיסְתָּנַאי דִּיהַבְתְּ לִי, יַהְבִתֵּיהּ נִיהֲלֵיהּ. אֲמַר לַהּ: מִצְוָה עֲבַדְתְּ. נְפַק רַבִּי עֲקִיבָא וּדְרַשׁ: ״וּצְדָקָה תַּצִּיל מִמָּוֶת״, וְלֹא מִמִּיתָה מְשׁוּנָּה, אֶלָּא מִמִּיתָה עַצְמָהּ.", "english": "From Rabbi Akiva as well (we learn): there is no mazal for Yisrael. For Rabbi Akiva had a daughter. The astrologers told him: On the day she enters the bridal canopy (lit., “the garden-house”), a snake will bite her and she will die. He worried greatly. That day she took her hairpin (???) and stuck it into the wall; it happened to lodge in the eye of the snake. In the morning, when she took it, the snake was drawn after it and came out. Her father said: What did you do? She said: In the evening a poor man came and called at the door, and everyone was busy with the meal and no one heard him. I rose, took my portion that was given to me, and gave it to him. He said: You performed a mitzvah. Rabbi Akiva went out and expounded: “And tzedakah saves from death”—not from an unusual death, but from death itself."}, {"location": "Bava Batra 9b", "hebrew": "אָמַר רַבִּי אֶלְעָזָר: גָּדוֹל הָעוֹשֶׂה צְדָקָה בַּסֵּתֶר, יוֹתֵר מִמֹּשֶׁה רַבֵּינוּ – דְּאִילּוּ בְּמֹשֶׁה רַבֵּינוּ כְּתִיב: ״כִּי יָגֹרְתִּי מִפְּנֵי הָאַף וְהַחֵמָה״, וְאִילּוּ בְּעוֹשֶׂה צְדָקָה כְּתִיב: ״מַתָּן בַּסֵּתֶר יִכְפֶּה אָף, [וְשֹׁחַד בַּחֵק חֵמָה עַזָּה]״.", "english": "Rabbi Elazar said: Great is one who does tzedakah in secret—greater than Moshe Rabbeinu. For regarding Moshe Rabbeinu it is written: “For I was afraid because of the anger and the wrath,” whereas regarding one who does tzedakah it is written: “A gift in secret will subdue anger, and a bribe in the bosom—strong wrath.”"}, {"location": "Ketubot 111b", "hebrew": "מְסַיַּיע לֵיהּ לְרַבִּי יוֹחָנָן, דְּאָמַר רַבִּי יוֹחָנָן: טוֹב הַמַּלְבִּין שִׁינַּיִם לַחֲבֵירוֹ יוֹתֵר מִמַּשְׁקֵהוּ חָלָב, שֶׁנֶּאֱמַר: ״וּלְבֶן שִׁנַּיִם מֵחָלָב״, אַל תִּקְרֵי ״לְבֶן שִׁינַּיִם״ אֶלָּא ״לִבּוּן שִׁינַּיִם״.", "english": "This supports Rabbi Yoḥanan, for Rabbi Yoḥanan said: Better is one who “whitens teeth” for his fellow than one who gives him milk to drink, as it is said: “And the whiteness of teeth is more than milk”—do not read “whiteness (leven) of teeth,” but rather “whitening (libbun) of teeth.”"}, {"location": "Avot DeRabbi Natan 29:3", "hebrew": "רבי חנניא בן יעקב אומר הניעור בלילה מתוך דברי תורה סימן יפה לו. מתוך דברי שיחה סימן רע לו ר׳ יעקב בן חנניה אומר הניעור בלילה ואינו פותח פיו בדברי תורה ראוי לו ומוטב לו שנהפכה לו שלייתו של אמו על פניו ולא יצא לאויר העולם ולא ראה את העולם:", "english": "Rabbi Ḥananya ben Yaakov says: One who is awake at night because of words of Torah—it is a good sign for him. (But) because of words of idle talk—it is a bad sign for him. Rabbi Yaakov son of Ḥananya says: One who is awake at night and does not open his mouth with words of Torah—it would be fitting and better for him had his mother’s afterbirth been turned over his face, so that he would not have come out into the air of the world and not seen the world."}, {"location": "Yalkut Shimoni on Nach 950", "hebrew": "ושך שבטו שונא בנו. וכי יש אדם ששונא בנו, אלא מתוך שאין מוכיחו על התורה והחכמה ודרך ארץ עתיד לשנאתו, אבל אם מוכיחו נעשה אוהבו שנאמר ואוהבו שחרו מוסר, וכן הקב\"ה מתוך שהוא אוהב את הצדיקים מיסרן בעולם הזה ביסורין ובשעבוד מלכיות כדי שתהא להם לכפרת עון:", "english": "“One who withholds his rod hates his son.” Is there a person who hates his son? Rather, because he does not rebuke him regarding Torah, wisdom, and derech eretz—he will eventually come to hate him. But if he rebukes him, he becomes one who loves him, as it is said: “And one who loves him seeks him early with discipline.” So too HaKadosh Baruch Hu—because He loves the righteous, He afflicts them in this world with sufferings and with subjugation to kingdoms, so that it will be for them an atonement for sin."}, {"location": "Tractate Semachot 2:4-6", "hebrew": "ומעשה בבנו של גורגיוס שברח מבית הספר, והראה לו אביו באזנו, ונתיירא מאביו, והלך ואיבד עצמו בבור, ושאלו לרבי טרפון ואמר אין מונעין הימנו כל דבר. ושוב מעשה בתינוק אחד מבני ברק ששיבר צלוחית, והראה לו אביו באזנו, ונתיירא ממנו, והלך ואיבד עצמו בבור, ובאו ושאלו לרבי עקיבא, ואמר אין מונעין הימנו כל דבר. ומיכן אמרו חכמים אל יראה אדם לתינוק באזנו אלא מלקהו מיד, או שותק ולא אומר כלום. רבי שמעון בן אלעזר אומר: יצר, תינוק ואישה תהא שמאל דוחה וימין מקרבת.", "english": "And there was an incident with the son of Georgios who fled from school; his father “showed him in his ear” (i.e., threatened him by pulling/gesturing at his ear), and he feared his father, went and destroyed himself in a pit. They asked Rabbi Tarfon, and he said: One does not withhold from him anything. And again there was an incident with a child from Bnei Brak who broke a small dish; his father “showed him in his ear,” and he feared him, went and destroyed himself in a pit. They came and asked Rabbi Akiva, and he said: One does not withhold from him anything. From here the Chachamim said: A person should not “show (threaten) a child in his ear”; rather, he should strike him immediately, or be silent and say nothing. Rabbi Shim’on ben Elazar says: (Regarding) the yetzer, a child, and a woman—let the left hand push away, and the right hand draw near."}, {"location": "Bereishit Rabbah 54:3", "hebrew": "וְהוֹכִחַ אַבְרָהָם אֶת אֲבִימֶלֶךְ וגו' (בראשית כא, כה), אָמַר רַבִּי יוֹסֵי בַּר חֲנִינָא הַתּוֹכַחַת מְבִיאָה לִידֵי אַהֲבָה, שֶׁנֶּאֱמַר (משלי ט, ח): הוֹכַח לְחָכָם וְיֶאֱהָבֶךָּ, הִיא דַּעְתֵּיהּ דְּרַבִּי יוֹסֵי בַּר חֲנִינָא דְּאָמַר כָּל אַהֲבָה שֶׁאֵין עִמָּהּ תּוֹכָחָה אֵינָהּ אַהֲבָה. אָמַר רֵישׁ לָקִישׁ תּוֹכָחָה מְבִיאָה לִידֵי שָׁלוֹם, וְהוֹכִחַ אַבְרָהָם אֶת אֲבִימֶלֶךְ, הִיא דַּעְתֵּיהּ דְּאָמַר כָּל שָׁלוֹם שֶׁאֵין עִמּוֹ תּוֹכָחָה אֵינוֹ שָׁלוֹם.", "english": "“And Avraham rebuked Avimelech…” Rabbi Yosi bar Ḥanina said: Rebuke brings to love, as it is said: “Rebuke a wise man and he will love you.” This is his view, for he said: Any love that does not have rebuke with it is not love. Reish Lakish said: Rebuke brings to peace; “and Avraham rebuked Avimelech”—this is his view, for he said: Any peace that does not have rebuke with it is not peace."}, {"location": "Midrash Tehillim 92:13", "hebrew": "מעשה באחד שהיה עושה דייתיקי ואמר לא יהא בני יורש מאומה משלי עד שיעשה שוטה, הלך ר' יוסי בר יהודה ורבי לשאול את המעשה הזה לר' יהושע בן קרחה והוציאו מחוץ, וראה אותו מרגיע על ידיו ועל רגליו, ונמה נתון לתוך פיח, והוא נמשך אחר בנו, וכיון שראו אותו הטמינו עצמן והכניסו אצלו, שאלו אותו המעשה התחיל משחק ואמר להם חייכם זה המעשה ששאלתם עכשיו הגיעני, אמר להם מכאן שאדם רואה בנים כאילו משתטה הוא:", "english": "There was an incident with someone who was making a “dayteiki” (a will/testament) and said: My son shall inherit nothing of mine until he becomes a fool. Rabbi Yosi bar Yehudah and Rabbi went to ask about this incident with Rabbi Yehoshua ben Korḥah. They took him outside, and saw him calming (???) upon his hands and upon his feet, and dozing, placed into soot/ash (???), and he was drawn along after his son. When they saw him, they hid themselves, and brought (the matter) to him. They asked him about the incident; he began to laugh and said to them: By your lives, this is the incident you asked—now it has come to me. He said to them: From here (we learn) that when a person sees children, it is as though he becomes foolish."}, {"location": "Jerusalem Talmud, Berakhot 9:1", "hebrew": "אִי אֶפְשַׁר לָאִישׁ בְּלֹא אִשָּׁה. וְאִי אֶפְשַׁר לְאִישָּׁה בְּלֹא אִישׁ. אִי אֶפְשַׁר לִשְׁנֵיהֶן בְּלֹא שְׁכִינָה.", "english": "It is impossible for a man without a woman. And it is impossible for a woman without a man. It is impossible for the two of them without the Shechinah."}, {"location": "Sotah 17a", "hebrew": "דָּרֵישׁ רַבִּי עֲקִיבָא: אִישׁ וְאִשָּׁה זָכוּ — שְׁכִינָה בֵּינֵיהֶן. לֹא זָכוּ — אֵשׁ אוֹכַלְתָּן.", "english": "Rabbi Akiva expounded: If a man and a woman merit—it is the Shechinah between them. If they do not merit—fire consumes them."}, {"location": "Sifra Bechukotai 1:8", "hebrew": "שמא תאמרו הרי מאכל, הרי משתה; אם אין שלום, אין כלום!", "english": "Lest you say: Here is food, here is drink—if there is no shalom, there is nothing at all!"}, {"location": "Gittin 59b", "hebrew": "כָּל הַתּוֹרָה כּוּלָּהּ נָמֵי מִפְּנֵי דַּרְכֵי שָׁלוֹם.", "english": "The entire Torah as well (was ordained) because of the ways of shalom."}, {"location": "Mishnah Oktzin 3:12", "hebrew": "אָמַר רַבִּי שִׁמְעוֹן בֶּן חֲלַפְתָּא, לֹא מָצָא הַקָּדוֹשׁ בָּרוּךְ הוּא כְּלִי מַחֲזִיק בְּרָכָה לְיִשְׂרָאֵל אֶלָּא הַשָּׁלוֹם.", "english": "Rabbi Shim’on ben Ḥalafta said: HaKadosh Baruch Hu found no vessel that holds blessing for Yisrael except shalom."}, {"location": "Vayikra Rabbah 9:9; Jerusalem Talmud Sotah 1:4", "hebrew": "תָּנֵי רַבִּי יִשְׁמָעֵאל גָּדוֹל שָׁלוֹם שֶׁשֵּׁם הַגָּדוֹל שֶׁנִּכְתַּב בִּקְדֻשָּׁה אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא יִמָּחֶה בַּמַּיִם כְּדֵי לְהַטִּיל שָׁלוֹם בֵּין אִישׁ לְאִשְׁתּוֹ. רַבִּי מֵאִיר הֲוָה יָתִיב וְדָרִישׁ בְּלֵילֵי שַׁבַּתָּא הֲוָה תַּמָּן חָדָא אִתְּתָא יַצִּיבָא וְשָׁמְעָה לֵיהּ תָּנְתָא מִדְרָשָׁא, אַמְתִּינַת עַד דִּיחֲסַל מִמִּדְרָשׁ, אָזְלָה לְבֵיתָהּ אַשְׁכְּחָא בּוּצִינָא טָפֵי, אֲמַר לָהּ בַּעְלָהּ אָן הֲוֵית, אָמְרָה לֵיהּ אֲנָא יָתִיבָא וְשָׁמְעָה קָלֵיהּ דָּרוֹשָׁה, אֲמַר לָהּ כֵּן וְכֵן לָא אִעַיַּלְתְּ לְהָכָא עַד דַּאֲזַלְתְּ וְרוֹקַת בְּאַנְפֵּי דָרוֹשָׁה, יְתִיבָא שַׁבַּתָּא קַמַּיְיתָא תִּנְיָנָא וּתְלִיתָא, אֲמָרִין לָהּ מְגֵירָתָא כַּדּוּ אַתּוּן צְהִיבִין, אֲתֵינָן עִמָּךְ לְגַבֵּי דָּרוֹשָׁה, כֵּיוָן דְּחָמֵי יַתְהוֹן רַבִּי מֵאִיר צָפָה בְּרוּחַ הַקֹּדֶשׁ, אֲמַר לְהוֹ אִית מִנְּכוֹן אִתְּתָא דְּחַכִּימָא לְמִלְחַשׁ בְּעֵינָא, אֲמָרִין לָהּ מְגֵירָתָא כַּדּוּ אַתְּ אָזְלַת וְרוֹקַת בְּאַנְפֵּיהּ וְתִשְׁרֵי לְבַעֲלִךְ, כֵּיוָן דְּיָתְבָא קַמֵּי אִידְחִילַת מִינֵיהּ, אֲמָרָה לֵיהּ רַבִּי לֵית אֲנָא חַכִּימָא לְמִילְחַשׁ עֵינָא, אֲמַר לָהּ אֲפִלּוּ הָכֵי רוֹקִי בְּאַנְפִּי שְׁבַע זִמְנִין וַאֲנָא מִינְשִׁים, עָבְדָה הָכִין. אֲמַר לָהּ אִיזִילִי אִמְרִי לְבַעֲלִיךָ אַתְּ אֲמַרְתְּ חָדָא זִימְנָא וַאֲנָא רָקֵית שְׁבַע זִימְנִין. אָמְרוּ לוֹ תַּלְמִידָיו רַבִּי כָּךְ מְבַזִּין אֶת הַתּוֹרָה, לָא הֲוָה לָךְ לְמֵימַר לְחַד מִינָן לְמִלְחַשׁ לָךְ, אֲמַר לְהוֹ לָא דַּיּוֹ לְמֵאִיר לִהְיוֹת שָׁוֶה לְקוֹנוֹ, דְּתָנֵי רַבִּי יִשְׁמָעֵאל גָּדוֹל שָׁלוֹם שֶׁשֵּׁם הַגָּדוֹל שֶׁנִּכְתַּב בִּקְדֻשָּׁה אָמַר הַקָּדוֹשׁ בָּרוּךְ הוּא יִמָּחֶה עַל הַמַּיִם בִּשְׁבִיל לְהַטִּיל שָׁלוֹם בֵּין אִישׁ לְאִשְׁתּוֹ.", "english": "Rabbi Yishmael taught: Great is peace—for the Great Name that is written in holiness, the Holy One, blessed be He, said that it may be erased in water in order to make peace between a man and his wife. Rabbi Meir would sit and teach on Friday nights. There was a certain woman who regularly came and heard his teaching in the study hall; she stayed until the lecture ended. She went home and found the lamp already extinguished. Her husband said to her, “Where were you?” She said to him, “I was sitting and hearing the voice of the preacher.” He said to her, “By such-and-such, you will not enter here again until you go and spit in the face of the preacher.” She sat out the first Shabbat, the second, and the third. Her neighbors said to her, “Why are your cheeks so pale? Come with us to the preacher.” When Rabbi Meir saw them, he perceived by divine inspiration. He said to them, “Is there among you a woman who knows how to whisper an incantation over an eye?” They said to her, “Neighbor, go and spit in his face and you will be reconciled with your husband.” When she sat before him, she was afraid of him. She said, “My master, I do not know how to whisper over an eye.” He said to her, “Even so, spit in my face seven times and I will be ‘healed.’” She did so. He said to her, “Go—tell your husband: you said it once, and I spat seven times.” His students said to him, “Rabbi—do they disgrace the Torah like this? Should you not have told one of us to whisper for you?” He said to them: “Is it not enough for Meir to be equal to his
